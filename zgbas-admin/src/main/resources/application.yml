# zgbas-plus shared config — public keys + framework behavior (D-P2-14).
# Secrets live in application-{dev,prod}.yml, never here.
server:
  port: 8080                                          # D-P2-16
  servlet:
    context-path: /
    session:
      tracking-modes: cookie                          # WARNING 1: disable URL jsessionid (avoid redirect 400). Source application.properties L9.
      cookie:
        http-only: true                               # WARNING 1: source application.properties L10.
      timeout: 21600s                                 # WARNING 1: 6h session. Source L12 (old key server.session.timeout=21600), SB 2.5 maps to server.servlet.session.timeout; Duration suffix s = seconds.

spring:
  mvc:
    static-path-pattern: /static/**                   # BLOCKER 1: templates @{/static/css/...} resolve correctly. Spring Boot default /** would make /static/css/foo.css -> classpath:/static/static/css/foo.css (double static/) -> 404. Source application.properties L21.
  main:
    allow-bean-definition-overriding: true              # Rule 1 fix: 11 sign-client @FeignClient share name="sign" -> FeignClientSpecification override (Spring Cloud OpenFeign standard)
  application:
    name: zgbas-plus
  flyway:
    enabled: false                                     # D-P2-02 (no schema mutation)
  jpa:
    hibernate:
      # D-P2-02 intended validate to surface entity/schema drift. Validate DID surface real
      # drift (e.g. api_param: entity varchar(255) vs DB mediumtext — pre-existing across 239
      # entities, source project ran with implicit ddl-auto=none). Drift fix is out of Phase 2
      # scope (CONTEXT.md deferred: "涉及 259 表结构变更"). Set to none to match source behavior
      # and unblock startup verification (D-P2-03 primary goal). Drift tracked as deferred debt.
      ddl-auto: none
    show-sql: false                                    # Discretion: copy source behavior
    properties:
      hibernate:
        generate_statistics: false                       # was true (Phase-2 startup-drift instrumentation, not source behavior); off to stop collecting + silence the "Session Metrics" listener spam
        cache:
          use_second_level_cache: true                 # ehcache 2nd-level (Discretion: copy source)
          use_query_cache: true
          region:
            factory_class: org.hibernate.cache.ehcache.SingletonEhCacheRegionFactory
      javax.persistence:
        sharedCache:
          mode: ENABLE_SELECTIVE                       # @Cache entities only
  aop:
    auto: true
    proxy-target-class: true

mybatis-plus:
  mapper-locations: classpath:/mybatis/mappers/*Mapper.xml
  # Phase 5 Wave 0 (D-P5-07 part 1): append report entity + vo packages so 53 Rpt*Mapper.xml
  # resultType / parameterType FQNs resolve. mapper-locations unchanged — 53 report XML drop
  # alongside SampleMapper.xml and are picked up by the existing glob.
  # Pitfall 4 defense: client.entity kept; report.client.{entity,vo} added for report XML FQN refs.
  type-aliases-package: >-
    com.spt.bas.client.entity,
    com.spt.bas.report.client.entity,
    com.spt.bas.report.client.vo

logging:
  level:
    com.spt: info
    org.springframework: warn
    org.hibernate.stat: OFF                             # silence "Session Metrics" console spam (StatisticalLoggingSessionEventListener)
