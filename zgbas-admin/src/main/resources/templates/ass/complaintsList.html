<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <title>投诉列表</title>
    <th:block th:replace="~{layouts/include :: include}"></th:block>
</head>
<body class="easyui-layout">
<div region="north" class="search_div pt20	pl20 pr20 pb15 ofh" border="false">
    <input type="hidden" id="currentUserId" th:value="${@shiroUtil.getCurrentUserId()}">
    <form id="searchForm" class="form-search from-input-layout" method="post">
        <div class="mb6">
            <p class="yw-table-filter">
                <label>投诉类型</label>
                <input  class="control" id="src_complaintsType" type="text" name="search_EQS_complaintsType"/>
            </p>
            <p class="yw-table-filter">
                <label>投诉人</label>
                <input  class="control" id="src_fromUserName" type="text" name="search_LIKES_fromUserName"/>
            </p>
            <a href="#" class="easyui-linkbutton btn64" onclick="Convert.search('searchForm','complaint_table');">查询</a>
            <a href="#"class="easyui-linkbutton btn-empty btn64 ml10" onclick="$('#searchForm').form('reset');">清空</a>
        </div>
    </form>
    <div id="btn" class="add-btn" style="margin-top: 10px">
        <a  href="#" class="easyui-linkbutton btn64 addBtn" onclick="editComplaints(0)">我要投诉</a>
    </div>
</div>
<div region="center" border="false" class="panel_padding"  style="padding-right:20px;padding-left:20px;">
    <table id="complaint_table" fit="true" title="" iconCls="icon-edit" singleSelect="true" idField="id"></table>
</div>
<div id="w_complaints" title="新增投诉" data-options="width:530,height:400"></div>
<script type="text/javascript">
    var lastIndex=0;
    var _complaintsTypeJson=eval('[(${complaintsTypeJson})]');
    var _userTree = eval('[(${userTree})]');
    var _deptTree = eval('[(${deptTree})]');
    var _complainsFlg = eval('[(${complainsFlg})]');
    var _currentUserId = $("#currentUserId").val();
    $(function(){

        $("#src_complaintsType").combobox({
            data:_complaintsTypeJson,
            textField : 'dictName',
            valueField : 'dictCd',
            panelHeight: 'auto',
            editable : false
        });


        $('#complaint_table').datagrid({
            pagination:true,
            pageSize:30,
            rownumbers:true,
            showFooter:true,
            queryParams:Convert.getJson4Form('searchForm'),
            pageList:[500,200,100,50,30,20],
            url:_ctx+"/ass/complaints/findComplaintsPage",
            columns: [ [
                {field:'fromUserName',title:'投诉人',align:"left", width:110},
                {field:'createdDate',title:'投诉时间', align:"center", width:120, formatter:formatterData},
                {field:'complaintsType',title:'投诉类型', align:"center", width:110,formatter:function (value){
                    return Convert.findValueByKey(_complaintsTypeJson,"dictCd",value,"dictName");
                }},
                {field:'toUserName',title:'被投诉人', align:"left", width:120},
                {field:'toDeptName',title:'被投诉部门',align:"left", width:120},
                {field:'subject',title:'投诉事项',align:"left", width:150},
                {field:'content',title:'投诉内容',align:"left", width:450},
                {field:'status',title:'处理状态',align:"center", width:80,formatter:function (value){
                    if (value == '0'){
                        return '<span class="contract-btn contract-btn-2">未处理</span>';
                    }else if (value == '1'){
                        return '<span class="contract-btn contract-btn-10">已处理</span>';
                    }
                    return '';
                }},
                {field: 'option',title: '操作',align: "center",width: 100,formatter:function (value, row, index){
                    if (row.id){
                        var str = "";
                        if (_complainsFlg && row.status == '0'){
                            str = '<span class="contract-btn contract-btn-1" onclick="dealWithComplaints('+row.id+')">处理</span>';
                        }else if (row.status == '0' && _currentUserId == row.fromUserId){
                            str = '<img onclick="removeComplaints('+row.id+')" style="cursor:pointer;width:16px;hight:18px;" src="../static/new-version/images/icon_delete.png"/>';
                        }
                        return str;
                    }
                 }}
            ]],
            onDblClickRow: function (index, row) {
                lastIndex = index;
                editComplaints(row.id);
            },
            onClickRow: function (index, row) {
                lastIndex = index;
            },
            onLoadSuccess: function (data) {
                var total = $('#complaint_table').datagrid('getData').total;
                if (lastIndex > total - 1) {
                    lastIndex = total - 1;
                }
            }
        });

        $('#w_complaints').window({
            title : '新增投诉',
            modal : true,
            closed : true,
            collapsible : false,
            minimizable : false,
            maximizable : false,
            cache : false,
            onClose : function() {
                $('#complaint_table').datagrid('reload');
            }
        });
    });

    function dealWithComplaints(id){
        if (id){
            $.messager.confirm({
                width:388,
                height:170,
                title: '删除提示',
                msg: '确认已处理该投诉信息吗？',
                ok: "确定",
                cancel: "取消",
                cls:'c9',
                border:'thin',
                fn: function(r){
                    if (r){
                        $.post(_ctx+"/ass/complaints/dealWithComplaints/"+id,function(result) {
                            var rObj = eval(result);
                            if(rObj.success){
                                $('#complaint_table').datagrid('reload');
                                $('#complaint_table').datagrid('clearSelections');
                            }else{
                                $.messager.alert('error',rObj.failure,'warning');
                            }
                        });
                    }
                }
            });
        }
    }

    function removeComplaints(id){
        if (id){
            $.messager.confirm({
                width:388,
                height:170,
                title: '删除提示',
                msg: '确认要删除该投诉信息吗？',
                ok: "确定",
                cancel: "取消",
                cls:'c9',
                border:'thin',
                fn: function(r){
                    if (r){
                        $.post(_ctx+"/ass/complaints/delete/"+id,function(result) {
                            var rObj = eval(result);
                            if(rObj.success){
                                $('#complaint_table').datagrid('reload');
                                $('#complaint_table').datagrid('clearSelections');
                            }else{
                                $.messager.alert('error',rObj.failure,'warning');
                            }
                        });
                    }
                }
            });
        }
    }

    //弹出新增框
    function editComplaints(id) {
        var url = _ctx + "/ass/complaints/detail/" + id;
        if (id > 0){
            $('#w_complaints').window({title : '投诉详情'});
        }else{
            $('#w_complaints').window({title : '新增投诉'});
        }
        $('#w_complaints').window({href:url});
        $('#w_complaints').window("open");
    }

    function formatterData(value){
        if (value && value.length > 10){
            return value.substring(0,value.length-3);
        }
    }
</script>
</body>
</html>
