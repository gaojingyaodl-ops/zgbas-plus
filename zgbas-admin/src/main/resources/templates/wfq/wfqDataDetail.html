<script type="text/javascript">

  $(function(){
      var exportExcelHtml = $('#exportExcelId');
      var companyName = $('#companyName').val();
      // exportExcelHtml.attr('href',_ctx+"/wfq/auth/exportExcel?companyName="+companyName)
  });
  function formateNum(num,row,index) {
      if (num){
          num = parseFloat(num).toFixed(2).toString().split(".");
          num[0] = num[0].replace(new RegExp('(\\d)(?=(\\d{3})+$)','ig'),"$1,");
          return num.join(".");
      }else{
          return num;
      }
  }
  // 下载使用的方法
  function doExport() {
      var companyName = $('#companyName').val();
      var url = _ctx+"/wfq/auth/exportExcel?companyName="+companyName;
      var xhr = new XMLHttpRequest();
      $.modal.loading("正在努力导出中，请稍候...");
      xhr.open('GET', url, true);    // 也可用POST方式
      xhr.responseType = "blob";
      xhr.onload = function () {
          if (this.status === 200) {
              var blob = this.response;
              if (navigator.msSaveBlob == null) {
                  var a = document.createElement('a');
                  var headerName = xhr.getResponseHeader("Content-disposition");
                  a.download = decodeURIComponent(headerName).substring(20);
                  a.href = URL.createObjectURL(blob);
                  $("body").append(a);    // 修复firefox中无法触发click
                  a.click();
                  URL.revokeObjectURL(a.href);
                  $(a).remove();
              } else {
                  navigator.msSaveBlob(blob, decodeURIComponent(headerName).substring(20));
              }
              $.modal.closeLoading();
          }
      };
      xhr.send()
  };
</script>
