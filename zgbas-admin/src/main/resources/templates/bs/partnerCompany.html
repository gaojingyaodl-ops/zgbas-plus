<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
<title>业务合伙人管理</title>
<th:block th:replace="~{layouts/include :: include}"></th:block>
</head>

<body class="easyui-layout">
<div region="north" class="search_div pt20	pl20 pr20 pb15 ofh" border="false">
	<form id="searchForm" class="form-search from-input-layout" method="post">
		<div class="mb6">

			<p class="yw-table-filter">
				<label>企业名称:</label>
				<input name="search_LIKES_companyName" type="text" value=""/>
			</p>
			<p class="yw-table-filter">
				<label>联系人:</label>
				<input name="search_LIKES_contactName" type="text" value=""/>
			</p>
			<p class="yw-table-filter">
				<label style="width: 60px;">是否有效:</label>
				<input name="search_EQB_enableFlg" id="enableFlg_srh" type="text" value=""/>
			</p>
			<a href="#" id="btn" class="easyui-linkbutton btn64" onclick="Convert.search('searchForm','tt');">查询</a>
			<a href="#" id="btn" class="easyui-linkbutton btn-empty btn64 ml10" onclick="$('#searchForm').form('reset');">清空</a>
		</div>
	</form> 
	<div id="btn" class="add-btn" style="margin-top: 10px">
		  <a  href="#" class="easyui-linkbutton btn64 addBtn" onclick="editrow(0)">新增</a>
	</div>
	</div>
	<div region="center" border="false" class="panel_padding pl20 pr20">
		<table id="tt" fit="true"
				title="" iconCls="icon-edit" singleSelect="true"
				th:url="@{/bs/partnerCompany/list}">
		</table>
	</div>
<div id="w" title="业务合伙人" class="easyui-window" data-options="width:800,height:550">
</div>
<script type="text/javascript">
	var lastIndex=0;
	var enableFlgs =eval('[(${enableFlgs})]');
	$(function(){
		init();
		$("#enableFlg_srh").combobox({
			data:enableFlgs,
			textField:'dictName',
			valueField:'dictCd',
			panelHeight:"auto"
		});
	});
	function init(){
		$('#tt').datagrid({
			pagination:true,
			pageSize:50,
			pageList:[50,40,30,20,10],
			columns:[ [
				{field:'companyName',title:'企业名称',align:'left',sortable:false,width:150,height:30},
				{field:'legalRepresent',title:'法人',align:'left',width:150},
				{field:'contactName',title:'联系人',width:60,align:'center'},
				{field:'contactPhone',title:'联系电话',width:150,align:'center'},
				{field:'contactEmail',title:'联系邮箱',width:150,align:'center'},
				{field:'licenseNumber',title:'营业执照号',width:120,align:'center'},
				{field:'address',title:'地址',width:150,align:'center'},
				{field:'registerDate',title:'注册日期',width:100,align:'center'},
				{field:'enableFlg',title:'是否有效',width:60,align:'center',formatter:function(value,row,index){
						return Convert.findValueByKey(enableFlgs, "dictCd",value, "dictName");
				}},
				{field:'operate',title:'操作', width:120,align:'center',formatter:function(value, row, index){

						var str = "";
						str += '<span onclick="editrow('+row.id+')" class="contract-btn contract-btn-10">详情</span>';
						str += '<span onclick="deleteType('+row.id+')" class="contract-btn contract-btn-4">删除</span>';

			       // var str = '<img onclick="deleteType('+row.id+')" style="cursor:pointer;width:16px;hight:18px" src="../static/new-version/images/icon_delete.png"/>';
			        //var str = '<i class="icon-remove ml10 icon cursor" onclick="deleteType('+row.id+')"></i>';
			        return str;
				}}
			] ],
			toolbar:'#toolbar',
			onDblClickRow:function(index,row){
				lastIndex = index;
				editrow(row.id);
			},
			onClickRow:function(index,row){
				lastIndex = index;
			},
			onLoadSuccess:function(data){
				var total =$('#tt').datagrid('getData').total;
				if (lastIndex >total-1){
					lastIndex=total-1;
				}
				$('#tt').datagrid('selectRow', lastIndex);
			}
		});
 		$('#w').window({
			title: '业务合伙人',
			modal:true,
			closed: true,
			collapsible : false,
			minimizable : false,
			maximizable : false,
			cache:false,
			onClose:function(){
				$('#tt').datagrid('reload');
			}
		});
	}
	function deleteType(id){
		// $('#tt').datagrid('selectRecord',id);
		// var row = $('#tt').datagrid('getSelected');
		// if(row){
		// 	var index = $('#tt').datagrid('getRowIndex', row);
		// 	var lastIndex=index;
		// 	if (row.id==undefined){
		// 		$('#tt').datagrid('deleteRow',index);
		// 		$('#w').window("close");
		// 		lastIndex=index>0?index-1:0;
		// 		$('#tt').datagrid('selectRow', nextSelect);
		// 	}else{
				$.messager.confirm({
					width:388,
					height:170,
					title: '删除提示',
					msg: '确定要删除该信息吗？',
					ok: "确定",
					cancel: "取消",
					cls:'c9',
					border:'thin',
					fn: function(r){
		                if (r){
		                	//lastIndex=index>0?index-1:0;
							$.post(_ctx+"/bs/partnerCompany/deleteCompany/"+id,function(result) {
								var rObj = eval(result);
								if(rObj.success){
									$('#tt').datagrid('reload');
									$('#w').window("close");
								}else{
									alert(rObj.failure);
								}
							});
		                }
		            }
		        });
		// 	}
		// }
	}
	function editrow(id){
		var url=_ctx+"/bs/partnerCompany/detail/"+id;
		$('#w').window({href:url});
		$('#w').window("open");
	}
</script>
</body>
</html>
