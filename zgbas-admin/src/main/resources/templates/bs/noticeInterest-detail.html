<!DOCTYPE html>
<html  lang="zh" xmlns:th="http://www.thymeleaf.org" >
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <title>权益知情书详情</title>
</head>
<body class="gray-bg">
<script th:src="@{/static/js/filePlus.js?v=220125}" type="text/javascript"></script>
<script th:src="@{/static/ueditor/third-party/webuploader/webuploader.min.js}" type="text/javascript"></script>
<script th:src="@{/static/js/admin/apply_base.js}" type="text/javascript"></script>
<div class="wrapper wrapper-content" >
    <form id="inputForm" method="post" class="editForm">
        <input type="hidden" name="id" id="entityId" th:value="${textConsent.id}" />
        <div class="mb6">
            <p class="yw-table-filter">
                <label>文本类型</label>
                <input name="textType" th:value="noticeInterest"  id="textTypeDetail" type="text" readonly/>
            </p>
            <p class="yw-table-filter">
                <label>文本类型名称:</label>
                <input name="typeName" th:value="权益知情书" id="typeNameDetail" type="text" readonly/>
            </p>
            <p class="yw-table-filter">
                <label for="versionDetail">版本:</label>
                <input name="version" th:value="${textConsent.version}" id="versionDetail" type="text"/>
            </p>
            <p class="yw-table-filter">
                <label>&nbsp;</label>
                <span onchange="$(this).toggleClass('on')" th:class="${textConsent.enableFlg} ? 'ckbox on' : 'ckbox'">
						<input type="checkbox" th:checked="${textConsent.enableFlg}" onchange="$('#enableFlg').val($(this).attr('checked')=='checked');"/>
	            		<span>是否有效</span>
	           			<input type="hidden" name="enableFlg" th:value="${textConsent.enableFlg}" id="enableFlg" />
					</span>
            </p>
            <a href="#" class="easyui-linkbutton btn-info-empty" data-options="iconCls:'icon-save'" onclick="save();">保存</a>
            <input name="content" th:value="${textConsent.content}" type="hidden" id="content"/>
            <div class="row" style="margin-left: -20px">
                <div class="col-sm-12" style="margin-left: 6px">
                    <div class="click2edit wrapper"    id="nr">
                    </div>
                </div>
            </div>
        </div>
    </form>
</div>
<script type="text/javascript"  th:inline="javascript">
    $(document).ready(function () {
        $('.click2edit').summernote({
            lang: 'zh-CN',
            height: 300,
            width:757,
            callbacks: {
                onImageUpload: function (files) {
                    debugger;
                    sendFile(files[0], this);
                }
            }

        });
        // 上传文件
        function sendFile(file, obj) {
            var data = new FormData();
            data.append("file", file);
            $.ajax({
                type: "POST",
                url: _ctx + "/bs/bsNotice/uploadFile",
                data: data,
                cache: false,
                contentType: false,
                processData: false,
                dataType: 'json',
                success: function(result) {
                    $("#fileId").val($("#fileId").val()+','+result);
                    if (result) {
                        $(obj).summernote('editor.insertImage','http://file.tosupply.cn/ys-file-server/view/show/'+result,true);
                    } else {
                        $.modal.alertError(result.msg);
                    }
                }
            });
        }
    });

    // 判断是否为空
    function isBlank(val) {
        if (val == undefined
            || val == ''
            || val == null
            || val == "") {
            return true;
        }
        return false;
    }
    $(function(){
        var html=$("#content").val();
        if(isBlank(html)==false){
            $('.click2edit').summernote('code',html);
        }
    });
    function  save(){
        let versionDetail = $("#versionDetail").val();
        if(versionDetail === '' || versionDetail === undefined || versionDetail === null){
            $.messager.alert({
                title:'提示',
                msg:'版本不能为空'
            });
            return;
        }
        var aHTML = $('.click2edit').summernote('code');
        $("#content").val(aHTML)
        $('#inputForm').form('submit', {
            url: _ctx+"/text/content/save",
            onSubmit: function(data){
                var isValid = $(this).form('validate');
                return isValid;	// 返回false终止表单提交
            },
            success: function(result){
                if (result.indexOf('success') != -1) {
                    $.messager.show({
                        height: 150,
                        title: '提示',
                        msg: '保存成功',
                        timeout: 2000,
                        border: 'thin',
                        cls: 'c9',
                        showType: 'show'
                    });
                    $("#noticeInterest_detail").window("close");
                    $('#tt').datagrid('reload');
                } else {
                    $.messager.alert('', '保存失败');
                }
            }
        });
    }
</script>

</body>
</html>
