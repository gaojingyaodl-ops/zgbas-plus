<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
	<link th:href="@{/static/ueditor/third-party/webuploader/webuploader.css}" type="text/css" rel="stylesheet" />
	<th:block th:replace="~{layouts/include :: include}"></th:block>
	<script th:src="@{/static/js/areaJson.js}" type="text/javascript"></script>
	<style>
		.tab-btn-self {
			border-color: transparent;
			background: var(--skin-color);
			margin-right: 17px;
		}
	</style>
</head>
<body>
<div class="easyui-layout" fit="true">
	<div id="w_gjjl" title="新增跟进记录" data-options="width:700,height:450"></div>
	<!--<div region="center" class="search_div pt20	pl20 pr20 pb20 ofh form-section" border="false">-->
	<div region="center" border="false" style="padding-left: 30px;" class="form-section">
		<form id="inputForm" method="post"  enctype="multipart/form-data" class="from-input-layout">
			<input type="hidden" name="id" id="entityId" th:value="${entity.id}" />
			<input type="hidden" name="id" id="risk" th:value="${Risk}" />
			<input type="hidden" name="companyEditFlag" id="companyEditFlag" th:value="${companyEditFlag}" />
			<input type="hidden" id="oriCompanyName" th:value="${entity.companyName}" />
			<input type="hidden" name="status" id="status" th:value="${entity.status}">
			<input type="hidden" name="enableFlgs" id="enableFlgs" th:value="${entity.enableFlg}">
			<input type="hidden" name="matchUserId" id="matchUserId" th:value="${entity.matchUserId}">
			<input type="hidden" name="fileServerUrl" id="fileServerUrl" th:value="${fileServerUrl}" />

			<p class="form-section-title"><span class="approve_text">基本信息</span><i></i></p>

			<div class="mb6">
				<p class="yw-table-filter w2">
					<label for="companyName"  class="control-label">企业名称:</label>
					<input name="companyName" id="companyName" type="text" th:value="${entity.companyName}"></input>
				</p>
				<p class="yw-table-filter">
					<label for="companyGrade"  class="control-label">客户分类:</label>
					<input name="companyGrade" readonly id="companyGrade" type="text" class="control"  th:value="${entity.companyGrade}"></input>
				</p>

				<p class="yw-table-filter">
					<label for="companyType"  class="control-label"><i>*</i>企业类型:</label>
					<input name="companyType" id="companyType" type="text" class="control"  th:value="${entity.companyType}"></input>
				</p>

				<p class="yw-table-filter" id="industryStyle">
					<label for="industry"  class="control-label"><i>*</i>行业分类:</label>
					<input name="industry" id="industry" type="text" th:value="${entity.industry}"  class="control" ></input>
				</p>

				<p class="yw-table-filter">
					<label for="companyCategory"  class="control-label">企业性质:</label>
					<input name="companyCategory" id="companyCategory" type="text"  class="control" th:value="${entity.companyCategory}"></input>
				</p>
			</div>
			<div class="mb6">
				<p class="yw-table-filter">
					<label for="contactName"  class="control-label"><i>*</i>联系人:</label>
					<input name="contactName" id="contactName" type="text" th:value="${entity.contactName}" data-options="validType:'length[1,20]'" ></input>
				</p>

				<p class="yw-table-filter">
					<label for="contactPhone"  class="control-label"><i>*</i>联系电话:</label>
					<input name="contactPhone" id="contactPhone" type="text" th:value="${entity.contactPhone}" data-options="validType:'length[1,20]'"></input>
				</p>

				<p class="yw-table-filter">
					<label for="companyPhone"  class="control-label">公司电话:</label>
					<input name="companyPhone" id="companyPhone" type="text" th:value="${entity.companyPhone}" data-options="validType:'length[1,20]'"></input>
				</p>

				<p class="yw-table-filter">
					<label for="stafferNumber"  class="control-label">员工人数:</label>
					<input name="stafferNumber" id="stafferNumber" type="text" th:value="${entity.stafferNumber}" class="easyui-numberbox"></input>
				</p>

				<p class="yw-table-filter">
					<label for="logisticsSealType"  class="control-label">物流章类型:</label>
					<input name="logisticsSealType" id="logisticsSealType" type="text" th:value="${entity.logisticsSealType}"></input>
				</p>

				<p class="yw-table-filter" th:if = "${entity.plasticType eq null && entity.temporaryPlasticType eq null}">
					<label for="plasticType"  class="control-label"><i>*</i>塑料分类:</label>
					<input name="plasticType" id="plasticType1" type="text" th:value="${entity.plasticType}"/>
				</p>

				<p class="yw-table-filter" th:if = "${entity.plasticType ne null}">
					<label for="plasticType"  class="control-label"><i>*</i>塑料分类:</label>
					<input name="plasticType" id="plasticType" type="text" th:value="${entity.plasticType}"/>
				</p>

				<p class="yw-table-filter" th:if="${entity.temporaryPlasticType eq 'PS' && entity.plasticType eq null}">
					<label for="plasticType"  class="control-label"><i>*</i>塑料分类:</label>
					<input name="temporaryPlasticType" id="temporaryPlasticType" type="text" th:value="${entity.temporaryPlasticType}"/>
				</p>
			</div>

			<div class="mb6">
				<p class="yw-table-filter">
					<label for="email"  class="control-label">邮箱:</label>
					<input name="email" id="email" type="text" th:value="${entity.email}"></input>
				</p>

				<p class="yw-table-filter">
					<label for="companyFax"  class="control-label">传真:</label>
					<input name="companyFax" id="companyFax" type="text" th:value="${entity.companyFax}"></input>
				</p>

				<p class="yw-table-filter w2">
					<label for="companyUrl"  class="control-label">网址:</label>
					<input name="companyUrl" id="companyUrl" type="text" th:value="${entity.companyUrl}"></input>
				</p>

				<p class="yw-table-filter w2">
					<label for="address"  class="control-label">办公地址:</label>
					<input name="address" id="address" type="text" th:value="${entity.address}"></input>
				</p>
			</div>

			<div class="mb10">
				<p class="yw-table-filter">
					<a href="#" id="fileBtn" class="easyui-linkbutton addBtn btn150">上传企业营业执照</a>
				</p>

				<p class="yw-table-filter">
					<input type="hidden" name="fileId" id="fileId" th:value="${entity.fileId}" />
					<label class="control-label" id="filePath"></label>
				</p>

				<p class="yw-table-filter">
					<a href="#" id="cardFrontBtn" class="easyui-linkbutton addBtn btn150">上传法人身份证正面</a>
				</p>

				<p class="yw-table-filter">
					<input type="hidden" name="cardFrontId" id="cardFrontId" th:value="${entity.cardFrontId}" />
					<label class="control-label" id="cardFrontPath"></label>
				</p>

				<p class="yw-table-filter">
					<a href="#" id="cardReverseBtn" class="easyui-linkbutton addBtn btn150">上传法人身份证反面</a>
				</p>

				<p class="yw-table-filter">
					<input type="hidden" name="cardReverseId" id="cardReverseId" th:value="${entity.cardReverseId}" />
					<label class="control-label" id="cardReversePath"></label>
				</p>

				<a href="#" class="easyui-linkbutton addBtn btn80">初审</a>
			</div>
			<p class="form-section-title"><span class="approve_text">印章信息</span><i></i></p>
			<div class="mb10">
				<p class="yw-table-filter">
					<a href="#" id="officialSealBtn" class="easyui-linkbutton addBtn btn150">CFCA公章</a>
				</p>

				<p class="yw-table-filter">
					<input type="hidden" name="officialSealId" id="officialSealId" th:value="${companyCfcaSeal.officialSealId}" />
					<label class="control-label" id="officialSealIdPath"></label>
				</p>

				<p class="yw-table-filter">
					<a href="#" id="chapterContractSealBtn" class="easyui-linkbutton addBtn btn150">CFCA合同章</a>
				</p>

				<p class="yw-table-filter">
					<input type="hidden" name="chapterContractSealId" id="chapterContractSealId" th:value="${companyCfcaSeal.chapterContractSealId}" />
					<label class="control-label" id="chapterContractSealIdPath"></label>
				</p>

				<p class="yw-table-filter">
					<a href="#" id="logisticsSealBtn" class="easyui-linkbutton addBtn btn150">CFCA物流章</a>
				</p>

				<p class="yw-table-filter">
					<input type="hidden" name="chapterContractSealId" id="logisticsSealId" th:value="${companyCfcaSeal.logisticsSealId}" />
					<label class="control-label" id="logisticsSealIdPath"></label>
				</p>
			</div>
			<p class="form-section-title"><span class="approve_text">标记供应商信息</span><i></i></p>
			<div class="mb6">
				<p class="yw-table-filter">
					<label for="buyCommissionFlag"  class="control-label">是否参与采购提成:</label>
					<input name="buyCommissionFlag"  th:readonly="${!Risk}" id="buyCommissionFlag" type="text" th:value="${entity.buyCommissionFlag}"></input>
				</p>

				<p class="yw-table-filter">
					<label for="markSupplierFlag"  class="control-label">是否标记供应商:</label>
					<input name="markSupplierFlag" th:readonly="${!Risk}" id="markSupplierFlag"  type="text" th:value="${entity.markSupplierFlag}"></input>
				</p>

				<p class="yw-table-filter">
					<label for="supplierManagerUserId"  class="control-label">供应商资源负责人:</label>
					<input name="supplierManagerUserId" th:readonly="${!Risk}"  id="supplierManagerUserId" type="text" th:value="${entity.supplierManagerUserId}"></input>
				</p>

			</div>
			<p class="form-section-title"><span class="approve_text">注册信息</span><i></i></p>
			<div class="mb6">
				<p class="yw-table-filter w2">
					<label for="companyCreditNo"  class="control-label">企业信用代码:</label>
					<input name="companyCreditNo" readonly="readonly" id="companyCreditNo" type="text" th:value="${entity.companyCreditNo}"></input>
				</p>

				<p class="yw-table-filter">
					<label for="registerCapital"  class="control-label">注册资本:</label>
					<input name="registerCapital" id="registerCapital" readonly="readonly" type="text" th:value="${entity.registerCapital}"></input>
				</p>

				<p class="yw-table-filter">
					<label for="registerDate"  class="control-label">注册日期:</label>
					<input name="registerDate" readonly="readonly" id="registerDate" type="text" th:value="${#dates.format(entity.registerDate,'yyyy-MM-dd')}"></input>
				</p>

				<p class="yw-table-filter">
					<label for="companyArea"  class="control-label">企业区域:</label>
					<input type="text" id="companyAreaShow"/>
					<input type="hidden" name="companyArea" id="companyArea" th:value="${entity.companyArea}"/>
				</p>
			</div>
			<div class="mb6">
				<p class="yw-table-filter">
					<label for="legalRepresent"  class="control-label">法人:</label>
					<input name="legalRepresent" readonly="readonly" id="legalRepresent" type="text" th:value="${entity.legalRepresent}"></input>
				</p>

				<p class="yw-table-filter w2">
					<label for="legalRepresentNo"  class="control-label">法人身份证号:</label>
					<input name="legalRepresentNo" readonly="readonly" id="legalRepresentNo" type="text"></input>
				</p>
			</div>

			<p class="form-section-title newItem"><span class="approve_text">审批信息</span><i></i></p>
			<div class="mb6 newItem">
				<p class="yw-table-filter">
					<label for="creditRating"  class="control-label">企业等级:</label>
					<input name="creditRating" readonly="readonly" id="creditRating" type="text" class="control"  th:value="${entity.creditRating}" ></input>
				</p>

				<p class="yw-table-filter">
					<label for="totalCreditAmount"  class="control-label">赊销额度(元):</label>
					<input name="totalCreditAmount" readonly="readonly" id="totalCreditAmount" type="text" th:value="${entity.totalCreditAmount}" class="control" ></input>
				</p>

				<p class="yw-table-filter">
					<label for="usedCreditAmount"  class="control-label">已用赊销额度(元):</label>
					<input name="usedCreditAmount" readonly="readonly" id="usedCreditAmount" type="text" th:value="${entity.usedCreditAmount}" class="control" ></input>
				</p>

				<p class="yw-table-filter">
					<label for="totalSpotAmount"  class="control-label">代采现货额度(元):</label>
					<input name="totalSpotAmount" readonly="readonly" id="totalSpotAmount" type="text" th:value="${entity.totalSpotAmount}" class="control" ></input>
				</p>

				<p class="yw-table-filter">
					<label for="usedSpotAmount"  class="control-label">已用代采现货额度(元):</label>
					<input name="usedSpotAmount" readonly="readonly" id="usedSpotAmount" type="text" th:value="${entity.usedSpotAmount}" class="control" ></input>
				</p>
			</div>
			<div class="mb6 newItem">
				<p class="yw-table-filter">
					<label for="totalFuturesAmount"  class="control-label">代采期货额度(元):</label>
					<input name="totalFuturesAmount" readonly="readonly" id="totalFuturesAmount" type="text" th:value="${entity.totalFuturesAmount}" class="control" ></input>
				</p>

				<p class="yw-table-filter">
					<label for="usedFuturesAmount"  class="control-label">已用代采期货额度(元):</label>
					<input name="usedFuturesAmount" readonly="readonly" id="usedFuturesAmount" type="text" th:value="${entity.usedFuturesAmount}" class="control" ></input>
				</p>

				<p class="yw-table-filter">
					<label for="usedFuturesAmount"  class="control-label">访厂报告是否通过:</label>
					<input name="accessReportFlg"   id="accessReportFlg" type="text" th:value="${entity.accessReportFlg}" default="null" class="easyui-textbox" data-options="required: false"></input>
				</p>

				<p  class="yw-table-filter">
					<label for="actualGuaranteeFlg"  class="control-label">实控人担保:</label>
					<input name="actualGuaranteeFlg"   id="actualGuaranteeFlg" type="text" th:value="${entity.actualGuaranteeFlg}" default="null" class="easyui-textbox" data-options="required: false"></input>
				</p>

				<p class="yw-table-filter">
					<label>访厂报告上传日期:</label>
					<input name="accessReportUploadDate" readonly="readonly" id="accessReportUploadDate" type="text" th:value="${#dates.format(entity.accessReportUploadDate,'yyyy-MM-dd')}"></input>
				</p>

			</div>

			<p class="form-section-title"><span class="approve_text">补充信息</span><i></i></p>
			<div class="mb6">
				<p class="yw-table-filter w2">
					<label class="control-label" style="text-align:center;font-weight:bold">征信类：</label>
				</p>

				<p class="yw-table-filter">
					<a href="#" id="corporateCreditBtn" class="easyui-linkbutton addBtn btn150">上传企业征信授权书</a>
				</p>

				<p class="yw-table-filter">
					<input type="hidden" name="corporateCreditId" id="corporateCreditId" th:value="${entity.corporateCreditId}" />
					<label class="control-label" id="corporateCreditPath"></label>
				</p>

				<p class="yw-table-filter">
					<a href="#" id="personalCreditBtn" class="easyui-linkbutton addBtn btn150">上传个人征信授权书</a>
				</p>

				<p class="yw-table-filter">
					<input type="hidden" name="personalCreditId" id="personalCreditId" th:value="${entity.personalCreditId}" />
					<label class="control-label" id="personalCreditPath"></label>
				</p>
			</div>
			<div class="mb6">
				<p class="yw-table-filter w2">
					<label class="control-label" style="text-align:center;font-weight:bold">资信类：</label>
				</p>

				<p class="yw-table-filter">
					<a href="#" id="trademarkBtn" class="easyui-linkbutton addBtn btn150">上传商标注册证</a>
				</p>

				<p class="yw-table-filter">
					<input type="hidden" name="trademarkId" id="trademarkId" th:value="${entity.trademarkId}" />
					<label class="control-label" id="trademarkPath"></label>
				</p>

				<p class="yw-table-filter">
					<a href="#" id="patentBtn" class="easyui-linkbutton addBtn btn150">上传专利说明书</a>
				</p>

				<p class="yw-table-filter">
					<input type="hidden" name="patentId" id="patentId" th:value="${entity.patentId}" />
					<label class="control-label" id="patentPath"></label>
				</p>
			</div>
			<div class="mb6">
				<p class="yw-table-filter w2">
					<label class="control-label" style="text-align:center;font-weight:bold">担保类：</label>
				</p>

				<p class="yw-table-filter">
					<a href="#" id="personalGuaranteeBtn" class="easyui-linkbutton addBtn btn150">上传个人担保函</a>
				</p>

				<p class="yw-table-filter">
					<input type="hidden" name="personalGuaranteeId" id="personalGuaranteeId" th:value="${entity.personalGuaranteeId}" />
					<label class="control-label" id="personalGuaranteePath"></label>
				</p>

				<p class="yw-table-filter">
					<a href="#" id="assetGuaranteeBtn" class="easyui-linkbutton addBtn btn150">上传资产担保函</a>
				</p>

				<p class="yw-table-filter">
					<input type="hidden" name="assetGuaranteeId" id="assetGuaranteeId" th:value="${entity.assetGuaranteeId}" />
					<label class="control-label" id="assetGuaranteePath"></label>
				</p>
			</div>
			<div class="mb6">
				<p class="yw-table-filter w2">
					<label class="control-label" style="text-align:center;font-weight:bold">财务类：</label>
				</p>

				<p class="yw-table-filter">
					<a href="#" id="assetsBtn" class="easyui-linkbutton addBtn btn150">上传资产负债表</a>
				</p>

				<p class="yw-table-filter">
					<input type="hidden" name="assetsId" id="assetsId" th:value="${entity.assetsId}" />
					<label class="control-label" id="assetsPath"></label>
				</p>

				<p class="yw-table-filter">
					<a href="#" id="cashFlowBtn" class="easyui-linkbutton addBtn btn150">上传现金流量表</a>
				</p>

				<p class="yw-table-filter">
					<input type="hidden" name="cashFlowId" id="cashFlowId" th:value="${entity.cashFlowId}" />
					<label class="control-label" id="cashFlowPath"></label>
				</p>
			</div>
			<div class="mb6">
				<p class="yw-table-filter w2">
					<label class="control-label" style="text-align:center;font-weight:bold"></label>
				</p>

				<p class="yw-table-filter">
					<a href="#" id="profitBtn" class="easyui-linkbutton addBtn btn150">上传利润表</a>
				</p>

				<p class="yw-table-filter">
					<input type="hidden" name="profitId" id="profitId" th:value="${entity.profitId}" />
					<label class="control-label" id="profitPath"></label>
				</p>

				<p class="yw-table-filter">
					<a href="#" id="auditReportBtn" class="easyui-linkbutton addBtn btn150">上传审计报告表</a>
				</p>

				<p class="yw-table-filter">
					<input type="hidden" name="auditReportId" id="auditReportId" th:value="${entity.auditReportId}" />
					<label class="control-label" id="auditReportPath"></label>
				</p>

			</div>
			<div class="mb6">
				<p class="yw-table-filter w2">
					<label class="control-label" style="text-align:center;font-weight:bold">固定资产：</label>
				</p>

				<p class="yw-table-filter">
					<a href="#" id="landBtn" class="easyui-linkbutton addBtn btn150">上传土地证明</a>
				</p>

				<p class="yw-table-filter">
					<input type="hidden" name="landId" id="landId"  th:value="${entity.landId}" />
					<label class="control-label" id="landPath"></label>
				</p>

				<p class="yw-table-filter">
					<!--土地类型-->
					<input name="landType" class="control" id="landType" type="text" th:value="${entity.landType}"></input>
				</p>

				<p class="yw-table-filter">
					<label class="control-label"></label>
				</p>
			</div>
			<div class="mb6">
				<p class="yw-table-filter w2">
					<label class="control-label" style="text-align:center;font-weight:bold"></label>
				</p>

				<p class="yw-table-filter">
					<a href="#" id="plantBtn" class="easyui-linkbutton addBtn btn150">上传厂房证明</a>
				</p>

				<p class="yw-table-filter">
					<input type="hidden" name="plantId" id="plantId"  th:value="${entity.plantId}" />
					<label class="control-label" id="plantPath"></label>
				</p>

				<p class="yw-table-filter">
					<!--厂房类型-->
					<input name="plantType" id="plantType" type="text"  class="control"  th:value="${entity.plantType}"></input>
				</p>

				<p class="yw-table-filter">
					<label class="control-label"></label>
				</p>
			</div>
			<div class="mb6">
				<p class="yw-table-filter w2">
					<label class="control-label" style="text-align:center;font-weight:bold"></label>
				</p>

				<p class="yw-table-filter">
					<a href="#" id="equipmentBtn" class="easyui-linkbutton addBtn btn150">上传机械设备证明</a>
				</p>

				<p class="yw-table-filter">
					<input type="hidden" name="equipmentId" id="equipmentId" th:value="${entity.equipmentId}" />
					<label class="control-label" id="equipmentPath"></label>
				</p>

				<p class="yw-table-filter">
					<!--机械设备类型-->
					<input name="equipmentType"  class="control" id="equipmentType" type="text" th:value="${entity.equipmentType}"></input>
				</p>


				<p class="yw-table-filter">
					<label class="control-label"></label>
				</p>
			</div>

			<div class="mb6" >
				<p class="yw-table-filter w2">
					<label class="control-label" style="text-align:center;font-weight:bold"></label>

			console.log(fileIdArray,'文件id')
			console.log(fileServerUrl,'文件地址')
			if(fileIdArray.length>0){
				fileIdArray.forEach((id,index) => {
					// 浏览器不支持同时下载多个，定时任务隔开一下
					setTimeout(()=>{
						const url = fileServerUrl+id;

						// 触发点击事件以启动下载
						link.click();
						// 移除链接元素
						document.body.removeChild(link);
					},index*1000)
				});

	function fileUpload(fileBtn, fileId, filePath, filePlugin) {
		var $this = $('#' + fileId);
		// fileBtn:点击弹出选择文件事件的dom对象
		// filePath:文件上传成功后，保存的服务文件Id
		// --start-文件上传---
		var uploader = WebUploader.create({
			auto : true,
			// swf文件路径
			swf : _ctx + '/static/webuploader-0.1.5/Uploader.swf',
			// 文件接收服务端。
			server : _ctx + '/file/uploadFile',
			// 选择文件的按钮。可选。
			// 内部根据当前运行是创建，可能是input元素，也可能是flash.
			pick : '#' + fileBtn,
			// 不压缩image, 默认如果是jpeg，文件上传前会压缩一把再上传！
			resize : false,
			duplicate :true ,//true可重复上传，默认不可多次重复上传
			// 只允许选择图片文件。
			accept : {
				title : 'file',
				extensions : 'gif,jpg,jpeg,bmp,png,pdf,rar,zip,doc,docx,xlsx,xls',
//					mimeTypes :	"image/*"
// 				mimeTypes :	"image/jpg,image/jpeg,image/gif,image/bmp,image/png,application/pdf,application/rar,application/zip,application/msword,application/vnd.openxmlformats-officedocument.wordprocessingml.document"
				mimeTypes: "*"
			}
		});
		// 去掉文件上传组件样式，使用上传dom 自己样式
		$(".webuploader-pick").removeClass();

		uploader.on('beforeFileQueued', function(file) {
			$.messager.progress('close');
			if(file &&file.size > 104857600){
				$.messager.alert('tip',"上传文件不能超过100M!",'info');
				return false;
			}
		})

		// 当有文件添加进来的时候
		uploader.on('fileQueued', function(file) {
			$.messager.progress();
			//var $li = $('<div id="' + file.id + '" class="file-item thumbnail">' + '<img>' + '<div class="info">' + file.name + '</div>' + '</div>'), $img = $li.find('img');
		});

		// 文件上传成功，给item添加成功class, 用样式标记上传成功。
		uploader.on('uploadSuccess', function(file, response) {
			$.messager.progress('close');
			if(file &&file.size > 104857600){
				$.messager.alert('tip',"上传文件不能超过100M!",'info');
				return;
			}
			if(response && response.result){//上传成功
				// console.log("uploadSuccess", response);
				var fileId = response.fileId;
				// console.log("fileId", fileId);
				filePlugin.uploadSuccess(fileId);
				//加载附件列表
				filePlugin.load($this.val(),'#'+filePath);
			}else{
				$.messager.alert('tip',"上传文件失败，失败信息："+ response._raw,'info');
			}

		});
		uploader.on('error',function(file){
			$.messager.progress('close');
			$.messager.alert('tip','文件格式不支持!','info');
		})
		// 文件上传失败，显示上传出错。
		uploader.on('file', function(file) {
			$.messager.progress('close');
			$.messager.alert('tip','文件上传失败,请重试!','info');
		});
		// --end-文件上传---
	}

				$.messager.alert('tip',"上传文件不能超过100M!",'info');
				return;
			}
			if(response && response.result){//上传成功
				// console.log("uploadSuccess", response);
				var fileId = response.fileId;
				// console.log("fileId", fileId);
				filePlugin.uploadSuccess(fileId);
				//加载附件列表
				filePlugin.load($this.val(),'#'+filePath);
				parseAccessReport();
			}else{
				$.messager.alert('tip',"上传文件失败，失败信息："+ response._raw,'info');
			}

		});
		uploader.on('error',function(file){
			$.messager.progress('close');
			$.messager.alert('tip','文件格式不支持!','info');
		})
		// 文件上传失败，显示上传出错。
		uploader.on('file', function(file) {
			$.messager.progress('close');
			$.messager.alert('tip','文件上传失败,请重试!','info');
		});
		// --end-文件上传---
	}

	function parseAccessReport(){
		var flg = false;
		setTimeout(function(){
			var fileId = $("#accessReportId").val();
			if (fileId == null || fileId.length == 0){
				flg = false
			}else{
				flg = true;
			}
			$('#accessReportFlg').combobox({required: flg});
			$('#accessReportUploadDate').datebox('setValue', myformatter(new Date()));
			
		},500);
	}
	//获取当前时间
	function myformatter(date){
		var y = date.getFullYear();
		var m = date.getMonth()+1;
		var d = date.getDate();
		return y+'-'+(m<10?('0'+m):m)+'-'+(d<10?('0'+d):d);
	}
</script>
</body>
</html>
