<!DOCTYPE html>
<html  lang="zh" xmlns:th="http://www.thymeleaf.org" >
<head>
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
<title>企业公告新增</title>
</head>
<body class="gray-bg">
<script th:src="@{/static/js/filePlus.js?v=220125}" type="text/javascript"></script>
<script th:src="@{/static/ueditor/third-party/webuploader/webuploader.min.js}" type="text/javascript"></script>
<script th:src="@{/static/js/admin/apply_base.js}" type="text/javascript"></script>
<div class="wrapper wrapper-content" >
	<form id="inputForm" method="post" class="editForm">
		<input type="hidden" name="id" id="entityId" th:value="${entity.id}" />
		<div class="mb6">
			<p class="yw-table-filter" style="width: 320px">
				<label>发文公司</label>
				<input name="companyName" th:value="${entity.companyName}"  id="fwgs" type="text" value=""/>
			</p>
			<p class="yw-table-filter" style="margin-left: 10px">
				<label>发文部门:</label>
				<input name="sendDeptName" th:value="${entity.sendDeptName}" id="fwbms" type="text" value=""/>
			</p>
			<p class="yw-table-filter">
				<label>接收部门:</label>
				<input name="receiveDeptId" th:value="${entity.receiveDeptId}" id="jsbm" type="text" value=""/>
				<input name="receiveDeptName"  id="jsbmName" type="hidden" />
			</p>
		</div>
		<div class="mb6" >
				<p class="yw-table-filter"style="width: 320px">
					<label>公告标题</label>
					<input name="subjuect"  required="required" th:value="${entity.subjuect}" style="width: 320px;" type="text" value=""/>
				</p>
				<p style="margin-left: 10px" class="yw-table-filter">
					<label>年份:</label>
					<input name="year" th:value="${entity.year}" type="text" value=""/>
				</p>
				<p class="yw-table-filter">
					<label>公告编号:</label>
					<input name="noticeCode" th:value="${entity.noticeCode}" type="text" value=""/>
				</p>
					<input type="text" hidden name="fileId" id="fileId" th:value="${entity.fileId}" />
				<a href="#" class="easyui-linkbutton btn-info-empty" data-options="iconCls:'icon-save'" onclick="save();">保存</a>
		<input name="content" th:value="${entity.content}" type="hidden" id="content"/>
		<div class="row" style="margin-left: -20px">
			<div class="col-sm-12" style="margin-left: 6px">
						<div class="click2edit wrapper"    id="nr">
						</div>
			</div>
		</div>
		</div>
	</form>
	</div>
<script type="text/javascript"  th:inline="javascript">
	var deptNameTreeJson = eval('[(${deptNameTree})]');// 机构树
	$(document).ready(function () {
		$('.click2edit').summernote({
			lang: 'zh-CN',
			height: 300,
			width:757,
			callbacks: {
				onImageUpload: function (files) {
					debugger;
					sendFile(files[0], this);
				}
			}

	});
		// 上传文件
		function sendFile(file, obj) {
			var data = new FormData();
			data.append("file", file);
			$.ajax({
				type: "POST",
				url: _ctx + "/bs/bsNotice/uploadFile",
				data: data,
				cache: false,
				contentType: false,
				processData: false,
				dataType: 'json',
				success: function(result) {
					$("#fileId").val($("#fileId").val()+','+result);
					if (result) {
						$(obj).summernote('editor.insertImage','http://file.tosupply.cn/ys-file-server/view/show/'+result,true);
					} else {
						$.modal.alertError(result.msg);
					}
				}
			});
		}
	});
	$('#jsbm').combotree({
		data : deptNameTreeJson,
		multiple : true,
		editable : true,
		required: false,
		onLoadSuccess:function (node,data){
			var t = $(this);
			t.tree('expandAll');
		},
		onClick : function(node) {
			console.log(node.children.length)
			if (node.children.length != 0) {
				$('#matchDeptNameTree').combotree('clear');

			}
			if ($('#relaDeptId').val() != ''){
				$("#relaUserId").combotree({ disabled: true })
			}else {
				$("#relaUserId").combotree({ disabled: false })
			}

		},

	});

	// 判断是否为空
	function isBlank(val) {
		if (val == undefined
				|| val == ''
				|| val == null
				|| val == "") {
			return true;
		}
		return false;
	}
	$(function(){
		var html=$("#content").val();
		if(isBlank(html)==false){
			$('.click2edit').summernote('code',html);
		}

		$("#fwbms").combobox({
			data:announcementDeptFwTypeJson,
			textField:'dictName',
			valueField:'dictCd',
			panelHeight:"auto",
			required: true
		});

		$("#fwgs").combobox({
			data:ourCompanyJson,
			textField:'dictName',
			width: 320,
			valueField:'dictCd',
			panelHeight:"auto",
			required: true
		});

	});
	function  save(){
	   var sss=$("#jsbm").combotree('getText');
	   $("#jsbmName").val(sss);
	   var aHTML = $('.click2edit').summernote('code');
	   $("#content").val(aHTML)
	   $('#inputForm').form('submit', {
		   url: _ctx+"/bs/bsNotice/save",
		   onSubmit: function(data){
			   var isValid = $(this).form('validate');
			   return isValid;	// 返回false终止表单提交
		   },
		   success: function(result){
			   if (result.indexOf('success') != -1) {
				   $.messager.show({
					   height: 150,
					   title: '提示',
					   msg: '保存成功',
					   timeout: 2000,
					   border: 'thin',
					   cls: 'c9',
					   showType: 'show'
				   });
				   $("#xz").window("close");
				   $('#tt').datagrid('reload');
			   } else {
				   $.messager.alert('', '保存失败');
			   }
		   }
	   });
	}
</script>

</body>
</html>
