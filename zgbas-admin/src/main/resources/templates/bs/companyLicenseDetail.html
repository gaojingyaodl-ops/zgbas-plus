<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <link th:href="@{/static/ueditor/third-party/webuploader/webuploader.css}" type="text/css" rel="stylesheet"/>
    <link th:href="@{/static/ruoyi/css/ry-ui.css?v=4.7.3}" rel="stylesheet"/>
</head>
<div class="easyui-layout" fit="true">
    <div region="center" class=" pt20	pl80 pr20 pb15 ofh" border="false">
        <div id="inputForm" method="post" class="editForm_approve content_div">
            <input type="hidden" name="id" id="entityId" th:value="${entity.id}"/>
            <div class="mb6">
                <p class="yw-table-filter w2">
                    <label for="companyName" class="control-label">公司名称:</label>
                    <input name="companyCode" class="control" id="companyCode" type="hidden"
                           th:value="${entity.companyCode}"/>
                    <input name="companyName" class="control" id="companyName" type="text"
                           th:value="${entity.companyName}"/>
                </p>
                <p class="yw-table-filter">
                    <label for="fileType" class="control-label">文件类型:</label>
                    <input class="control" name="fileType" id="fileType" th:value="${entity.fileType}"/>
                </p>
            </div>
            <div class="mb6">
                <p class="yw-table-filter w2">
                    <label for="fileName" class="control-label">文件名称:</label>
                    <input name="fileName" class="control" id="fileName" type="text" th:value="${entity.fileName}"/>
                </p>
                <p class="yw-table-filter">
                    <label for="updatedDate" class="control-label">更新时间:</label>
                    <input name="updatedDate" class="control" id="updatedDate" type="text"
                           th:value="${entity.updatedDate}"/>
                </p>
            </div>
            <div class="mb6">
                <p class="yw-table-filter w3">
                    <label for="remark" class="control-label">备注:</label>
                    <input name="remark" class="control" id="remark" type="text" th:value="${entity.remark}"/>
                </p>
            </div>
        </div>
        <div class="editForm" style="margin-bottom: 20px">
            <p style="width:240px">
				<span class="upload-btn" id="btn_fileId">
	               	 <a href="#" class="easyui-linkbutton file-upload" data-options="iconCls:'icon-upload'">上传附件 </a>
	           	</span>
                <input class="control" id="fileId" name="fileId" type="hidden" th:value="${entity.fileId}" />
            </p>
            <p class="controls showImg fileId" id="span_fileId"></p>
        </div>

        <div region="south" border="false" style="overflow: hidden;height: 40px;">
            <div class="actions_bar">
                <a href="#" class="easyui-linkbutton btn-info-empty" data-options="iconCls:'icon-save'" onclick="submit();">保存</a>
            </div>
        </div>
    </div>

</div>
</html>
<script th:src="@{/static/ueditor/third-party/webuploader/webuploader.min.js}" type="text/javascript"></script>
<script th:src="@{/static/js/file.js?v=2}" type="text/javascript"></script>
<script type="text/javascript">

    var _fileTypeJson = eval('[(${companyLicenseFileTypeJson})]');
    var _companyListJson = eval('[(${companyListJson})]');
    var filePlugin = new FilePlugin('#fileId', -1, null, true);

    $(function () {

        filePlugin.load($('#fileId').val(), '#span_fileId');
        if ($("#btn_fileId").length > 0) {
            fileUpload("btn_fileId", "fileId", "span_fileId", filePlugin);
        }

        $("#companyName").combobox({
            data: _companyListJson,
            textField: 'companyName',
            valueField: 'companyName',
            panelHeight: "auto",
            editable: false,
            required: true,
            onSelect: function (data) {
                $("#companyCode").val(data.companyCode);
            }
        });

        $("#fileType").combobox({
            data: _fileTypeJson,
            textField: 'dictName',
            valueField: 'dictCd',
            panelHeight: "auto",
            editable: false,
            required: true
        });

        $("#fileName").textbox({
            required: true
        });

        $("#updatedDate").datebox({
            disabled: true,
            readonly: true
        })
    });

    // 保存
    function submit() {
        const entityId = $("#entityId").val();
        save();
    }

    /* 添加方法 */
    function save(){

        const param = {
            id: $("#entityId").val(),
            companyCode: $("#companyCode").val(),
            companyName: $("#companyName").combobox('getValue'),
            fileType: $("#fileType").combobox('getValue'),
            fileName: $("#fileName").val(),
            fileId: $("#fileId").val(),
            remark: $("#remark").val(),
            updatedDate: $("#updatedDate").datebox('getValue')
        }
        console.log("param", param);

        $.ajax({
            type:"POST",
            dataType: "json",
            url: '/company/license/save',
            data: JSON.stringify(param),
            contentType:'application/json',
            success: function (data){
                if ((!isEmpty(data)) && !isEmpty(data.success)) {
                    $.messager.show({
                        title: 'Tip',
                        msg: '添加成功',
                        timeout: 2000,
                        showType: 'show'
                    });
                } else {
                    $.messager.alert('error', data.failure, 'warning');
                }
                $("#w_loading").window("close");
                $('#tt').datagrid('reload');
            },
            error : function() {
                $.messager.alert('error', "请联系管理员", 'warning');
            }

        })
    }

    function fileUpload(fileBtn, fileId, filePath, filePlugin) {
        var $this = $('#' + fileId);
        // fileBtn:点击弹出选择文件事件的dom对象
        // filePath:文件上传成功后，保存的服务文件Id
        // --start-文件上传---
        var uploader = WebUploader.create({
            auto : true,
            // swf文件路径
            swf : _ctx + '/static/webuploader-0.1.5/Uploader.swf',
            title:'更新附件',
            // 文件接收服务端。
            server : _ctx + '/file/uploadFile',
            // 选择文件的按钮。可选。
            // 内部根据当前运行是创建，可能是input元素，也可能是flash.
            pick : '#' + fileBtn,
            // 不压缩image, 默认如果是jpeg，文件上传前会压缩一把再上传！
            resize : false,
            duplicate :true ,//true可重复上传，默认不可多次重复上传
            // 只允许选择图片文件。
            accept : {
                title : 'file',
                extensions : 'jpg,jpeg,png',
//					mimeTypes :	"image/*"
// 				mimeTypes :	"image/jpg,image/jpeg,image/gif,image/bmp,image/png,application/pdf,application/rar,application/zip,application/msword,application/vnd.openxmlformats-officedocument.wordprocessingml.document"
                mimeTypes: "*"
            }
        });
        // 去掉文件上传组件样式，使用上传dom 自己样式
        $(".webuploader-pick").removeClass();

        uploader.on('beforeFileQueued', function(file) {
            $.messager.progress('close');
            if(file &&file.size > 10485760){
                $.messager.alert('tip',"上传文件不能超过10M!",'info');
                return false;
            }
        })

        // 当有文件添加进来的时候
        uploader.on('fileQueued', function(file) {
            $.messager.progress();
            //var $li = $('<div id="' + file.id + '" class="file-item thumbnail">' + '<img>' + '<div class="info">' + file.name + '</div>' + '</div>'), $img = $li.find('img');
        });
        var valTemp = $this.val();
        // 文件上传成功，给item添加成功class, 用样式标记上传成功。
        uploader.on('uploadSuccess', function(file, response) {
            $.messager.progress('close');
            if(file &&file.size > 10485760){
                $.messager.alert('tip',"上传文件不能超过10M!",'info');
                return;
            }
            $this.val("");
            if(response && response.result){//上传成功
                console.log("uploadSuccess", response);
                var fileId = response.fileId;
                // console.log("fileId", fileId);
                filePlugin.uploadSuccess(fileId);
                //加载附件列表
                filePlugin.load($this.val(),'#'+filePath);
            }else{
                $this.val(valTemp);
                $.messager.alert('tip',"上传文件失败，失败信息："+ response._raw,'info');
            }

        });
        uploader.on('error',function(file){
            $.messager.progress('close');
            $.messager.alert('tip','文件格式不支持!（只允许上传jpg,jpeg,png）','info');
        })
        // 文件上传失败，显示上传出错。
        uploader.on('file', function(file) {
            $.messager.progress('close');
            $.messager.alert('tip','文件上传失败,请重试!','info');
        });
        // --end-文件上传---
    }
</script>
