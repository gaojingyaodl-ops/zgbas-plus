<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
<title>字典管理</title>
<th:block th:replace="~{layouts/include :: include}"></th:block>
</head>

<body class="easyui-layout">
<div region="north" class="search_div pt20	pl20 pr20 pb15 ofh" border="false">
	<form id="searchForm" class="form-search from-input-layout" method="post">
		<div class="mb6">
			<p class="yw-table-filter mobile-display-none">
				<label>字典CD:</label>
				<input name="search_LIKES_dictTypeCd" type="text" value=""/>
			</p>
			<p class="yw-table-filter">
				<label>字典名称:</label>
				<input name="search_LIKES_dictTypeName" type="text" value=""/>
			</p>
			<p class="yw-table-filter  mobile-display-none">
				<label style="width: 60px;">是否有效:</label>
				<input name="search_EQB_enableFlg" id="enableFlg_srh" type="text" value=""/>
			</p>
			<a href="#" id="btn3" class="easyui-linkbutton btn64" onclick="Convert.search('searchForm','tt');">查询</a>
			<a href="#" id="btn2" class="easyui-linkbutton btn-empty btn64 ml10" onclick="$('#searchForm').form('reset');">清空</a>
		</div>
	</form> 
	<div id="btn" class="add-btn mobile-display-none" style="margin-top: 10px">
		  <a  href="#" class="easyui-linkbutton btn64 addBtn" onclick="editrow(0)">新增</a>
	</div>
	</div>
	<div region="center" border="false" class="panel_padding pl20 pr20">
		<table id="tt" fit="true"
				title="" iconCls="icon-edit" singleSelect="true"
				th:url="@{/bs/dict/list}">
		</table>
	</div>
<div id="w" title="字典管理" class="easyui-window" data-options="width:700,height:550">		
</div>
<script type="text/javascript">
	var lastIndex=0;
	var enableFlgs =eval('[(${enableFlgs})]');
	$(function(){
		init();
		$("#enableFlg_srh").combobox({
			data:enableFlgs,
			textField:'dictName',
			valueField:'dictCd',
			panelHeight:"auto"
		});
	});
	function init(){
		$('#tt').datagrid({
			pagination:true,
			pageSize:50,
			pageList:[50,40,30,20,10],
			columns:[ [
				{field:'dictTypeCd',title:'字典类型CD',align:'left',sortable:false,width:200,height:30},
				{field:'dictTypeName',title:'字典类型名称',align:'left',width:250},
				{field:'dispOrderNo',title:'显示序号',width:70,align:'center'},
				{field:'enableFlg',title:'是否有效',width:70,align:'center',formatter:function(value,row,index){
					if(value =='true'){
						return'是';
					}else{
						return'否';
					}
				}},
				{field:'createdDate',title:'创建时间',width:150},
				{field:'updatedDate',title:'更新时间',width:150},
				{field:'operate',title:'操作', width:120,align:'center',formatter:function(value, row, index){  
			        var str = '<img onclick="deleteType('+row.id+')" style="cursor:pointer;width:16px;hight:18px" src="../static/new-version/images/icon_delete.png"/>'; 
			        //var str = '<i class="icon-remove ml10 icon cursor" onclick="deleteType('+row.id+')"></i>';
			        return str;
				}}
			] ],
			toolbar:'#toolbar',
			onDblClickRow:function(index,row){
				lastIndex = index;
				editrow(row.id);
			},
			onClickRow:function(index,row){
				lastIndex = index;
			},
			onLoadSuccess:function(data){
				var total =$('#tt').datagrid('getData').total;
				if (lastIndex >total-1){
					lastIndex=total-1;
				}
				$('#tt').datagrid('selectRow', lastIndex);
			}
		});
 		$('#w').window({
			title: '字典管理',
			modal:true,
			closed: true,
			collapsible : false,
			minimizable : false,
			maximizable : false,
			cache:false,
			onClose:function(){
				$('#tt').datagrid('reload');
			}
		});
	}
	function deleteType(id){
		$('#tt').datagrid('selectRecord',id);
		var row = $('#tt').datagrid('getSelected');
		if(row){
			var index = $('#tt').datagrid('getRowIndex', row);
			var lastIndex=index;
			if (row.id==undefined){
				$('#tt').datagrid('deleteRow',index);
				$('#w').window("close");
				lastIndex=index>0?index-1:0;
				$('#tt').datagrid('selectRow', nextSelect);
			}else{
				$.messager.confirm({
					width:388,
					height:170,
					title: '删除提示',
					msg: '确定要删除该信息吗？',
					ok: "确定",
					cancel: "取消",
					cls:'c9',
					border:'thin',
					fn: function(r){
		                if (r){
		                	lastIndex=index>0?index-1:0;
							//TODO:如果该记录被引用,是否强制不允许删除?
							$.post(_ctx+"/bs/dict/delete/"+row.id,function(result) {
								var rObj = eval(result);
								if(rObj.success){
									$('#tt').datagrid('reload');
									$('#w').window("close");
								}else{
									alert(rObj.failure);
								}
							});
		                }
		            }
		        });
			}
		}
	}
	function editrow(id){
		var url=_ctx+"/bs/dict/detail/"+id;
		$('#w').window({href:url});
		$('#w').window("open");
	}
</script>
</body>
</html>
