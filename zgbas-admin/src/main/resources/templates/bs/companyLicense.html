<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<title>公司证照管理</title>
<th:block th:replace="~{layouts/include :: include}"></th:block>
</head>
<body class="easyui-layout">
 <div region="north" class="search_div pt20	pl20 pr20 pb15 ofh" border="false">
	<form id="searchForm" class="form-search from-input-layout" method="post" >
		<div class="mb6">
			<p class="yw-table-filter">
				<label>公司名称:</label>
				<input id="company_name"  name="search_LIKES_companyName" type="text" value=""/>
			</p>
			<p class="yw-table-filter">
				<label>文件类型:</label>
				<input id="file_type" type="text" name="search_EQS_fileType"/>
			</p>
			<a href="#" id="btn" class="easyui-linkbutton btn64" onclick="Convert.search('searchForm','tt');">查询</a>
				<a href="#" id="btn" class="easyui-linkbutton btn-empty btn64 ml10" onclick="$('#searchForm').form('reset');">清空</a>
		</div>
	</form>
	<div id="btn" class="add-btn" style="margin-top: 10px">
		  <a  href="#" class="easyui-linkbutton btn64 addBtn" onclick="add()">新增</a>
	</div>
</div>
<div region="center" border="false" class="panel_padding" style="padding-right:20px;padding-left:20px;">
	<table id="tt" fit="true" title="" iconCls="icon-edit" singleSelect="true" idField="id">
	</table>
</div>
 <div id="w_loading" title="公司证照详情" data-options="width:700,height:500">
 </div>
<script type="text/javascript">
	var lastIndex;

	const _companyLicenseFileTypeJson = eval('[(${companyLicenseFileTypeJson})]');

	$(function(){

		$('#w_loading').window({
			title: '公司证照详情',
			modal:true,
			closed: true,
			collapsible : false,
			minimizable : false,
			maximizable : false,
			cache:false,
			onClose:function(){
				$('#tt').datagrid('reload');
			}
		});

		$("#file_type").combobox({
			data:_companyLicenseFileTypeJson,
			textField:'dictName',
			valueField:'dictCd',
			panelHeight:"auto",
			editable:true
		});

		$('#tt').datagrid({
			pagination:true,
			pageSize:20,
			rownumbers:true,
			pageList:[50,40,30,20,10],
			url:_ctx+"/company/license/listPage",
			columns:[ [
				{field: 'companyCode', title: '企业代码', align: 'left', hidden: true},
				{field: 'companyName', title: '企业名称', align: 'left', width: 300},
				{
					field: 'fileType',
					title: '文件类型',
					align: 'left',
					width: 100,
					formatter: function (value) {
						return Convert.findValueByKey(_companyLicenseFileTypeJson, "dictCd", value, "dictName");
					}
				},
				{field: 'fileName', title: '文件名称', align: 'left', width: 200},
				// {field: 'fileId', title: '文件id', align: 'left', width: 80, hidden: true},
				{field: 'updatedDate', title: '更新时间', align: 'left', width: 100},
				{field: 'remark', title: '备注', align: 'left', width: 380},
				{
					field: 'operate',
					title: '操作',
					width: 120,
					align: 'center',
					formatter: function (value, row, index) {
						var str = "";
						str += '<span onclick="editRow(' + row.id + ')" class="contract-btn contract-btn-10">编辑</span>';
						str += '<span onclick="deleteRow(' + row.id + ')" class="contract-btn contract-btn-4">删除</span>';
						return str;
					}
				}
			]],
			toolbar:'#toolbar',
		});

	});

	function add() {
		const url = _ctx + "/company/license/edit/-1";
		$('#w_loading').window({
			href: url,
			title: '新增公司证照',
			modal: true,
			closed: true,
			collapsible: false,
			minimizable: false,
			maximizable: false,
			cache: false
		});
		$('#w_loading').window("open");
	}

	function editRow(id) {
		const url = _ctx + "/company/license/edit/" + id;
		$('#w_loading').window({
			href: url,
			title: '编辑公司证照',
			modal: true,
			closed: true,
			collapsible: false,
			minimizable: false,
			maximizable: false,
			cache: false
		});
		$('#w_loading').window("open");
	}

	function deleteRow(id) {
		$.messager.confirm({
			width:388,
			height:170,
			title: '删除提示',
			msg: '确定要删除该信息吗？',
			ok: "确定",
			cancel: "取消",
			cls:'c9',
			border:'thin',
			fn: function (res) {
				if (res) {
					$.get(_ctx + "/company/license/remove/" + id, (result) => {
						const rObj = eval(result);
						debugger
						if (rObj.success) {
							$('#tt').datagrid('reload');
						} else {
							$.messager.alert('error', rObj.failure, 'warning');
						}
					});
				}
			}
		});
	}

</script>
</body>
</html>
