<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
	<title>承运商管理</title>
	<th:block th:replace="~{layouts/include :: include}"></th:block>
</head>
<body class="easyui-layout">
<div region="north" class="search_div pt20	pl20 pr20 pb15 ofh" border="false">
	<form id="searchForm" class="form-search from-input-layout" method="post">
		<div class="mb6">
			<p class="yw-table-filter">
				<label>企业名称:</label>
				<input  name="search_LIKES_carrier" type="text"  id="companyName" />
			</p>
			<p class="yw-table-filter">
				<label>联系人:</label>
				<input  name="search_LIKES_contactName" type="text"  id="contactName" />
			</p>
			<p class="yw-table-filter">
				<label>是否有效:</label>
				<input  name="search_EQB_enableFlg" type="text"  id="enableFlgs" />
			</p>
			<a href="#" id="btn" class="easyui-linkbutton btn64" onclick="Convert.search('searchForm','tt');">查询</a>
			<a href="#" id="btn" class="easyui-linkbutton btn-empty btn64 ml10" onclick="$('#searchForm').form('reset');">清空</a>
		</div>
	</form>
	<div id="btn" class="add-btn" style="margin-top: 10px">
		<a  href="#" class="easyui-linkbutton btn64 addBtn" onclick="editrow(0)">新增</a>
	</div>
</div>


<div region="center" border="false" class="panel_padding pl20 pr20">
	<table id="tt" fit="true"
		   title="" iconCls="icon-edit" singleSelect="true"
		   idField="id">
	</table>
</div>
<div id="matchProfitsConfig_detail" title="承运商" data-options="width:800,height:605">
</div>
<script type="text/javascript">
	 var lastIndex;
	 var enableFlgJson = eval('[(${enableFlgJson})]');
	 var ourCompanyJson = eval('[(${ourCompanyJson})]');
	$(function(){

		/* 是否有效 */
		$('#enableFlgs').combobox({
			data:enableFlgJson,
			valueField:'dictCd',
			textField:'dictName',
			panelHeight:"auto",
			onLoadSuccess : function() {
				$('#enableFlgs').combobox("select", "true");
			}
		})

		$('#tt').datagrid({
			pagination:true,
			width:400,
			pageSize:30,
			rownumbers:true,
			pageList:[50,40,30,20,10],
			queryParams:Convert.getJson4Form('searchForm'),
			url:_ctx+"/bs/logisticsCompanyConfig/findByAll",
			columns:[ [
				{field:'carrier',title:'企业名称',align:'center', width:130},
				{field:'ourCompanyNames',title:'我方',align:'center', width:200,formatter:function (value, row, index) {
					console.log(value);
						if (value){
							var text_array=[];
							if(value && value.length > 0){
								var itemTypes = value.split(",");
								for(var i in itemTypes){
									if (itemTypes[i]==''){
										continue;
									}
									var item_type  = itemTypes[i];
									var itemTypeStr = Convert.findValueByKey(ourCompanyJson,"dictCd",item_type,"dictName");
									text_array.push(itemTypeStr);
								}
							}
							return text_array.join('|');
						}
					// return  Convert.findValueByKey(ourCompanyJson, "dictCd",value, "dictName");
				}   },
				{field:'contactName',title:'联系人',align:'center', width:120},
				{field:'contactPhone',title:'联系电话',align:'right', width:120},
				{field:'licenseNumber',title:'营业执照号',align:'center', width:120},
				{field:'averageScore',title:'评分',align:'center', width:80},
				{field:'address',title:'地址',align:'left', width:200},
				{field:'remark',title:'备注',align:'center', width:120},
				{field:'startDate',title:'签订日期',align:'center', width:100},
				{field:'endDate',title:'到期日',align:'center', width:100},
				{field:'enableFlg',title:'是否有效',align:'center', width:80,formatter:function (value, row, index) {
						if(value == "0"){
							return '<span style="color:#FF4A83FF">无效</span>';
						}else{
							return '<span style="color:#4A9BFFFF">有效</span>';
						}
				}   },
				{field:'op',title:'操作',width: 120,align:'center',formatter:function(value, row, index){
					var str = "";
					str += '<span onclick="editrow('+row.id+')" class="contract-btn contract-btn-10">详情</span>';
					str += '<span onclick="removeConfig('+row.id+')" class="contract-btn contract-btn-4">删除</span>';
					return str;
				} }
			]],
			toolbar:'#toolbar',
			onDblClickCell:function(index,field){
				var row = $('#tt').datagrid('getSelected');
			}
		});


		$('#matchProfitsConfig_detail').window({
			title : '物流承运商',
			modal : true,
			closed : true,
			collapsible : false,
			minimizable : false,
			maximizable : false,
			cache : false,
			onClose : function() {
				$('#tt').datagrid('reload');
			}
		});
	});

	/* 弹出新增框 */
	function editrow(id) {
			 var url = _ctx + "/bs/logisticsCompanyConfig/detail/" + id;
			 $('#matchProfitsConfig_detail').window({href:url});
			 $('#matchProfitsConfig_detail').window("open");

	 }
	/*  删除方法 */
	function removeConfig(id){
		$('#tt').datagrid('selectRecord',id);
		var row = $('#tt').datagrid('getSelected');
		var index = $('#tt').datagrid('getRowIndex', row);
		if (id=='0'){
			$('#tt').datagrid('deleteRow',index);
			var nextSelect=index>0?index-1:0;
			$('#tt').datagrid('selectRow', nextSelect);
		}else{
			$.messager.confirm({
				width:388,
				height:170,
				title: '删除提示',
				msg: '确定要删除该信息吗？',
				ok: "确定",
				cancel: "取消",
				cls:'c9',
				border:'thin',
				fn: function(r){
					if (r){
						$.post(_ctx+"/bs/logisticsCompanyConfig/delete/"+id,function(result) {
							var rObj = eval(result);
							if(rObj.success){
								$('#tt').datagrid('reload');
								$('#tt').datagrid('clearSelections');
							}else{
								$.messager.alert('error',rObj.failure,'warning');
							}
						});
					}
				}
			});
		}
	}

</script>
</body>
</html>
