<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <title>客户配置管理</title>
    <th:block th:replace="~{layouts/include :: include}"></th:block>
</head>
<body class="easyui-layout">
<div region="north" class="search_div pt20	pl20 pr20 pb15 ofh" border="false">
    <form id="searchForm" class="form-search from-input-layout" method="post">
        <div class="mb6">
            <p class="yw-table-filter">
                <label>客户名称:</label>
                <input  name="search_LIKES_bsCompanyName" type="text" value=""/>
            </p>
            <p class="yw-table-filter">
                <label>业务员:</label>
                <input  name="search_LIKES_matchUserName" type="text" value=""/>
            </p>
            <a href="#" class="easyui-linkbutton btn64" onclick="Convert.search('searchForm','tt');">查询</a>
            <a href="#" class="easyui-linkbutton btn-empty btn64 ml10" onclick="$('#searchForm').form('reset');">清空</a>
        </div>
    </form>
    <div id="btn" class="add-btn" style="margin-top: 10px">
        <a  href="#" class="easyui-linkbutton btn64 addBtn" onclick="editCompanyConfig(0)">新增</a>
    </div>
</div>

<div region="center" border="false" class="panel_padding pl20 pr20">
    <table id="tt" fit="true"
           title="" iconCls="icon-edit" singleSelect="true"
           idField="id">
    </table>
</div>
<div id="w" title="新增客户配置" data-options="width:530,height:270"></div>
</div>
<script type="text/javascript">
    var lastIndex;
    var enableFlgs = eval('[(${enableFlgs})]');
    $(function(){
        $("#srh_enableFlg").combobox({
            data : enableFlgs,
            textField : 'dictName',
            valueField : 'dictCd',
            width : 150,
            height : 30,
            editable : true
        });
        $('#tt').datagrid({
            pagination:true,
            width:400,
            pageSize:30,
            rownumbers:true,
            pageList:[50,40,30,20,10],
            queryParams:Convert.getJson4Form('searchForm'),
            url:_ctx+"/bs/companyConfig/list",
            columns:[ [
                {field:'id',title:'ID',hidden:true},
                {field:'bsCompanyId',title:'关联企业ID',hidden:true},
                {field:'bsCompanyName',title:'企业名称', width:200,align:"left"},
                {field:'matchUserName',title:'业务员', width:200,align:"left"},
                {field:'profitRate',title:'盈利限制费率', width:120,align:'right'},
                {field:'serviceRate',title:'资金服务费率', width:120,align:'right'},
                {field:'insuranceRate',title:'保险费率', width:120,align:'right'},
                {field:'overdueRate',title:'逾期罚息费率', width:120,align:'right'},
                {field:'sellCommissionRate',title:'销售提成比例', width:150,align:'right'},
                {field:'operate',title:'操作', width:80,align:'center',formatter:function(value, row, index){
                        var str = '<img onclick="removeCompanyConfig('+row.id+')" style="cursor:pointer;width:16px;hight:18px;float:left;margin-left:24px" src="../static/new-version/images/icon_delete.png"/>';
                        return str;
                    }}
            ]],
            toolbar:'#toolbar',
            onDblClickCell:function(index,field){
                var row = $('#tt').datagrid('getSelected');
                editCompanyConfig(row.id);
            }
        });
        $('#w').window({
            title : '客户配置管理',
            modal : true,
            closed : true,
            collapsible : false,
            minimizable : false,
            maximizable : false,
            cache : false,
            onClose : function() {
                $('#tt').datagrid('reload');
            }
        });
    });


    function removeCompanyConfig(id){
        if (id){
            $.messager.confirm({
                width:388,
                height:170,
                title: '删除提示',
                msg: '确定要删除该信息吗？',
                ok: "确定",
                cancel: "取消",
                cls:'c9',
                border:'thin',
                fn: function(r){
                    if (r){
                        $.post(_ctx+"/bs/companyConfig/delete/"+id,function(result) {
                            var rObj = eval(result);
                            if(rObj.success){
                                $('#tt').datagrid('reload');
                                $('#tt').datagrid('clearSelections');
                            }else{
                                $.messager.alert('error',rObj.failure,'warning');
                            }
                        });
                    }
                }
            });
        }
    }
    //弹出新增框
    function editCompanyConfig(id) {
        var url = _ctx + "/bs/companyConfig/detail/" + id;
        $('#w').window({href:url});
        $('#w').window("open");
    }
</script>
</body>
</html>
