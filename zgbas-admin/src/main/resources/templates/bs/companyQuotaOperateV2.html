<!--额度浮动审批-->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<div class="easyui-layout" fit="true">
    <div region="center" border="false">
        <div id="inputForm" method="post" class="editForm_approve content_div"
             style="margin-top: 10px;margin-bottom: 0;overflow:hidden;">
            <input type="hidden" name="companyId" id="companyId" th:value="${company.id}"/>
<!--            <input type="hidden" name="companyName" id="companyName" th:value="${company.companyName}"/>-->
            <input type="hidden" name="canApproveEdit" id="canApproveEdit" th:value="${psv.canApproveEdit}"/>
            <input type="hidden" name="floatingGear" id="floatingGear" th:value="${entity.floatingGear}"/>

            <div th:fragment="company" region="center" border="false" >
                <div class="mb6">
                    <p class="yw-table-filter  w2">
                        <label>企业名称</label>
                        <input id="companyName" readonly type="text" th:value="${company.companyName}">
                    </p>
                    <p class="yw-table-filter">
                        <label>公司类型</label>
                        <input id="companyGrade" type="text" name="companyGrade" th:value="${company.companyGrade}"/>
                    </p>
                    <p class="yw-table-filter">
                        <label>法人</label>
                        <input id="legalRepresent" readonly type="text" th:value="${company.legalRepresent}">
                    </p>
                </div>
                <div class="mb6">
                    <p class="yw-table-filter  w2">
                        <label>营业执照</label>
                        <input id="companyCreditNo" readonly type="text" th:value="${company.companyCreditNo}">
                    </p>
                    <p class="yw-table-filter  w2">
                        <label>企业地址</label>
                        <input id="address" readonly type="text" th:value="${company.address}">
                    </p>
                </div>
                <div class="mb6">
                    <p class="yw-table-filter">
                        <label>联系人</label>
                        <input id="contactName" readonly type="text" th:value="${company.contactName}">
                    </p>
                    <p class="yw-table-filter">
                        <label>联系电话</label>
                        <input id="contactPhone" readonly type="text" th:value="${company.contactPhone}">
                    </p>
                    <p class="yw-table-filter">
                        <label>注册资本</label>
                        <input id="registerCapital" readonly type="text" th:value="${company.registerCapital}">
                    </p>
                    <p class="yw-table-filter">
                        <label>成立日期</label>
                        <input id="registerDate" readonly type="text"
                               th:value="${#dates.format(company.registerDate,'yyyy-MM-dd')}">
                    </p>
                </div>
                <div class="mb6">
                    <p class="yw-table-filter">
                        <label>企业类型</label>
                        <input id="companyType" type="text" name="companyType" th:value="${company.companyType}"/>
                    </p>
                    <p class="yw-table-filter">
                        <label>企业性质</label>
                        <input id="companyCategory" type="text" name="companyCategory"  th:value="${company.companyCategory}"/>
                    </p>
                    <p class="yw-table-filter">
                        <label>录入日期</label>
                        <input id="createdDate" readonly type="text" th:value="${#dates.format(company.createdDate,'yyyy-MM-dd')}">
                    </p>
                    <p class="yw-table-filter">
                        <label>业务员</label>
                        <input id="matchUser" readonly type="text" th:value="${matchUser}">
                    </p>
                </div>
                <div class="mb6">
                    <p class="yw-table-filter w4">
                        <label>经营范围</label>
                        <input id="scope" readonly type="text" th:value="${company.scope}">
                    </p>
                </div>
            </div>

            <p class="form-section-title"><span class="approve_text">风控评估信息</span><i></i></p>
            <div class="mb6">
                <p class="yw-table-filter w2">
                    <lable>公司：</lable>
                    <input type="text" readonly th:value="${company.companyName}"/>
                </p>
                <p class="yw-table-filter w2">
                    <lable>有效期至：</lable>
                    <input type="text" readonly th:value="${#dates.format(effectiveDate,'yyyy/MM/dd HH:mm')}"/>
                </p>
            </div>

            <div class="mb6">
                <p class="yw-table-filter">
                    <lable>上浮比率</lable>
                    <input name="floatingRate" type="text" id="floatingRate" th:value="${entity.floatingRate}"/>
                </p>
                <p class="yw-table-filter">
                    <lable>上浮的最高限额</lable>
                    <input name="floatingMaxAmount" type="text" id="floatingMaxAmount"
                           th:value="${#numbers.formatDecimal(entity.floatingMaxAmount,1,'COMMA',2,'POINT')}"/>
                </p>
                <p class="yw-table-filter">
                    <lable>基准赊销额度</lable>
                    <input name="baseQuota" type="text" id="baseQuota" th:value="${#numbers.formatDecimal(company.baseQuota,1,'COMMA',2,'POINT')}" disabled="true"
                           　readOnly="true"/>
                </p>

            </div>
            <div class="mb6">
                <p class="yw-table-filter w2">
                    <lable>备注</lable>
                    <input id="gearRemark" readonly type="text" th:value="${company.gearRemark}">
                </p>
            </div>
        </div>
    </div>
</div>
<script th:src="@{/static/ueditor/third-party/webuploader/webuploader.min.js}" type="text/javascript"></script>
<script th:src="@{/static/js/file.js?v=2}" type="text/javascript"></script>
<script th:src="@{/static/js/admin/apply_base.js}" type="text/javascript"></script>
<script type="text/javascript" th:inline="javascript">
    var entity = [[${entity}]];
    var psv = [[${psv}]];
    var companyCategoryJson = eval('[(${companyCategoryJson})]');
    var companyTypeJson = eval('[(${companyTypeJson})]');
    var companyGradeJson = eval('[(${companyGradeJson})]');
    //企业分类
    $("#companyType").combobox({
        data:companyTypeJson,
        textField:'dictName',
        valueField:'dictCd',
        panelHeight:"auto",
        required: false,
        editable:false,
        readonly: true
    });
    //企业性质
    $("#companyCategory").combobox({
        data:companyCategoryJson,
        textField:'dictName',
        valueField:'dictCd',
        panelHeight:"auto",
        required: false,
        editable:false,
        readonly: true
    });
    // 公司类型
    $("#companyGrade").combobox({
        data:companyGradeJson,
        textField:'dictName',
        valueField:'dictCd',
        panelHeight:"auto",
        editable:false,
        readonly: true
    });

    $('#floatingMaxAmount').numberbox({
        min:0,
        precision:2,
        required: true,
        parser: function(val) {
            // 解析时去除千分位分隔符
            if(val) {
                return parseFloat(String(val).replace(/,/g, ''));
            } else {
                if(isNaN(val)) {
                    return '';
                } else {
                    return val;
                }
            }
        },
        formatter: function(val) {
            if (val || val === 0) {
                val = parseFloat(val).toFixed(2).toString().split(".");
                val[0] = val[0].replace(new RegExp('(\\d)(?=(\\d{3})+$)', 'ig'), "$1,");
                return val.join(".");
            } else {
                if(isNaN(val)){
                    return ""
                } else {
                    return val;
                }
            }
        }
    });
    if (entity.id != 0) {
        console.log("companyQuotaOperate : ", entity);
        // console.table("psv : ", psv);

        $("#totalCreditAmount").val(entity.totalCreditAmount);
        $("#totalSpotAmount").val(entity.totalSpotAmount);
        $("#totalFuturesAmount").val(entity.totalFuturesAmount);
        if (psv.hasEdit) {
            $("#totalCreditAmount").attr("readonly", false);
            $("#totalSpotAmount").attr("readonly", false);
            $("#totalFuturesAmount").attr("readonly", false);
        } else {
            if (psv.canApproveEdit && psv.mapEdit && psv.mapEdit.totalCreditAmount && psv.mapEdit.totalCreditAmount.edit) {
                $("#totalCreditAmount").attr("readonly", false);
            } else {
                $("#totalCreditAmount").attr("readonly", "readonly");
            }
            if (psv.canApproveEdit && psv.mapEdit && psv.mapEdit.totalSpotAmount && psv.mapEdit.totalSpotAmount.edit) {
                $("#totalSpotAmount").attr("readonly", false);
            } else {
                $("#totalSpotAmount").attr("readonly", "readonly");
            }
            if (psv.canApproveEdit && psv.mapEdit && psv.mapEdit.totalFuturesAmount && psv.mapEdit.totalFuturesAmount.edit) {
                $("#totalFuturesAmount").attr("readonly", false);
            } else {
                $("#totalFuturesAmount").attr("readonly", "readonly");
            }
        }
    }
</script>
