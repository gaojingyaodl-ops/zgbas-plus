<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <title>资金方管理</title>
    <th:block th:replace="~{layouts/include :: include}"></th:block>
</head>
<body class="easyui-layout">
<div region="north" class="search_div pt20	pl20 pr20 pb15 ofh" border="false">
    <form id="searchForm" class="form-search from-input-layout" method="post">
        <div class="mb6">
            <p class="yw-table-filter">
                <label>资方名称:</label>
                <input  name="search_EQL_fundCompanyId" type="text"  id="fundCompanyId" th:value="${fundCompanyId}"/>
            </p>
            <p class="yw-table-filter">
                <label>流水类型:</label>
                <input  name="search_EQS_flowType" type="text"  id="flowType" />
            </p>
            <p class="yw-table-filter">
                <label>日期</label>
                <input name="search_GTED_updatedDate" class="easyui-datebox"/>
            </p>
            <span style="margin-left: -15px;">
				<label>~</label>
			</span>
            <p class="yw-table-filter">
                <input  name="search_LTED_updatedDate" class="easyui-datebox" />
            </p>
            <p class="yw-table-filter">
                <label>摘要:</label>
                <input  name="search_LIKES_subject" type="text" id="subject"/>
            </p>
            <a href="#" id="btn" class="easyui-linkbutton btn64" onclick="Convert.search('searchForm','tt');">查询</a>
            <a href="#" id="btn1" class="easyui-linkbutton btn-empty btn64 ml10" onclick="resetForm()">清空</a>
            <a href="#" class="easyui-linkbutton btn-empty btn64 ml6 mobile-display-none" onclick="exportExcel()">导出</a>
        </div>
    </form>
</div>


<div region="center" border="false" class="panel_padding pl20 pr20">
    <table id="tt" fit="true"
           title="" iconCls="icon-edit" singleSelect="true"
           idField="id">
    </table>
</div>
<div id="funder_detail" title="资金方明细配置" data-options="width:650,height:340">
</div>
<script type="text/javascript">
    var _insuranceAmountFlowTypeJson = eval('[(${insuranceAmountFlowTypeJson})]');
    var _bsCompanyDcsxJson = eval('[(${bsCompanyDcsxJson})]');//我方抬头
    $(function(){
        $("#fundCompanyId").combobox({
            data : _bsCompanyDcsxJson,
            textField : 'companyAbbr',
            valueField : 'id',
            panelHeight:"auto",
            editable : false
        });
        $("#flowType").combobox({
            data : _insuranceAmountFlowTypeJson,
            textField : 'dictName',
            valueField : 'dictCd',
            panelHeight:"auto",
            editable : false
        });
        $('#tt').datagrid({
            pagination:true,
            width:400,
            pageSize:20,
            rownumbers:true,
            pageList:[50,40,30,20,10],
            queryParams: {
                // 资金方流水点击保费会跳转此界面，默认查询对应资方的流水
                search_EQL_fundCompanyId: $("#fundCompanyId").val()
            },
            url:_ctx+"/bs/companyDcsx/insuranceAmountFlow/findPage",
            columns:[ [
                {field:'flowType',title:'流水类型',align:'left', width:80,formatter:function (value,row,index){
                        return Convert.findValueByKey(_insuranceAmountFlowTypeJson,"dictCd",value,"dictName");
                    }},
                {field:'fundCompanyName',title:'资方名称',align:'left', width:100},
                {field:'flowAmount',title:'流水金额',align:'right', width:120,formatter:formatterFundNum},
                {field:'initialAmount',title:'期初余额', align:'right',width:120,formatter:formateNum},
                {field:'ultimateAmount',title:'期末余额', align:'right',width:120,formatter:formateNum},
                {field:'subject',title:'摘要',align:'left', width: 300},
                {field:'createdDate',title:'日期', width:150,align:'center'},
                {field:'operate',title:'审批详情', width:150,align:'center', formatter: function (value, row, index){
                        if(row.flowType !='T'&&row.flowType!='D'){
                            return '<span onclick="openFundFlowDetail('+row.linkApproveId+')" class="contract-btn contract-btn-7">审批详情</span>';
                        } else {
                            return ''
                        }
                    }}
            ]],
            toolbar:'#toolbar'
        });
    });
    function resetForm(){
        $('#searchForm').form('reset');
        $("#fundCompanyId").combobox('setValue','')
    }
    function formateNum(num,row,index) {
        if (num){
            num = parseFloat(num).toFixed(2).toString().split(".");
            num[0] = num[0].replace(new RegExp('(\\d)(?=(\\d{3})+$)','ig'),"$1,");
            return num.join(".");
        }else{
            return num;
        }
    }
    function openFundFlowDetail(approveId){
        if (approveId) {
            var title = '审批详情' + ':' + approveId;
            window.parent.addTab(title, _ctx + '/pm/approve/detail/' + approveId);
        }
    }
    function formatterFundNum(num, row, index) {
        if (num == null || num == undefined){
            return "";
        }
        const _num = parseFloat(num).toFixed(2).toString().split(".");
        _num[0] = _num[0].replace(new RegExp('(\\d)(?=(\\d{3})+$)', 'ig'), "$1,");
        const value = _num.join(".");
        if (num <=0) {
            return '<span class="contract-btn contract-btn-4">' + value + '</span>';
        } else {
            return '<span class="contract-btn contract-btn-2">' + '＋' + value + '</span>';
        }
    }
    function exportExcel() {
        $.messager.confirm({
            title: '提示',
            msg: '确认要导出保费流水吗？',
            ok: "导出",
            cancel: "取消",
            cls: 'c9',
            border: 'thin',
            fn: function (r) {
                if (r) {
                    $('#searchForm').form('submit', {url: _ctx + "/bs/companyDcsx/insuranceAmountFlow/exportExcel"});
                }
            }
        })
    }
</script>
</body>
</html>
