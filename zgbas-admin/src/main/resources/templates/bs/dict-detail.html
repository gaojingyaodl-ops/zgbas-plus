<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<div region="north" class="search_div pt20	pl20 pr20 pb15 ofh" border="false">
	<div region="north" border="false">
		<form id="inputForm" method="post" class="from-input-layout">
			<input type="hidden" name="id" id="dictTypeId" th:value="${dictType.id}" />
			<div class="mb6">
				<p class="yw-table-filter">
					<label for="dictTypeCd">字典代码:</label>
					<input name="dictTypeCd" id="dictTypeCd" required="required" type="text" th:value="${dictType.dictTypeCd}"></input>
				</p>
				<p class="yw-table-filter">
					<label for="dictTypeName" >字典名称:</label>
					<input name="dictTypeName" id="dictTypeName" required="required" type="text" th:value="${dictType.dictTypeName}"></input>
				</p>
				<p class="yw-table-filter">
					<label for="dispOrderNo" >显示序号:</label>
					<input name="dispOrderNo" id="dispOrderNo" type="text" required="required" number="true" max="10000" th:value="${dictType.dispOrderNo}"></input>
				</p>
			</div>
			<div class="mb6">
				<p class="yw-table-filter w2">
					<label for="remark">备注:</label>
					<input name="remark" id="remark" class="control large">[[${dictType.remark}]]</input>
				</p>
				<p class="yw-table-filter">
					<label>&nbsp;</label>
					<span onchange="$(this).toggleClass('on')" th:class="${dictType.enableFlg} ? 'ckbox on' : 'ckbox'">
						<input type="checkbox" th:checked="${dictType.enableFlg}" onchange="$('#enableFlg').val($(this).attr('checked')=='checked');"/>
	            		<span id="enableFlg">是否有效</span>
	           			<input type="hidden" name="enableFlg" th:value="${dictType.enableFlg}" id="enableFlg" />
					</span>
				</p>
			</div>
		</form>
	</div>
	
	<div region="center" border="false">
		<a  href="#" class="easyui-linkbutton mb6" data-options="iconCls:'icon-add'," onclick="insert()">新增</a>
		<!-- <table id="tt2" th:url="@{'/bs/dict/listData/'+${dictType.id}}"
			singleSelect="true" rownumbers="true" data-options="fit:true" style="height:200px;">
		</table> -->
		<div class="mt20 yw-menu-section tbw popup-tab" style="height:320px;" id="tt2" th:url="@{'/bs/dict/listData/'+${dictType.id}}"></div>
	</div>
		
	<div region="south">
		<a href="#" class="easyui-linkbutton btn-info-empty" data-options="iconCls:'icon-save'" onclick="$('#inputForm').submit();">保存</a>
		<th:block th:if="${dictType.id!=0 and dictType.id!=null }">
			<a href="#" class="easyui-linkbutton ml10" iconCls="icon-reload" th:onclick="'editrow('+${dictType.id}+');'">刷新</a>
			<a href="#" class="easyui-linkbutton ml10" iconCls="icon-clear" onclick="deleteType();">删除</a>
		</th:block>
		<a  href="#" class="easyui-linkbutton ml10" data-options="iconCls:'icon-add'," onclick="editrow(0)">新增</a>
	</div>
</div>


<script type="text/javascript">
	var lastIndex2=-1;	var isExists=false;
	$(function(){
		initAppDictInput();
		$("#inputForm").validate({
			rules: {
				dictTypeCd: {
					remote: _ctx+"/bs/dict/isTypeExists?oldDictTypeCd=" + encodeURIComponent('[[${dictType.dictTypeCd}]]')
				}
			},
			messages: {
				dictTypeCd: {
					remote: "已经存在！"
				}
			},
			submitHandler: function(form)
			   {
				saveDict();
			   }
		});
	});
	function saveDict(){
		var options={
		        url:_ctx+'/bs/dict/save',
		        onSubmit: function(){
		        	var flag=true;
		        	var changeRows=[];
	        		var inserted = $('#tt2').datagrid('getChanges','inserted');
	        		var updated = $('#tt2').datagrid('getChanges','updated');
	        		changeRows = inserted.concat(updated);
		        	for(var i=0;i<changeRows.length;i++){
		        		var rowIndex=$('#tt2').datagrid('getRowIndex',changeRows[i]);
		        		flag=$('#tt2').datagrid('validateRow',rowIndex);
		        		if (!flag){
		        			$('#tt2').datagrid('selectRow',rowIndex);
		        			$('#tt2').datagrid('beginEdit', rowIndex);
							break;
		        		}else{
		        			$('#tt2').datagrid('endEdit', rowIndex);
		        		}
		        	}
		        	if(flag){
		        		$('#tt2').datagrid('endEdit', lastIndex2);
				        Convert.setChildren2Form("inputForm","tt2");
		        	}
		        	return flag;
		        },
		        success:function(data){
		        	if(data.indexOf('success')!=-1){
		        		 $.messager.show({
		        			 height:150,
		                     title:'提示',
		                     msg:'保存成功',
		                     timeout:2000,
		                     border:'thin',
		                     cls:'c9',
		                     showType:'show'
		                 });
						var id =$("#dictTypeId").val();
						if (id == '0'){
				        	$('#w').window("close");
						}else{
				    		$('#tt2').datagrid('reload');
						}
		        	}else{
		        		$.messager.alert('','保存失败');
		        	}
		        }
			};
		$('#inputForm').form('submit', options);
	}
	function initAppDictInput(){
		$('#tt2').datagrid({
			columns:[ [
				{field:'dictCd',title:'代码',align:'left',width:100,editor:{type:'validatebox',options:{required:'true',validType:'length[1,100]'}}},
				{field:'dictName',title:'名称',align:'left',width:120,editor:{type:'validatebox',options:{required:'true',validType:'length[1,2000]'}}},
				{field:'dispOrderNo',title:'序号',align:'right',width:50,editor:{type:'numberbox',options:{max:'10'}}},
				{field:'enableFlg',title:'是否有效',editor:{type:'checkbox',options:{on:'true',off:'false'}}, width:80, align:'center',
					formatter:function(value,row,index){
						if(value=='true')
							return '是';
						else 
							return '否';
					}
				},
				{field:'remark',title:'备注',width:100,editor:{type:'validatebox',options:{validType:'length[0,100]'}},
					formatter:function(value,row,index){
						return '<div style="overflow: hidden; white-space: nowrap; text-overflow:ellipsis;" title="'+value+'">'+value+'</div>';
					}
				},
				{field:'updatedDate',title:'更新时间',width:130,
					formatter:function(value,row,index){
						if(value){
							return '<div style="overflow: hidden; white-space: nowrap; text-overflow:ellipsis;" title="'+value+'">'+value+'</div>';
						}else{
							return '';
						}
					}
				},
				{field:'action',title:'操作',width:60,align:'center',
					formatter:function(value,row,index){
						var id =row.id;
						var d = '<img href="#" style="cursor:pointer;width:16px;hight:18px" onclick=deleterow2("'+id+'") src="../static/new-version/images/icon_delete.png"></img>';
						return d;
					}
				}
				] ],
			toolbar: '#addBtn',
			onBeforeLoad:function(){
				$(this).datagrid('rejectChanges');
			},
			onClickCell:function(index,field){
				if (lastIndex2 != index){
					$('#tt2').datagrid('endEdit', lastIndex2);
					$('#tt2').datagrid('beginEdit', index);
				}
				lastIndex2 = index;
				Convert.focusEditor("tt2",field,lastIndex2);
			}
		});
	}
	function focusEditor(field,editIndex){
		var editor = $('#tt2').datagrid('getEditor', {index:editIndex,field:field});
		if (editor){
			editor.target.focus();
		} else {
			var editors = $('#tt2').datagrid('getEditors', editIndex);
			if (editors.length){
				editors[0].target.focus();
			}
		}
	}
	
	function insert(){
		var rowSel=$('#tt2').datagrid('getSelected', lastIndex2);
		$('#tt2').datagrid('endEdit', lastIndex2);
		var index = $('#tt2').datagrid('getData').total;
		if(!index)index = $('#tt2').datagrid('getRows').length;
		var field={
				id:'0',
				dictCd:'',
				dictName:'',
				i18n:'',
				enableFlg:'true',
				remark:'',
				dispOrderNo:index+1
			}
		$('#tt2').datagrid('appendRow',field);
		lastIndex2 = $('#tt2').datagrid('getRows').length-1;
		$('#tt2').datagrid('selectRow', lastIndex2);
		$('#tt2').datagrid('beginEdit', lastIndex2);				
		Convert.focusEditor("tt2",field,lastIndex2);	
	}	
	
	function deleterow2(id){
		$('#tt2').datagrid('selectRecord',id);
		var row = $('#tt2').datagrid('getSelected');
		var index = $('#tt2').datagrid('getRowIndex',row);
		if (id=='0'){
			$('#tt2').datagrid('deleteRow', index);
			var nextSelect=index>0?index-1:0;
			$('#tt2').datagrid('selectRow', nextSelect);
		}else{
			$.messager.confirm({
				width:388,
				height:170,
				title: '删除提示',
				msg: '确认删除字典数据?',
				ok: "确定",
				cancel: "取消",
				cls:'c9',
				border:'thin',
				fn: function(r){
	                if (r){
	                	if(id){
							$.post(_ctx+"/bs/dict/deleteData/"+id, function(result) {
								$('#tt2').datagrid('reload');
							});
						}
	                }
	            }
	        });					
			/*$.messager.confirm('Confirm','确认删除字典数据?',function(r){
				if (r){
// 					$('#tt2').datagrid('deleteRow', index);
// 					var nextSelect=index>0?index-1:0;
// 					$('#tt2').datagrid('selectRow', nextSelect);
					if(id){
						$.post(_ctx+"/bs/dict/deleteData/"+id, function(result) {
							$('#tt2').datagrid('reload');
						});
					}
				}
			});*/
		}
	}
</script>
