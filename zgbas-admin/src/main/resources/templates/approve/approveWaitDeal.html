<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <title>群发待办</title>
    <th:block th:replace="~{layouts/include :: include}"></th:block>
</head>
<body class="easyui-layout">
<div region="north" class="search_div pt20	pl20 pr20 pb15 ofh" border="false">
    <form id="searchForm" class="form-search from-input-layout" method="post">
        <div class="mb6">
            <p class="yw-table-filter">
                <label>事项类型:</label>
                <input  name="dealType" type="text"  id="dealType" />
            </p>
            <p class="yw-table-filter">
                <label>摘要:</label>
                <input  name="subject" type="text"  id="subject" />
            </p>
            <p class="yw-table-filter">
                <label>已读状态:</label>
                <input  name="readFlg" type="text"  id="readFlg" />
            </p>
            <p class="yw-table-filter">
                <label style="width: 80px;">创建时间:</label>
                <input  id="createdDate" name="createdDate" class="easyui-datebox"></input>
            </p>
            <a href="#" id="btn" class="easyui-linkbutton btn64" onclick="Convert.search('searchForm','tt');">查询</a>
            <a href="#" id="btn" class="easyui-linkbutton btn-empty btn64 ml10" onclick="$('#searchForm').form('reset');">清空</a>
        </div>
    </form>
    <div id="btn" class="add-btn" style="margin-top: 10px">
        <a  href="#" class="easyui-linkbutton btn64 addBtn" onclick="editrow(0)">新增</a>
    </div>
</div>


<div region="center" border="false" class="panel_padding pl20 pr20">
    <table id="tt" fit="true"
           title="" iconCls="icon-edit" singleSelect="true"
           idField="id">
    </table>
</div>
<div id="w" title="摘要" data-options="width:1080,height:350">
    <div class="easyui-layout" fit="true">
        <div style="padding:20px 50px">
            <h3 id="subjectText">
            </h3>
        </div>
    </div>
</div>
<div id="matchProfitsConfig_detail" title="群发待办" data-options="width:800,height:580">
</div>
<script type="text/javascript">
    var lastIndex;
    var readFlg = eval('[(${readFlg})]');//是否已读
    var dealType = eval('[(${dealType})]');//是否已读
    var userJson = eval('[(${userJson})]');
    $(function(){
        /* 是否已读 */
        $("#readFlg").combobox({
            data : readFlg,
            textField : 'dictName',
            valueField : 'dictCd',
            width : 150,
            height : 30,
        });
        /* 通知类型 */
        $("#dealType").combobox({
            data : dealType,
            textField : 'dictName',
            valueField : 'dictCd',
            width : 150,
            height : 30,
        });

        $('#tt').datagrid({
            pagination:true,
            width:400,
            pageSize:30,
            rownumbers:true,
            pageList:[50,40,30,20,10],
            url:_ctx+"/approve/waitDeal/findPageWaitDeal",
            columns:[ [
                {field:'dealType',title:'事项类型',align:'center', width:150},
                {field:'subject',title:'摘要',align:'center', width:150,},
                {field:'readFlg',title:'已读状态',width:150,align:'center',formatter:function(value,row,index){
                        if(value =='0'){
                            return'未读';
                        }else if(value =='1'){
                            return'已读';
                        }
                    }},
                {field:'completeFlg',title:'完成状态',width:150,align:'center',formatter:function(value,row,index){
                        if(value =='0'){
                            return'未完成';
                        }else if(value =='1'){
                            return'已完成';
                        }else if(value =='2'){
                            return '不处理';
                        }
                }},
                {field:'relaUserId',title:'责任人',align:'center', width:150 ,formatter : function(value, row, index) {
                return Convert.findValueByKey(userJson, "userId",value, "nickName");

        }},
                {field:'source',title:'来源',align:'center', width:140},
                {field:'createdDate',title:'创建时间',align:'center', width:140},
                {field:'operate',title:'操作', width:120,align:'center',formatter:function(value, row, index){
                        var str = '<img onclick="remove('+row.id+')" style="cursor:pointer;width:16px;hight:18px" src="../static/new-version/images/icon_delete.png"/>';
                        return str;
                    }}
            ]],
            onDblClickRow : function(index, row) {// 双击单行进入对应销售详情
                lastIndex = index;
                add(row.id);
            },
        });
        $('#matchProfitsConfig_detail').window({
            title : '群发待办',
            modal : true,
            closed : true,
            collapsible : false,
            minimizable : false,
            maximizable : false,
            cache : false,
            onClose : function() {
                $('#tt').datagrid('reload');
            }
        });
        $('#w').window({
            modal : true,
            closed : true,
            collapsible : false,
            minimizable : false,
            maximizable : false,
            cache : false
        });

    });


    /* 弹出新增框 */
    function editrow(id) {
        var url = _ctx + "/approve/waitDeal/detail/" + id;
        $('#matchProfitsConfig_detail').window({href:url});
        $('#matchProfitsConfig_detail').window("open");

    }
    function add(id){
        $.ajax({
            type:"POST",
            dataType: "json",
            url: '/approve/waitDeal/findSubject',
            data:{"id":id},
            success: function (data){
                // console.log(data);//打印服务端返回的数据(调试用)\
                // $('#w').window("open");
                // console.log(data.rows.toString())
                document.getElementById("subjectText").innerHTML="<pre>"+data.rows.toString()+"</pre>"
                html="<pre>"+data.rows.toString()+"</pre>"
                parent.layer.open({
                    title: '待办事项',
                    type: 1,
                    fix: false,
                    shadeClose:true,
                    area: ['600px', '300px'],
                    // btn: ['确定', '关闭'],
                    content: html
                });

            },
            error : function() {
                $.messager.alert('error', "请联系管理员", 'warning');
            }

        })

    }
    function remove(id){
        $('#tt').datagrid('selectRecord',id);
        var row = $('#tt').datagrid('getSelected');
        if(row){
            var index = $('#tt').datagrid('getRowIndex', row);
            if (row.id==undefined){
                $('#tt').datagrid('deleteRow',index);
            }else{
                $.messager.confirm({
                    width:388,
                    height:170,
                    title: '删除提示',
                    msg: '确定要删除该信息吗？',
                    ok: "确定",
                    cancel: "取消",
                    cls:'c9',
                    border:'thin',
                    fn: function(r){
                        if (r){
                            //TODO:如果该记录被引用,是否强制不允许删除?
                            $.post(_ctx+"/approve/waitDeal/delete/"+row.id,function(result) {
                                var rObj = eval(result);
                                if(rObj.success){
                                    $('#tt').datagrid('reload');
                                    $('#tt').datagrid('clearSelections');
                                }else{
                                    $.messager.alert('error',rObj.failure,'warning');
                                }
                            });
                        }
                    }
                });
            }
        }
    }



</script>
</body>
</html>
