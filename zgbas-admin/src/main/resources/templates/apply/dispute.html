<script type="text/javascript" th:inline="javascript">
	//品名列表
	var _productTypeJson = eval('[(${productTypeJson})]');
	//
	var _productChildrenJson = eval('[(${productChildrenJson})]');
	//牌号名称
	var _brandJson = eval('[(${brandJson})]');
	//厂商列表
	var _factoryJson = eval('[(${factoryJson})]');
	//合同类型
	var _contractTypeJson = eval('[(${contractTypeJson})]');
	//付款方式
	var _payTypeJson = eval('[(${payTypeJson})]');
	//结算方式
	var _deliveryModeJson = eval('[(${deliveryModeJson})]');
	var _buyDeliveryModeJson = eval('[(${buyDeliveryModeJson})]');
	var _sellDeliveryModeJson = eval('[(${sellDeliveryModeJson})]');
	//提货方式
	var _deliveryTypeJson = eval('[(${deliveryTypeJson})]');
	//合同属性
	var _contractAttrJson = eval('[(${contractAttr})]');
	//交货日期补充
	var _arrivalTimeExtJson = eval('[(${arrivalTimeExtJson})]');
	//质量标准
	var _qualityStandardJson = eval('[(${qualityStandardJson})]');
	//我方企业抬头
	var _ourCompanyNameJson = eval('[(${ourCompanyNameJson})]');
	//服务费收取方式
	var _serviceTypeJson = eval('[(${serviceTypeJson})]');
	//默认交货地址
	var _defaultDeliveryAddr = eval('[(${defaultDeliveryAddr})]');
	var _contractBondRateJson = eval('[(${contractBondRateJson})]');
	var _packingSpecificaJson = eval('[(${packingSpecificaJson})]');
	var _buySourceJson = eval('[(${buySourceJson})]');
	var _matchUserNameTree = eval('[(${matchUserNameTree})]');
	var contractStatusJson = eval('[(${contractStatusJson})]');
	var _approveStatusJson = eval('[(${approveStatusJson})]');
	var settlementTypeJson = [{"id": "0", "text": "赊销(一票制)"}, {"id": "1", "text": "赊销(两票制)"}]
	var filePlugin = new FilePlugin('#fileId',$('#entityId').val(),'/apply/dispute/updateFileId',[[${param.hasEditFile}]]);
	_beforSaveOper = true;
	$(function () {
		$('#addBtn').linkbutton();
		$('#addBtnp').linkbutton();
		var _curStatus = $("#entityStatus").val();
		console.log("curStatus:" + _curStatus);
		$('.easyui-linkbutton').linkbutton();

		//合同类型
		var contractTypeDom = $("#bcontractType");
		var contractType = Convert.findValueByKey(_contractTypeJson, "dictCd", contractTypeDom.val(), "dictName");
		contractTypeDom.val(contractType);
		//合同类型
		var contractTypeDom = $("#scontractType");
		var contractType = Convert.findValueByKey(_contractTypeJson, "dictCd", contractTypeDom.val(), "dictName");
		contractTypeDom.val(contractType);

		//合同属性
		var contractAttrDom = $("#contractAttr");
		var contractAttr = Convert.findValueByKey(_contractAttrJson, "dictCd", contractAttrDom.val(), "dictName");
		contractAttrDom.val(contractAttr);

		//付款方式
		var payTypeDom = $("#payType");
		var payType = Convert.findValueByKey(_payTypeJson, "dictCd", payTypeDom.val(), "dictName");
		payTypeDom.val(payType);

		var receiveTypeDom = $("#receiveType");
		var receiveType = Convert.findValueByKey(_payTypeJson, "dictCd", receiveTypeDom.val(), "dictName");
		receiveTypeDom.val(receiveType);

		var buySourceDom = $("#buySource");
		var buySource = Convert.findValueByKey(_buySourceJson, "dictCd", buySourceDom.val(), "dictName");
		buySourceDom.val(buySource);

		var serviceTypeDom = $("#serviceType");
		var serviceType = Convert.findValueByKey(_serviceTypeJson, "dictCd", serviceTypeDom.val(), "dictName");
		serviceTypeDom.val(serviceType);

		//销售方式
		var deliveryModeBDom = $("#deliveryModeB");
		var delivery = Convert.findValueByKey(_deliveryModeJson, "dictCd", deliveryModeBDom.val(), "dictName");
		deliveryModeBDom.val(delivery);

		var deliveryModeSDom = $("#deliveryModeS");
		var deliveryS = Convert.findValueByKey(settlementTypeJson,"id",deliveryModeSDom.val(),"text");
		deliveryModeSDom.val(deliveryS);

		//交货方式
		var buyDeliveryTypeDom = $("#buyDeliveryType");
		var buyDeliveryType = Convert.findValueByKey(_deliveryTypeJson, "dictCd", buyDeliveryTypeDom.val(), "dictName");
		buyDeliveryTypeDom.val(buyDeliveryType);

		var sellDeliveryTypeDom = $("#sellDeliveryType");
		var sellDeliveryType = Convert.findValueByKey(_deliveryTypeJson, "dictCd", sellDeliveryTypeDom.val(), "dictName");
		sellDeliveryTypeDom.val(sellDeliveryType);

		//到货日期
		var _BarrivalTimeExt = $('#BarrivalTimeExt').val();
		var BarrivalTimeExt = Convert.findValueByKey(_arrivalTimeExtJson, "dictCd", _BarrivalTimeExt, "dictName");
		$("#BarrivalTimeExt").val(BarrivalTimeExt);

		var _SarrivalTimeExt = $('#SarrivalTimeExt').val();
		var SarrivalTimeExt = Convert.findValueByKey(_arrivalTimeExtJson, "dictCd", _SarrivalTimeExt, "dictName");
		$("#SarrivalTimeExt").val(SarrivalTimeExt);
		//质量标准
		var _qualityStandard = $('#qualityStandard').val();
		var qualityStandard = Convert.findValueByKey(_qualityStandardJson, "dictCd", _qualityStandard, "dictName");
		$('#qualityStandard').val(qualityStandard);

		//包装规格
		var _wrapSpecs = $('#wrapSpecs').val();
		var wrapSpecs = Convert.findValueByKey(_packingSpecificaJson, "dictCd", _wrapSpecs, "dictName");
		$('#wrapSpecs').val(wrapSpecs);

		var _payRate = $('#payRate').val();
		var payRate = Convert.findValueByKey(_contractBondRateJson, "dictCd", _payRate, "dictName");
		$("#payRate").val(payRate);

		var _receiveRate = $('#receiveRate').val();
		var receiveRate = Convert.findValueByKey(_contractBondRateJson, "dictCd", _receiveRate, "dictName");
		$("#receiveRate").val(receiveRate);

		var _rateType = $('#rateType').val();
		var rateType = Convert.findValueByKey(_serviceTypeJson, "dictCd", _rateType, "dictName");
		$("#rateType").val(rateType);

		//我方抬头
		$('#ourCompanyName').combobox({
			hasDownArrow: false
		});
		//合同属性
		$('#contractAttr').combobox({
			hasDownArrow: false
		});
		$('#qualityStandard').combobox({
			hasDownArrow: false
		})
		//收保证金日期
		var receiveBondTime = $('#receiveBondTime').val();
		if (!receiveBondTime) {
			$('#receiveBondTime').parent().addClass('hide');
		}

		$('#w_contract').window({
			title: '电子合同',
			modal: true,
			closed: true,
			collapsible: false,
			minimizable: false,
			maximizable: false,
			cache: false
		});

		// 采购合同预览按钮
		$(".buyContractPreviewClass").on("click", function () {
			if (!isBlank($("#buyContractFileId").val())) {
				window.open($("#buyContractFileId").val());
			}else {
				var val = $("#buyContractId").val();
				if (val) {
					var url = _ctx + "/ctr/contractText/getBycontractId/" + val;
					$('#w_contract').window({href: url});
					$('#w_contract').window("open");
				}
			}
		});

		// 销售合同预览按钮
		$(".sellContractPreviewClass").on("click", function () {
			if (!isBlank($("#sellContractFileId").val())) {
				window.open($("#sellContractFileId").val());
			}else {
				var val = $("#sellContractId").val();
				if (val) {
					var url = _ctx + "/ctr/contractText/getBycontractId/" + val;
					$('#w_contract').window({href: url});
					$('#w_contract').window("open");
				}
			}
		});

		// 服务合同预览按钮
		$(".serverContractPreviewClass").on("click", function () {
			if (!isBlank($("#serviceContractFileId").val())) {
				window.open($("#serviceContractFileId").val());
			}else {
				var val = $("#serverContractId").val();
				if (val) {
					var url = _ctx + "/ctr/contractText/getServiceText/" + val;
					$('#w_contract').window({href: url});
					$('#w_contract').window("open");
				}
			}

		$('#w_stock_choose').window({
			modal: true,
			closed: true,
			collapsible: false,
			minimizable: false,
			maximizable: false,
			cache: false,
			title: "请选择采购库存"
		});

		//禁用所有输入框
		$(".control").attr("readOnly", "true");

		if ($("#entityId").val() == 0) {
			$("#disputeReason").attr("readOnly", false);
			$("#disputeHandle").attr("readOnly", false);
		}
		$("#disputeReason").textbox({required:true})
		$("#disputeHandle").textbox({required:true})


		//加载附件列表
		filePlugin.load($('#fileId').val(),'#span_fileId');
		if ($('#btn_fileId').length>0){
			fileUpload("btn_fileId", "fileId");
		}


	});

	function operChooseContract() {
		var url = _ctx + "/stock/stockContract/choose";
		$('#w_stock_choose').attr('callbackExec', 'chooseCallback');
		$('#w_stock_choose').window({href: url});
		$('#w_stock_choose').window("open");
	}

	function chooseCallback(stockRows) {
		if (stockRows) {
			var _curProductCd = "";
			for (var i = 0; i < stockRows.length; i++) {
				var row = stockRows[i];
				$("#productName").combotree('setValue', row.productName);
				$("#brandNumber").combobox('setValue', row.brandNumber);
				$("#factoryName").combobox('setValue', row.factoryName);
				$("#dealNumber").numberbox('setValue', row.remainNumber);
				$("#maxNumber").val(row.remainNumber);
				$("#wrapSpecs").combobox('setValue', row.wrapSpecs);
				$("#bdealPrice").numberbox('setValue', row.dealPrice);
				$("#stockContractId").val(row.stockContractId);
				$("#minDealPrice").numberbox('setValue', row.dealPrice);
				var new_row = {
					id: 0,
					productCd: row.productCd,
					productName: row.productName,
					brandNumber: row.brandNumber,
					factoryId: row.factoryId,
					warehouseName: row.warehouseName,
					factoryName: row.factoryName,
					warehouseId: row.warehouseId,
					maxNumber: row.remainNumber,
					dealNumber: row.remainNumber,
					productAttr: row.productAttr,
					stockDetailId: row.id,
					otherDealPrice: row.dealPrice,
					warehouseAddr: row.warehouseAddr,
					stockContractId: row.id,
					warehousePrice: row.warehousePrice,
					dealPrice: row.dealPrice,
					taxPrice: parseFloat(row.dealPrice / 1.13).toFixed(2),
					totalPrice: parseFloat(row.dealPrice * row.remainNumber).toFixed(2)
				};
			}
		}
	}

	//发起申请前操作
	function beforSaveOper() {
		if (isBlank($("#fileId").val())) {
			$.messager.alert('提示','必须上传附件','info');
			return false;
		}
		return true;
	}
</script>
