<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
	<link th:href="@{/static/ueditor/third-party/webuploader/webuploader.css}" type="text/css" rel="stylesheet" />
</head>
<div class="easyui-layout" fit="true">
	<div id="inputForm" method="post" style="margin-bottom:20px">
		<input type="hidden" name="id" id="entityId" th:value="${entity.id}" />
		<input type="hidden" name="status" id="entityStatus" th:value="${entity.status}" />
		<input type="hidden" id="hashEdit" th:value="${psv.hasEdit}"/>
		<input type="hidden" name="canApproveEdit" id="canApproveEdit" th:value="${psv.canApproveEdit}" />

		<div class="mb6">
			<p class="yw-table-filter">
				<label>申请人:</label>
				<input id="applyUserName" name="applyUserName" readonly type="text" th:value="${entity.applyUserName}"></input>
				<input id="applyUserId" name="applyUserId" readonly type="hidden" th:value="${entity.applyUserId}"></input>
			</p>
			<p class="yw-table-filter">
				<label>申请日期:</label>
				<input name="applyDate" id="applyDate" class="easyui-datebox" required="required"  th:value="${#dates.format(entity.applyDate,'yyyy-MM-dd')}"></input>
			</p>
		</div>
		<div class="mb6">
			<p class="yw-table-filter w2">
				<label>收款方:</label>
				<input type="text" name="receiveCompanyName" id="receiveCompanyName"  th:value="${entity.receiveCompanyName}"></input>
			</p>
		</div>
		<div class="mb6">
			<p class="yw-table-filter w2">
				<label for="bankName"  class="control-label">开户行:</label>
				<input name="bankName" id="bankName" type="text" th:value="${entity.bankName}"></input>
			</p>
			<p class="yw-table-filter w2">
				<label for="bankAccount"  class="control-label">账号:</label>
				<input name="bankAccount" id="bankAccount" type="text"  th:value="${entity.bankAccount}" ></input>
			</p>
		</div>
		<div class="mb6">
			<p class="yw-table-filter w2">
				<label>公司名称:</label>
				<input name="companyName" id="companyName" type="text" th:value="${entity.companyName}"></input>
			</p>
			<p class="yw-table-filter">
				<label>所属部门:</label>
				<input name="belogDept" id="belogDept" type="text" th:value="${entity.belogDept}"></input>
			</p>
			<p class="yw-table-filter">
				<label>费用类别:</label>
				<input id="costType" name="costType"  type="text" th:value="${entity.costType}"></input>
			</p>


		</div>
		<div class="mb6">
<!--			<p class="yw-table-filter w2">-->
<!--				<label>摘要:</label>-->
<!--				<input name="subject" id="subject" type="text" th:value="${entity.subject}"></input>-->
<!--			</p>-->
			<!--摘要-->
			<th:block contenteditable='true'  th:replace="~{tags/apply :: subject(${#maps.containsKey(psv.mapEdit, 'subject')}?${psv.mapEdit['subject'].require}:true,${#maps.containsKey(psv.mapEdit, 'subject')}?${psv.mapEdit['subject'].edit && psv.hasApprove}:${ psv.hasEdit})}"/>
			<p class="yw-table-filter">
				<label>金额(元):</label>
				<input name="dealAmount" id="dealAmount" type="text" th:value="${entity.dealAmount}"></input>
			</p>
		</div>
		<div class="mb6">
<!--			<p class="yw-table-filter w2">-->
<!--				<label>备注:</label>-->
<!--				<input name="remark" id="remark" type="text" th:value="${entity.remark}"></input>-->
<!--			</p>-->
			<!--备注-->
			<th:block contenteditable='true'  th:replace="~{tags/apply :: remarks(${#maps.containsKey(psv.mapEdit, 'remarks')}?${psv.mapEdit['remarks'].require}:true,${#maps.containsKey(psv.mapEdit, 'remarks')}?${psv.mapEdit['remarks'].edit && psv.hasApprove}:${ psv.hasEdit})}"/>
		</div>
	</div>
	<div class="editForm">
		<p style="width:240px">
			<span class="upload-btn" id="btn_fileId">
               	 <a href="#" class="easyui-linkbutton file-upload" data-options="iconCls:'icon-upload'">上传附件 </a>
           	</span>
			<input class="control" id="fileId" name="fileId" type="hidden" th:value="${entity.fileId}"/>
		</p>
		<p class="controls showImg fileId" id="span_fileId"></p>
	</div>
</div>
<script th:src="@{/static/ueditor/third-party/webuploader/webuploader.min.js}" type="text/javascript"></script>
<script th:src="@{/static/js/file.js?v=2}" type="text/javascript"></script>
<script th:src="@{/static/js/admin/apply_base.js}" type="text/javascript"></script>
<script type="text/javascript">
	var isExists=false;
	var imgShowUrl =_filePath+'/view/small/';
	var _customerNameJson = eval('[(${customerNameJson})]');//印章-公司名称
	var businessDeptTypeJson =eval('[(${businessDeptTypeJson})]');//所属部门
	var receptionCostTypeJson =eval('[(${receptionCostTypeJson})]');//前台费用类别
	var personnelCostTypeJson =eval('[(${personnelCostTypeJson})]');//人事费用类别
	var backgroundCostTypeJson =eval('[(${backgroundCostTypeJson})]');//后台商开费用类别
	var _costTypeJson = '';
	var filePlugin = new FilePlugin('#fileId',$('#entityId').val(),'/apply/businessPay/updateFileId',[[${param.hasEditFile}]]);
	$(function(){
				$('.easyui-linkbutton').linkbutton();
				var _curStatus = $("#entityStatus").val();
				if(_curStatus&&(_curStatus=='N'||_curStatus=='B'||_curStatus=='C')){
					$('#applyDate').datebox({
						required: true,
						editable: false
					});
					$("#costType").combobox({
						data:_costTypeJson,
						textField:'dictName',
						valueField:'dictCd',
						required: true,
						panelHeight:"auto",
						editable:false
					});
					$("#belogDept").combobox({
						data:businessDeptTypeJson,
						textField:'dictName',
						valueField:'dictCd',
						required: true,
						panelHeight:"auto",
						editable:false,
						onSelect:function(node){
							var value = $(this).val();
							var cd = node.dictCd;
							if (cd == "QT"){
								_costTypeJson = receptionCostTypeJson;
							}else if (cd == "XZ"){
								_costTypeJson = personnelCostTypeJson;
							}else{
								_costTypeJson = backgroundCostTypeJson;
							}
							if (value != cd){
								$('#costType').combobox('clear');
							}
							$('#costType').combobox('loadData',_costTypeJson);
						}
					});
					$("#dealAmount").numberbox({
						min:0,
						precision:2,
						required: true
					});
				}else if(_curStatus&&(_curStatus=='A'||_curStatus=='D')){
					$("#belogDept").combobox({
						data:businessDeptTypeJson,
						textField:'dictName',
						valueField:'dictCd',
						required: true,
						panelHeight:"auto",
						editable:false,
						readonly:true,
						onSelect:function(node){
							var cd = node.dictCd;
							if (cd == "QT"){
								_costTypeJson = receptionCostTypeJson;
							}else if (cd == "XZ"){
								_costTypeJson = personnelCostTypeJson;
							}else{
								_costTypeJson = backgroundCostTypeJson;
							}
							var _belogDept = $("#belogDept").combobox("getValue");
							var _belogDeptStr = Convert.findValueByKey(businessDeptTypeJson,"dictCd",_belogDept,"dictName");
							$("#belogDept").val(_belogDeptStr);

						}

					});
					$("#costType").combobox({
						data:_costTypeJson,
						textField:'dictName',
						valueField:'dictCd',
						required: true,
						panelHeight:"auto",
						editable:false,
						readonly:true,
						onSelect:function(node) {
							var _costType = node.dictCd;
							var _costTypeStr = Convert.findValueByKey(_costTypeJson,"dictCd",_costType,"dictName");
							$("#costType").val(_costTypeStr);
					}
					});
					$("#inputForm").find("input").not("[type='button']").not("#remarks").attr("readonly",true);
					$("#inputForm").find("input").not("[type='button']").not("#subject").attr("readonly",true);
					$('#remarks').textbox({
					});
					$('#subject').textbox({
					});
					$(".chooseBtn").hide();
				}
				//加载附件列表
				filePlugin.load($('#fileId').val(),'#span_fileId');
				if ($('#btn_fileId').length>0){
					fileUpload("btn_fileId", "fileId");
				}
				$('#companyName').combobox({
					data:_customerNameJson,
					valueField:'dictCd',
					textField:'dictName',
					editable:false,
					required:true,
					multiple:true,
					panelHeight:275,
					formatter: function (row) {
						var opts = $(this).combobox('options');
						return '<input style="margin-right:10px;" type="checkbox" class="combobox-checkbox ckbox">' + row[opts.textField]
					},
					onShowPanel: function () {
						var opts = $(this).combobox('options');
						var target = this;
						var values = $(target).combobox('getValues');
						$.map(values, function (value) {
							var el = opts.finder.getEl(target, value);
							el.find('input.combobox-checkbox')._propAttr('checked', true);
						})
					},
					onLoadSuccess: function () {
						var opts = $(this).combobox('options');
						var target = this;
						var values = $(target).combobox('getValues');
						$.map(values, function (value) {
							var el = opts.finder.getEl(target, value);
							el.find('input.combobox-checkbox')._propAttr('checked', true);
						})
					},
					onSelect: function (row) {
						var opts = $(this).combobox('options');
						var el = opts.finder.getEl(this, row[opts.valueField]);
						el.find('input.combobox-checkbox')._propAttr('checked', true);
					},
					onUnselect: function (row) {
						var opts = $(this).combobox('options');
						var el = opts.finder.getEl(this, row[opts.valueField]);
						el.find('input.combobox-checkbox')._propAttr('checked', false);
					}
				});
			}
	);
</script>
