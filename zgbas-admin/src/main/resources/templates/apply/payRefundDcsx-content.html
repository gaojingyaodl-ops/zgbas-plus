<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
	<link th:href="@{/static/ueditor/third-party/webuploader/webuploader.css}" type="text/css" rel="stylesheet" />

</head>
<div class="easyui-layout" fit="true">
	<div id="inputForm" method="post" class="editForm_approve content_div" style="margin-bottom:20px">
		<input type="hidden" name="id" id="entityId" th:value="${entity.id}" />
		<input type="hidden" name="contractId" id="contractId" th:value="${entity.contractId}" />
		<input type="hidden" id="entityStatus" th:value="${entity.status}" />
		<input type="hidden" id="hashEdit" th:value="${psv.hasEdit}"/>
		<input type="hidden" name="canApproveEdit" id="canApproveEdit" th:value="${psv.canApproveEdit}" />
<!--		<input name="buyCompanyId" type="hidden" id="buyCompanyId" th:value="${entity.companyId}"/>-->
		<div class="mb6">
			<p class="yw-table-filter">
				<label>合同编号:</label>
				<input name="contractNo" id="contractNo" class="chooseBtnStyle" readonly type="text" th:value="${entity.contractNo}"></input>
			</p>
			<a id="addBtn" href="#" class="easyui-linkbutton btn-empty btn64" onClick="contractDetail()">合同详情</a>
		</div>
		<div class="mb6">
			<p class="yw-table-filter">
				<label>合同总价(元):</label>
				<input name="totalAmount" id="totalAmount" readonly type="text"  th:value="${#numbers.formatDecimal(entity.totalAmount,1,'COMMA',2,'POINT')}"></input>
			</p>
			<p class="yw-table-filter">
				<label>已付金额(元):</label>
				<input name="payedAmount" id="payedAmount" readonly type="text" th:value="${#numbers.formatDecimal(entity.payedAmount,1,'COMMA',2,'POINT')}"></input>
			</p>

			<p class="yw-table-filter">
				<label>退款金额(元):</label>
				<input name="refundAmount" id="refundAmount" readonly type="text" th:value="${#numbers.formatDecimal(entity.refundAmount,1,'COMMA',2,'POINT')}"></input>
			</p>
			<th:block contenteditable='true' th:replace="~{tags/apply :: refundDate(${#maps.containsKey(psv.mapEdit, 'refundDate')}?${psv.mapEdit['refundDate'].require}:true,${#maps.containsKey(psv.mapEdit, 'refundDate')}?${psv.mapEdit['refundDate'].edit && psv.hasApprove}:${ psv.hasEdit})}"/>
		</div>
		<div class="mb6">
			<p class="yw-table-filter w2">
				<label>我方:</label>
				<input name="ourCompanyName" id="ourCompanyName" readonly type="text" required="required" th:value="${entity.ourCompanyName}"></input>
			</p>
			<p class="yw-table-filter w2">
				<label>退款方:</label>
<!--				<input name="companyId" type="hidden" id="companyId" th:value="${entity.companyId}"></input>-->
				<input type="text" name="companyName" readonly="readonly" id="companyName" th:value="${entity.companyName}"></input>
			</p>
		</div>
		<div class="mb6">
			<p class="yw-table-filter w2">
				<label>开户行:</label>
				<input name="bankName" id="bankName" type="text" required="required" th:value="${entity.bankName}"/>
			</p>
			<p class="yw-table-filter w2">
				<label>账号:</label>
				<input name="bankAccount" id="bankAccount" type="text" required="required" th:value="${entity.bankAccount}"/>
			</p>
		</div>
		<div class="mb6">
			<p class="yw-table-filter w2">
				<label>备注:</label>
				<input name="remark" id="remark" type="text" th:value="${entity.remark}"></input>
			</p>
		</div>
	</div>
	<div class="editForm">
		<p style="width:240px">
			<span class="upload-btn" id="btn_fileId">
               	 <a href="#" class="easyui-linkbutton file-upload" data-options="iconCls:'icon-upload'">上传附件 </a>
           	</span>
			<input class="control" id="fileId" name="fileId" type="hidden" th:value="${entity.fileId}" />
		</p>
		<p class="controls showImg fileId" id="span_fileId"></p>
	</div>
	<div id="w_contract_choose" class="easyui-window" title="合同详情" data-options="width:830,height:640"></div>
</div>
<script th:src="@{/static/ueditor/third-party/webuploader/webuploader.min.js}" type="text/javascript"></script>
<script th:src="@{/static/js/file.js?v=2}" type="text/javascript"></script>
<script th:src="@{/static/js/admin/apply_base.js}" type="text/javascript"></script>
<script type="text/javascript">
	var companyJson =eval('[(${companyJson})]');
	var _ourCompanyJson=eval('[(${ourCompanyJson})]');
	var filePlugin = new FilePlugin('#fileId',$('#entityId').val(),'/apply/payRefundDcsx/updateFileId',[[${param.hasEditFile}]]);
	var canApproveEdit = $("#canApproveEdit").val();
	$(function(){
		_beforSaveOper = true;
		$('#w_contract_choose').window({
			title: '请选择合同',
			modal:true,
			closed: true,
			collapsible : false,
			minimizable : false,
			cache:false
		});
		$('.easyui-linkbutton').linkbutton();
		var _curStatus = $("#entityStatus").val();

		$('#totalAmount,#payedAmount,#refundAmount').numberbox({
			required: true,
			precision:2,
			min:0,
			parser: function(val) {
				// 解析时去除千分位分隔符
				if(val) {
					return parseFloat(String(val).replace(/,/g, ''));
				} else {
					if(isNaN(val)) {
						return '';
					} else {
						return val;
					}
				}
			},
			formatter: function(val) {
				if (val || val === 0) {
					val = parseFloat(val).toFixed(2).toString().split(".");
					val[0] = val[0].replace(new RegExp('(\\d)(?=(\\d{3})+$)', 'ig'), "$1,");
					return val.join(".");
				} else {
					if(isNaN(val)){
						return ""
					} else {
						return val;
					}
				}
			}
		});

		if(_curStatus&&(_curStatus=='N'||_curStatus=='B'||_curStatus=='C')){
			$(".insertContent").show();

			$("#bankAccount,#bankName").textbox({
				required:true
			});

			$('#dueTime,#billDueTime,#refundDate').datebox({
				required: true,
				editable:false
			});
			//我方抬头
			$('#ourCompanyName').combobox({
				data:_ourCompanyJson,
				valueField:'dictName',
				textField:'dictName',
				panelHeight:"auto",
				editable:false,
				hasDownArrow:false,
				readonly:true,
				onHidePanel:function(){
					BasCombobox.onHidePanel(this);
				}
			});
			var _ourcompanyName = $('#ourCompanyName').val();
			if(_ourcompanyName == ''){
				$('#ourCompanyName').combobox('select', _ourCompanyJson[0].dictName);
			}
			applyLoadSucess();
		}

		// 审批中
		if(_curStatus&&(_curStatus=='A')){
			$(".chooseBtn").hide();

			$("#inputForm").find("input").not("[type='button']").not("#receiveDate").attr("readonly",true);
			$("#inputForm").find("input").not("[type='button']").not("#refundAmount").attr("readonly",true);
		}

		if(_curStatus&&(_curStatus=='D')){
			$(".chooseBtn").hide();

			$("#inputForm").find("input").not("[type='button']").attr("readonly",true);

		}
		//加载附件列表
		filePlugin.load($('#fileId').val(),'#span_fileId');
		if ($('#btn_fileId').length>0){
			fileUpload("btn_fileId", "fileId");
		}
	});
	//选择合同
	function openChoose(){
		var url=_ctx+"/ctr/contract/choose?contractType=S&contractStatus=C&fondFlg=0&type=R";
		$('#w_contract_choose').attr('callbackExec', 'chooseCallback');
		$('#w_contract_choose').window({href:url});
		$('#w_contract_choose').window("open");
	}

	function chooseCallback(contractRows){
		var contract = contractRows[0];
		byContract(contract);
	}
	function byContract(contract){
		if (contract!=undefined){
			$("#contractNo").val(contract.contractNo);//合同编号
			$('#ourCompanyName').combobox('setValue',contract.ourCompanyName);
			if ('ZY-TP' === contract.businessType) {
				$("#totalAmount").numberbox('setValue',contract.settlementTotalAmount);//合同总价
				$("#payedAmount").numberbox('setValue',Number(contract.receiveAmount));//已收金额
				$("#refundAmount").numberbox('setValue', Number(contract.receiveAmount) - Number(contract.settlementTotalAmount));
			} else {
				$("#totalAmount").numberbox('setValue',contract.totalAmount);//合同总价
				$("#payedAmount").numberbox('setValue',contract.receiveAmount);//已收金额
				$("#refundAmount").numberbox('setValue', Number(contract.receiveAmount) - Number(contract.totalAmount));
			}
			$("#contractId").val(contract.id);
			// $("#companyId").val(contract.companyId);
			$("#companyName").val(contract.companyName);
			// $("#buyCompanyId").val(contract.buyCompanyId);

			try {
				$.ajax({
					url:_ctx+"/apply/payRefundDcsx/findOurCompany",
					type:"post",
					async:false,
					data:{"companyName":contract.ourCompanyName},
					success:function(data){
						if(data) {
							$('#bankAccount').textbox("setValue",data.companyCardId);
							$('#bankName').textbox("setValue",data.companyBankName);
						}
						
					}
				});
			}catch (e){
				console.log(e);
			}
		}
	}

	//合同详情
	function contractDetail(){
		var contractNo = $("#contractNo").val();
		var contractId = $("#contractId").val();
		if (contractId){
			$.post(_ctx + '/bs/matchDetail/content5/' + contractId, function (result) {
				var title="代采赊销详情"+contractNo;
				window.parent.addTab(title, _ctx + '/bs/matchDetail/content2/' + result.approveId);
			});
		}
	}

	//发起申请前操作
	function beforSaveOper(){
		return true;
	}
</script>
</html>
