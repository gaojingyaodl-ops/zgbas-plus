<!DOCTYPE html>

<head>

<body class="easyui-layout">
<div region="north" class="search_div pt20	pl20 pr20 pb15 ofh" border="false">
    <form id="searchForm" class="form-search from-input-layout" method="post">

        <input type="hidden" name="search_LIKES_businessTypeDcsx" value="BL">

        <input type="hidden" name="search_EQB_matchCreditFlg" th:value="${matchCreditFlg}">
        <input type="hidden" name="matchCreditFlg" id="matchCreditFlg" th:value="${matchCreditFlg}">
        <input id="isGcy" type="hidden" th:value="${isGcy}"/>
        <div class="mb6">
            <p class="yw-table-filter">
                <label>合同编号</label>
                <input  class="control" id="contractNo" type="text" name="search_LIKES_contractNo"/>
            </p>
            <p class="yw-table-filter">
                <label>企业名称</label>
                <input  class="control" id="companyName" type="text" name="search_LIKES_companyName"/>
            </p>
            <p class="yw-table-filter">
                <label>业务员</label>
                <input type="text" id="matchUserName" class="control text_padding" name="search_EQS_matchUserId"></input>
            </p>
<!--            <p class="yw-table-filter">-->
<!--                <label>合同属性</label>-->
<!--                <input type="text"  name="search_EQS_contractAttr" id="contractAttr" class="control text_padding"></input>-->
<!--            </p>-->
            <p class="yw-table-filter">
                <label>类型</label>
                <input type="text" id="contractTypes" class="control text_padding" name="contractTypes"></input>
            </p>
            <p class="yw-table-filter">
                <label>货名</label>
                <input  class="control" id="productsName" type="text" name="search_LIKES_productsName"/>
            </p>
            <p class="yw-table-filter">
                <label>交货日期</label>
                <input  id="srh_deliveryDate_from" name="search_GTED_deliveryDateTo" class="easyui-datebox"/>
            </p>
            <span style="margin-left: -15px;">
				<label>~</label>
			</span>
            <p class="yw-table-filter">
                <input  id="srh_deliveryDate_to"  name="search_LTD_deliveryDateTo" class="easyui-datebox" />
            </p>
        </div>
        <div class="mb6">
            <p class="yw-table-filter">
                <label id="payTypeName"></label>
                <input type="text" id="payType" class="control text_padding" name="payCondition"></input>
            </p>
            <p class="yw-table-filter">
                <label id="warehouseTypeName"></label>
                <input type="text" id="warehouseType" class="control text_padding" name="warehouseCondition"></input>
            </p>
            <p class="yw-table-filter">
                <label id="billTypeName"></label>
                <input type="text" id="billType" class="control text_padding" name="billCondition"></input>
            </p>
            <p class="yw-table-filter">
                <label>我方抬头</label>
                <input type="text" id="ourCompanyName" class="control text_padding" name="search_LIKES_ourCompanyName"></input>
            </p>
            <p class="yw-table-filter">
                <label>交货方式</label>
                <input type="text" id="deliveryType" class="control text_padding" name="search_EQS_deliveryType"></input>
            </p>
<!--            <p class="yw-table-filter">-->
<!--                <label>合同调整</label>-->
<!--                <input type="text" id="adjustFlg" class="control text_padding" name="search_EQB_adjustFlg"></input>-->
<!--            </p>-->
            <p class="yw-table-filter">
                <label>签订日</label>
                <input  id="srh_contractTime_from" name="search_GTED_contractTime" class="easyui-datebox"/>
            </p>
            <span style="margin-left: -15px;">
				<label>~</label>
			</span>
            <p class="yw-table-filter">
                <input  id="srh_contractTime_to"  name="search_LTD_contractTime" class="easyui-datebox" />
            </p>
        </div>
        <div class="mb6 mt20">
            <a href="#" class="easyui-linkbutton  btn64" onclick="Convert.search('searchForm','tt');">查询</a>
            <a href="#" class="easyui-linkbutton btn-empty btn64 ml10" onclick="$('#searchForm').form('reset');">清空</a>
            <a href="#" class="easyui-linkbutton btn-empty btn64 ml10"  onclick="refresh_columns();"><span id="refreshText">详情</span></a>
            <input type="hidden" id="refreshColumns" value = "B"></input>
            <a href="#" class="easyui-linkbutton btn-empty btn64 ml6" onclick="exportExcel()">导出</a>
        </div>

    </form>
</div>
<div region="center" border="false" class="panel_padding"  style="padding-right:20px;padding-left:20px;">
    <table id="tt" fit="true"

</div>

                            return "代采赊销保理";

    // 概要

        {field:'pairId', title:'',align:'center',hidden:false,width: 30},
        {field:'pairCode', title:'代采排序号', width:125,align:'center',hidden:true},
        {field:'contractNo', title:'合同编号', width:140 ,
            formatter:function(value,row,index){
                if (row.id) {
                    if (row.breachDays > 0) {
                        return '<span style="color: red">'+value+'</span>';
                    }else {

                    }
                }
            } },
        {
            field: 'businessTypeDcsx', title: '业务类型', width: 100, formatter: function (value, row, index) {

                        }
                        if (value=="DCSX") {

                var value = "";
                if(row.contractType=="S"){
                    if(row.factorStatus=="N"){
                        value  = '<span style="color:#00e3e3">' + '待处理' + '</span>';

        {field:'contractTime',title:'签订日', width:120,align:'center'},
        {field:'matchUserName',title:'业务员',align:"center", width:70},
        {field:'option',title:'合同预览',align:'center',formatter:function(value, row, index){
                if (row.id){
                    var str = "";
                    var contractType = row.contractType;

                        if (row.existContractTextFileId){

    /**
     * 业务操作列数据初始化
     */
    function businessOptionColumnInit(value, row) {
        var str = '';
        // 是否已通过盖章审核
        if (row.canStartBuy && preSellFlg && row.contractStatus != "B") {
            str += '<span onclick="getBuyContract(' + row.id + ')" class="contract-btn contract-btn-4">发起采购</span>';
        }
        if (row.contractType == "S" && (row.businessTypeDcsx == "BL" || row.businessTypeDcsx == "DCSXBL")) {
            if (row.factorStatus == "N") {
                str += '<span class="contract-btn contract-btn-2" onclick="updateContractFile(' + row.id + ',' + true + ')">资料收集</span>';
            } else if (row.factorStatus == "Z") {
                str += '<span class="contract-btn contract-btn-2" onclick="depositPay(' + row.id + ',' + row.applyCancelFlg + ')">保证金付款</span>';
            } else if (row.factorStatus == "B") {
                str += '<span class="contract-btn contract-btn-2" onclick="confirm(' + row.id + ')">确认收款</span>';
            } else if (row.factorStatus == "F") {
                str += '<span class="contract-btn contract-btn-2" onclick="repayment(' + row.id + ',' + row.applyCancelFlg + ')">还款</span>';
            }
            str += '<span class="contract-btn contract-btn-9" onclick="updateContractFile(' + row.id + ',' + false + ')">资料预览</span>';
        }
        //  }
        // }
        return str;
    }

    // 默认概要列
    columns = columns_brief;
    if (type=='B'){

        $.extend($.fn.datagrid.methods, {
            autoMergeCells : function (jq, fields) {
                return jq.each(function () {
                    var target = $(this);
                    if (!fields) {
                        fields = target.datagrid("getColumnFields");
                    }
                    var rows = target.datagrid("getRows");
                    var i = 0,
                        j = 0,
                        temp = {};
                    for (i; i < rows.length; i++) {
                        var row = rows[i];
                        j = 0;
                        for (j; j < fields.length; j++) {
                            var field = fields[j];
                            var tf = temp[field];
                            if (!tf) {
                                tf = temp[field] = {};
                                tf[row[field]] = [i];
                            } else {
                                var tfv = tf[row[field]];
                                if (tfv) {
                                    tfv.push(i);
                                } else {
                                    tfv = tf[row[field]] = [i];
                                }
                            }
                        }
                    }
                    $.each(temp, function (field, colunm) {
                        $.each(colunm, function () {
                            var group = this;

                            if (group.length > 1) {
                                var before,
                                    after,
                                    megerIndex = group[0];
                                for (var i = 0; i < group.length; i++) {
                                    before = group[i];
                                    after = group[i + 1];
                                    if (after && (after - before) == 1) {
                                        continue;
                                    }
                                    var rowspan = before - megerIndex + 1;
                                    if (rowspan > 1) {
                                        target.datagrid('mergeCells', {
                                            index : megerIndex,
                                            field : field,
                                            rowspan : rowspan
                                        });
                                    }
                                    if (after && (after - before) != 1) {
                                        megerIndex = after;
                                    }
                                }
                            }
                        });
                    });
                });
            }
        });

    //字符串转日期
    function strDateForDate(str){
        var strDate = str.split(" ");
        var strDatepart = strDate[0].split("-");
        var dtDate = new Date(strDatepart[0],strDatepart[1]-1,strDatepart[2]);
        return dtDate;
    }

    //计算两个日期的天数差
    function dateDiff(firstDate,secondDate){
        var firstDate = new Date(firstDate);
        var secondDate = new Date(secondDate);
        var diff = Math.abs(firstDate.getTime() - secondDate.getTime())
        var result = parseInt(diff / (1000 * 60 * 60 * 24));
        return result
    }

    function formateNumTon(num, row, index) {
        if (num) {
            num = parseFloat(num).toFixed(3).toString().split(".");
            num[0] = num[0].replace(new RegExp('(\\d)(?=(\\d{3})+$)', 'ig'), "$1,");
            return num.join(".");
        } else {
            return num;
        }
    }

    function formateNum(num,row,index) {
        if (num){
            num = parseFloat(num).toFixed(2).toString().split(".");
            num[0] = num[0].replace(new RegExp('(\\d)(?=(\\d{3})+$)','ig'),"$1,");
            return num.join(".");
        }else{
            return num;
        }
    }
