<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<div class="easyui-layout" id="inputForm" border="false" fit="true">
	<div region="north" border="false" method="post"  style="margin-bottom:10px;">
		<input type="hidden" name="id" id="entityId" th:value="${entity.id}" />
		<input type="hidden" id="entityStatus" th:value="${entity.status}" />
		<input type="hidden" id="applyType" name="applyType" th:value="${entity.applyType}" />
		<input type="hidden" id="businessType" name="businessType" th:value="${entity.businessType}"/>
		<input type="hidden" id="defaultFlg" th:value="${defaultFlg}"/>
	</div>
	<div class="mb10">
         <table id="relaTable" title="" iconCls="icon-edit" singleSelect="true" idField="id" style="max-height:196px;"></table>
    </div>	
	<!--  <input type="hidden" id="canApproveEdit" th:value="${psv.canApproveEdit}"/>-->
	<input type="hidden" id="companyId" name="companyId" th:value="${entity.companyId}"/>
	<input type="hidden" name="status" id="status" th:value="${entity.status}"/>
	<input type="hidden" id="contractId" th:value="${entity.contractId}"/>
	<div class="mb6">
		<th:block th:replace="~{tags/apply :: contractNo (${#maps.containsKey(psv.mapEdit, 'contractNo')}?${psv.mapEdit['contractNo'].require}:true,${#maps.containsKey(psv.mapEdit, 'contractNo')}?${psv.mapEdit['contractNo'].edit && psv.hasApprove}:${ psv.hasEdit})}"/>
		<p class="yw-table-filter">
			<label>合同总价(元):</label>
			<input id="totalAmount" type="text" th:value="${#numbers.formatDecimal(entity.totalAmount,1,'COMMA',2,'POINT')}" readonly="readonly"/>
		</p>
		<p class="yw-table-filter w2">
			<label>我方:</label>
			<input name="ourCompanyName" id="ourCompanyName" readonly="readonly" type="text" required="required" th:value="${entity.ourCompanyName}"/>
		</p>
	</div>
	<div class="mb6">
		<p class="yw-table-filter">
			<label>业务类型:</label>
			<input type="text" th:value="${business}" readonly="readonly"></input>
		</p>
		<p class="yw-table-filter">
			<label>合同属性:</label>
			<input name="contractAttr" id="contractAttr" type="text"  required="required" th:value="${entity.contractAttr}"></input>
		</p>
		<p class="yw-table-filter w2">
			<label>供方:</label>
			<input name="companyName" id="companyName" type="text" required="required" th:value="${entity.companyName}"/>
		</p>	
	</div>
	<div class="mb6">
		<th:block th:replace="~{tags/apply :: deliveryType (${#maps.containsKey(psv.mapEdit, 'deliveryType')}?${psv.mapEdit['deliveryType'].require},${#maps.containsKey(psv.mapEdit, 'deliveryType')}?${psv.mapEdit['deliveryType'].edit && psv.hasEdit}:${ psv.hasEdit},${deliveryTypeJson})}"/>
		<p class="yw-table-filter">
			<label>质量标准:</label>
			<input name="qualityStandard" id="qualityStandard"  type="text" th:value="${entity.qualityStandard}"></input>
		</p>
		<p class="yw-table-filter">
			<label>开票日期:</label>
			<input name="invoiceDate" id="invoiceDate"  type="text" th:value="${entity.invoiceDate}"></input>
		</p>
	</div>
	<div class="mb6">
		<p class="yw-table-filter">
			<label>运输费(元):</label>
			<input name="transportAmount" id="transportAmount" type="text" th:value="${#numbers.formatDecimal(entity.transportAmount,1,'COMMA',2,'POINT')}"/>
		</p>
		<p class="yw-table-filter">
			<label>不含税运输费:</label>
			<input id="tax_transportAmount" type="text" th:value="${entity.transportAmount}==null ? '' : ${#numbers.formatDecimal(entity.transportAmount/1.09,1,'COMMA',2,'POINT')}"/>
		</p>
		<p class="yw-table-filter">
			<label>仓储费(元):</label>
			<input name="warehouseAmount" id="warehouseAmount" type="text" th:value="${#numbers.formatDecimal(entity.warehouseAmount,1,'COMMA',2,'POINT')}"/>
		</p>
		<p class="yw-table-filter">
			<label>不含税仓储费:</label>
			<input id="tax_warehouseAmount" type="text" th:value="${entity.warehouseAmount}==null ? '' : ${#numbers.formatDecimal(entity.warehouseAmount/1.06,1,'COMMA',2,'POINT')}"/>
		</p>

	</div>
	<div class="mb6">
		<p class="yw-table-filter hide">
			<label>承运商</label>
			<input id="carrier" name="carrier" value="" type="text"  th:value="${entity.carrier}"/>
		</p>
		<!-- 结算方式 -->
		<th:block th:replace="~{tags/apply :: deliveryMode (${#maps.containsKey(psv.mapEdit, 'deliveryMode')}?${psv.mapEdit['deliveryMode'].require},${#maps.containsKey(psv.mapEdit, 'deliveryMode')}?${psv.mapEdit['deliveryMode'].edit && psv.hasEdit}:${ psv.hasEdit},${deliveryModeJson},'结算方式')}"/>
		<!-- 支付方式 -->
		<p class="yw-table-filter">
			<label>支付方式:</label>
			<input name="payType" id="payType" type="text" th:value="${entity.payType}"></input>
		</p>
		<p class="yw-table-filter">
			<label>到货日期:</label>
			<input name="arrivalTime" id="arrivalTime" class="easyui-datebox" required="required" th:value="${#dates.format(entity.arrivalTime,'yyyy-MM-dd')}" />
		</p>
		<p class="yw-table-filter">
			<input name="arrivalTimeExt" id="arrivalTimeExt" th:value="${entity.arrivalTimeExt}"/>
		</p>
	</div>	
	<div class="mb6">
		<p class="yw-table-filter">
			<label>定金比例:</label>
			<input name="bondRate" id="bondRate" type="text" th:value="${entity.bondRate}"/>
		</p>
		<p class="yw-table-filter">
			<label>定金(元):</label>
			<input name="bondAmount" id="bondAmount" type="text" th:value="${#numbers.formatDecimal(entity.bondAmount,1,'COMMA',2,'POINT')}"/>
		</p>
		<p class="yw-table-filter">
			<label>付定金日期:</label>
			<input name="payBondTime" id="payBondTime" class="easyui-datebox" required="required" th:value="${#dates.format(entity.payBondTime,'yyyy-MM-dd')}"></input>
		</p>
		<p class="yw-table-filter">
			<label>付款期:</label>
			<input name="payFullTime" id="payFullTime" class="easyui-datebox" required="required" th:value="${#dates.format(entity.payFullTime,'yyyy-MM-dd')}" ></input>
		</p>
	</div>
	<div class="mb6">
		<p class="yw-table-filter w2">
			<label>收款银行:</label>
			<input name="receiveBank" id="receiveBank" type="text" th:value="${entity.receiveBank}"/>
		</p>
		<p class="yw-table-filter w2">
			<label>收款账号:</label>
			<input name="receiveAccount" id="receiveAccount" class="control text_padding" type="text" th:value="${entity.receiveAccount}"/>
		</p>
	</div>
	<div class="mb6">
		<p class="yw-table-filter w2">
			<label>联系地址:</label>
			<input name="contactAddr" id="contactAddr" type="text" th:value="${entity.contactAddr}"/>
		</p>
		<p class="yw-table-filter">
			<label>联系人:</label>
			<input name="contactName" id="contactName" type="text" th:value="${entity.contactName}"/>
		</p>
		<p class="yw-table-filter">
			<label>联系电话:</label>
			<input name="contactPhone" id="contactPhone" type="text" th:value="${entity.contactPhone}"/>
		</p>
	</div>
	<div class="mb6">
		<p class="yw-table-filter w2">
			<label>交货地点:</label>
			<input name="deliveryAddr" id="deliveryAddr" type="text" th:value="${entity.deliveryAddr}"/>
		</p>
		<p class="yw-table-filter">
			<label>交货电话:</label>
			<input name="deliveryPhone" id="deliveryPhone" type="text" th:value="${entity.deliveryPhone}"/>
		</p>
	</div>
	<div class="mb6">
		<p class="yw-table-filter w2">
			<label>补充条款:</label>
			<input name="extraTerm" type="text" id="extraTerm" th:value="${entity.extraTerm}"></input>
		</p>

		<p class="yw-table-filter w2">
			<label>备注:</label>
			<input name="remark" id="remark" type="text" th:value="${entity.remark}"></input>
		</p>
	</div>
		
	<div class="editForm"> 
		<p style="width:240px">
			<span class="upload-btn" id="btn_fileId">
               	 <a href="#" class="easyui-linkbutton file-upload" data-options="iconCls:'icon-upload'">上传附件 </a>
           	</span>
			<input class="control" id="fileId" name="fileId" type="hidden" th:value="${entity.fileId}" />
		</p>
		<p class="controls showImg fileId" id="span_fileId"></p>
	</div>
</div>
<script type="text/javascript" th:inline="javascript">
var lastIndex;
var _factoryJson = eval('[(${factoryJson})]');
var _productTypeJson = eval('[(${productTypeJson})]');
var _brandJson = eval('[(${brandJson})]');
var _payTypeJson = eval('[(${payTypeJson})]');
var _deliveryTypeJson = eval('[(${deliveryTypeJson})]');
var _new_deliveryTypeJson = _deliveryTypeJson.filter(function (a) {
	return a.dictCd != 'P';
});
var _warehouseJson = eval('[(${warehouseJson})]');
var _ourCompanyJson=eval('[(${ourCompanyJson})]');
var _deliveryModeJson = eval('[(${deliveryModeJson})]');
var _contractAttrJson= eval('[(${contractAttr})]');
var _arrivalTimeExtJson = eval('[(${arrivalTimeExtJson})]');
var _qualityStandardJson = eval('[(${qualityStandardJson})]');
var _invoiceDateJson = eval('[(${invoiceDateJson})]');
var _contractBondRateJson = eval('[(${contractBondRateJson})]');
var filePlugin = new FilePlugin('#fileId',$('#entityId').val(),'/apply/buy/updateFileId',[[${param.hasEditFile}]]);
var hasEdit = [[${psv.hasEdit}]];
var maxNumberArray = [];
var colums = [ [ ] ];
var defaultFlg = [[${defaultFlg}]];
$(function(){
	var _chageInvoiceDateJson=new Array();
	for (var i = 0; i < _invoiceDateJson.length; i++) { 
		if(_invoiceDateJson[i].dictCd.indexOf("B") == -1){
			_chageInvoiceDateJson.push(_invoiceDateJson[i]);
		}
	} 
	$('.easyui-linkbutton').linkbutton();
	_beforSaveOper = true;
	var _curStatus = $("#entityStatus").val();
	var _flg = defaultFlg;
	var _url = _ctx+"/apply/productDetail/productList?search_EQS_applyType="+$("#applyType").val()+"&search_EQL_applyId="+$("#entityId").val();
	if(contractId){
		colums =[ [
			{field:'productCd',title:'品名',align:'center',width:140,
				formatter:function(value,row,index){
					return Convert.findTreeValueByKey(_productTypeJson,"id",value,"text");
			}},
			{field:'brandNumber',title:'牌号',align:'center',width:150},
			{field:'factoryId',title:'厂商',align:'center',width:180,
				formatter:function(value,row,index){
					return Convert.findValueByKey(_factoryJson,"id",value,"factoryName");
			}},
			{field:'warehouseName',title:'提货/配送仓库',align:'center',width:180},
			{field:'dealNumber',title:'数量(吨)', width:120,align:'center',editor:{type:'numberbox',options:{required:'true',validType:'length[1,20]',precision:4}},
				formatter: function (value, row, index) {
	                if (row != null) {
	                    return parseFloat(value).toFixed(3);
	                }
			}},
			{field:'dealPrice',title:'单价(元)', width:120,align:'center',editor:{type:'numberbox',options:{required:'true',validType:'length[1,20]',precision:2,
						parser: function(val) {
							// 解析时去除千分位分隔符
							if(val) {
								return parseFloat(String(val).replace(/,/g, ''));
							} else {
								if(isNaN(val)) {
									return '';
								} else {
									return val;
								}
							}
						},
						formatter: function(val) {
							if (val || val === 0) {
								val = parseFloat(val).toFixed(2).toString().split(".");
								val[0] = val[0].replace(new RegExp('(\\d)(?=(\\d{3})+$)', 'ig'), "$1,");
								return val.join(".");
							} else {
								if(isNaN(val)){
									return ""
								} else {
									return val;
								}
							}
						}}},
				formatter: function (val, row, index) {
	                if (row != null) {
						if (val) {
							val = parseFloat(val).toFixed(2).toString().split(".");
							val[0] = val[0].replace(new RegExp('(\\d)(?=(\\d{3})+$)', 'ig'), "$1,");
							return val.join(".");
						} else {
							return val;
						}
	                }
			}},
			{field:'totalPrice',title:'总价(元)', width:120,align:'center',editor:{type:'numberbox',options:{required:'true' ,readonly:'true',validType:'length[1,20]',precision:2,
						parser: function(val) {
							// 解析时去除千分位分隔符
							if(val) {
								return parseFloat(String(val).replace(/,/g, ''));
							} else {
								if(isNaN(val)) {
									return '';
								} else {
									return val;
								}
							}
						},
						formatter: function(val) {
							if (val || val === 0) {
								val = parseFloat(val).toFixed(2).toString().split(".");
								val[0] = val[0].replace(new RegExp('(\\d)(?=(\\d{3})+$)', 'ig'), "$1,");
								return val.join(".");
							} else {
								if(isNaN(val)){
									return ""
								} else {
									return val;
								}
							}
						}}},
				formatter: function (val, row, index) {
	                if (row != null) {
						if (val) {
							val = parseFloat(val).toFixed(2).toString().split(".");
							val[0] = val[0].replace(new RegExp('(\\d)(?=(\\d{3})+$)', 'ig'), "$1,");
							return val.join(".");
						} else {
							return val;
						}
	                }
			}},
			/* {field:'option',title:'操作', width:120,hidden:true, align:'center',formatter:function(value, row, index){
				var str = '<img onclick="remove(\''+row.id+'\',event,this)" style="cursor:pointer;width:16px;hight:18px" src="/static/images/icon_delete.png"/>';  
		        return str; 
			}}, */
			{field:'option',title:'', width:120,hidden:true, align:'center',formatter:function(value, row, index){
				var str = '<i class="icon-remove ml10 icon cursor" onclick="remove(\''+row.id+'\',\'' + index + '\',event,this)"></i>';  
		        return str; 
			}}
		]];
	}else{
		colums =[ [
		{field:'productCd',title:'品名',align:'center',width:140,editor:{type:'combotree',options:{required:'true',editable:'false',panelWidth:150,panelHeight:300,data:_productTypeJson}},
			formatter:function(value,row,index){
				return Convert.findTreeValueByKey(_productTypeJson,"id",value,"text");
		}},
		{field:'brandNumber',title:'牌号',align:'center',width:150,editor:{type:'combobox',options:{required:true,panelWidth:180}}},
		{field:'factoryId',title:'厂商',align:'center',width:180,editor:{type:'combobox',options:{required:true,panelWidth:180,data:_factoryJson,textField:'factoryName',valueField:'id',onHidePanel:function(){BasCombobox.onHidePanel(this);}}},
			formatter:function(value,row,index){
				return Convert.findValueByKey(_factoryJson,"id",value,"factoryName");
		}},
		{field:'warehouseName',title:'提货/配送仓库',align:'center',width:180,editor:{type:'combobox',options:{required:true,data:_warehouseJson,valueField:'warehouseName',textField:'warehouseName'}}},
		{field:'dealNumber',title:'数量(吨)', width:120,align:'center',editor:{type:'numberbox',options:{required:'true',validType:'length[1,20]',precision:4}},
			formatter: function (value, row, index) {
                if (row != null) {
                    return parseFloat(value).toFixed(3);
                }
		}},
		{field:'dealPrice',title:'单价(元)', width:120,align:'center',editor:{type:'numberbox',options:{required:'true',validType:'length[1,20]',precision:3,
					parser: function(val) {
						// 解析时去除千分位分隔符
						if(val) {
							return parseFloat(String(val).replace(/,/g, ''));
						} else {
							if(isNaN(val)) {
								return '';
							} else {
								return val;
							}
						}
					},
					formatter: function(val) {
						if (val || val === 0) {
							val = parseFloat(val).toFixed(3).toString().split(".");
							val[0] = val[0].replace(new RegExp('(\\d)(?=(\\d{3})+$)', 'ig'), "$1,");
							return val.join(".");
						} else {
							if(isNaN(val)){
								return ""
							} else {
								return val;
							}
						}
					}}},
			formatter: function (val, row, index) {
                if (row != null) {
					if (val) {
						val = parseFloat(val).toFixed(3).toString().split(".");
						val[0] = val[0].replace(new RegExp('(\\d)(?=(\\d{3})+$)', 'ig'), "$1,");
						return val.join(".");
					} else {
						return val;
					}
                }
		}},
		{field:'taxPrice',title:'不含税单价(元)', width:120,align:'center',editor:{type:'numberbox',options:{required:'true' ,readonly:'true',validType:'length[1,20]',precision:3,
					parser: function(val) {
						// 解析时去除千分位分隔符
						if(val) {
							return parseFloat(String(val).replace(/,/g, ''));
						} else {
							if(isNaN(val)) {
								return '';
							} else {
								return val;
							}
						}
					},
					formatter: function(val) {
						if (val || val === 0) {
							val = parseFloat(val).toFixed(3).toString().split(".");
							val[0] = val[0].replace(new RegExp('(\\d)(?=(\\d{3})+$)', 'ig'), "$1,");
							return val.join(".");
						} else {
							if(isNaN(val)){
								return ""
							} else {
								return val;
							}
						}
					}}},
			formatter: function (value, row, index) {
                if (row != null) {
					var taxPrice = row.dealPrice/1.13;
					taxPrice = parseFloat(taxPrice).toFixed(3).toString().split(".");
					taxPrice[0] = taxPrice[0].replace(new RegExp('(\\d)(?=(\\d{3})+$)', 'ig'), "$1,");
					return taxPrice.join(".");
                }
		}},
		{field:'totalPrice',title:'总价(元)', width:120,align:'center',editor:{type:'numberbox',options:{required:'true' ,readonly:'true',validType:'length[1,20]',precision:3,
					parser: function(val) {
						// 解析时去除千分位分隔符
						if(val) {
							return parseFloat(String(val).replace(/,/g, ''));
						} else {
							if(isNaN(val)) {
								return '';
							} else {
								return val;
							}
						}
					},
					formatter: function(val) {
						if (val || val === 0) {
							val = parseFloat(val).toFixed(3).toString().split(".");
							val[0] = val[0].replace(new RegExp('(\\d)(?=(\\d{3})+$)', 'ig'), "$1,");
							return val.join(".");
						} else {
							if(isNaN(val)){
								return ""
							} else {
								return val;
							}
						}
					}}},
			formatter: function (val, row, index) {
                if (row != null) {
					if (val) {
						val = parseFloat(val).toFixed(3).toString().split(".");
						val[0] = val[0].replace(new RegExp('(\\d)(?=(\\d{3})+$)', 'ig'), "$1,");
						return val.join(".");
					} else {
						return val;
					}
                }
		}},
		{field:'option',title:'', width:80,hidden:true, align:'center',formatter:function(value, row, index){
			var str = '';
	        if(index == 0){
	        	str = '<i class="icon-add icon cursor operator mt4" style="margin-right: 26px;" onclick="insert()"></i>'
	        }else{
	        	str = '<i class="icon-add icon cursor operator mt4" onclick="insert()"></i><i class="icon-remove ml10 icon cursor mt4" onclick="remove(\''+row.id+'\',\'' + index + '\',event,this)"></i>'
	        }
			return str; 
		}}
	]];
	}
	if (_industry.indexOf('SL')==-1){
		for(var i in colums[0]){
			var col =colums[0][i];
			if (col.field=='brandNumber' || col.field=='factoryId'){
				if (col.editor){
					col.editor.options.required = false;
				}
				col.hidden = true;
			}
			
		}
	}
	
	if($("#applyType").val()=="A"){
		$('#btn').addClass('hide');
	}
	
	$('#relaTable').datagrid({
		pageSize:50,
		rownumbers:true,
		url:_url,
		pagination:false,
		columns:colums,
		//toolbar:'#btn',
		onBeginEdit:function(index,row){
			//新增采购申请默认属性为在途P
			row.productAttr = "P";
			//预售采购设置最大值
			if(contractId){
				var ed_curNumber = $('#relaTable').datagrid('getEditor', {index:index,field:'dealNumber'});
				var maxNumber = maxNumberArray[index]
				$(ed_curNumber.target).numberbox({max:maxNumber,min:0});
			}else{
				var ed_warehouseName = $('#relaTable').datagrid('getEditor', {index:index,field:'warehouseName'});
				var ed_productCd = $('#relaTable').datagrid('getEditor', {index:index,field:'productCd'});
				var ed_brandNumber = $('#relaTable').datagrid('getEditor', {index:index,field:'brandNumber'});
				var ed_factoryId = $('#relaTable').datagrid('getEditor', {index:index,field:'factoryId'});
				//品名绑定失焦事件，判断是否点击了combotree
				$(ed_productCd.target).combotree('textbox').on('blur',function(){
					var t = $(ed_productCd.target).combotree('tree');
					var _productSelect = t.tree('getSelected');
					if(!_productSelect) $(ed_productCd.target).combotree('clear');
				});
				$(ed_productCd.target).combotree('options').onClick = function(record){
					if(record.children.length!=0){
						$(ed_productCd.target).combotree('clear'); 
					}else{
						var productName = record.text;
						row.productName = productName;
						var productCode = record.id;
						parseColumn(productCode, index);
						$.post(_ctx+"/bas/brand/findBrand",{"productCode":productCode},function(data){
							$(ed_brandNumber.target).combobox({
								data:data,
								valueField:"brandNumber",
								textField:'brandNumber'
							});
						});
					}
				}
				var productCode = row.productCd;
				if(productCode){

//获取当前日期
function myformatter(date){  
    var y = date.getFullYear();  
    var m = date.getMonth()+1;  
    var d = date.getDate();  
    return y+'-'+(m<10?('0'+m):m)+'-'+(d<10?('0'+d):d);  
}  	

function formattData(date){
	if (date=='undefined'||date==null||date==""){
		date = myformatter(new Date());
	}
	var arr = date.split('-');
	var year = arr[0]  
    var month = arr[1];  
    var day = arr[2];  
	return year + '年' + month + '月' + day + '日';
}
	
function insert(){
	var changeRows = $('#relaTable').datagrid('getRows');
	if(changeRows.length>9){
		$.messager.alert('提示','最多只能添加10条商品记录！','info');
		return;
	}
	if(!lastIndex){
		lastIndex = 1;
	}
	var operators = $('.operator')
	for(var i = 0; i < operators.length; i++) {
		$(operators[i]).removeClass('icon-add').addClass('icon-add-no').attr('onClick','');
		if($(operators[i]).next()){
			$(operators[i]).next().removeClass('icon-remove').attr('onClick','');
		}
	}
	
	var field={id:0};
	var row = $('#relaTable').datagrid('appendRow',field);
	lastIndex = $('#relaTable').datagrid('getRows').length-1;
	$('#relaTable').datagrid('selectRow', lastIndex);
	$('#relaTable').datagrid('beginEdit', lastIndex);
	Convert.focusEditor("relaTable",field,lastIndex);
}
function remove(id,_index,event,target){
	var lastIndex = $('#relaTable').datagrid('getRows').length - 1;	
	if(_index != lastIndex)
		return;
	var row , index;
	if(id=='0' ||id =='' || id == undefined) {
		$('#relaTable').datagrid('deleteRow',_index);
	}else{
		$('#relaTable').datagrid('selectRecord',id);
		row = $('#relaTable').datagrid('getSelected');
		index = $('#relaTable').datagrid('getRowIndex', row);
		$.messager.confirm('提示','确认要删除该记录吗?',function(t){
			if(t){
				$('#relaTable').datagrid('deleteRow', index);
				var nextSelect=index>0?index-1:0;
				$('#relaTable').datagrid('selectRow', nextSelect);
			}
		});
	}
	var operators = $('.operator');

//银行卡号码检测
function luhnCheck(bankno) {
    var lastNum = bankno.substr(bankno.length - 1, 1); //取出最后一位（与luhn进行比较）
    var first15Num = bankno.substr(0, bankno.length - 1); //前15或18位
    var newArr = new Array();
    for (var i = first15Num.length - 1; i > -1; i--) { //前15或18位倒序存进数组
        newArr.push(first15Num.substr(i, 1));
    }
    var arrJiShu = new Array(); //奇数位*2的积 <9
    var arrJiShu2 = new Array(); //奇数位*2的积 >9
    var arrOuShu = new Array(); //偶数位数组
    for (var j = 0; j < newArr.length; j++) {
        if ((j + 1) % 2 == 1) { //奇数位
            if (parseInt(newArr[j]) * 2 < 9) arrJiShu.push(parseInt(newArr[j]) * 2);
            else arrJiShu2.push(parseInt(newArr[j]) * 2);
        } else //偶数位
        arrOuShu.push(newArr[j]);
    }

    var jishu_child1 = new Array(); //奇数位*2 >9 的分割之后的数组个位数
    var jishu_child2 = new Array(); //奇数位*2 >9 的分割之后的数组十位数
    for (var h = 0; h < arrJiShu2.length; h++) {
        jishu_child1.push(parseInt(arrJiShu2[h]) % 10);
        jishu_child2.push(parseInt(arrJiShu2[h]) / 10);
    }

    var sumJiShu = 0; //奇数位*2 < 9 的数组之和
    var sumOuShu = 0; //偶数位数组之和
    var sumJiShuChild1 = 0; //奇数位*2 >9 的分割之后的数组个位数之和
    var sumJiShuChild2 = 0; //奇数位*2 >9 的分割之后的数组十位数之和
    var sumTotal = 0;
    for (var m = 0; m < arrJiShu.length; m++) {
        sumJiShu = sumJiShu + parseInt(arrJiShu[m]);
    }

    for (var n = 0; n < arrOuShu.length; n++) {
        sumOuShu = sumOuShu + parseInt(arrOuShu[n]);
    }

    for (var p = 0; p < jishu_child1.length; p++) {
        sumJiShuChild1 = sumJiShuChild1 + parseInt(jishu_child1[p]);
        sumJiShuChild2 = sumJiShuChild2 + parseInt(jishu_child2[p]);
    }
    //计算总和
    sumTotal = parseInt(sumJiShu) + parseInt(sumOuShu) + parseInt(sumJiShuChild1) + parseInt(sumJiShuChild2);

    //计算luhn值
    var k = parseInt(sumTotal) % 10 == 0 ? 10 : parseInt(sumTotal) % 10;
    var luhn = 10 - k;

    if (lastNum == luhn) {
        $("#banknoInfo").html("luhn验证通过");
        return true;
    } else {
        $("#banknoInfo").html("银行卡号必须符合luhn校验");
        return false;
    }
}
