<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
<meta charset="UTF-8">
<title>代理进口审批单打印</title>
<th:block th:replace="~{layouts/include :: include}"></th:block>
<link th:href="@{/static/css/businessTable.css?v=1}" rel="stylesheet" type="text/css" />
<link th:href="@{/static/css/saleTable.css?v=1}" rel="stylesheet" type="text/css" />
<script th:src="@{/static/jquery/jquery.jqprint-0.3.js}" type="text/javascript"></script>
<script th:src="@{/static/jquery/FileSaver.js}" type="text/javascript"></script>
<script th:src="@{/static/jquery/jquery.wordexport.js}" type="text/javascript"></script>
</head>
<div class="outContain">
<input type="hidden" id="approveNo" th:text="${entity.approveNo}"/>
    <div class="model-list">
        <div class="m-top clearFix">
            <div class="logo-left"></div>
            <div class="print-right">
                <i class="print-ico"></i>
                <span class="write" onclick="printTheApprove()">打印</span>
            </div>
        </div>

        <div id = "print">
        <h3 class="title">代理进口业务审批表</h3>
        <table class="m-content" id="appTable">
            <tr class="tr2">
                <td class="td1">备注:</td>
                <td class="tr2-td2 padding-left fz12" colspan="11">
					<span id="remark"></span>
				</td>
            </tr>

            <tr class="tr3">
                <td class="tr3-td1" colspan="5">业务事项</td>
                <td class="tr3-td2 center-text" colspan="3">业务相关</td>
                <td class="tr3-td3 center-text" colspan="4">处理结果/签名/审批意见/日期</td>
            </tr>
            <tr class="tr4">
                <td class="tr4-td1 padding-left">1</td>
                <td class="tr4-td2 padding-left" colspan="4">申请单位向客户经理提交申请材料；（代理进口申请书、公司营业执照复印件））</td>
                <td class="tr4-td3 center-text" colspan="3">客户经理</td>
                <td class="tr4-td4 padding-left" colspan="4" id="createUserNameprd"></td>
            </tr>
            <tr class="tr4">
                <td class="tr4-td1 padding-left">2</td>
                <td class="tr4-td2 padding-left" colspan="4">审核申请材料、联络申请单位核实业务</td>
                <td class="tr4-td3 center-text" colspan="3">国贸部</td>
                <td class="tr4-td4 padding-left" colspan="4"></td>
            </tr>
            <tr class="tr4">
                <td class="tr4-td1 padding-left">3</td>
                <td class="tr4-td2 padding-left" colspan="4">监管部审查</td>
                <td class="tr4-td3 center-text" colspan="3">监管部</td>
                <td class="tr4-td4 padding-left" colspan="4"></td>
            </tr>
            <tr class="tr4">
                <td class="tr4-td1 padding-left">4</td>
                <td class="tr4-td2 padding-left" colspan="4">确认开证（付款）银行</td>
                <td class="tr4-td3 center-text" colspan="3">财务部</td>
                <td class="tr4-td4 padding-left" colspan="4"></td>
            </tr>
            <tr class="tr4">
                <td class="tr4-td1 padding-left">5</td>
                <td class="tr4-td2 padding-left" colspan="4">企发部总经理审批意见</td>
                <td class="tr4-td3 center-text" colspan="3">企发部总经理</td>
                <td class="tr4-td4 padding-left" colspan="4"></td>
            </tr>
            <tr class="tr4">
                <td class="tr4-td1 padding-left">6</td>
                <td class="tr4-td2 padding-left" colspan="4">公司总经理审批意见</td>
                <td class="tr4-td3 center-text" colspan="3">总经理</td>
                <td class="tr4-td4 padding-left" colspan="4"></td>
            </tr>
            <tr class="tr4">
                <td class="tr4-td1 padding-left">7</td>
                <td class="tr4-td2 padding-left" colspan="4">与申请单位签订代理进口协议，通知申请单位支付保证金</td>
                <td class="tr4-td3 center-text" colspan="3">国贸部</td>
                <td class="tr4-td4 padding-left" colspan="4"></td>
            </tr>
            <tr class="tr4">
                <td class="tr4-td1 padding-left">8</td>
                <td class="tr4-td2 padding-left" colspan="4">保证金收款确认</td>
                <td class="tr4-td3 center-text" colspan="3">财务部</td>
                <td class="tr4-td4 padding-left" colspan="4"></td>
            </tr>
            <tr class="tr4">
                <td class="tr4-td1 padding-left">9</td>
                <td class="tr4-td2 padding-left" colspan="4">与外商签订购销合同</td>
                <td class="tr4-td3 center-text" colspan="3">国贸部</td>
                <td class="tr4-td4 padding-left" colspan="4"></td>
            </tr>
            <tr class="tr4">
                <td class="tr4-td1 padding-left">10</td>
                <td class="tr4-td2 padding-left" colspan="4">收到单据通知后，配合报关公司办理货物通关手续，完成后通知储运部办理货物入库手续，通知申请单位提货</td>
                <td class="tr4-td3 center-text" colspan="3">国贸部</td>
                <td class="tr4-td4 padding-left" colspan="4"></td>
            </tr>
        </table>
        </div>
    </div>
</div>
<script type="text/javascript">
var _contractAttrJson= eval('[(${contractAttr})]');
var sellProductList = eval('[(${sellList})]');
var buyProductList = eval('[(${buyList})]');
var _approveNo='[[${approveNo}]]';
var _createUserName='[[${createUserName}]]';
var _deliveryTypeJson = eval('[(${deliveryTypeJson})]');
var sellContractNo = '[[${sell.contractNo}]]';
var buyContractNo = '[[${buy.contractNo}]]';
var sellCompanyName = '[[${sell.companyName}]]';
var buyCompanyName = '[[${buy.companyName}]]';
var payRemark = '[[${buy.payRemark}]]';
$(function(){
		var tb = document.getElementById("appTable");
		var length = sellProductList.length;
		 /* for(var i=0;i<length;i++){
			var sell = sellProductList[i];
			var buy = buyProductList[i];
			var tr = tb.insertRow(i);
			var trpro = "<tr class='tr1'>";
			var td="<td  class='td1 center-text fz12'>货名</td>"
			+"<td class='td2 center-text fz12'>"+sell.productName+'/'+sell.brandNumber+'/'+sell.factoryName+"</td>"
       		+"<td class='td3 center-text'>数量</td>"
        	+"<td class='td4 center-text fz12'>"+buy.dealNumber.toFixed(2)+"</td>"
        	+"<td class='td5 center-text fz12'>单价</td>"
        	+"<td class='td6 center-text fz12'>"+buy.dealPrice.toFixed(2)+"</td>"
        	+"<td class='td7 center-text fz12'>总价</td>"
        	+"<td class='td8 center-text fz12'>"+buy.totalPrice.toFixed(2)+"</td>"
        	+"<td class='td9 center-text'>合同号</td>"
        	+"<td class='td11 center-text fz12'>"+buyContractNo+"</td>"
        	+"<td class='td9 center-text'>委托方</td>"
			+"<td class='td8 center-text fz12'>"+buyCompanyName+"</td>";
           	trpro = trpro+td+"</tr>";
           	tr.innerHTML = trpro;
		}  */
		var tr = tb.insertRow(0);
		var trpro = "<tr class='tr0'>";
		var td1="<td class='td1 center-text fz12'>货名</td>";
		var td2="<td class='td2 center-text fz12'>";
		var td3="<td class='td3 center-text fz12'>数量</td>";
		var td4="<td class='td4 center-text fz12'>";
		var td5="<td class='td5 center-text fz12'>单价</td>";
		var td6="<td class='td6 center-text fz12'>";
		var td7="<td class='td7 center-text fz12'>总价</td>";
		var td8="<td class='td8 center-text fz12'>";
		var td9="<td class='td9 center-text fz12'>合同号</td>";
		var td10="<td class='td10 center-text fz12'>"+buyContractNo+"</td>";
		var td11="<td class='td11 center-text fz12'>委托方</td>";
		var td12="<td class='td12 center-text fz12'>"+buyCompanyName+"</td></tr>";
		if(length>1){
			td2+="<div class='read-and-read'>";
			td4+="<div class='read-and-read'>";
			td6+="<div class='read-and-read'>";
			td8+="<div class='read-and-read'>"
		}
		//货名
		for(var i=0;i<length;i++){
			var sell = sellProductList[i];
			if(i==length-2){
				td2 += sell.productName+'/'+sell.brandNumber+'/'+sell.factoryName+"</div>";
			}else if(i==length-1){
				td2 += sell.productName+'/'+sell.brandNumber+'/'+sell.factoryName;
			}else{
				td2 += sell.productName+'/'+sell.brandNumber+'/'+sell.factoryName+"</div><div class='read-and-read'>";
			}
		}
		td2 = td2+"</td>";
		//数量
		for(var i=0;i<length;i++){
			var buy = buyProductList[i];
			if(i==length-2){
				td4 += buy.dealNumber.toFixed(2)+"</div>";
			}else if(i==length-1){
				td4 += buy.dealNumber.toFixed(2);
			}else {
				td4 += buy.dealNumber.toFixed(2)+"</div><div class='read-and-read'>";
			}

		}
		td4 = td4+"</td>";
		//单价
		for(var i=0;i<length;i++){
			var buy = buyProductList[i];
			if(i==length-2){
				td6 += buy.dealPrice.toFixed(2)+"</div>";
			}else if(i==length-1){
				td6 += buy.dealPrice.toFixed(2);
			}else{
				td6 += buy.dealPrice.toFixed(2)+"</div><div class='read-and-read'>";
			}
		}
		td6 = td6+"</td>";
		//总价
		for(var i=0;i<length;i++){
			var buy = buyProductList[i];
			if(i==length-2){
				td8 += buy.totalPrice.toFixed(2)+"</div>";
			}else if(i==length-1){
				td8 += buy.totalPrice.toFixed(2);
			}else {
				td8 += buy.totalPrice.toFixed(2)+"</div><div class='read-and-read'>";
			}
		}
		td8 = td8+"</td>";

		trpro = trpro+td1+td2+td3+td4+td5+td6+td7+td8+td9+td10+td11+td12;
		tr.innerHTML = trpro;
		//审批发起人
		$("#createUserNameprd").html(_createUserName);
		$("#remark").html(payRemark);
		//配送方式
		var _deliveryType = $("#deliveryTypePrt").html();
		var _deliveryTypeMsg = Convert.findValueByKey(_deliveryTypeJson,"dictCd",_deliveryType,"dictName");
		$("#deliveryTypePrt").html(_deliveryTypeMsg);
		//合同属性
		var _contractAttr = $('#contractAttrprt').html();
		var _concontractAttrMsg = Convert.findValueByKey(_contractAttrJson,"dictCd",_contractAttr,"dictName");
		$("#contractAttrprt").html(_concontractAttrMsg);
		//仓库
		var _wereHouse ="";
		for(var i=0;i<buyProductList.length;i++){
			if(i!=buyProductList.length-1){
				_wereHouse = _wereHouse+buyProductList[i].warehouseName+",";
			}else{
				_wereHouse = _wereHouse+buyProductList[i].warehouseName;
			}

		}
		$("#warehouseName").html(_wereHouse);
		//备注
		if($("#prtrmk").html()==""){
			$("#remarkprt").hide();
		}
		//收款时间
		if($("#prtReceiveTime").html()==""){
			$("#prtrve").hide();
		}
		//付款时间
		if($("#prtRayTime").html()==""){
			$("#prtpa").hide();
		}

});
//审批单打印
function printTheApprove(){
	$('#print').jqprint();
}

</script>
