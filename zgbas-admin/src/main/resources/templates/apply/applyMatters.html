<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
	<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
	<title>事项申请</title>
	<th:block th:include="include :: header('Summernote富文本编辑器')" />
	<th:block th:include="include :: summernote-css" />
	<script th:src="@{/static/js/bootstrap.min.js?v=3.3.7}"></script>
	<th:block th:include="include :: summernote-js" />
</head>

<div class="easyui-layout" id="inputForm" border="false" fit="true">
	<input type="hidden" name="id" id="entityId" th:value="${entity.id}" />
	<input type="hidden" id="entityStatus" th:value="${entity.status}" />
	<div class="mb6">
		<p class="yw-table-filter">
			<label>审批单号:</label>
			<input name="approveNo" id="approveNo" th:value="${entity.approveNo}" type="text"></input>
		</p>
		<p class="yw-table-filter">
			<label>合同号:</label>
			<input name="contractNo" id="contractNo" th:value="${entity.contractNo}" type="text"></input>
		</p>
	</div>
	<div class="mb6">
		<p class="yw-table-filter w2">
			<label>事项类型:</label>
			<input name="mattersType" id="mattersType" th:value="${entity.mattersType}" type="text"></input>
		</p>
		<p class="yw-table-filter">
			<label>所属区域:</label>
			<input name="ownRegion" id="ownRegion" th:value="${entity.ownRegion}" type="text"></input>
		</p>
	</div>
	<div class="mb6">
		<p class="yw-table-filter w3">
			<label>备注:</label>
			<input name="remark" id="remark" th:value="${entity.remark}" type="text"></input>
		</p>
	</div>
	<!-- 富文本编辑框 -->
	<div class="mb6">
		<p class="yw-table-filter w4">
			<div id="contentHtml" hidden style="padding:10px;width: 757px;border: solid 1px #cbd1e0;">
			</div>
		</p>

		<input name="content" th:value="${entity.content}" type="hidden" id="content"/>
		<div class="row" name="content_f" id="content_f" disabled="true" style="margin-left: -20px">
			<div class="col-sm-12" style="margin-left: 6px">
				<div class="click2edit wrapper">
				</div>
			</div>
		</div>
	</div>

	<div class="editForm">
		<p style="width:240px">
			<span class="upload-btn" id="btn_fileId">
               	 <a href="#" class="easyui-linkbutton file-upload" data-options="iconCls:'icon-upload'">上传附件 </a>
           	</span>
			<input class="control" id="fileId" name="fileId" type="hidden" th:value="${entity.fileId}" />
		</p>
		<p class="controls showImg fileId" id="span_fileId"></p>
	</div>
</div>
<script th:src="@{/static/ueditor/third-party/webuploader/webuploader.min.js}" type="text/javascript"></script>
<script th:src="@{/static/js/file.js?v=2}" type="text/javascript"></script>
<script th:src="@{/static/js/admin/apply_base.js?v=1}"  type="text/javascript"></script>
<script type="text/javascript">
	var filePlugin = new FilePlugin('#fileId',$('#entityId').val(),'/apply/matters/updateFileId',[[${param.hasEditFile}]]);
	var _curStatus = '[[${status}]]';
	var _mattersTypeTree = eval('[(${mattersTypeTree})]');
	var _ownRegionType = eval('[(${ownRegionType})]');
	var _fileShowUrl = '[[${fileShowUrl}]]';

	$(function(){

		//加载附件列表
		$('.easyui-linkbutton').linkbutton();
		filePlugin.load($('#fileId').val(),'#span_fileId');
		if ($('#btn_fileId').length>0){
			fileUpload("btn_fileId", "fileId");
		}
		var _curStatus = $("#entityStatus").val();

		$("#mattersType").validatebox({
			required: true,
		})
		if(_curStatus == "A" || _curStatus =="D"){
			$("#content_f").hide();
			$("#content").show();
			let contentVal = $("#content").val();
			if(contentVal){
				$("#contentHtml").show();
			}
			$("#contentHtml").html(contentVal);
			// $("#lossTypeTo").val(_conLossTypeToType);
		}
		if(_curStatus&&(_curStatus=='N'||_curStatus=='B'||_curStatus=='C')){
			$('.click2edit').summernote({
				lang: 'zh-CN',
				height: 300,
				width: 757,
				toolbar: [

					// [groupName, [list of button]]
					//'strikethrough', 'superscript', 'subscript
					['style', ['style']],
					['font', ['bold', 'italic', 'underline', 'clear']],
					['fontsize', ['fontsize']],
					['fontface', ['fontname']],//字体
					['color', ['color']],
					['para', ['ul', 'ol', 'paragraph']],
					['table', ['table']],
					['pre-shipped',['picture','link']],
					['help',['help']]

				],
				callbacks: {
					onImageUpload: function (files) {
						sendFile(files[0], this);
					}
				}

			});
			var html=$("#content").val();
			if(isBlank(html)==false){
				$('.click2edit').summernote('code',html);
			}

			$('#mattersType').combotree({
				data: _mattersTypeTree,
				multiple : false,
				editable : false,
				required:true,
				panelHeight:275,
				panelWidth:350,
				formatter:function(node){
					var enableFlg = node.attributes.enableFlg;
					if (enableFlg==false){
						return '<span style="color:red;">'+node.text+'(无效)</span>';
					}
					return node.text;
				},
				onSelect : function(node){
					if(node.children.length!=0){
						$('#mattersType').combotree('clear');
					}else{
						$('#mattersType').combotree('setValue',node.text);
					}
				}
			});

			$('#ownRegion').combobox({
				data:_ownRegionType,
				valueField:'dictCd',
				textField:'dictName',
				panelHeight:'auto',
				editable:false,
				required:true
			});
		}else{
			var _ownRegion = $("#ownRegion").val();
			var _$ownRegion = Convert.findValueByKey(_ownRegionType,"dictCd",_ownRegion,"dictName");
			$("#ownRegion").val(_$ownRegion);

			$("#inputForm").find("input").not('.tags input').not("[type='button']").attr("readonly",true);
			$('.click2edit').summernote("disable");
		}
		applyLoadSucess();
		_beforSaveOper = true;
	});
	//发起申请前操作
	function beforSaveOper() {
		var aHTML = $('.click2edit').summernote('code');
		$("#content").val(aHTML)
		//点击申请前，先检查是否有改库存数据
		return true;
	}
	function chooseCallback(contractRows){
		var contract = contractRows[0];
		byContract(contract);
	}

	// 上传文件
	function sendFile(file, obj) {
		var data = new FormData();
		data.append("file", file);
		$.ajax({
			type: "POST",
			url: _ctx + "/apply/matters/uploadFile",
			data: data,
			cache: false,
			contentType: false,
			processData: false,
			dataType: 'json',
			success: function(result) {
				// $("#fileId").val($("#fileId").val()+','+result);
				console.log(_fileShowUrl)
				if (result) {
					$(obj).summernote('editor.insertImage',_fileShowUrl+"/view/show/"+result,true);
				} else {
					$.modal.alertError(result.msg);
				}
			}
		});
	}
</script>
<style>
.modal-backdrop {
	z-index: -1 !important
}
#contentHtml {
	border:1px solid #c2c0c0;
}
</style>
