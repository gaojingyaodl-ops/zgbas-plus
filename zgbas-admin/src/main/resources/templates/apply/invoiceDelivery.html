<!--发票寄送-->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<div class="easyui-layout" fit="true">
    <div region="center" border="false">
        <div id="inputForm" method="post" class="editForm_approve content_div" style="margin-top: 10px;margin-bottom: 0;overflow:hidden;">
            <input type="hidden" name="id" id="entityId" th:value="${entity.id}" />
            <input type="hidden" name="canApproveEdit" id="canApproveEdit" th:value="${psv.canApproveEdit}" />
            <div class="editForm">
                <div class="mb6">
                    <p class="yw-table-filter">
                        <label for="contractNo" class="control-label">合同编号:</label>
                        <input name="contractNo" id="contractNo" class="control chooseBtnStyle" readonly type="text"
                               th:value="${entity.contractNo}"></input>
                    </p>
                    <a id="addBtn" href="#" class="easyui-linkbutton btn-empty btn64"
                       onClick="contractDetail()">预算详情</a>
                </div>
                <div class="mb6 pt20">
                    <p class="yw-table-filter w2">
                        <label>我方:</label>
                        <input id="ourCompanyName" readonly="readonly" th:value="${entity.ourCompanyName}"></input>
                    </p>
                    <p class="yw-table-filter w2">
                        <label>需方:</label>
                        <input name="companyName" id="companyName" readonly="readonly" type="text"
                               th:value="${entity.companyName}"></input>
                    </p>
                </div>
                <div class="mb6">
                    <p class="yw-table-filter">
                        <label>发票号:</label>
                        <input class="control" name="invoiceNumber" id="invoiceNumber" type="text"  th:value="${entity.invoiceNumber}"></input>
                    </p>
                    <p class="yw-table-filter">
                        <label>快递单号:</label>
                        <input class="control" name="expressNumber" id="expressNumber" type="text"  th:value="${entity.expressNumber}"></input>
                    </p>
                </div>
            </div>
            <div class="mb6">
                <div class="yw-table-filter">
                    <label>附件类型:</label>
                    <input name="fileTypeId" id="fileTypeId" type="text" th:value="${entity.fileTypeId}"></input>
                </div>
            </div>
            <div class="mb6">
                <span class="upload-btn" id="btn_fileId">
                         <a href="#" class="easyui-linkbutton file-upload" data-options="iconCls:'icon-upload'">上传附件 </a>
                    </span>
                <input class="control" id="fileId" name="fileId" type="hidden" th:value="${entity.fileId}" />
                <p class="controls showImg fileId" id="span_fileId"></p>
            </div>
        </div>
    </div>
</div>
</div>
<script th:src="@{/static/ueditor/third-party/webuploader/webuploader.min.js}" type="text/javascript"></script>
<script th:src="@{/static/js/file.js?v=2}" type="text/javascript"></script>
<script th:src="@{/static/js/admin/apply_base.js}" type="text/javascript"></script>
<script type="text/javascript">
    var filePlugin = new FilePlugin('#fileId',$('#entityId').val(),'/apply/invoiceDelivery/updateFileId',[[${param.hasEditFile}]]);
    var _curStatus = '[[${status}]]';
    var contractApproveId = '[[${contractApproveId}]]';
    var canApproveEdit = $("#canApproveEdit").val();

    $(function () {
        _beforSaveOper = true;
        //$('#addBtn').linkbutton();
        $('.easyui-linkbutton').linkbutton();
        //加载附件列表
        filePlugin.load($('#fileId').val(), '#span_fileId');

        // 附件类型
        var fileTypeJson = eval('[(${fileTypeJson})]');

        // 附件类型列表
        $("#fileTypeId").combobox({
            data: fileTypeJson,
            valueField: 'fileTypeId',
            textField: 'fileTypeName',
            panelHeight: 'auto',
            editable: false,
            required: false,
            limitToList: true,
            onLoadSuccess: function () {
                var value = $(this).val();
                if (!value) {
                    $(this).combobox('setValue', fileTypeJson[0].fileTypeId);
                }
            },
        })
        $("#fileTypeId").combobox('setValue',null);
        // 我方公司
       var company= $("#ourCompanyName").val();
        if( company==null) {
            getContractDetailByContractNo($("#contractNo").val());
        }

        // 如果当前状态是完成或取消,或者是不可编辑，则页面不可编辑
        if (_curStatus != 'D' && _curStatus != 'C' && canApproveEdit == 'true') {
            // 可编辑
            if ($('#btn_fileId').length > 0) {
                fileUpload("btn_fileId", "fileId");
            }
            $(".control").attr("readonly", false);
            $("#fileTypeId").combobox({readonly: false});
        }else {
            $(".control").attr("readonly", true);
            $("#fileTypeId").combobox({readonly: true});
        }
    });

    //发起申请前操作
    function beforSaveOper(){

        return true;
    }

        function getContractDetailByContractNo(contractNo) {
            if (contractNo) {
                $.ajax({
                    url: _ctx + "/apply/invoiceDelivery/findByContractNo?contractNo=" + contractNo,
                    type: "post",
                    async: false,
                    success: function (contract) {
                        if (contract != null && contract != undefined) {
                            $("#ourCompanyName").val(contract.ourCompanyName);
                        }
                    }
                });
            }
        }


    // 打开预算详情tab
    function contractDetail(){
        if(contractApproveId){
            var title = "预算详情" + ':' +contractApproveId;
            window.parent.addTab(title,_ctx+'/pm/approve/detail/'+contractApproveId+"?from=dcContract");
        }
    }

</script>
