<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <script th:src="@{/static/js/admin/apply_protocol_doc_ckh.js?v=1}" type="text/javascript"></script>
    <script th:src="@{/static/js/admin/apply_protocol_doc_znj.js?v=1}" type="text/javascript"></script>
    <script th:src="@{/static/js/admin/apply_protocol_doc_rescission.js?v=1}" type="text/javascript"></script>
    <script th:src="@{/static/js/admin/apply_protocol_doc_repayment.js?v=1}" type="text/javascript"></script>
    <script th:src="@{/static/js/admin/apply_protocol_doc_supAgreement.js?v=1}" type="text/javascript"></script>
    <script th:src="@{/static/js/admin/apply_protocol_doc_reminderPayment.js?v=1}" type="text/javascript"></script>
    <script th:src="@{/static/js/admin/apply_protocol_doc_dzd.js?v=1}" type="text/javascript"></script>
    <title>协议文件申请</title>
</head>

<div class="easyui-layout" id="inputForm" border="false" fit="true">
    <input type="hidden" name="id" id="entityId" th:value="${entity.id}"/>
    <input type="hidden" id="entityStatus" th:value="${entity.status}"/>
    <input type="hidden" id="content" name="content"/>
    <p class="yw-table-filter w2">
        <label>协议类型:</label>
        <input name="docType" id="docType" th:value="${entity.docType}" type="text"/>
    </p>
    <p class="yw-table-filter w2 signCompanyName">
        <label>签署方:</label>
        <input name="signCompanyName" id="signCompanyName" th:value="${entity.signCompanyName}" type="text"/>
    </p>
    <form th:id="formContent">
        <div id="rescissioDiv"></div>
        <div id="repaymentDiv"></div>
        <div id="dzdDiv"></div>
        <input type="hidden" id="detailList" name="detailList"/>
        <textarea th:id="overdueLateFeesSumHidden" name="overdueLateFeesSum" th:text="${content.overdueLateFeesSum}" type="hidden" style="height:45px;width: 340px;display:none;"/>
        <div class="mb6">
            <p class="yw-table-filter w2 companyName">
                <label>企业名称:</label>
                <input name="companyName" id="companyName" th:value="${content.companyName}"  type="text"/>
            </p>
            <p class="yw-table-filter w2 accountName">
                <label>账户名:</label>
                <input name="accountName" id="accountName" th:value="${content.accountName}" type="text"/>
            </p>
        </div>
        <div class="mb6">
            <p class="yw-table-filter w2 paymentAccount">
                <label>回款账户:</label>
                <input name="paymentAccount" id="paymentAccount" th:value="${content.paymentAccount}" type="text"/>
            </p>
            <p class="yw-table-filter w2 bankName">
                <label>开户行:</label>
                <input name="bankName" id="bankName" th:value="${content.bankName}" type="text"/>
            </p>
            <p class="yw-table-filter w2 bankAccount">
                <label>账号:</label>
                <input name="bankAccount" id="bankAccount" th:value="${content.bankAccount}" type="text"/>
            </p>
            <p class="yw-table-filter endDate">
                <label>截止日期:</label>
                <input name="endDate" id="endDate" th:value="${content.endDate}" type="text"/>
            </p>
        </div>
        <div class="mb6">
            <p class="yw-table-filter w4">
                <label>备注:</label>
                <input name="remark" id="remark" th:value="${content.remark}" type="text"/>
            </p>
        </div>
        <div class="mb6">
            <p class="p_text" style="margin: 10px 0 0 0px">
			<span class="btn-group ckh-detail-btn" style="line-height: 28px;" th:if="${!disabled}">
				<a href="#" class="easyui-linkbutton btn-empty btn64" id="insertB"  type="B" tag="M"  onclick="applyProtocolDoc_ckh.addProtocolInput(this,'RL',0)">明细</a>
			</span>
            <span class="btn-group znj-detail-btn" style="line-height: 28px;" th:if="${!disabled}">
				<a href="#" class="easyui-linkbutton btn-empty btn64" type="B" tag="M"  onclick="applyProtocolDoc_znj.addProtocolInput(this,'LN',0)">明细</a>
			</span>
             <span class="btn-group repayment-detail-btn" style="line-height: 28px;" th:if="${!disabled}">
				<a href="#" class="easyui-linkbutton btn-empty btn64" type="B" tag="M"  onclick="applyProtocolDoc_rePayment.addProtocolInput(this,'RP',0)">明细</a>
			</span>
            </p>
        </div>
    </form>
    <div id="b_parenDiv">
        <div id="firstDiv"></div>
        <div id="endDiv"></div>
    </div>
    <div class="mb6">
        <p class="yw-table-filter w2 overdueLateFeesSum">
            <label>逾期滞纳金合计</label>
            <textarea th:id="overdueLateFeesSum" th:text="${content.overdueLateFeesSum}" type="text" style="height:45px;width: 340px"/>
        </p>
    </div>
    <div class="editForm">
        <p style="width:240px">
			<span class="upload-btn" id="btn_fileId">
               	 <a href="#" class="easyui-linkbutton file-upload" data-options="iconCls:'icon-upload'">上传附件 </a>
           	</span>
            <input class="control" id="fileId" name="fileId" type="hidden" th:value="${entity.fileId}"/>
        </p>
        <p class="controls showImg fileId" id="span_fileId"></p>
    </div>

</div>
<script th:src="@{/static/ueditor/third-party/webuploader/webuploader.min.js}" type="text/javascript"></script>
<script th:src="@{/static/js/file.js?v=2}" type="text/javascript"></script>
<script th:src="@{/static/js/admin/apply_base.js?v=1}" type="text/javascript"></script>

<script type="text/javascript">
    var filePlugin = new FilePlugin('#fileId', $('#entityId').val(), '/apply/matters/updateFileId', [[${param.hasEditFile}]]);
    var _curStatus = '[[${status}]]';
    var _repTable_last_index = 0;
    var _exist_repTable = false;
    var entityId=$("#entityId").val();
    var _curStatus = $("#entityStatus").val();
    var _defaultFlgJson =eval('[(${defaultFlgJson})]');
    //牌号名称
    var _productTypeJson = eval('[(${productTypeJson})]');
    var _brandJson = eval('[(${brandJson})]');
    var _docTypeJson = eval('[(${docTypeJson})]');
    var _detailSize = eval('[(${detailSize})]');
    //我方企业抬头
    var _ourCompanyNameJson =eval('[(${ourCompanyNameJson})]');
    // 交货方式
    var _deliveryModeJson =eval('[(${deliveryModeJson})]');
    var number1= 0;

    filePlugin.load($('#fileId').val(), '#span_fileId');
    if ($('#btn_fileId').length > 0) {
        fileUpload("btn_fileId", "fileId");
    }

    $(function () {
        $('.easyui-linkbutton').linkbutton();
        $('#signCompanyName').combobox({
            data: _ourCompanyNameJson,
            valueField: 'dictName',
            textField: 'dictName',
            panelHeight: "auto",
            editable: false,
            required: true,
            onSelect: function (record) {
                $("#ourCompanyName").textbox('setValue',record.dictName);
            }
        });
        $('#accountName').combobox({
            data: _ourCompanyNameJson,
            valueField: 'dictName',
            textField: 'dictName',
            panelHeight: "auto",
            editable: false,
            required: true,
            onSelect: function (record) {
                $('#signCompanyName').combobox('setValue', record.dictName);
            }
        });

        $("#endDate").datebox({
            height:30,
            required:true,
            editable:false,
        });

        $(".ckh-detail-btn").hide();
        $(".znj-detail-btn").hide();
        $(".repayment-detail-btn").hide();
        $(".overdueLateFeesSum").hide();
        $(".companyName").hide();
        $(".accountName").hide();
        $(".bankName").hide();
        $(".bankAccount").hide();
        $(".endDate").hide();
        $(".signCompanyName").hide();
        $(".paymentAccount").hide();
        $("#paymentAccount").hide();
        $('#docType').combobox({
            data: _docTypeJson,
            valueField: 'dictCd',
            textField: 'dictName',
            panelHeight: 'auto',
            editable: false,
            required: true,
            onSelect: function (record) {
                debugger
                if (record.dictCd == 'RL') {
                    // 催款函
                    $(".detail-content").remove();
                    applyProtocolDoc_ckh.addProtocolInput(this,"RL", entityId);
                    $(".ckh-detail-btn").show();
                    $(".znj-detail-btn").hide();
                    $(".overdueLateFeesSum").hide();
                    $("#overdueLateFeesSum").validatebox({required:false});
                    $(".companyName").show();
                    $("#companyName").textbox({required:true});
                    $(".signCompanyName").hide();
                    $("#signCompanyName").combobox({required:false});
                    $(".accountName").show();
                    $("#accountName").combobox({required:true});
                    $(".bankName").show();
                    $("#bankName").textbox({required:true});
                    $(".bankAccount").show();
                    $("#bankAccount").textbox({required:true});
                    $(".endDate").hide();
                    $("#endDate").datebox({required:false});
                    $(".paymentAccount").hide();
                    $("#paymentAccount").textbox({required:false});

                } else if (record.dictCd == 'LN') {
                    // 逾期滞纳金告知函
                    $(".detail-content").remove();
                    applyProtocolDoc_znj.addProtocolInput(this,"LN", entityId);
                    $(".ckh-detail-btn").hide();
                    $(".znj-detail-btn").show();
                    $(".overdueLateFeesSum").show();
                    $("#overdueLateFeesSum").validatebox({required:true});
                    $(".companyName").show();
                    $("#companyName").textbox({required:true});
                    $(".signCompanyName").hide();
                    $("#signCompanyName").combobox({required:false});
                    $(".accountName").show();
                    $("#accountName").combobox({required:true});
                    $(".bankName").show();
                    $("#bankName").textbox({required:true});
                    $(".bankAccount").show();
                    $("#bankAccount").textbox({required:true});
                    $(".endDate").show();
                    $("#endDate").datebox({required:true});
                    $(".paymentAccount").hide();
                    $("#paymentAccount").textbox({required:false});

                }else if (record.dictCd == 'RP') {
                    // 付款提示函
                    $(".detail-content").remove();
                    applyProtocolDoc_rePayment.addProtocolInput(this,"RP", entityId);
                    $(".ckh-detail-btn").hide();
                    $(".znj-detail-btn").hide();
                    $('.repayment-detail-btn').show()
                    $(".overdueLateFeesSum").hide();
                    $("#overdueLateFeesSum").validatebox({required:false});
                    $(".companyName").show();
                    $("#companyName").textbox({required:true});
                    $(".signCompanyName").show();
                    $("#signCompanyName").combobox({required:true});
                    $(".accountName").show();
                    $("#accountName").combobox({required:true});
                    $(".bankName").show();
                    $("#bankName").textbox({required:true});
                    $(".bankAccount").show();
                    $("#bankAccount").textbox({required:true});
                    $(".endDate").hide();
                    $("#endDate").datebox({required:false});
                    $(".signCompanyName").hide();
                    $("#signCompanyName").combobox({required:false});
                    $(".paymentAccount").show();
                    $("#paymentAccount").textbox({required:true});

                } else if(record.dictCd == 'DZ') {
                    $(".detail-content").remove();
                    $(".ckh-detail-btn").hide();
                    $(".znj-detail-btn").hide();
                    $(".overdueLateFeesSum").hide();
                    $("#overdueLateFeesSum").validatebox({required:false});
                    $(".companyName").hide();
                    $("#companyName").textbox({required:false});
                    $(".signCompanyName").show();
                    $("#signCompanyName").combobox({required:true});
                    $(".accountName").hide();
                    $("#accountName").combobox({required:false});
                    $(".bankName").hide();
                    $("#bankName").textbox({required:false});
                    $(".bankAccount").hide();
                    $("#bankAccount").textbox({required:false});
                    $(".endDate").hide();
                    $("#endDate").datebox({required:false});
                    $(".paymentAccount").hide();
                    $("#paymentAccount").textbox({required:false});
                    // 对账单
                    applyProtocolDocDzd.initDzdView(record.dictCd);
                } else {
                    $(".detail-content").remove();
                    $(".ckh-detail-btn").hide();
                    $(".znj-detail-btn").hide();
                    $(".overdueLateFeesSum").hide();
                    $("#overdueLateFeesSum").validatebox({required:false});
                    $(".companyName").hide();
                    $("#companyName").textbox({required:false});
                    $(".signCompanyName").show();
                    $("#signCompanyName").combobox({required:true});
                    $(".accountName").hide();
                    $("#accountName").combobox({required:false});
                    $(".bankName").hide();
                    $("#bankName").textbox({required:false});
                    $(".bankAccount").hide();
                    $("#bankAccount").textbox({required:false});
                    $(".endDate").hide();
                    $("#endDate").datebox({required:false});
                    $(".paymentAccount").hide();
                    $("#paymentAccount").textbox({required:false});
                    // 取消协议
                    applyProtocolDocRescission.initRescissionView(record.dictCd);
                    // 还款协议
                    applyProtocolDocRepayment.initRepaymentView(record.dictCd);
                    // 合同补充协议
                    applyProtocolSupAgreement.initSupAgreementView(record.dictCd)
                }
                
            }
        });
        if (_curStatus && (_curStatus == 'N' || _curStatus == 'B' || _curStatus == 'C')) {
            $("#companyName").textbox({
                required:true
            });
            $("#bankName").textbox({
                required:true
            });
            $("#bankAccount").textbox({
                required:true
            });

        } else {
            $("#inputForm").find("input").not('.tags input').not("[type='button']").attr("readonly", true);
            $("#overdueLateFeesSum").validatebox({
                required:false
            });
            $("#overdueLateFeesSum").validatebox('readonly', true);
            $('#docType').combobox('readonly', true);
            $('#accountName').combobox('readonly', true);
            $("#endDate").datebox('readonly', true);

        }
        applyLoadSucess();
        _beforSaveOper = true;
    });

    //发起申请前操作
    function beforSaveOper() {
        var arr=new Array();
        for(var i=0;i<number1;i++){
            var contractNo = $("#contractNo"+i).val();
            if(contractNo) {
                var str= Convert.getJson4Form("form"+i);
                arr.push(str);
            }
        }
        $("#overdueLateFeesSumHidden").text($("#overdueLateFeesSum").val())
        var resultArr=JSON.stringify(arr);
        $("#detailList").val(resultArr);
        applyProtocolDocRepayment.setDetailListValue();
        applyProtocolDocDzd.setDetailListValue();
        var formContentStr= Convert.getJson4Form("formContent");
        $("#content").val(JSON.stringify(formContentStr));
        console.log("formData12:"+resultArr);
        return true;
    }
</script>
<style>
    .easyui-linkbutton-self {
        display: inline-block;
        padding: 3px 12px;
        font-size: 12px;
        font-weight: normal;
        line-height: 1.42857143;
        text-align: center;
        white-space: nowrap;
        vertical-align: middle;
        cursor: pointer;
        background-color: #fff;
        border:1px solid var(--skin-color);
        color: var(--skin-color);
        border-radius: 4px;
        text-decoration: none;
        user-select: none;
        /*transition: background-color 0.3s, border-color 0.3s;*/
    }
    .easyui-linkbutton-self:hover {
        background-color: #fff;
        border-color: var(--skin-color);
        color: var(--skin-color);
        text-decoration: none; /* Remove underline */
    }

    .easyui-linkbutton-self:active {
        background-color: #fff;
        border-color: var(--skin-color);
        color: var(--skin-color);
        text-decoration: none; /* Remove underline */
    }

</style>
