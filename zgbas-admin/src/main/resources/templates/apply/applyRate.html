<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<div class="easyui-layout" fit="true">
    <div region="center" border="false">
        <div id="inputForm" method="post" class="editForm_approve content_div" style="margin-top: 10px;margin-bottom: 0;overflow:hidden;">
            <input type="hidden" name="companyId" id="companyId" th:value="${entity.id}" />
            <input type="hidden" name="companyName" id="companyName" th:value="${entity.companyName}" />
            <input type="hidden" name="canApproveEdit" id="canApproveEdit" th:value="${psv.canApproveEdit}" />
            <div class="mb6">
                <p class="yw-table-filter w2">
                    <lable>公司：</lable>
                    <input type="text" readonly  th:value="${entity.companyName}"/>
                </p>
            </div>
            <div class="mb6">
                <p class="yw-table-filter">
                    <lable>服务费率</lable>
                    <input name="rate" type="number" id="rate"  th:value="${entity.rate}"/>
                </p>
                <p class="yw-table-filter">
                    <lable>超期服务费率</lable>
                    <input name="interestRate" type="number" id="interestRate"  th:value="${entity.interestRate}"/>
                </p>
            </div>
        </div>
    </div>
</div>
<script th:src="@{/static/ueditor/third-party/webuploader/webuploader.min.js}" type="text/javascript"></script>
<script th:src="@{/static/js/file.js?v=2}" type="text/javascript"></script>
<script th:src="@{/static/js/admin/apply_base.js}" type="text/javascript"></script>
<script type="text/javascript" th:inline="javascript">
    var entity = [[${entity}]];
    var psv = [[${psv}]];
    if (entity.id != 0){
        console.log("applyRate : ", entity);
        // console.table("psv : ", psv);

        // $("#creditDays").val(entity.creditDays);
        if (psv.hasEdit) {
            $("#interestRate").attr("readonly",false);
            $("#rate").attr("readonly",false);
        }else {
            if (psv.canApproveEdit && psv.mapEdit && psv.mapEdit.interestRate && psv.mapEdit.interestRate.edit) {
                $("#interestRate").attr("readonly",false);
            }else {
                $("#interestRate").attr("readonly","readonly");
            }
            if (psv.canApproveEdit && psv.mapEdit && psv.mapEdit.rate && psv.mapEdit.rate.edit) {
                $("#rate").attr("readonly",false);
            }else {
                $("#rate").attr("readonly","readonly");
            }
        }
    }
</script>
