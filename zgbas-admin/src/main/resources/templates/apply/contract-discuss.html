<!--溢短装-->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<div class="easyui-layout" id="inputForm" border="false" fit="true">
	<input type="hidden" name="id" id="entityId" th:value="${entity.id}" />
	<input type="hidden" id="entityStatus" th:value="${entity.status}" />
	<div class="mb6">
		<p class="yw-table-filter">
			<label>合同编号:</label>
			<input name="buyContractNo" id="buyContractNo" th:value="${entity.buyContractNo}" type="text" readonly="readonly"></input>
			<input name="buyContractId" id="buyContractId" th:value="${entity.buyContractId}" type="hidden"></input>
			<input name="sellContractNo" id="sellContractNo" th:value="${entity.sellContractNo}" type="hidden" readonly="readonly"></input>
			<input name="sellContractId" id="sellContractId" th:value="${entity.sellContractId}" type="hidden"></input>
		</p>
		<a id="addBtn" href="#" class="easyui-linkbutton btn-empty btn64" onClick="contractDetail()">预算详情</a>
	</div>
	<div class="mb6">
		<p class="yw-table-filter">
			<label>数量:</label>
			<input name="dealNumber" readonly id="dealNumber" th:value="${entity.dealNumber}" type="text"></input>
		</p>
		<p class="yw-table-filter">
			<label>溢短装后数量:</label>
			<input name="dealNumberB" id="dealNumberB" th:value="${entity.dealNumberB}" type="text"></input>
		</p>
	</div>
	<div class="mb6">
		<p class="yw-table-filter">
			<label>采购总价:</label>
			<input name="buyTotalAmount" readonly id="buyTotalAmount" th:value="${#numbers.formatDecimal(entity.buyTotalAmount,1,'COMMA',2,'POINT')}" type="text"></input>
		</p>
		<p class="yw-table-filter">
			<label>销售总价:</label>
			<input name="sellTotalAmount" readonly id="sellTotalAmount" th:value="${#numbers.formatDecimal(entity.sellTotalAmount,1,'COMMA',2,'POINT')}" type="text"></input>
		</p>
		<p class="yw-table-filter">
			<label>服务费:</label>
			<input name="serviceAmount" readonly id="serviceAmount" th:value="${#numbers.formatDecimal(entity.serviceAmount,1,'COMMA',2,'POINT')}" type="text"></input>
		</p>
	</div>
	<div class="mb6">
		<th:block th:replace="~{tags/apply :: remark(${#maps.containsKey(psv.mapEdit, 'remark')}?${psv.mapEdit['remark'].edit && psv.hasApprove}:${ psv.hasEdit})}"/>
	</div>

	<div class="editForm">
		<p style="width:240px">
			<span class="upload-btn" id="btn_fileId">
               	 <a href="#" class="easyui-linkbutton file-upload" data-options="iconCls:'icon-upload'">上传附件 </a>
           	</span>
			<input class="control" id="fileId" name="fileId" type="hidden" th:value="${entity.fileId}" />
		</p>
		<p class="controls showImg fileId" id="span_fileId"></p>
	</div>
</div>
<script th:src="@{/static/ueditor/third-party/webuploader/webuploader.min.js}" type="text/javascript"></script>
<script th:src="@{/static/js/file.js?v=2}" type="text/javascript"></script>
<script th:src="@{/static/js/admin/apply_base.js}" type="text/javascript"></script>
<script type="text/javascript">
	var filePlugin = new FilePlugin('#fileId',$('#entityId').val(),'/apply/loss/updateFileId',[[${param.hasEditFile}]]);
	//var _curStatus = $("#entityStatus").val();
	var _curStatus = '[[${status}]]';
	var contractApproveId = '[[${contractApproveId}]]';

	var sellUnitPrice = '[[${entity.sellUnitPrice}]]';
	console.log("销售单价：" + sellUnitPrice);
	var buyUnitPrice = '[[${entity.buyUnitPrice}]]';
	console.log("采购单价：" + buyUnitPrice);
	var serverRate = '[[${serverRate}]]';
	console.log("服务费率:" + serverRate);
	var creditDays = '[[${creditDays}]]';
	console.log("赊销时长:" + creditDays);
	var isTwo = '[[${isTwo}]]';
	console.log("是否两票制:" + isTwo);
	_beforSaveOper = true;
	$(function(){
		//加载附件列表
		$('.easyui-linkbutton').linkbutton();
		filePlugin.load($('#fileId').val(),'#span_fileId');
		if ($('#btn_fileId').length>0){
			fileUpload("btn_fileId", "fileId");
		}
		var _curStatus = $("#entityStatus").val();
		if(_curStatus&&(_curStatus=='N'||_curStatus=='B'||_curStatus=='C')){
			$("#dealNumber,#buyTotalAmount,#sellTotalAmount,#serviceAmount,#transportAmount,#warehouseAmount").numberbox({
				min:0,
				precision:2,
				parser: function(val) {
					// 解析时去除千分位分隔符
					if(val) {
						return parseFloat(String(val).replace(/,/g, ''));
					} else {
						if(isNaN(val)) {
							return '';
						} else {
							return val;
						}
					}
				},
				formatter: function(val) {
					if (val || val === 0) {
						val = parseFloat(val).toFixed(2).toString().split(".");
						val[0] = val[0].replace(new RegExp('(\\d)(?=(\\d{3})+$)', 'ig'), "$1,");
						return val.join(".");
					} else {
						if(isNaN(val)){
							return ""
						} else {
							return val;
						}
					}
				}
			});
			$("#dealNumber").numberbox({
				min:0,
				precision:4
			});
			$("#dealNumberB").numberbox({
				min:0,
				precision:4,
				onChange:function () {
					var value = $(this).val();
					var newBuyTotalAmount = Number(value) * Number(buyUnitPrice);
					var newSellTotalAmount = Number(value) * Number(sellUnitPrice);
					$("#buyTotalAmount").numberbox("setValue",newBuyTotalAmount)
					$("#sellTotalAmount").numberbox("setValue",newSellTotalAmount)
					// 两票制重新计算服务费
					if (isTwo == true) {
						var serverAmount = Number(serverRate) * Number(creditDays) * Number(sellUnitPrice) * Number(value);
						$("#serviceAmount").numberbox("setValue",serverAmount)
					}
				}
			})
		}else{
			$("#inputForm").find("input").not("#remark").not('.tags input').not("[type='button']").attr("readonly",true);
		}
		applyLoadSucess();
	});
	function chooseCallback(contractRows){
		var contract = contractRows[0];
		byContract(contract);
	}
	function byContract(contract){
		if (contract!=undefined){
			$("#buyContractId").val(contract.id);
			$("#buyContractNo").val(contract.contractNo);
			$("#buyTotalAmount").numberbox('setValue',contract.totalAmount);
		}
	}
	function contractDetail(){
		// var id = $("#buyContractId").val();
		console.log("contractApproveId : ", contractApproveId);
		if(contractApproveId){
			// var contractNo = $("#buyContractNo").val();
			// var url=_ctx+"/ctr/contract/detail/"+id;
			// var title=contractNo;
			// window.parent.addTab(title,url);
			var title = "预算详情" + ':' +contractApproveId;
			window.parent.addTab(title,_ctx+'/pm/approve/detail/'+contractApproveId+"?from=dcContract");
		}
	}

	//发起申请前操作
	function beforSaveOper(){
		if (isBlank($("#fileId").val())) {
			$.messager.alert('提示', '必须重新上传附件', 'info');
			return false;
		}
		return true;
	}
</script>
