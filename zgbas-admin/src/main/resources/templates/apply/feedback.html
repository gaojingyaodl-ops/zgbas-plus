<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<div class="easyui-layout" fit="true">
    <div region="center" border="false">
        <div id="inputForm" method="post" class="editForm_approve content_div"
             style="margin-top: 10px;margin-bottom: 0;overflow:hidden;">
            <input type="hidden" name="id" id="entityId" th:value="${entity.id}"/>
            <input type="hidden" name="attachIds" id="attachIds" th:value="${attachUrls}"/>
            <div class="editForm">
                <div class="mb6">
                    <p class="yw-table-filter">
                        <label>内容:</label>
                        <textarea style="height: 50px;width: 500px" th:text="${entity.feedbackContent}" readonly
                                  name="feedbackContent" id="feedbackContent" type="text"/>
                    </p>
                </div>
            </div>
            <label>附件:</label>
            <p class="controls showImg fileId" id="span_fileId" title="点击查看图片" th:each="url,stat:${attachUrls}">
                <img width="500px" height="300px" th:src="${url}" th:onclick="openImg([[${url}]])">
            </p>
        </div>
    </div>
</div>
</div>
<script th:src="@{/static/ueditor/third-party/webuploader/webuploader.min.js}" type="text/javascript"></script>
<script th:src="@{/static/js/file.js?v=2}" type="text/javascript"></script>
<script th:src="@{/static/js/admin/apply_base.js}" type="text/javascript"></script>
<script type="text/javascript">
    var _curStatus = '[[${status}]]';

    $(function () {


    });

    function openImg(url) {
        window.open(url, "_blank")
    }
</script>
</html>
