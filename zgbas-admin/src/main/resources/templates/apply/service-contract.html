<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<div class="easyui-layout" fit="true">	
	<div id="inputForm" method="post" class="editForm_approve content_div" style="margin-bottom:20px">
	<div region="center" border="false">
		<div id="inputForm" method="post" class="editForm_approve content_div" style="margin-top: 10px;margin-bottom: 0;overflow:hidden;">
		<input type="hidden" name="id" id="entityId" th:value="${entity.id}" />
		<input type="hidden" id="entityStatus" th:value="${entity.status}" />		
		<input type="hidden" id="contractId" th:value="${entity.contractId}"/>
		<div id="btn" class="add-btn" th:if="${entity.status eq 'B' or entity.status eq 'N'}">
			<a id="addBtn" href="#" class="easyui-linkbutton" data-options="iconCls:'icon-add'" onclick="openChoose();">选择</a>
		</div>
		<p class="p_text">
			<th:block th:replace="~{tags/apply :: contractNo (${#maps.containsKey(psv.mapEdit, 'contractNo')}?${psv.mapEdit['contractNo'].require}:true,${#maps.containsKey(psv.mapEdit, 'contractNo')}?${psv.mapEdit['contractNo'].edit && psv.hasApprove}:${ psv.hasEdit})}"/>
			<span class="input-colspan">
				<label>对应合同号:</label>
				<input name="linkContractNo" id="linkContractNo" type="text" readonly="readonly" th:value="${entity.linkContractNo}"></input>
				<input name="linkContractId" id="linkContractId" type="hidden" readonly="readonly" th:value="${entity.linkContractId}"></input>
			</span>
			<span class="input-colspan">
				<label>服务费费率:</label>
				<input name="serviceRate" id="serviceRate" type="text" th:value="${entity.serviceRate}"></input>
			</span>
		</p>
		<p class="p_text">
			<span class="input-colspan">
				<label>合同总价(元):</label>
				<input name="totalAmount" id="totalAmount" type="text" th:value="${entity.totalAmount}" readonly="readonly"></input>
			</span>
			<span class="input-colspan">
				<label>合同数量(吨):</label>
				<input name="totalNumber" id="totalNumber" type="text" th:value="${entity.totalNumber}" readonly="readonly"></input>
			</span>
			<span class="input-colspan">
				<label>服务费(元):</label>
				<input name="serviceAmount" id="serviceAmount" type="text" th:value="${entity.serviceAmount}" readonly="readonly"></input>
			</span>
		</p>
		<p class="p_text">
			<span class="input-colspan2">
				<label>我方:</label>
				<input name="ourCompanyName" id="ourCompanyName" type="text" readonly="readonly" th:value="${entity.ourCompanyName}"></input>
			</span>
			<span class="input-colspan">
				<label>合同签订日:</label>
				<input name="contractTime" id="contractTime" readonly="readonly"  type="text" th:value="${#dates.format(entity.contractTime,'yyyy-MM-dd')}"></input>
			</span>
		</p>
		<P class="p_text">
			<span class="input-colspan2">
				<label>需方:</label>
				<input name="companyName" id="companyName" type="text" readonly="readonly" th:value="${entity.companyName}"></input>
				<input name="companyId" id="companyId" type="hidden" th:value="${entity.companyId}"></input>
			</span>
			<span class="input-colspan">
				<label for="matchUserName">业务员:</label>
				<input name="matchUserName" id="matchUserName" readonly type="text" th:value="${entity.matchUserName}"></input>
			</span>
		</P>
		<p class="p_text">
			<span class="input-colspan2">
				<label>备注:</label>
				<input name="remark" id="remark" type="text" th:value="${entity.remark}"></input>
			</span>
		</p>
		
		<div class="editForm"> 
			<p>
				<span class="upload-btn" id="btn_fileId">
				 	<i></i>
	               	<span>附件上传</span>
	           	</span>
				<input class="control" id="fileId" name="fileId" type="hidden" th:value="${entity.fileId}" />
			</p>
			<p class="controls showImg fileId" id="span_fileId"></p>
		</div>											
		<div id="w_contract_choose" class="easyui-window" title="合同详情" data-options="width:830,height:640"></div>
		</div>
		</div>
	</div>
</div>
<script th:src="@{/static/ueditor/third-party/webuploader/webuploader.min.js}" type="text/javascript"></script>

<script type="text/javascript">
var _serviceContractRateJson = eval('[(${serviceContractRateJson})]');
var filePlugin = new FilePlugin('#fileId',$('#entityId').val(),'/apply/serviceContract/updateFileId',[[${param.hasEditFile}]]);
var _curStatus = $("#entityStatus").val();
$(function(){
	$('#addBtn').linkbutton();
	if(_curStatus&&(_curStatus=='N'||_curStatus=='B'||_curStatus=='C')){
		$('#totalAmount,#serviceAmount').numberbox({
			precision:2,
			readonly:true,
			required:true
		});
		$('#contractTime').datebox({hasDownArrow:false});
		$('#totalNumber').numberbox({
			precision:2,
			readonly:true
		});
		$('#serviceRate').combobox({
			data:_serviceContractRateJson,
			valueField:'dictCd',
			textField:'dictName',
			editable:false,
			required:true,
			panelHeight:"auto",
			onSelect:function(node){
				var rate = node.dictCd;
				if (rate){
					var totalAmount = $('#totalAmount').numberbox('getValue');
					var serviceAmount = totalAmount*rate;
					$('#serviceAmount').numberbox('setValue',serviceAmount);
				}
			}
		});

	} else if(_curStatus&&(_curStatus=='A'||_curStatus=='D')){
		
		$("#toolbar").addClass("hide");		
		$("#inputForm").find("input").not('.tags input').not("[type='button']").attr("readonly",true);
		//服务费率
		var _serviceRate = $('#serviceRate').val();
		var serviceRate = Convert.findValueByKey(_serviceContractRateJson,"dictCd",_serviceRate,"dictName");
		$("#serviceRate").val(serviceRate);

	}
	
	//加载附件列表
	filePlugin.load($('#fileId').val(),'#span_fileId');
	if ($('#btn_fileId').length>0){
		fileUpload("btn_fileId", "fileId");
	}
});
$('#w_contract_choose').window({
	title: '请选择合同',
	modal:true,
	closed: true,
	collapsible : false,
	minimizable : false,
	cache:false
});
//选择合同
function openChoose(){
	var url=_ctx+"/ctr/contract/choose?contractType=S&contractStatus=C&cancelFlg=true&NbusinessType=FW";
	$('#w_contract_choose').attr('callbackExec', 'chooseCallback');
	$('#w_contract_choose').window({href:url});
	$('#w_contract_choose').window("open");
	$('#serviceRate').combobox('clear');
	$('#serviceAmount').numberbox('clear');
}
function chooseCallback(contractRows){
	var contract = contractRows[0];
	byContract(contract);
}
function byContract(contract){
	if (contract!=undefined){
		$('#linkContractNo').val(contract.contractNo);
		$('#linkContractId').val(contract.id);
		$('#totalAmount').numberbox('setValue',contract.totalAmount);
		$('#totalNumber').numberbox('setValue',contract.totalNumber);
		$('#companyId').val(contract.companyId);
		$('#companyName').val(contract.companyName);
		$('#ourCompanyName').val(contract.ourCompanyName);
		$('#matchUserName').val(contract.matchUserName);
		$('#contractTime').datebox('setValue',contract.contractTime);
	}
}

//获取当前日期
function myformatter(date){  
    var y = date.getFullYear();  
    var m = date.getMonth()+1;  
    var d = date.getDate();  
    return y+'-'+(m<10?('0'+m):m)+'-'+(d<10?('0'+d):d);  
}  	

function insert(){
	//弹出框
	var url=_ctx+"/stock/stockContract/choose";
	$('#w_stock_choose').attr('callbackExec', 'chooseCallback');
	$('#w_stock_choose').window({href:url});
	$('#w_stock_choose').window("open");
	$('#totalAmount').numberbox('clear');
}
function formattData(date){
	var arr = date.split('-');
	var year = arr[0]  
    var month = arr[1];  
    var day = arr[2];  
	return year + '年' + month + '月' + day + '日';
}

function chooseCallback(stockRows){
	var rows = $('#relaTable').datagrid('getRows');
	var length =rows.length;
	for(var i=0;i<length;i++){
		$('#relaTable').datagrid('deleteRow',0);
	}
	if(stockRows){
		var _curProductCd = "";
		for(var i=0;i<stockRows.length;i++){
			var row = stockRows[i];
			
			//Convert.findValueByKey(_productType,"dictCd",value,"dictName");
			var new_row = {
					id:0,
					productCd:row.productCd,
					productName:row.productName,
					brandNumber:row.brandNumber,
					factoryId:row.factoryId,
					warehouseName:row.warehouseName,
					factoryName:row.factoryName,
					warehouseId:row.warehouseId,
					maxNumber:row.remainNumber,
					dealNumber:row.remainNumber,
					productAttr:row.productAttr,
					stockDetailId:row.id,
					otherDealPrice:row.dealPrice,
					wrapSpecs:row.wrapSpecs,
					warehousePos:row.warehousePos,
					warehouseAddr:row.warehouseAddr,
					stockContractId:row.id,
					warehousePrice:row.warehousePrice
			};
			_curProductCd = row.productCd;
			$('#relaTable').datagrid('appendRow', new_row);
			var rowIndex=$('#relaTable').datagrid('getRowIndex',new_row);
			$('#relaTable').datagrid('beginEdit', rowIndex);
			if (row.qualityStandard){
				$('#qualityStandard').combobox('setValue',row.qualityStandard);
			}
			var value = Convert.findValueByKey(_ourCompanyJson,"dictName",row.ourCompanyName,"dictCd");
			if (!value){
				value = Convert.findValueByKey(_ourCompanyJson,"dictCd",row.ourCompanyName,"dictName");
			}
			$('#ourCompanyName').combobox('setValue',value);
	}
}

//数量校验，判断卖的数量是否小于等于库存数量
function numberValidate(){
	var btn=true;
	var rows = $('#relaTable').datagrid('getChanges');	
	for(var i = 0 ;i<rows.length; i++){
		if(!btn){
			break;
		}
	}
	return btn;
}

//发起申请前操作	
function beforSaveOper(){
	var ctn=numberValidate();
	if(ctn){
		var changeRows = $('#relaTable').datagrid('getRows'); 
		for(var i=0;i<changeRows.length;i++){
			var rowIndex=$('#relaTable').datagrid('getRowIndex',changeRows[i]);
			flag=$('#relaTable').datagrid('validateRow',rowIndex);
			if (!flag){
				$('#relaTable').datagrid('selectRow',rowIndex);
				$('#relaTable').datagrid('beginEdit', rowIndex);
				break;
			}else{
				$('#relaTable').datagrid('endEdit', rowIndex);
			}
		}
		
	    Convert.setChildren2Form("inputFormApprove","relaTable");
		return true;
	}
	return false;
