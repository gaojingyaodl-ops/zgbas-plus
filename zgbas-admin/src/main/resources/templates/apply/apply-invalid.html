<!--作废申请-->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <link th:href="@{/static/ueditor/third-party/webuploader/webuploader.css}" type="text/css" rel="stylesheet"/>
</head>
<style>
    .datagrid-cell-check{height: 29px;}
    .datagrid-header-check{height: 29px;}
</style>
<div class="easyui-layout" fit="true">
    <div id="inputForm" method="post" class="editForm_approve content_div">
        <input type="hidden" name="id" id="entityId" th:value="${entity.id}"/>
        <input type="hidden" name="budgetApproveId" id="budgetApproveId" th:value="${entity.budgetApproveId}"/>
        <input type="hidden" name="invalidApproveIds" id="invalidApproveIds" th:value="${entity.invalidApproveIds}"/>
        <input type="hidden" name="buyContractId" id="buyContractId" th:value="${entity.buyContractId}"/>
        <input type="hidden" name="sellContractId" id="sellContractId" th:value="${entity.sellContractId}"/>
        <input type="hidden" name="status" id="entityStatus" th:value="${entity.status}"/>
        <input type="hidden" id="_invalidType" th:value="${entity.invalidType}"/>
        <div class="mb6">
            <p class="yw-table-filter">
                <label for="matchUserName">业务员:</label>
                <input name="matchUserName" id="matchUserName" readonly type="text"/>
            </p>
            <p class="yw-table-filter">
                <label>业务模式:</label>
                <input name="businessType" id="businessType" type="text" readonly="readonly"/>
            </p>
            <p class="yw-table-filter">
                <label>合同尾号:</label>
                <input id="contractTailNo" name="contractTailNo" data-options="prompt:'9位纯数字合同尾号'" type="text" th:value="${entity.contractTailNo}" />
            </p>
            <a id="queryBtn" href="#" class="easyui-linkbutton btn-empty btn64" onClick="queryInvalidDetail()">加载合同</a>
        </div>
        <div id="boxDiv" class="easyui-tabs pt5 popup-tab hide">
            <table id="contractTable" style="height:80px" title="" iconCls="icon-edit" singleSelect="true" idField="id"></table>
        </div>
        <div class="mb6">
            <p class="yw-table-filter w5">
                <label>贸易链条:</label>
                <input name="tradeChain" id="tradeChain" type="text" readonly="readonly"/>
            </p>
        </div>
        <p class="form-section-title"><span class="approve_text">作废审批单选择</span><i></i></p>
        <div class="mb6">
            <p class="yw-table-filter w2">
                <label>作废类型:</label>
                <input name="invalidType" id="invalidType" th:value="${entity.invalidType}"/>
            </p>
            <div id="approveInvalidBox" class="easyui-tabs pt5 popup-tab">
                <table id="approveInvalidTable" title="" iconCls="icon-edit" singleSelect="true" idField="id"></table>
            </div>
        </div>
        <div class="mb6">
            <p class="yw-table-filter w5">
                <label>作废原因:</label>
                <input name="invalidRemark" id="invalidRemark" th:value="${entity.invalidRemark}" data-options="multiline:true" class="easyui-textbox" style="border: 1px solid #cacaca;width: 99.5%; height: 80px;line-height: 1.6;"/>
            </p>
        </div>
        <p class="form-section-title"><span class="approve_text">采购</span><i></i></p>
        <div class="mb6">
            <p class="yw-table-filter">
                <label for="buyContractNo" class="control-label">合同编号:</label>
                <input id="buyContractNo" type="text" readonly/>
            </p>

            <p class="yw-table-filter">
                <label for="buyDealPrice" class="control-label">采购单价(元):</label>
                <input id="buyDealPrice" type="text" readonly/>
            </p>

            <p class="yw-table-filter">
                <label for="buyTotalAmount" class="control-label">采购总价(元):</label>
                <input id="buyTotalAmount" type="text" readonly/>
            </p>

            <p class="yw-table-filter">
                <label for="buyDeliveryType" class="control-label">交货方式:</label>
                <input id="buyDeliveryType" type="text" readonly/>
            </p>

            <p class="yw-table-filter">
                <label for="buyDeliveryDate" class="control-label">交货日期:</label>
                <input id="buyDeliveryDate" type="text" readonly/>
            </p>
        </div>
        <div class="mb6">
            <p class="yw-table-filter">
                <label for="buyTotalAmount" class="control-label">付全款日期:</label>
                <input id="buyPayFullDate" type="text" readonly/>
            </p>

            <p class="yw-table-filter">
                <label for="buyDeliveryType" class="control-label">已付款金额(元):</label>
                <input id="buyDealedAmount" type="text" readonly/>
            </p>

            <p class="yw-table-filter">
                <label for="buyDeliveryDate" class="control-label">已收票金额(元):</label>
                <input id="buyBilledAmount" type="text" readonly/>
            </p>

            <p class="yw-table-filter">
                <label for="buyDeliveryDate" class="control-label">已入库数量(吨):</label>
                <input id="buyWarehouseNum" type="text" readonly/>
            </p>
        </div>
        <p class="form-section-title"><span class="approve_text">销售</span><i></i></p>
        <div class="mb6">
            <p class="yw-table-filter">
                <label for="sellContractNo" class="control-label">合同编号:</label>
                <input id="sellContractNo" type="text" readonly/>
            </p>

            <p class="yw-table-filter">
                <label for="sellDealPrice" class="control-label">销售单价(元):</label>
                <input id="sellDealPrice" type="text" readonly/>
            </p>

            <p class="yw-table-filter">
                <label for="sellTotalAmount" class="control-label">销售总价(元):</label>
                <input id="sellTotalAmount" type="text" readonly/>
            </p>

            <p class="yw-table-filter">
                <label for="sellDeliveryType" class="control-label">交货方式:</label>
                <input id="sellDeliveryType" type="text" readonly/>
            </p>

            <p class="yw-table-filter">
                <label for="sellDeliveryDate" class="control-label">交货日期:</label>
                <input id="sellDeliveryDate" type="text" readonly/>
            </p>
        </div>
        <div class="mb6">
            <p class="yw-table-filter">
                <label for="sellAppointPayFullTime" class="control-label">约定付全款日期:</label>
                <input id="sellAppointPayFullTime" type="text" readonly/>
            </p>

            <p class="yw-table-filter">
                <label for="sellDeliveryType" class="control-label">已收款金额(元):</label>
                <input id="sellDealedAmount" type="text" readonly/>
            </p>

            <p class="yw-table-filter">
                <label for="sellDeliveryDate" class="control-label">已开票金额(元):</label>
                <input id="sellBilledAmount" type="text" readonly/>
            </p>

            <p class="yw-table-filter">
                <label for="sellDeliveryDate" class="control-label">已出库数量(吨):</label>
                <input id="sellWarehouseNum" type="text" readonly/>
            </p>
        </div>
        <p class="form-section-title"><span class="approve_text">补充附件</span><i></i></p>
        <div class="mb6" style="width: 250px;">
			<span class="upload-btn" id="btn_fileId">
               	 <a href="#" class="easyui-linkbutton file-upload" data-options="iconCls:'icon-upload'">补充附件 </a>
           	</span>
            <input class="control" id="fileId" name="fileId" type="hidden" th:value="${entity.fileId}"/>
            <p class="controls showImg fileId" id="span_fileId"></p>
        </div>
    </div>
</div>
<div id="w_contract_choose" class="easyui-window" title="合同详情" data-options="width:830,height:640">
</div>
<script th:src="@{/static/ueditor/third-party/webuploader/webuploader.min.js}" type="text/javascript"></script>
<script th:src="@{/static/js/file.js?v=2}" type="text/javascript"></script>
<script th:src="@{/static/js/admin/apply_base.js?v=1}" type="text/javascript"></script>
<script type="text/javascript">
    var _entityStatus = $('#entityStatus').val();
    var _invalidTypeJson = eval('[(${invalidTypeJson})]');
    var _qualityStandardJson = eval('[(${qualityStandardJson})]');
    var _deliveryTypeJson = eval('[(${deliveryTypeJson})]');
    var _packingSpecificaJson = eval('[(${packingSpecificaJson})]');
    var filePlugin = new FilePlugin('#fileId', $('#entityId').val(), '/apply/invalid/updateFileId', (_entityStatus == 'N' || _entityStatus == 'C' || _entityStatus == 'B'));
    var _$_ctr_contract_id = 0;
    var _$_budget_approve_id = 0;
    var _$_invalid_type = $('#_invalidType').val();
    var _$_invalid_approve_Ids = $('#invalidApproveIds').val();
    $(function () {
        _beforSaveOper = true;
        let _buyContractId = $('#buyContractId').val();
        let _sellContractId = $('#sellContractId').val();
        let _$_budget_approve_id = $('#budgetApproveId').val();
        if (_buyContractId){
            _$_ctr_contract_id = _buyContractId
        }
        if (_sellContractId){
            _$_ctr_contract_id = _sellContractId;
        }
        $('.easyui-linkbutton').linkbutton();
        var _curStatus = $("#entityStatus").val();
        // 作废类型
        $('#invalidType').combobox({
            data: _invalidTypeJson,
            required: true,
            valueField: 'dictCd',
            textField: 'dictName',
            panelHeight: "auto",
            editable: false,
            onChange: function (newValue, oldValue){
                _$_invalid_type = newValue;
                queryInvalidApproveList();
                removeCheckList();
            }
        });
        // 合同尾号
        $('#contractTailNo').numberbox({
            validType: 'length[9,9]',
            precision: 0,
            required: true,
            onChange: function (newValue, oldValue){
                queryInvalidDetail();
            }
        });
        // 作废原因
        $('#invalidRemark').textbox({
            required: true
        });
        $('#buyDealPrice,#sellDealPrice,#buyTotalAmount,#sellTotalAmount,#buyDealedAmount,#sellDealedAmount,#buyBilledAmount,#sellBilledAmount').numberbox({
            precision: 3,
        });
        $('#buyWarehouseNum,#sellWarehouseNum').numberbox({
            precision: 4,
        });
        $('#buyDeliveryDate,#buyPayFullDate,#sellDeliveryDate,#sellAppointPayFullTime').datebox({
            readOnly: true,
            hasDownArrow: false
        });
        $("#buyDeliveryType,#sellDeliveryType").combobox({
            data: _deliveryTypeJson,
            textField: 'dictName',
            valueField: 'dictCd',
            panelHeight: "auto",
            readonly: true,
            hasDownArrow: false
        });
        $('#contractTable').datagrid({
            pageSize:50,
            rownumbers:false,
            url: _ctx + "/ctr/product/list?search_EQL_ctrContractId=" + _$_ctr_contract_id,
            pagination:false,
            columns:[ [
                {field:'productName',title:'品名',align:'center',width:120},
                {field:'brandNumber',title:'牌号',align:'center',width:120},
                {field:'factoryName',title:'厂商',align:'center',width:130},
                {field:'wrapSpecs',title:'包装规格',align:'center',width:160,
                    formatter:function(value,row,index){
                        return Convert.findValueByKey(_packingSpecificaJson,"dictCd",value,"dictName");
                    }},
                {field:'qualityStandard',title:'质量标准',align:'center',width:160,
                    formatter:function(value,row,index){
                        return Convert.findValueByKey(_qualityStandardJson,"dictCd",value,"dictName");
                    }},
                {field:'dealNumber',title:'数量(吨)', align:'center', width:115}
            ]],
            onLoadSuccess:function(data){
            }
        });
        $('#approveInvalidTable').datagrid({
            pageSize:50,
            rownumbers:true,
            singleSelect:false,
            selectOnCheck:true,
            checkOnSelect:false,
            url: _ctx + "/apply/invalid/findCanInvalidList?budgetApproveId=" + _$_budget_approve_id + "&invalidType=" + _$_invalid_type + '&invalidApproveIds=' + _$_invalid_approve_Ids,
            pagination:false,
            columns:[ [
                {field: 'ck', title: ' ', checkbox: (_curStatus != 'A' && _curStatus != 'D'), sortable: false, width: 30},
                {field: 'approveNo', title: '审批单号', align: 'center', width: 115},
                {field: 'processName', title: '流程名称', align: 'left', width: 100},
                {field:'subject',title:'摘要', width:245,align:'left',
                    formatter: function(value, row, index) {
                        var abValue = value;
                        var content = '<p title="' + value + '" class="note">' + abValue + '</p>';
                        return content;
                    }
                },
                {field: 'startUserName', title: '发起人', align: 'center', width: 80},
                {field: 'startDate', title: '发起时间', align: 'center', width: 130},
                {field:'options',title:'操作', align:"center", width:75,formatter:function(value, row, index){
                    var str = '';
                    if (row.approveId){
                        str = '<span class="contract-btn contract-btn-1" onclick="openApproveDetail(' +row.approveId+ ',\'' +row.processName+'\')">审批明细</span>';
                    }
                    return str;
                }}
            ]],
            onLoadSuccess:function(data){

            }
        });
        if (_curStatus && (_curStatus == 'N' || _curStatus == 'B' || _curStatus == 'C')) {

        }
        if (_curStatus && (_curStatus == 'A' || _curStatus == 'D')) {
            _$_invalid_type = $('#invalidType').combobox('getValue');
            $("#queryBtn").addClass('hide');
            $(".chooseBtn").hide();
            $("#inputForm").find("input").not('.tags input').not("[type='button']").attr("readonly", true);
            $('#invalidRemark').textbox({
                readonly : true
            });
            $('#invalidType').combobox({
                readonly : true,
                hasDownArrow : false
            });
        }
        //加载附件列表
        filePlugin.load($('#fileId').val(), '#span_fileId');
        if ($('#btn_fileId').length > 0) {
            fileUpload("btn_fileId", "fileId");
        }

        // 加载作废详细信息
        setTimeout(function () {
            queryInvalidDetail();
        }, 100);
    });

    function openApproveDetail(approveId, processName) {
        var title = processName + ':' + approveId;
        window.parent.addTab(title, _ctx + '/pm/approve/detail/' + approveId);
    }

    function queryInvalidDetail(){
        let contractTailNo = $("#contractTailNo").val();
        if (contractTailNo.length != 9){
            return;
        }
        $.ajax({
            url:_ctx+"/apply/invalid/queryInvalidDetail?contractTailNo="+contractTailNo,
            type:"post",
            async:false,
            success: function (data) {
                if (data != null && data != undefined) {
                    setInvalidValue(data);
                }
            }
        });
    }

    function queryInvalidApproveList(){
        let budgetApproveId = $("#budgetApproveId").val();
        let contractTailNo = $("#contractTailNo").val();
        if (budgetApproveId){
            _$_budget_approve_id = budgetApproveId;
            $('#approveInvalidTable').datagrid({
                url: _ctx + "/apply/invalid/findCanInvalidList?budgetApproveId=" + _$_budget_approve_id + "&invalidType=" + _$_invalid_type + "&contractTailNo=" + contractTailNo,
            });
            $('#approveInvalidTable').datagrid('reload');
            $('#approveInvalidTable').datagrid('resize');
        }
    }

    function setInvalidValue(data){
        let buyContract = data.buyContract;
        let sellContract = data.sellContract;
        let invalidTypeList = data.invalidTypeList;
        if (buyContract){
            _$_ctr_contract_id = buyContract.id;
            _$_budget_approve_id = buyContract.approveId;
            $('#buyContractId').val(buyContract.id);
            $('#budgetApproveId').val(buyContract.approveId);
            $('#matchUserName').val(buyContract.matchUserName);
            $('#businessType').val(getBusinessType(buyContract));
            $('#buyContractNo').val(buyContract.contractNo);
            $('#buyDealPrice').numberbox('setValue', buyContract.dealPrice);
            $('#buyTotalAmount').numberbox('setValue', buyContract.totalAmount);
            $('#buyDeliveryType').combobox('setValue', buyContract.deliveryType);
            $('#buyDeliveryDate').datebox('setValue', buyContract.deliveryDateTo);
            $('#buyPayFullDate').datebox('setValue',buyContract.payFullTime);
            $('#buyDealedAmount').numberbox('setValue', buyContract.dealedAmount);
            $('#buyBilledAmount').numberbox('setValue', buyContract.billedAmount);
            $('#buyWarehouseNum').numberbox('setValue', buyContract.warehouseNumber);
        }
        if (sellContract){
            _$_ctr_contract_id = sellContract.id;
            _$_budget_approve_id = sellContract.approveId;
            $('#sellContractId').val(sellContract.id);
            $('#budgetApproveId').val(buyContract.approveId);
            $('#matchUserName').val(sellContract.matchUserName);
            $('#businessType').val(getBusinessType(sellContract));
            $('#sellContractNo').val(sellContract.contractNo);
            $('#sellDealPrice').numberbox('setValue', sellContract.dealPrice);
            $('#sellTotalAmount').numberbox('setValue', sellContract.totalAmount);
            $('#sellDeliveryType').combobox('setValue', sellContract.deliveryType);
            $('#sellDeliveryDate').datebox('setValue',sellContract.deliveryDateTo);
            $('#sellAppointPayFullTime').datebox('setValue',sellContract.appointPayFullTime);
            $('#sellDealedAmount').numberbox('setValue', sellContract.dealedAmount);
            $('#sellBilledAmount').numberbox('setValue', sellContract.billedAmount);
            $('#sellWarehouseNum').numberbox('setValue', sellContract.warehouseNumber);
        }
        $('#tradeChain').val(data.tradeChain);
        if (_$_ctr_contract_id){
            $('#boxDiv').removeClass('hide');
            $('#contractTable').datagrid({
                url: _ctx + "/ctr/product/list?search_EQL_ctrContractId=" + _$_ctr_contract_id,
            });
            $('#contractTable').datagrid('reload');
            $('#contractTable').datagrid('resize');
        }
        if (_$_budget_approve_id){
            let contractTailNo = $("#contractTailNo").val();
            $('#approveInvalidTable').datagrid({
                url: _ctx + "/apply/invalid/findCanInvalidList?budgetApproveId=" + _$_budget_approve_id + "&invalidType=" + _$_invalid_type + '&invalidApproveIds=' + _$_invalid_approve_Ids + "&contractTailNo=" + contractTailNo,
            });
            $('#approveInvalidTable').datagrid('reload');
            $('#approveInvalidTable').datagrid('resize');
        }
        let _entityStatus = $('#entityStatus').val();
        if (invalidTypeList && _entityStatus != 'A' && _entityStatus != 'D'){
            _invalidTypeJson = _invalidTypeJson.filter(function (a) {
                return invalidTypeList.includes(a.dictCd);
            });
            let _$_invalidType = $('#_invalidType').val();
            if (!_$_invalidType){
                $('#invalidType').combobox('clear');
            }
            $('#invalidType').combobox('loadData', _invalidTypeJson);
        }
    }

    function getBusinessType(contract) {
        let _type = contract.businessType;
        let _matchCreditFlg = contract.matchCreditFlg;
        if (_type == 'ZY-BB') {
            if (_matchCreditFlg == "true") {
                return "赊销";
            } else {
                return "代采";
            }
        } else {
            return "自营";
        }
    }

    function getCheckList() {
        var _budgetApproveIds = [];
        var checkedItems = $('#approveInvalidTable').datagrid('getChecked');
        for (let i = 0; i < checkedItems.length; i++) {
            let item = checkedItems[i];
            _budgetApproveIds.push(item.approveId);
        }
        $('#invalidApproveIds').val(_budgetApproveIds);
        return _budgetApproveIds;
    }

    function removeCheckList() {
        $('#approveInvalidTable').datagrid('uncheckAll');
    }

    function beforSaveOper() {
        let _budgetApproveIds = getCheckList();
        let _contractTailNo = $('#contractTailNo').numberbox('getValue');
        let _invalidType = $('#invalidType').combobox('getValue');
        let _invalidRemark = $('#invalidRemark').textbox('getValue');
        if (!_contractTailNo) {
            $.messager.alert('提示', '请输入合同尾号！', 'warning');
            return false;
        }
        if (!_invalidType) {
            $.messager.alert('提示', '请选择作废类型！', 'warning');
            return false;
        }
        if (!_invalidRemark) {
            $.messager.alert('提示', '请输入作废原因！', 'warning');
            return false;
        }
        if (_budgetApproveIds.length > 0) {
            return true;
        } else {
            $.messager.alert('提示', '请勾选需要作废的审批单！', 'warning');
            return false;
        }
    }
</script>
<script th:src="@{/static/js/admin/apply_base.js}" type="text/javascript"></script>
