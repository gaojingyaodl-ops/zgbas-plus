<script type="text/javascript" th:inline="javascript">
	// 附件上传插件初始化
	var filePlugin = new FilePlugin('#buyContentTemplateId',$('#entityId').val(),'/apply/match/updateFileId',true);
	var sellFilePlugin = new FilePlugin('#sellContentTemplateId',$('#entityId').val(),'/apply/match/updateFileId',true);

	//品名列表
	var _productTypeJson = eval('[(${productTypeJson})]');
	// 牌号名称
	var _brandJson = eval('[(${brandJson})]');
	// 厂商列表
	var _factoryJson = eval('[(${factoryJson})]');
	// 安全仓库
	var _safeWarehouse = eval('[(${safeWarehouse})]');
	// 合同类型
	var _contractTypeJson = eval('[(${contractTypeJson})]');
	// 付款方式
	var _payTypeJson= eval('[(${payTypeJson})]');
	// 结算方式
	var _deliveryModeJson =eval('[(${deliveryModeJson})]');
	// 提货方式
	var _deliveryTypeJson =eval('[(${deliveryTypeJson})]');
	//交货日期补充
	var _arrivalTimeExtJson= eval('[(${arrivalTimeExtJson})]');
	//质量标准
	var _qualityStandardJson = eval('[(${qualityStandardJson})]');
	//我方企业抬头
	var _ourCompanyNameJson =eval('[(${ourCompanyNameJson})]');
	// 定金比例
	var _contractBondRateJson = eval('[(${contractBondRateJson})]');
	// 包装规格
	var _packingSpecificaJson = eval('[(${packingSpecificaJson})]');
	// 采购来源
	var _buySourceJson = eval('[(${buySourceJson})]');
	// 业务员数
	var _matchUserNameTree = eval('[(${matchUserNameTree})]');
	// 采购合同模板
	var _buyTemplateList = eval('[(${buyTemplateList})]');
	// 销售合同模板
	var _sellTemplateList = eval('[(${sellTemplateList})]');
	var _matchCreateFlg = false;
	_beforSaveOper=true;

	var commissionRate = {
		// 业务提成比例
		businessCommissionRate : 0,
		// 采购提成比例
		buyCommissionRate : 0,
		// 销售提成比例
		sellCommissionRate : 0,
		// 营销比例
		marketingRetentionRate: 0,
		companyCommissionRate: 0
	}

	function CommissionRate(businessCommissionRate,
							buyCommissionRate,
							sellCommissionRate,
							marketingRetentionRate,
							companyCommissionRate,
							productCd) {
		this.businessCommissionRate = businessCommissionRate;
		this.buyCommissionRate = buyCommissionRate;
		this.sellCommissionRate = sellCommissionRate;
		this.marketingRetentionRate = marketingRetentionRate;
		this.companyCommissionRate = companyCommissionRate;
		this.productCd = productCd;
	}

	// 品种提成比例
	var productCommissionRate = [];

	$(function(){
		$('#addBtn').linkbutton();
		$('#addBtnp').linkbutton();
		$('.easyui-linkbutton').linkbutton();
		$('#ourCompanyName').combobox({
			data:_ourCompanyNameJson,
			valueField:'dictCd',
			textField:'dictName',
			panelHeight:"auto",
			editable:false,
			required:true,
			onLoadSuccess:function(data){
				// var value = $(this).val();
				// if (!value){
				// 	$(this).combobox('setValue',data[0].dictCd);
				// 	value = data[0].dictCd;
				// }
			}
		});

		// 合同预览按钮初始化隐藏
		$(".bContractPreviewClass").hide();
		$(".sContractPreviewClass").hide();

		$("#pallet_amount").numberbox({
			validType: 'length[1,20]',
			precision: 2,
			value: 0
		});
		$("#pallet_days").numberbox({
			validType:'length[1,20]',
			precision:0,
			value:1
		});



		$('#w_contract').window({
			title: '电子合同',
			modal:true,
			closed: true,
			collapsible : false,
			minimizable : false,
			maximizable : false,
			cache:false
		});

		// 初始化牌照
		$("#brandNumber").combobox({
			data:"",
			required:true,
			limitToList:true,
			editable:true,
			textField:'brandNumber',
			valueField:'brandNumber'
		});

		// 初始化品种
		$("#productCd").combotree({
			data:_productTypeJson,
			required:true,
			editable:true,
			panelWidth:150,
			panelHeight:300,
			onSelect:function(node){
				var text = node.text;
				$("#productName").val(text);
				var new_brandJson = _brandJson.filter(function (e) {
					return e.productCd == node.id && e.enterpriseId == 44;
				})
				$.post(_ctx+"/ctr/product/getProductConfig?productCd="+node.id,function(result) {
					if (result) {
						productCommissionRate = [];
						var commissionRate = new CommissionRate(result.businessCommissionRate, result.buyCommissionRate, result.sellCommissionRate, result.marketingRate, result.companyCommissionRate, node.id);
						productCommissionRate.push(commissionRate);
					}
				});

				// 初始化牌照
				$("#brandNumber").combobox({
					data:new_brandJson,
					required:true,
					limitToList:true,
					editable:true,
					textField:'brandNumber',
					valueField:'brandNumber'
				});
			}
		});

		// 初始化厂商数据
		$("#factoryName").combobox({
			data:_factoryJson,
			required:true,
			textField:'factoryName',
			valueField:'factoryName',
			panelHeight:'100',
			onSelect : function(node){
				var id = node.id;
				$("#factoryId").val(id);
			}
		});

		// 采购-销售地点
		$("#bdeliveryAddr").combobox({
			data:_safeWarehouse,
			editable:false,
			valueField:'dictName',
			textField:'dictName',
			panelHeight:300,
			required:true,
			onSelect:function (row) {
				// 详细地址
				$("#bcontactAddr").val(row.remark);
			}
		});

		var other = {
			id: -1,
			templateName: "其他",
		}
		_buyTemplateList.push(other);
		$("#buyTemplateId").combobox({
			data:_buyTemplateList,
			required:false,
			editable:false,
			textField:'templateName',
			valueField:'id',
			panelHeight:'200',
			onChange:function(){
				upbtempBtnFun(true,false,false);
			}
		});

		_sellTemplateList.push(other);
		$("#sellTemplateId").combobox({
			data:_sellTemplateList,
			required:false,
			editable:false,
			textField:'templateName',
			valueField:'id',
			panelHeight:'200',
			onChange:function(){
				upstempBtnFun(true,false,false);
			}
		});


		// 采购-收货日期(补充)
		$("#BarrivalTimeExt").combobox({
			data:_arrivalTimeExtJson,
			valueField:'dictCd',
			textField:'dictName',
			panelHeight:"auto",
			required: true,
			editable: false,
			onLoadSuccess:function(){
				var value = $(this).combobox('getValue');
				if(!value){
					$(this).combobox("setValue","LR");
				}
			}
		});

		// 销售 收货日期（补充）
		$("#SarrivalTimeExt").combobox({
			data:_arrivalTimeExtJson,
			valueField:'dictCd',
			textField:'dictName',
			panelHeight:"auto",
			required: true,
			editable: false,
			onLoadSuccess:function(){
				var value = $(this).combobox('getValue');
				if(!value){
					$(this).combobox("setValue","LR");
				}
			}
		});

		// 数量
		$("#dealNumber").numberbox({
			required:true,
			validType:'length[1,20]',
			precision:4,
			onChange:function(value){
				formatterBuy(null);
				formatterSell(null);
			}
		});

		// 销售定金(收) 采购定金(付)
		$("#receiveRateAmount,#payRateAmount").numberbox({
			required:true,
			validType:'length[1,20]',
			precision:2
		});

		$("#receiveRateAmount").numberbox({
			required:true,
			validType:'length[1,20]',
			precision:2,
			editable:false
		});

		// 仓储费 运输费
		$("#bwarehouseCost,#btransportCost").numberbox({
			required:true,
			validType:'length[1,20]',

	function formatterBuy(value){
		if (!value){
			value = $("#bdealPrice").numberbox('getValue');

		var notax = parseFloat(value/1.13).toFixed(2);
		$("#bdealAmountNotax").numberbox('setValue',notax);
		var dealNumber = $("#dealNumber").numberbox('getValue');

			var totalAmount = parseFloat(value*dealNumber).toFixed(2);
			$("#btotalAmount").numberbox('setValue',totalAmount);
			$("#payRateAmount").numberbox('setValue',totalAmount*payRate);
		}
	}
	function formatterSell(value){
		if (!value){
			value = $("#sdealPrice").numberbox('getValue');
		}
		var dealNumber = $("#dealNumber").numberbox('getValue');
		var payRate = $("#receiveRate").combobox('getValue');
		if (dealNumber){
			var totalAmount = parseFloat(value*dealNumber).toFixed(2);
			$("#stotalAmount").numberbox('setValue',totalAmount);
			$("#receiveRateAmount").numberbox('setValue',totalAmount*payRate);
		}
		var transportCost_price = 0;
		var warehouseCost_price = 0;

		// 数量
		var total_number = $("#dealNumber").numberbox('getValue');

		var warehouseCost = $("#swarehouseCost").numberbox("getValue");
		var transportCost = $("#stransportCost").numberbox("getValue");
		var bwarehouseCost = $("#bwarehouseCost").numberbox("getValue");
		console.log('bwarehouseCost:' + bwarehouseCost);
		var btransportCost = $("#btransportCost").numberbox("getValue");
		console.log('btransportCost:' + btransportCost);
		// 上下游合计运输仓储费
		var t_warehouseCost = Number(warehouseCost) + Number(bwarehouseCost);
		var t_transportCost = Number(transportCost) + Number(btransportCost);

		if (t_transportCost){
			transportCost_price = t_transportCost/total_number;
		}
		if (t_warehouseCost){
			warehouseCost_price = t_warehouseCost/total_number;
		}
		// 销售单价 = 仓储费单价/1.06+运输费单价/1.09+加价+含税采购价
		if (t_transportCost){
			transportCost_price = transportCost/total_number;
		}
		if (t_warehouseCost){
			warehouseCost_price = warehouseCost/total_number;
		}
		var bdealPrice = $("#bdealPrice").numberbox("getValue");
		//加价
		var premiumAmount = value - Number(warehouseCost_price) - Number(transportCost_price) - Number(bdealPrice);
		if (premiumAmount<0){
			$("#premium").text().css({'border':'1px solid red'})
		}
		if(premiumAmount){
			$("#premium").numberbox('setValue',premiumAmount)
		}
	}

	// 计算销售价 销售总价
	function getDealPrice() {
		// 采购含税单价
		var premium = $("#premium").numberbox('getValue');
		if (isBlank(premium)) {
			premium = 0;
		}
		premium = Number(premium);
		var transportCost_price = 0;
		var warehouseCost_price = 0;

		// 数量
		var total_number = $("#dealNumber").numberbox('getValue');

		var warehouseCost = $("#swarehouseCost").numberbox("getValue");
		var transportCost = $("#stransportCost").numberbox("getValue");
		var bwarehouseCost = $("#bwarehouseCost").numberbox("getValue");
		console.log('bwarehouseCost:' + bwarehouseCost);
		var btransportCost = $("#btransportCost").numberbox("getValue");
		console.log('btransportCost:' + btransportCost);
		// 上下游合计运输仓储费
		var t_warehouseCost = Number(warehouseCost) + Number(bwarehouseCost);
		var t_transportCost = Number(transportCost) + Number(btransportCost);

		if (t_transportCost){
			transportCost_price = t_transportCost/total_number;
		}
		if (t_warehouseCost){
			warehouseCost_price = t_warehouseCost/total_number;
		}

		// 含税采购价
		var bdealPrice = $("#bdealPrice").numberbox("getValue");

		// 托盘时长
		var pallet_days = $("#pallet_days").numberbox("getValue");

		console.log("托盘时长：" + pallet_days);

		// 销售单价 = 仓储费单价/1.06+运输费单价/1.09+加价+含税采购价
		if (t_transportCost){
			transportCost_price = transportCost/total_number;
		}
		if (t_warehouseCost){
			warehouseCost_price = warehouseCost/total_number;
		}

		// 销售价 = 仓储费单价+运输费单价+加价+含税采购价
		var deal_price = premium + Number(warehouseCost_price) + Number(transportCost_price) + Number(bdealPrice);
		if (deal_price) {
			$("#sdealPrice").numberbox('setValue', deal_price);
		}

		// 收定金比例
		var receiveRate = $("#receiveRate").numberbox("getValue");

		// 托盘费用 = 销售单价 * 数量 * （1-定金比例）*0.00045 * 托盘时长
		var palletAmount = Number(deal_price) * Number(total_number) * (1 - Number(receiveRate)) * 0.00045 * Number(pallet_days);
		$("#pallet_amount").numberbox('setValue', palletAmount);
		console.log("托盘费用：" + palletAmount);

		// 销售总价 = 销售价 * 数量 + 托盘费用
		var sTotalAmount = Number(deal_price) * Number(total_number) + Number(palletAmount);
		if (sTotalAmount) {
			$("#stotalAmount").numberbox('setValue', sTotalAmount);
		}
	}

	/**

	function getGrossProfit() {
		console.log("getGrossProfit()=========================")
		// 采购合同总额
		var bAmount = $("#btotalAmount").numberbox('getValue');
		// 销售合同总额
		var sAmount = $("#stotalAmount").numberbox('getValue');
		if (bAmount != null && sAmount != null){
			// 运输费
			var transportCost_price = 0;
			// 仓库费
			var warehouseCost_price = 0;
			// 数量
			var total_number = $("#dealNumber").numberbox('getValue');
			console.log("数量 total_number : " + total_number);

			// 销售合同 仓储费用
			var warehouseCost = $("#swarehouseCost").numberbox("getValue");
			console.log("销售仓储费用 swarehouseCost : " + warehouseCost);

			// 销售合同 运输费用
			var transportCost = $("#stransportCost").numberbox("getValue");
			console.log("销售运输费用 stransportCost : " + transportCost);

			// 销售价
			var sellPrice = $("#sdealPrice").numberbox("getValue");
			console.log("销售价 sellPrice : " + sellPrice);

			// 采购价
			var buyPrice = $("#bdealPrice").numberbox("getValue");
			console.log("采购价 buyPrice : " + buyPrice);

			// 采购合同 仓储费用
			var bwarehouseCost = $("#bwarehouseCost").numberbox("getValue");
			console.log("采购仓储费用 bwarehouseCost : " + bwarehouseCost);

			// 采购合同 运输费用
			var btransportCost = $("#btransportCost").numberbox("getValue");
			console.log("采购运输费用 btransportCost : " + btransportCost);

			// 计算利润时，运输和仓储费用是采购和销售的合计
			var t_transportCost = Number(transportCost) + Number(btransportCost);
			var t_warehouseCost = Number(warehouseCost) + Number(bwarehouseCost);
			if (transportCost){
				transportCost_price = t_transportCost/total_number;
			}
			if (warehouseCost){
				warehouseCost_price = t_warehouseCost/total_number;
			}

			// 增值税 = ((销售价-采购价)/1.13*0.13-运费/1.09*0.09-仓储费/1.06*0.06)*数量
			var vatAmount = ((Number(sellPrice) - Number(buyPrice)) / 1.13 * 0.13 - Number(transportCost_price) / 1.09 * 0.09 - Number(warehouseCost_price) / 1.06 * 0.06) * Number(total_number);
			console.log("增值税 vatAmount : " + vatAmount);

			// 印花税= 销售价*数量*0.0003
			var printAmount = Number(sellPrice) * Number(total_number) / 1.13 * 0.0003;
			console.log("印花税 printAmount : " + printAmount);

			// 附加税 = 增值税 * 0.1
			var surtax = vatAmount * 0.1;
			console.log("附加税 surtax : " + surtax);

			// 利润 = 销售合同总价 - 采购合同总价-采购仓储费/1.06-采购运费/1.09- 增值税-附加税-印花税
			var grossProfit = Number(sAmount) - Number(bAmount) - Number(t_warehouseCost)/1.06 - Number(t_transportCost)/1.09 - Number(vatAmount) - Number(surtax) - Number(printAmount);
			console.log("利润 grossProfit : " + grossProfit);

			$("#grossProfit").val(Number(grossProfit).toFixed(2));
			var grossProfitRate = Number(grossProfit/bAmount*100).toFixed(2);
			$("#grossProfitRate").val(grossProfitRate);

			// 采购提成
			$("#buyCommission").val(Number(Number(grossProfit)*Number(0.08)).toFixed(2));
			// 销售提成
			$("#sellCommission").val(Number(Number(grossProfit)*Number(0.29)).toFixed(2));
			// 营销留存
			$("#marketingRetention").val(Number(Number(grossProfit)*Number(0.05)).toFixed(2));
			// 公司净利
			$("#companyCommission").val(Number(Number(grossProfit)*Number(0.54)).toFixed(2));
		}
	}

	//发起申请前操作
	function beforSaveOper(){
		// 若发货方式确定为我方配送，即采购端选择自提、销售端选择配送的，
		// 在预算新增时，一定要预先估算运输费用（包括运费与上车费合计）与仓储费用，若不录入运输费，则预算无法生成，仓储费可以不录入。
		if($("#buyDeliveryType").val() == 'Z' && $("#sellDeliveryType").val() == 'P'){
			var transportCost = $("#stransportCost").numberbox('getValue');
			if (isBlank(transportCost) || Number(transportCost) <= 0) {
				$.messager.alert('提示', '发货方式为我方配送,需预先估算运输费和仓储费（仓储费可以不录入）!出库时，可以调整运输和仓储费，但是只能往下调整', 'warning');
				return false;
			}
		}
		// 检验合同模板是否上传或选择
		var buyContract = $("#buyTemplateId").combobox('getValue');
		if ((isBlank(buyContract) && isBlank($("#buyContentTemplateId").val()))
				|| (buyContract == '-1' && isBlank($("#buyContentTemplateId").val()))
				) {
			$.messager.alert('提示','采购合同模板必须选择或上传!','warning');
			return false;
		}
		var sellContract = $("#sellTemplateId").combobox('getValue');
		if ((isBlank(sellContract) && isBlank($("#sellContentTemplateId").val()))
				|| (sellContract == '-1' && isBlank($("#sellContentTemplateId").val()))
			) {
			$.messager.alert('提示','销售合同模板必须选择或上传!','warning');
			return false;
		}

		//参数array
		var arr=new Array();
		var result={};
		var strB= Convert.getJson4Form("formB");
		var strS= Convert.getJson4Form("formS");
		arr.push(strB);
		arr.push(strS);

		//商品信息
		var resultData= Convert.ToJSONString(result);
		if($('#_easy_grid').length==0){
			$('#inputFormApprove').append('<input type="hidden" id="_easy_grid" name="_easy_grid">');
		}
		$('#_easy_grid').val(resultData);
		console.log("resultData:"+resultData);
		//基本数据

		if($("#contentStr").length==0){
			$('#inputFormApprove').append('<input type="hidden" id="contentStr" name="contentStr">');
		}
		var resultArr=Convert.ToJSONString(arr);
		$("#contentStr").val(resultArr);
		console.log("formData:"+resultArr);
		return true;
	}
	function fileUpload(fileBtn, fileId, filePath, filePlugin) {
		var $this = $('#' + fileId);
		// fileBtn:点击弹出选择文件事件的dom对象
		// filePath:文件上传成功后，保存的服务文件Id
		// --start-文件上传---
		var uploader = WebUploader.create({
			auto : true,
			// swf文件路径
			swf : _ctx + '/static/webuploader-0.1.5/Uploader.swf',
			// 文件接收服务端。
			server : _ctx + '/file/uploadFile',
			// 选择文件的按钮。可选。
			// 内部根据当前运行是创建，可能是input元素，也可能是flash.
			pick : '#' + fileBtn,
			// 不压缩image, 默认如果是jpeg，文件上传前会压缩一把再上传！
			resize : false,
			duplicate :true ,//true可重复上传，默认不可多次重复上传
			// 只允许选择图片文件。
			accept : {
				title : 'file',
				extensions : 'gif,jpg,jpeg,bmp,png,pdf,rar,zip,doc,docx,xlsx,xls',
//					mimeTypes :	"image/*"
// 				mimeTypes :	"image/jpg,image/jpeg,image/gif,image/bmp,image/png,application/pdf,application/rar,application/zip,application/msword,application/vnd.openxmlformats-officedocument.wordprocessingml.document"
				mimeTypes: "*"
			}
		});
		// 去掉文件上传组件样式，使用上传dom 自己样式
		$(".webuploader-pick").removeClass();

		uploader.on('beforeFileQueued', function(file) {
			$.messager.progress('close');
			if(file &&file.size > 10485760){
				$.messager.alert('tip',"上传文件不能超过10M!",'info');
				return false;
			}
		})

		// 当有文件添加进来的时候
		uploader.on('fileQueued', function(file) {
			$.messager.progress();
			//var $li = $('<div id="' + file.id + '" class="file-item thumbnail">' + '<img>' + '<div class="info">' + file.name + '</div>' + '</div>'), $img = $li.find('img');
		});

		// 文件上传成功，给item添加成功class, 用样式标记上传成功。
		uploader.on('uploadSuccess', function(file, response) {
			$.messager.progress('close');
			if(file &&file.size > 10485760){
				$.messager.alert('tip',"上传文件不能超过10M!",'info');
				return;
			}
			if(response && response.result){//上传成功
				// console.log("uploadSuccess", response);
				var fileId = response.fileId;

				// console.log("fileId", fileId);
				filePlugin.uploadSuccess(fileId);
				//加载附件列表
				filePlugin.load($this.val(),'#'+filePath);
				if (filePath == "upbtempPath"){
					upbtempBtnFun(false,true,false);
				}
				if (filePath == "upselltempPath"){
					upstempBtnFun(false,true,false);
				}
			}else{
				$.messager.alert('tip',"上传文件失败，失败信息："+ response._raw,'info');
			}

		});
		uploader.on('error',function(file){
			$.messager.progress('close');
			$.messager.alert('tip','文件格式不支持!','info');
		})
		// 文件上传失败，显示上传出错。
		uploader.on('file', function(file) {
			$.messager.progress('close');
			$.messager.alert('tip','文件上传失败,请重试!','info');
		});
		// --end-文件上传---
	}
