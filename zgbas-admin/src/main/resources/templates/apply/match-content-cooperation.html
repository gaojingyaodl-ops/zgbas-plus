			title: '电子合同',
			modal:true,
			closed: true,
			collapsible : false,
			minimizable : false,
			maximizable : false,
			cache:false
		});

		if (_curStatus == "A" || _curStatus == "D"){
			_$readonly = true;
			_$sell_readonly = true;
			_$buy_readonly = true;
			$(".cooperation").addClass("hide");
			$("#inputForm").find("input").not('.tags input').not("[type='button']").attr("readonly",true);

			var _buyTemplateId = $('#buyTemplateId').val();
			$(".upbtempBtnClass").hide();
			$(".bContractPreviewClass").show();
			$(".bContractPreviewClass").on("click",function () {
				Cooperation.printContract(_buyTemplateId,$("#buyApplyId").val());
			});

			var _sellTemplateId = $('#sellTemplateId').val();
			$(".upstempBtnClass").hide();
			$(".sContractPreviewClass").show();
			$(".sContractPreviewClass").on("click",function () {
				Cooperation.printContract(_sellTemplateId,$("#sellApplyId").val());
			});
		} else {
			var _createdUserId = $("#createdUserId").val();
			var _curr_user_id = $("#current_userId").val();
			var _cooperationUserId = $("#cooperationUserId").val();
			var _cooperationMode = $("#cooperationMode").val();
			if (!_createdUserId){
				_$buy_readonly = false;
				_$sell_readonly = false;
				_$readonly = false;
			} else if (_curr_user_id == _cooperationUserId && _cooperationMode == "B") {
				_$buy_readonly = true;
				_$readonly = true;
			} else if (_curr_user_id == _cooperationUserId && _cooperationMode == "S") {
				_$sell_readonly = true;
				_$readonly = true;
			} else if (_curr_user_id == _createdUserId && _cooperationMode == "B") {
				_$sell_readonly = true;
			} else if (_curr_user_id == _createdUserId && _cooperationMode == "S") {
				_$buy_readonly = true;
			} else {
				_$buy_readonly = true;
				_$sell_readonly = true;
			}
			if (hideApplyBtnFlg){
				$("#btn_apply").addClass("hide");
			}
		}

		// 初始化组件
		Cooperation.initComponent(_$readonly);
		// 采购、销售 明细显示逻辑
		Cooperation.handleHide(buyShowFlg, sellShowFlg);
	});

	//发起申请前操作
	function beforSaveOper() {
		// 校验合同模板是否上传
		if (!Cooperation.checkContractTemplate()) {
			return false;
		}

		//参数array
		var arr = new Array();
		var strB = Convert.getJson4Form("formB");
		var strS = Convert.getJson4Form("formS");
		arr.push(strB);
		arr.push(strS);

		//基本数据
		if ($("#contentStr").length == 0) {
			$('#inputFormApprove').append('<input type="hidden" id="contentStr" name="contentStr">');
		}
		var resultArr = Convert.ToJSONString(arr);
		$("#contentStr").val(resultArr);
		console.log("formData:" + resultArr);
		return true;
	}
