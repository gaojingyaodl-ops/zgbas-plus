<!--内部资金拆借-->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <link th:href="@{/static/ueditor/third-party/webuploader/webuploader.css}" type="text/css" rel="stylesheet"/>

</head>
<div class="easyui-layout" fit="true">
    <div id="inputForm" method="post" class="editForm_approve content_div">
        <input type="hidden" name="id" id="entityId" th:value="${entity.id}"/>
        <input type="hidden" name="status" id="entityStatus" th:value="${entity.status}"/>
        <input type="hidden" id="hashEdit" th:value="${psv.hasEdit}"/>
        <input type="hidden" id="contractApproveId"/>
        <input type="hidden" id="contractMatchCreditFlg"/>
        <!--		<div class="mb6">-->
        <!--			<p class="yw-table-filter">-->
        <!--				<label>申请人:</label>-->
        <!--				<input id="applyUserName" name="applyUserName" readonly type="text" th:value="${entity.applyUserName}"></input>-->
        <!--			</p>-->
        <!--		</div>-->
        <div class="mb6">

            <p class="yw-table-filter">
                <label>借款方:</label>
                <input name="borrower" required="required" readonly id="borrower" type="text"
                       th:value="${entity.borrower}"></input>
            </p>
            <p class="yw-table-filter ">
                <label>贷款方:</label>
                <input type="text" required="required" readonly name="lender" id="lender" th:value="${entity.lender}"/>
            </p>
        </div>
        <div class="mb6">
            <p class="yw-table-filter ">
                <label>申请日期:</label>
                <input name="applyDate" id="applyDate" class="easyui-datebox" readonly required="required"
                       th:value="${#dates.format(entity.applyDate,'yyyy-MM-dd')}"></input>
            </p>
            <p class="yw-table-filter ">
                <label>还款日期:</label>
                <input name="repaymentDate" readonly id="repaymentDate" class="easyui-datebox" required="required"
                       th:value="${#dates.format(entity.repaymentDate,'yyyy-MM-dd')}"></input>
            </p>
        </div>
        <div class="mb6">
            <p class="yw-table-filter">
                <label><i>*</i>金额(元):</label>
                <input name="repaymentAmount" readonly required="required" id="repaymentAmount"
                       onkeyup="value=value.replace(/^(\d*\.?\d{0,2}).*/,'$1')" type="number"
                       th:value="${entity.repaymentAmount} "></input>
            </p>
            <p class="yw-table-filter">
            <label><i>*</i>利息(元):</label>
            <input name="interest" required readonly id="interest" type="text" th:value="${entity.interest}"></input>
            </p>
            </p>
        </div>
        <div class="mb6">
            <div class="yw-table-filter">
                <label>用途:</label>
                <input name="applyuse" id="applyuse" readonly required type="text"
                       th:value="${entity.applyuse}"></input>
            </div>
            <div class="yw-table-filter">
                <label>备注:</label>
                <input name="remark" id="remark" readonly type="text" th:value="${entity.remark}"></input>
            </div>
        </div>
        <div class="mb6">
			<span class="upload-btn" id="btn_fileId">
               	 <a href="#" class="easyui-linkbutton file-upload" data-options="iconCls:'icon-upload'">上传附件 </a>
           	</span>
            <input class="control" id="fileId" name="fileId" type="hidden" th:value="${entity.fileId}"/>
            </p>
            <p class="controls showImg fileId" id="span_fileId"></p>
        </div>
    </div>
</div>

</div>
<script th:src="@{/static/ueditor/third-party/webuploader/webuploader.min.js}" type="text/javascript"></script>
<script th:src="@{/static/js/file.js?v=2}" type="text/javascript"></script>
<script th:src="@{/static/js/admin/apply_base.js}" type="text/javascript"></script>
<script type="text/javascript">

    var borrower = eval('[(${borrower})]');
    var lender = eval('[(${lender})]');
    // 附件类型
    var fileTypeJson = eval('[(${fileTypeJson})]');
    var filePlugin = new FilePlugin('#fileId', $('#entityId').val(), '/apply/invoiceReceived/updateFileId', [[${param.hasEditFile}]]);
    $(function () {
        $('#applyDate,#repaymentDate').datebox({
            required: true
        });
        $('#repaymentAmount,#interest').numberbox({
            required: true
        });

        $('.easyui-linkbutton').linkbutton();
        //加载附件列表
        filePlugin.load($('#fileId').val(), '#span_fileId');
        if ($('#btn_fileId').length > 0) {
            fileUpload("btn_fileId", "fileId");
        }

        $('#borrower').combobox({
            data: borrower,
            valueField: 'dictCd',
            textField: 'dictName',
            required: true,
            panelHeight: "auto",
            editable: false,
            onHidePanel: function () {
                BasCombobox.onHidePanel(this);
            },
            onLoadSuccess: function () {
                var value = $(this).val();

            }
        });
        $('#lender').combobox({
            data: lender,
            valueField: 'dictCd',
            textField: 'dictName',
            required: true,
            panelHeight: "auto",
            editable: false,
            onHidePanel: function () {
                BasCombobox.onHidePanel(this);
            },
            onLoadSuccess: function () {
                var value = $(this).val();

            }
        });


    });

</script>
