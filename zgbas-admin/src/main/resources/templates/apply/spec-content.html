<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
<link th:href="@{/static/ueditor/third-party/webuploader/webuploader.css}" type="text/css" rel="stylesheet" />

</head>
<div class="easyui-layout" fit="true">	
	<div id="inputForm" method="post" class="editForm_approve content_div" style="margin-bottom:20px">
	<div region="center" border="false">
		<div id="inputForm" method="post" class="editForm_approve content_div" style="margin-top: 10px;margin-bottom: 0;overflow:hidden;">
			<input type="hidden" name="id" id="entityId" th:value="${entity.id}" />
			<input type="hidden" id="entityStatus" th:value="${entity.status}" />
			<!-- <input type="hidden" name="contractId" id="contractId" th:value="${entity.contractId}" />
			<input type="hidden" id="bondAmount" th:value="${contract?.bondAmount}" />
			<input name="businessNo" id="businessNo"  type="hidden" th:value="${entity.businessNo}" /> -->
			<!-- <p class="p_text">
			<span class="input-colspan">
					<label>合同编号:</label>
					<input name="contractNo" id="contractNo" class="" readonly type="text" th:value="${entity.contractNo}"></input>
				</span>
			</p> -->
			<p  class="p_text">
				<span class="input-colspan">
					<label>合同名称:</label>
					<input name="contractName" id="contractName"  type="text" th:value="${entity.contractName}"></input>
				</span>
				<span class="input-colspan">
					<label>签订日期:</label>
					<input name="contractDate" id="contractDate" type="text" th:value="${#dates.format(entity.contractDate,'yyyy-MM-dd')}"></input>
				</span>
			</p>
			<p class="p_text">
				<span class="input-colspan2">
					<label>对方企业:</label>
					<input name="tarCompanyId" id="tarCompanyId"  type="hidden" th:value="${entity.tarCompanyId}"></input>
					<input name="tarCompanyName" id="tarCompanyName"  type="text" th:value="${entity.tarCompanyName}"></input>
				</span>
			</p>
			<p  class="p_text">
				<span class="input-colspan2">
					<label>备注:</label>
					<input name="remark" id="remark"  type="text" th:value="${entity.remark}"></input>
				</span>
			</p>
		</div>
		<div class="editForm"> 
			<p>
				<span class="upload-btn" id="btn_fileId">
				 	<i></i>
	               	<span>附件上传</span>
	           	</span>
				<input class="control" id="fileId" name="fileId" type="hidden" th:value="${entity.fileId}" />
			</p>
			<p class="controls showImg fileId" id="span_fileId"></p>
		</div>
</div>
</div>
</div>
<script th:src="@{/static/ueditor/third-party/webuploader/webuploader.min.js}" type="text/javascript"></script>
<script th:src="@{/static/js/file.js?v=2}" type="text/javascript"></script>
<script th:src="@{/static/js/admin/apply_base.js}" type="text/javascript"></script>
<script type="text/javascript">
var _curStatus = $('#entityStatus').val();
var filePlugin = new FilePlugin('#fileId',$('#entityId').val(),'/apply/spec/updateFileId',[[${param.hasEditFile}]]);
	$(function(){
		if(_curStatus == 'A'|| _curStatus == 'D'){
			$('#contractName').attr('readonly',true);
			$('#contractDate').attr('readonly',true);
			$('#tarCompanyName').attr('readonly',true);
			$('#remark').attr('readonly',true);
		}else{
			$('#contractDate').datebox({
				 required: true
			});
			
			$('#contractName').textbox({
				 required: true
			});
			var _companyId = $('#tarCompanyId').val();
			if(!_companyId){
				_companyId = 0;
			}
			$('#tarCompanyName').combobox({
				url:_ctx+"/bs/company/listMyCompany/"+ _companyId,
				mode:'remote',
				limitToList:true,
				valueField:'companyName',
				textField:'text',
				panelHeight:300,
				required:true,
				formatter: function(row){
					var text = row.text;
					var myFlag = row.myFlag;
					if (myFlag!=true){
						text = '<span style="color:#ccc">'+text+'</span>';
					}
					return text;
				},
				onSelect : function(node){
					var _id = node.id;
					$("#tarCompanyId").val(_id);
					//是否是我的企业
					var myFlag = node.myFlag;
					if (myFlag!=true){
						setTimeout(function () { $("#tarCompanyName").combobox("clear"); }, 1)
					}
				}
			});
		}
		//加载附件列表
		filePlugin.load($('#fileId').val(),'#span_fileId');
		if ($("#btn_fileId").length>0){
			fileUpload("btn_fileId", "fileId");
		}
	});	
</script>

</html>
