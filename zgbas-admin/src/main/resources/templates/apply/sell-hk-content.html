<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<div class="easyui-layout" id="inputForm" border="false" fit="true">
		<div region="north" border="false" method="post"  style="margin-bottom:10px;">
			<input type="hidden" name="id" id="entityId" th:value="${entity.id}" />
			<input type="hidden" id="entityStatus" th:value="${entity.status}" />
			<input type="hidden" id="businessType" name="businessType" th:value="${entity.businessType}">
			<input type="hidden" id="onLineFlg" th:value="${onLineFlg}">
			<input type="hidden" id="contractId" th:value="${entity.contractId}"/>
			<div id="btn" class="add-btn" th:if="${entity.status eq 'B' or entity.status eq 'N'}">
				<a id="addBtn" href="#" class="easyui-linkbutton btn-empty btn64" onClick="insert()">选择</a>
			</div>

			<table id="relaTable"
					title="" iconCls="icon-edit" singleSelect="true"
					idField="id">
			</table>
		</div>
	<div>
		<table id="relaTable" title="" iconCls="icon-edit" singleSelect="true" idField="id"></table>
	</div>

    <div data-options="region:'center',iconCls:'icon-ok'" fit="true">
    <!-- <input type="hidden" id="canApproveEdit" th:value="${psv.canApproveEdit}"/>       -->
        <div class="easyui-layout">
            <div data-options="region:'center'">

				<p class="p_text">
					<th:block th:replace="~{tags/apply :: contractNo (${#maps.containsKey(psv.mapEdit, 'contractNo')}?${psv.mapEdit['contractNo'].require}:true,${#maps.containsKey(psv.mapEdit, 'contractNo')}?${psv.mapEdit['contractNo'].edit && psv.hasApprove}:${ psv.hasEdit})}"/>
					<span class="input-colspan">
						<label>合同属性:</label>
						<input name="contractAttr" id="contractAttr" type="text"  required="required" th:value="${entity.contractAttr}"></input>
					</span>
					<span class="input-colspan">
						<label>交货时间:</label>
						<input name="deliveryTime" id="deliveryTime" th:value="${#dates.format(entity.deliveryTime,'yyyy-MM-dd')}"/>
						<input name="attachDeliveryTime" id="attachDeliveryTime" required="required" th:value="${entity.attachDeliveryTime}"/>
					</span>
				</p>

				<p class="p_text">
					<span class="input-colspan">
					<label>业务类型:</label>
					<input type="text" th:value="${business}" readonly="readonly"></input>
				</span>
					<span class="input-colspan">
						<label>合同总价(元):</label>
						<input name="totalAmount" id="totalAmount" type="text" th:value="${entity.totalAmount}" readonly="readonly"></input>
					</span>
					<span class="input-colspan">
						<label>质量标准:</label>
						<input name="qualityStandard" id="qualityStandard"  type="text" th:value="${entity.qualityStandard}"></input>
					</span>
					<span class="input-colspan">
						<label>成本毛利:</label>
						<input name="costProfit" id="costProfit"  type="text" readonly="readonly"></input>
					</span>
				</p>

				<p class="p_text">
					<span class="input-colspan2">
						<label>我方抬头:</label>
						<input name="ourCompanyName" id="ourCompanyName" type="text" readonly="readonly" th:value="${entity.ourCompanyName}"></input>
					</span>
					<!-- <th:block th:replace="~{tags/apply :: deliveryType (${#maps.containsKey(psv.mapEdit, 'deliveryType')}?${psv.mapEdit['deliveryType'].require},${#maps.containsKey(psv.mapEdit, 'deliveryType')}?${psv.mapEdit['deliveryType'].edit && psv.hasEdit}:${ psv.hasEdit},${deliveryTypeJson})}"/> -->
					<span class="input-colspan">
						<label>交货方式:</label>
						<input type="text" name="deliveryType" id="deliveryType" th:value="${entity.deliveryType}"/>
					</span>
					<span class="input-colspan">
						<label>结算方式:</label>
						<input type="text" name="deliveryMode" id="deliveryMode" readonly="readonly"th:value="${entity.deliveryMode}"/>
					</span>
				</P>

				<p class="p_text">
					<span class="input-colspan2">
						<label>交货地点:</label>
						<input id="shippingAddr" name="shippingAddr" th:value="${entity.shippingAddr}" type="text" required="required"></input>
					</span>
					<span class="input-colspan">
						<label>合同毛利:</label>
						<input name="grossProfit" id="grossProfit" type="text" th:value="${entity.grossProfit}"></input>
					</span>
					<span class="input-colspan">
						<label>差价:</label>
						<input name="differPrice" id="differPrice" type="text" th:value="${entity.differPrice}"></input>
					</span>
				</p>

				<p class="p_text">
					<span class="input-colspan4">
						<label>付款方式:</label>
						<input name="payMode" id="payMode"  type="text" th:value="${entity.payMode}"></input>
						<input name="payModeCode" id="payModeCode" type="hidden" th:value="${entity.payModeCode}"></input>
					</span>
				</p>

				<p class="p_text">
					<span class="input-colspan">
						<label>保证金(元):</label>
						<input type="text" name="bondAmount" id="bondAmount" th:value="${entity.bondAmount}" >
					</span>
					<span class="input-colspan">
						<label>收保证金时间:</label>
						<input  name="receiveBondTime" class="easyui-datebox" id="receiveBondTime" th:value="${#dates.format(entity.receiveBondTime,'yyyy-MM-dd')}">
					</span>
					<span class="input-colspan">
						<label>收全款时间:</label>
						<input  name="receiveFullTime" class="easyui-datebox" id="receiveFullTime" th:value="${#dates.format(entity.receiveFullTime,'yyyy-MM-dd')}">
					</span>
					<th:block th:replace="~{tags/apply :: receiveType (${#maps.containsKey(psv.mapEdit, 'receiveType')}?${psv.mapEdit['receiveType'].require},${#maps.containsKey(psv.mapEdit, 'receiveType')}?${psv.mapEdit['receiveType'].edit && psv.hasEdit}:${ psv.hasEdit},${payTypeJson},'')}"/>
				</p>

				<p class="p_text">
					<span class="input-colspan">
						<label>预估运输费(元):</label>
						<input name="transportCost" id="transportCost" onkeyup="value=value.replace(/^(\d*\.?\d{0,2}).*/,'$1')" type="text" th:value="${entity.transportCost}">
					</span>
					<span class="input-colspan">
						<label>预估仓储费(元):</label>
						<input name="warehouseCost" id="warehouseCost" onkeyup="value=value.replace(/^(\d*\.?\d{0,2}).*/,'$1')"  type="text" th:value="${entity.warehouseCost}"></input>
					</span>
					<span class="input-colspan2">
						<label>补充条款:</label>
						<input name="extraTerm" type="text" id="extraTerm" th:value="${entity.extraTerm}"></input>
					</span>
				</p>
				<p class="p_text">
					<span class="input-colspan2">
						<label>需货商名称:</label>
						<input name="companyName" id="companyName"  type="text" required="required" th:value="${entity.companyName}"></input>
						<input type="hidden" name="companyId" th:value="${entity.companyId}">
					</span>
					<span class="input-colspan2">
						<label>联系地址:</label>
						<input name="contactAddr" id="contactAddr" readonly="readonly" type="text" th:value="${entity.contactAddr}"></input>
					</span>
				</p>
				<div id="onLine" class="onlinStyle hide">注：该企业具备电子签约功能，将通过采购机器人完成电子签章！</div>
				<p class="p_text">
					<span class="input-colspan">
						<label>联系人:</label>
						<input name="contactName" id="contactName"  readonly="readonly" type="text" th:value="${entity.contactName}"></input>
					</span>
					<span class="input-colspan">
						<label>联系电话:</label>
						<input name="contactPhone" id="contactPhone"  readonly="readonly" type="text" th:value="${entity.contactPhone}"></input>
					</span>
					<span class="input-colspan2">
						<label>备注:</label>
						<input name="remark" id="remark" type="text" th:value="${entity.remark}"></input>
					</span>
				</p>

				<div class="editForm">
					<p>
						<span class="upload-btn" id="btn_fileId">
						 	<i></i>
			               	<span>附件上传</span>
			           	</span>
						<input class="control" id="fileId" name="fileId" type="hidden" th:value="${entity.fileId}" />
					</p>
					<p class="controls showImg fileId" id="span_fileId"></p>
				</div>
            </div>
        </div>
    </div>
	<div id="w_stock_choose" class="easyui-window" title="合同详情" data-options="width:1100,height:540"></div>
</div>
<script th:src="@{/static/ueditor/third-party/webuploader/webuploader.min.js}" type="text/javascript"></script>
<script th:src="@{/static/js/file.js?v=2}" type="text/javascript"></script>
<script type="text/javascript">
var lastIndex;
//var _companyJson = eval('[(${companyJson})]');
var _productType = eval('[(${productType})]');
var _payTypeJson = eval('[(${payTypeJson})]');
var _deliveryTypeJson = eval('[(${deliveryTypeJson})]');
var _deliveryModeJson = eval('[(${deliveryMode})]');
var _warehouseJson=eval('[(${warehouseJson})]');
var _productTypeJson=eval('[(${productTypeJson})]');
var _factoryJson=eval('[(${factoryJson})]');
var _productJson=eval('[(${productJson})]');
var _ourCompanyJson=eval('[(${ourCompanyJson})]');
var _contractAttrJson= eval('[(${contractAttr})]');
var packingSpecificaJson= eval('[(${packingSpecificaJson})]');
var filePlugin = new FilePlugin('#fileId',$('#entityId').val(),'/apply/sell/updateFileId',[[${param.hasEditFile}]]);
var _curStatus = $("#entityStatus").val();

var _qualityStandardJson = eval('[(${qualityStandardJson})]');
var _payModeJson = eval('[(${payModeJson})]');
var _attachDeliveryTimeJson = eval('[(${attachDeliveryTimeJson})]');

$(function(){
	$('#addBtn').linkbutton();
	var _url = _ctx+"/apply/productDetail/productList?search_EQS_applyType=S&search_EQL_applyId="+$("#entityId").val();
	var _curStatus = $("#entityStatus").val();
	var columns=[ [
		{field:'productCd',title:'品名',align:'center', width:150,
			formatter:function(value,row,index){
				return Convert.findTreeValueByKey(_productTypeJson,"id",value,"text");
		}},
		{field:'brandNumber',title:'牌号',align:'center', width:100},
		{field:'factoryName',title:'厂商',align:'center', width:150},
		{field:'warehouseName',title:'仓库',align:'center', width:150},
		{field:'warehousePos',title:'仓库所在地', width:160,align:'left',
			formatter:function(value,row,index){
				return Convert.findTreeValueByKey(_bsAreaJson,"id",value,"text");
		}},
		{field:'wrapSpecs',title:'包装规格',align:'center',width:120,
			formatter:function(value,row,index){
				return Convert.findTreeValueByKey(packingSpecificaJson,"dictCd",value,"dictName");
		}},
		{field:'warehousePrice',title:'仓储费/地区单价(元)', width:100,align:'left',hidden:'hidden'},
		{field:'productAttr',title:'在途/现货',align:'center', width:150,
			formatter:function(value,row,index){
				return Convert.findValueByKey(_productType,"dictCd",value,"dictName");}
		},
		{field:'maxNumber',title:'最大数量',width:100,hidden:true,editor:{type:'numberbox',options:{validType:'length[1,20]',precision:2}}},
		{field:'stockDetailId',title:'库存明细Id',width:100,hidden:true,editor:{type:'numberbox',options:{required:'true'}}},
		{field:'factoryId',title:'厂商Id',hidden:true},
		{field:'dealNumber',title:'数量(吨)',align:'right', width:95,editor:{type:'numberbox',options:{required:'true',validType:'length[1,20]',precision:4}},
			formatter: function (value, row, index) {
                if (row != null) {
                    return parseFloat(value).toFixed(3);
                }
		}},
		{field:'dealPrice',title:'单价(元)',align:'right', width:95,editor:{type:'numberbox',options:{required:'true',validType:'length[1,20]',precision:2}}},
		{field:'totalPrice',title:'总价(元)',align:'right', width:120,editor:{type:'numberbox',options:{required:'true',readonly:'true',validType:'length[1,20]',precision:2}}},
		{field:'otherDealPrice',title:'采购单价(元)',align:'right', width:95,hidden:true},
		{field:'stockContractId',title:'合同库存ID',align:'right', width:95,hidden:true},
		{field:'option',title:'操作', width:98,hidden:true, align:'center',formatter:function(value, row, index){
			var str = '<img onclick="remove(\''+row.id+'\',event,this)" style="cursor:pointer;width:16px;hight:18px" src="/static/images/icon_delete.png"/>';
	        return str;
		}}
	]];

	if (_industry.indexOf('SL')==-1){
		for(var i in columns[0]){
			var col =columns[0][i];
			if (col.field=='brandNumber' || col.field=='factoryName'){
				col.hidden = true;
			}

		}
	}
	setCostProfitValue();
	$('#relaTable').datagrid({
		rownumbers:true,
		url:_url,
		//pagination:true,
		//pageSize:50,
		columns:columns,
		//toolbar:'#btn',
		onLoadSuccess:function(data){
			if(_curStatus && _curStatus=='N'&&data.total==0){
				var new_row = {};
				$('#relaTable').datagrid('appendRow', new_row);
				var rowIndex=$('#relaTable').datagrid('getRowIndex',new_row);
				$('#relaTable').datagrid('beginEdit', rowIndex);
			}
		},
		onBeginEdit:function(index,row){

			var ed_dealNumber = $('#relaTable').datagrid('getEditor', {index:index,field:'dealNumber'});
			var ed_maxNumber = $('#relaTable').datagrid('getEditor', {index:index,field:'maxNumber'});
			var _maxNumber = $(ed_maxNumber.target).numberbox('getValue');
			if(""==_maxNumber){
				var ed_stockDetailId = $('#relaTable').datagrid('getEditor', {index:index,field:'stockDetailId'});
				var _stockDetailId = $(ed_stockDetailId.target).numberbox('getValue');
				if(_stockDetailId){
					$.post(_ctx+"/bas/stockDetail/list?search_EQL_id="+_stockDetailId,function(data){
						var row = eval('('+data+')').rows;
						$(ed_maxNumber.target).numberbox('setValue',row[0].availableNumber);
					});
				}

			}
			//数量
			$(ed_dealNumber.target).numberbox('textbox').on('blur',function(){

				var _dealNumber = $(ed_dealNumber.target).numberbox('getValue');
				if(parseFloat(_maxNumber)<parseFloat(_dealNumber)){
					$.messager.alert('提示','当前数量必须小于库存数量:'+_maxNumber+'吨','info');
					$(ed_dealNumber.target).numberbox('setValue',_maxNumber);
				}else{
					$(ed_dealNumber.target).numberbox('setValue',_dealNumber)
				}
			});


			curOper(index,row);
			lastIndex = index;
		},
		onClickCell:function(index,field){
			var rows =$('#relaTable').datagrid('getData').rows;
			var row =rows[index];
			if (_curStatus=='N'||_curStatus=='B'){
				if (lastIndex != index){
					$('#relaTable').datagrid('endEdit', lastIndex);
					$('#relaTable').datagrid('beginEdit', index);
				}
				lastIndex = index;
				Convert.focusEditor('relaTable',field,lastIndex);
			}
		},
		onDblClickRow:function(index,row,field){
			if (_curStatus=='N'||_curStatus=='B'||_curStatus=='C'){
				//进入可编辑状态
				$('#relaTable').datagrid('endEdit', lastIndex);
				$('#relaTable').datagrid('beginEdit', index);
				lastIndex = index;
				Convert.focusEditor("relaTable",field,lastIndex);
			}
		},
		onLoadSuccess:function(data){
			if(_curStatus && _curStatus=='N'&&data.total==0){
				var new_row = {id:0};
				$('#relaTable').datagrid('appendRow', new_row);
				var rowIndex=$('#relaTable').datagrid('getRowIndex',new_row);
				//lastIndex = rowIndex;
				$('#relaTable').datagrid('beginEdit', rowIndex);
			}else{
				var _productCode = data.rows[0].productCd
// 				if(_productCode.indexOf("SL")>=0){
// 					$('#relaTable').datagrid('showColumn', 'brandNumber');
// 				}else{
// 					$('#relaTable').datagrid('hideColumn', 'brandNumber');
// 				}
			}
		}
	});

	if(_curStatus&&(_curStatus=='N'||_curStatus=='B'||_curStatus=='C')){
		$('#relaTable').datagrid('showColumn', 'option');
		//交货时间deliveryTime
		$('#deliveryTime').datebox({
			editable:false,
			onSelect:function(record){
			 	var mDate=$("#deliveryTime").datebox('getValue');
			 	var dateFullTimeValue = $('#receiveFullTime').datebox('getValue');
				var curr_time = new Date();
				var sDate=myformatter(curr_time);
				var newcc = beForeDate(strDateForDate(mDate));
				if(mDate>sDate){
					$('#contractAttr').combobox('setValue', "F");
				}else{
					$('#contractAttr').combobox('setValue',"N");
				}

			 	var dateDeliveryTime = new Date(mDate);
			 	dateDeliveryTime.setDate(dateDeliveryTime.getDate() + 3);//交货时间后三天
				//收全款时间大于等于交货时间小于等于交货时间+3天
			  $('#receiveFullTime').datebox().datebox('calendar').calendar({
						validator: function(date){
			                return strDateForDate(mDate) <= date && date <= dateDeliveryTime;
			            }
					 });
				if(mDate >= dateFullTimeValue){
					/*  $('#receiveFullTime').datebox('setValue', beForeDate(strDateForDate(mDate))); */
					$('#receiveFullTime').datebox('setValue',mDate);
				}else{
					//相差小于三天，默认时间
					if(new Date(dateFullTimeValue).getDate() >dateDeliveryTime.getDate()){
						$('#receiveFullTime').datebox('setValue',mDate);
					} else {
						$('#receiveFullTime').datebox('setValue',dateFullTimeValue);
					}

				}
		 	}
		});
		//attachDeliveryTime
		$('#attachDeliveryTime').combobox({
			data:_attachDeliveryTimeJson,
			valueField:'dictCd',
			textField:'dictName',
			panelHeight:"auto",
			editable:false,
			required: true,
			onLoadSuccess:function(){
				if(!$(this).combobox('getValue')){
					$(this).combobox("setValue","LR");
				}
			},
			onSelect:function(record){
			 	if(record.dictCd == 'K'){
			 		$('#deliveryTime').datebox('clear');
			 		$('#deliveryTime').datebox({required:false});
			 		$("#inputForm").find("input[name='deliveryTime']").parent().addClass("hide");
			 	}else{
			 		var _value = $('#deliveryTime').datebox('getValue');
			 		$('#deliveryTime').datebox({required:true});
			 		$('#deliveryTime').datebox('setValue',_value);
			 		$("#inputForm").find("input[name='deliveryTime']").parent().removeClass("hide");
			 	}
		 	}
		});

		//合同属性
		$('#contractAttr').combobox({
			data:_contractAttrJson,
			valueField:'dictCd',
			textField:'dictName',
			panelHeight:"auto",
			editable:false,
			required: true,
			onLoadSuccess:function(){
				if(!$(this).combobox('getValue')){
					$(this).combobox("setValue","N");
					var curr_time = new Date();
					$("#deliveryTime").datebox('setValue',myformatter(curr_time));
				}
			}
		});

		// 质量标准
		$('#qualityStandard').combobox({
			data:_qualityStandardJson,
			valueField:'dictCd',
			textField:'dictName',
			panelHeight:"auto",
			required: true,
			editable: false,
			hasDownArrow:false,
			readonly:true
			/* onLoadSuccess:function(data){
				var value = $(this).val();
				if (!value){
					$(this).combobox('setValue',data[0].dictCd);
				}
			} */
		});

		//交货方式
		$('#deliveryType').combobox({
			data:_deliveryTypeJson,
			valueField:'dictCd',
			textField:'dictName',
			panelHeight:"auto",
			editable:false,
			onLoadSuccess:function(){
				var _this = $(this);
				var _val = _this.val();
				if(""==_val){
					_this.combobox("setValue","Z");
				}else{
					_this.combobox("setValue",_val);
				}
			}
		});

		//运输费仓储费
		$('#transportCost').numberbox({
			min:0,
		    precision:2,
		    required: true,
		    onChange:function(newValue,oldValue){
				var costProfit = $('#grossProfit').numberbox('getValue');
				var warehouseCost = $('#warehouseCost').numberbox('getValue');
				var num = Number(costProfit) - Number(newValue) - Number(warehouseCost);
				$('#costProfit').numberbox('setValue',num);
			}
		});
		$('#warehouseCost').numberbox({
			min:0,
		    precision:2,
		    required: true,
		    onChange:function(newValue,oldValue){
				var costProfit = $('#grossProfit').numberbox('getValue');
				var transportCost = $('#transportCost').numberbox('getValue');
				var num = Number(costProfit) - Number(newValue) - Number(transportCost);
				$('#costProfit').numberbox('setValue',num);
			}
		});

		//销售方式
		$('#deliveryMode').combobox({
			data:_deliveryModeJson,
			valueField:'dictCd',
			textField:'dictName',
			panelHeight:"auto",
			readonly:true,
			hasDownArrow:false,
			onLoadSuccess:function(){
				var _this = $(this);
				var _val = _this.val();
				if(""==_val){
					_this.combobox("setValue","XHHK");
				}else{
					_this.combobox("setValue",_val);
				}
			}
		});

		//供应商名称
		var _companyId = $('#companyId').val();
		if(!_companyId){
			_companyId = 0;
		}
		$('#companyName').combobox({
			url:_ctx+"/bs/company/listMyCompany/"+ _companyId,
			mode:'remote',
			limitToList:true,
			valueField:'companyName',
			textField:'text',
			panelHeight:300,
			formatter: function(row){
				var text = row.text;
				var myFlag = row.myFlag;
				if (myFlag!=true){
					text = '<span style="color:#ccc">'+text+'</span>';
				}
				return text;
			},
			onSelect : function(node){
				//是否是我的企业
				var myFlag = node.myFlag;
				var onLineFlg = node.onLineFlg;
				if (myFlag!=true){
					setTimeout(function () { $("#companyName").combobox("clear"); }, 1)
				}else{
					$("[name=companyId]").val(node.id);
					$("[name=companyName]").val(node.companyName);
					$("#contactName").val(node.contactName);
					$("#contactPhone").val(node.contactPhone);
					$("#contactAddr").val(node.address);
					if (onLineFlg==true){
						$('#onLine').removeClass("hide");
					}else{
						$('#onLine').addClass("hide");

//获取当前时间
function myformatter(date){
    var y = date.getFullYear();
    var m = date.getMonth()+1;
    var d = date.getDate();
    return y+'-'+(m<10?('0'+m):m)+'-'+(d<10?('0'+d):d);
}
//获取当前时间后一天
function beForeDate(date){
    var y = date.getFullYear();
    var m = date.getMonth()+1;
    var d = date.getDate()+1;
    return y+'-'+(m<10?('0'+m):m)+'-'+(d<10?('0'+d):d);
}

function formattData(date){
	var arr = date.split('-');
	var year = arr[0]

    var day = arr[2];
	return year + '年' + month + '月' + day + '日';
}
