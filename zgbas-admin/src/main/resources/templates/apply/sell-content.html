<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<div class="easyui-layout" id="inputForm" border="false" fit="true">
	<input type="hidden" name="id" id="entityId" th:value="${entity.id}" />
	<input type="hidden" id="entityStatus" th:value="${entity.status}" />
	<input type="hidden" id="businessType" name="businessType" th:value="${entity.businessType}">
	<input type="hidden" id="onLineFlg" th:value="${onLineFlg}">
	<input type="hidden" id="contractId" th:value="${entity.contractId}"/>
	<input type="hidden" id="applyType" name="applyType" th:value="${entity.applyType}" />
	<div id="btn" class="add-btn mb10" th:if="${entity.status eq 'B' or entity.status eq 'N'}">
		<a id="addBtn" href="#" class="easyui-linkbutton btn-empty btn64" onClick="insert()">选择</a>

		<a id="addBtnp" href="#" class="easyui-linkbutton btn-empty btn64 ml10" onClick="insertPresell()">预售</a>
	</div>

	<div class="mb10">
		<table id="relaTable" title="" iconCls="icon-edit" singleSelect="true" idField="id" style="width:99%;"></table>
	</div>
    <div class="mb6">
    	<!-- 合同编号 -->
    	<th:block th:replace="~{tags/apply :: contractNo (${#maps.containsKey(psv.mapEdit, 'contractNo')}?${psv.mapEdit['contractNo'].require}:true,${#maps.containsKey(psv.mapEdit, 'contractNo')}?${psv.mapEdit['contractNo'].edit && psv.hasApprove}:${ psv.hasEdit})}"/>
    	 <p class="yw-table-filter">
    	 	<label>合同总价(元):</label>
			<input name="totalAmount" id="totalAmount" type="text" th:value="${#numbers.formatDecimal(entity.totalAmount,1,'COMMA',2,'POINT')}" readonly="readonly"></input>
    	 </p>
    	  <p class="yw-table-filter w2">
    	 	<label>我方:</label>
			<input name="ourCompanyName" id="ourCompanyName" type="text" th:value="${entity.ourCompanyName}"></input>
    	 </p>
    </div>
    <div class="mb6">
    	<p class="yw-table-filter">
    		<label>业务类型:</label>
			<input type="text" id="business" th:value="${business}" readonly="readonly"></input>
    	</p>
    	<p class="yw-table-filter">
    		<label>合同属性:</label>
			<input name="contractAttr" id="contractAttr" type="text"  required="required" th:value="${entity.contractAttr}"></input>
    	</p>
    	<p class="yw-table-filter w2">
    		<label>需方:</label>
			<input name="companyName" id="companyName"  type="text" required="required" th:value="${entity.companyName}"></input>
			<input type="hidden" name="companyId" th:value="${entity.companyId}">
    	</p>
    </div>
    <div class="mb6">
    	<p class="yw-table-filter">
			<label>交货方式:</label>
			<input type="text" name="deliveryType" id="deliveryType" th:value="${entity.deliveryType}"/>
		</p>
		<p class="yw-table-filter">
			<label>质量标准:</label>
			<input name="qualityStandard" id="qualityStandard"  type="text" th:value="${entity.qualityStandard}"></input>
		</p>
		<p class="yw-table-filter profit_class">
			<label>毛利:</label>
			<input name="costProfit" id="costProfit"  type="text" readonly="readonly"></input>
		</p>
		<p class="yw-table-filter profit_class">
			<label>毛利率:</label>
			<input id="costProfitRate"  type="text" readonly="readonly"></input>
		</p>
		<p class="yw-table-filter hide">
			<label>合同毛利:</label>
			<input name="grossProfit" id="grossProfit" type="text" th:value="${#numbers.formatDecimal(entity.grossProfit,1,'COMMA',2,'POINT')}"></input>
		</p>
		<p class="yw-table-filter hide">
			<label>差价:</label>
			<input name="differPrice" id="differPrice" type="text" th:value="${#numbers.formatDecimal(entity.differPrice,1,'COMMA',2,'POINT')}"></input>
		</p>
    </div>
    <div class="mb6">
    	<p class="yw-table-filter">
			<label>运输费(元):</label>
			<input name="transportCost" id="transportCost" onkeyup="value=value.replace(/^(\d*\.?\d{0,2}).*/,'$1')" type="text" th:value="${#numbers.formatDecimal(entity.transportCost,1,'COMMA',2,'POINT')}"/>
    	</p>
    	<p class="yw-table-filter">
			<label>不含税运输费:</label>
			<input id="tax_transportCost" type="text" th:value="${entity.transportCost} == null ? '' : ${#numbers.formatDecimal(entity.transportCost/1.06,1,'COMMA',2,'POINT')}"/>
    	</p>
    	<p class="yw-table-filter">
			<label>仓储费(元):</label>
			<input name="warehouseCost" id="warehouseCost" onkeyup="value=value.replace(/^(\d*\.?\d{0,2}).*/,'$1')"  type="text" th:value="${#numbers.formatDecimal(entity.warehouseCost,1,'COMMA',2,'POINT')}"/>
    	</p>
    	<p class="yw-table-filter">
			<label>不含税仓储费:</label>
			<input id="tax_warehouseCost" type="text" th:value="${entity.warehouseCost} == null ? '' : ${#numbers.formatDecimal(entity.warehouseCost/1.06,1,'COMMA',2,'POINT')}"/>
    	</p>

    </div>
    <div class="mb6">
		<p class="yw-table-filter hide">
			<label>承运商</label>
			<input id="carrier" name="carrier" value="" type="text" th:value="${entity.carrier}"/>
		</p>
		<!-- 结算方式 -->
		<th:block th:replace="~{tags/apply :: deliveryMode (${#maps.containsKey(psv.mapEdit, 'deliveryMode')}?${psv.mapEdit['deliveryMode'].require},${#maps.containsKey(psv.mapEdit, 'deliveryMode')}?${psv.mapEdit['deliveryMode'].edit && psv.hasEdit}:${ psv.hasEdit},${deliveryMode},'结算方式')}"/>

		<th:block th:replace="~{tags/apply :: receiveType (${#maps.containsKey(psv.mapEdit, 'receiveType')}?${psv.mapEdit['receiveType'].require},${#maps.containsKey(psv.mapEdit, 'receiveType')}?${psv.mapEdit['receiveType'].edit && psv.hasEdit}:${ psv.hasEdit},${payTypeJson},'')}"/>
    	<p class="yw-table-filter">
			<label>交货日期:</label>
			<input name="deliveryTime" id="deliveryTime" th:value="${#dates.format(entity.deliveryTime,'yyyy-MM-dd')}"/>
		</p>
		<p class="yw-table-filter">
			<input name="attachDeliveryTime" id="attachDeliveryTime" required="required" th:value="${entity.attachDeliveryTime}"/>
		</p>
    </div>
    <div class="mb6">
    	<p class="yw-table-filter">
			<label>定金比例:</label>
			<input type="text" name="receiveRate" id="receiveRate" th:value="${entity.receiveRate}" >
		</p>
		<p class="yw-table-filter">
			<label>定金(元):</label>
			<input type="text" name="bondAmount" id="bondAmount" th:value="${#numbers.formatDecimal(entity.bondAmount,1,'COMMA',2,'POINT')}" >
		</p>
<!--		shaoanwei 因：新建自营预算没有此文本框，新建后查看却有-->
		<p class="yw-table-filter">
			<label>收定金日期:</label>
			<input name="receiveBondTime" class="easyui-datebox" id="receiveBondTime" th:value="${#dates.format(entity.receiveBondTime,'yyyy-MM-dd')}">
		</p>
		<p class="yw-table-filter">
			<label>收款期:</label>
			<input  name="receiveFullTime" class="easyui-datebox" id="receiveFullTime" th:value="${#dates.format(entity.receiveFullTime,'yyyy-MM-dd')}">
		</p>
    </div>
    <div class="mb6">
    	<p class="yw-table-filter w2">
			<label>联系地址:</label>
			<input name="contactAddr" id="contactAddr" readonly="readonly" type="text" th:value="${entity.contactAddr}"></input>
		</p>
		<p class="yw-table-filter w2">
			<label>补充条款:</label>
			<input name="extraTerm" type="text" id="extraTerm" th:value="${entity.extraTerm}"></input>
		</p>
    </div>
    <div class="mb6">
    	<p class="yw-table-filter w2">
			<label>交货地点:</label>
			<input id="shippingAddr" name="shippingAddr" th:value="${entity.shippingAddr}" type="text" required="required"></input>
		</p>
		<p class="yw-table-filter">
			<label>联系人:</label>
			<input name="contactName" id="contactName"  readonly="readonly" type="text" th:value="${entity.contactName}"></input>
		</p>
		<p class="yw-table-filter">
			<label>联系电话:</label>
			<input name="contactPhone" id="contactPhone"  readonly="readonly" type="text" th:value="${entity.contactPhone}"></input>
		</p>
    </div>
    <div class="mb6">
    	<p class="yw-table-filter w2">
			<label>备注:</label>
			<input name="remark" id="remark" type="text" th:value="${entity.remark}"></input>
		</p>
    </div>

	<div class="editForm">
		<p style="width:240px">
			<span class="upload-btn" id="btn_fileId">
               	 <a href="#" class="easyui-linkbutton file-upload" data-options="iconCls:'icon-upload'">上传附件 </a>
           	</span>
			<input class="control" id="fileId" name="fileId" type="hidden" th:value="${entity.fileId}" />
		</p>
		<p class="controls showImg fileId" id="span_fileId"></p>
	</div>
</div>

function parseColumn(productCode, index, preFlg) {
	var ed_brandNumber = $('#relaTable').datagrid('getEditor', {index: index, field: 'brandNumber'});
	var ed_factoryId = $('#relaTable').datagrid('getEditor', {index: index, field: 'factoryId'});
	if (productCode.indexOf("HG") >= 0 || productCode.indexOf("AL") >= 0) {
		if (preFlg == false) {
			$(ed_brandNumber.target).combobox({
				required: false,
				hidden: true,
				value: ''
			});
			$(ed_factoryId.target).combobox({
				required: false,
				hidden: true,
				value: ''
			});
			$('#relaTable').datagrid('hideColumn', 'factoryId');
		} else {
			$('#relaTable').datagrid('hideColumn', 'factoryName');
		}
		$('#relaTable').datagrid('hideColumn', 'brandNumber');
	} else {
		if (preFlg == false) {
			$(ed_brandNumber.target).combobox({
				required: true,
				hidden: false
			});
			$(ed_factoryId.target).combobox({
				required: true,
				hidden: false
			});
			$('#relaTable').datagrid('showColumn', 'factoryId');
		} else {
			$('#relaTable').datagrid('showColumn', 'factoryName');
		}
		$('#relaTable').datagrid('showColumn', 'brandNumber');
	}
}

//获取当前日期
function myformatter(date){
    var y = date.getFullYear();
    var m = date.getMonth()+1;
    var d = date.getDate();
    return y+'-'+(m<10?('0'+m):m)+'-'+(d<10?('0'+d):d);
}

function strDateForDate(str){
	var strDate = str.split(" ");
	var strDatepart = strDate[0].split("-");
	var dtDate = new Date(strDatepart[0],strDatepart[1]-1,strDatepart[2]);
	return dtDate;
}

		if (dict_Cd == dictCd){
			_array.splice(i,1);

		}
	}

}
function getCostProfitRate(costProfit){
	var totalAmount = $('#totalAmount').val();
	totalAmount = parseFloat(String(totalAmount).replace(/,/g, ''));
	if (totalAmount){
		var costProfitRate = Number(costProfit/totalAmount).toFixed(4);
		if (costProfitRate != null && costProfitRate != 'NaN'){
			$('#costProfitRate').val(costProfitRate);
		}
		if (costProfitRate != null && costProfitRate < 0){
			console.log('color','红色')
			$('#costProfit').numberbox('textbox').css('color','#ff6666');
		}else{
			$('#costProfit').numberbox('textbox').css('color','#4d4d4d');
		}
	}
}
function getCostProfit(costProfit,transAmount,warehouseAmunt){
	if(costProfit) {
		costProfit = parseFloat(String(costProfit).replace(/,/g, ''));
	}
	if(transAmount) {
		transAmount = parseFloat(String(transAmount).replace(/,/g, ''));
	}
	if(warehouseAmunt) {
		warehouseAmunt = parseFloat(String(warehouseAmunt).replace(/,/g, ''));
	}
	var totalAmount = $('#totalAmount').val();
	if(totalAmount) {
		totalAmount = parseFloat(String(totalAmount).replace(/,/g, ''));
	}
	//增值税=毛利/1.13*0.13
	var vatAmount = Number(costProfit/1.13*0.13).toFixed(4);
	//附加税=增值税*0.12
	var extraAmount = Number(vatAmount*0.12).toFixed(4);
	//印花税=含税销售收入*3/10000
	var printAmount = Number(totalAmount*3/10000).toFixed(4);
	//资金成本=含税采购成本*（销售回款时间-采购付款时间）*0.0002
	//仓储运输费
	var warehouseTransAmount = Number(transAmount/1.09+warehouseAmunt/1.06).toFixed(4);
	var _cost_profit = Number(costProfit-vatAmount-extraAmount-printAmount-warehouseTransAmount).toFixed(2);
	// $('#costProfit').val(_cost_profit);
	$('#costProfit').numberbox('setValue',_cost_profit);
	getCostProfitRate(_cost_profit);
	return _cost_profit;
}
