<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
	<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
	<title>资金方充值申请</title>
</head>

<div class="easyui-layout" id="inputForm" border="false" fit="true">
	<input type="hidden" name="id" id="entityId" th:value="${entity.id}" />
	<input type="hidden" id="entityStatus" th:value="${entity.status}" />
	<div class="mb6">
		<p class="yw-table-filter w2">
			<label>资金方名称:</label>
			<input name="fundCompanyName" id="fundCompanyName" th:value="${entity.fundCompanyName}" type="text"></input>
			<input name="fundCompanyId" id="fundCompanyId" th:value="${entity.fundCompanyId}" type="hidden"></input>
		</p>
		<p class="yw-table-filter w2">
			<label for="ourCompanyName"  class="control-label">我方抬头:</label>
			<input name="ourCompanyName" id="ourCompanyName" th:value="${entity.ourCompanyName}" type="text" />
		</p>
	</div>
	<div class="mb6">
		<p class="yw-table-filter w2">
			<label>期初金额:</label>
			<input name="initialAmount" id="initialAmount" th:value="${entity.initialAmount}" type="text"></input>
		</p>
		<p class="yw-table-filter w2">
			<label>充值金额:</label>
			<input name="rechargeAmount" id="rechargeAmount" th:value="${entity.rechargeAmount}" type="text"></input>
		</p>
	</div>
	<div class="mb6">
		<p class="yw-table-filter w2">
			<label>期末金额:</label>
			<input name="ultimateAmount" id="ultimateAmount" th:value="${entity.ultimateAmount}" type="text"></input>
		</p>
	</div>
	<div class="mb6">
		<p class="yw-table-filter w4">
			<label>备注:</label>
			<input name="remark" id="remark" th:value="${entity.remark}" type="text"></input>
		</p>
	</div>
	<div class="editForm">
		<p style="width:240px">
			<span class="upload-btn" id="btn_fileId">
               	 <a href="#" class="easyui-linkbutton file-upload" data-options="iconCls:'icon-upload'">上传附件 </a>
           	</span>
			<input class="control" id="fileId" name="fileId" type="hidden" th:value="${entity.fileId}" />
		</p>
		<p class="controls showImg fileId" id="span_fileId"></p>
	</div>
</div>
<script th:src="@{/static/ueditor/third-party/webuploader/webuploader.min.js}" type="text/javascript"></script>
<script th:src="@{/static/js/file.js?v=2}" type="text/javascript"></script>
<script th:src="@{/static/js/admin/apply_base.js?v=1}"  type="text/javascript"></script>
<script type="text/javascript">
	var filePlugin = new FilePlugin('#fileId',$('#entityId').val(),'/apply/fundRecharge/updateFileId',[[${param.hasEditFile}]]);
	var _curStatus = '[[${status}]]';
	var fundCompanyListJson = eval('[(${fundCompanyListJson})]');
	var _funderOurCompanyNameJson = eval('[(${funderOurCompanyNameJson})]');
	var fundAmountQg = 0;
	var fundAmountWs = 0;
	$(function(){
		//加载附件列表
		$('.easyui-linkbutton').linkbutton();
		filePlugin.load($('#fileId').val(),'#span_fileId');
		if ($('#btn_fileId').length>0){
			fileUpload("btn_fileId", "fileId");
		}
		var _curStatus = $("#entityStatus").val();
		$("#rechargeAmount").numberbox({
			required: true,
			readonly: false,
			validType: 'length[1,20]',
			precision: 2,
			onChange: function (){
				let _initialAmount = $("#initialAmount").numberbox("getValue");
				let _rechargeAmount = $("#rechargeAmount").numberbox("getValue");
				let _value = (Number(_initialAmount) + Number(_rechargeAmount)).toFixed(2);
				$("#ultimateAmount").numberbox("setValue", _value);
			},
			parser: function(val) {
				// 解析时去除千分位分隔符
				if(val) {
					return parseFloat(String(val).replace(/,/g, ''));
				} else {
					if(isNaN(val)) {
						return '';
					} else {
						return val;
					}
				}
			},
			formatter: function(val) {
				if (val || val === 0) {
					val = parseFloat(val).toFixed(2).toString().split(".");
					val[0] = val[0].replace(new RegExp('(\\d)(?=(\\d{3})+$)', 'ig'), "$1,");
					return val.join(".");
				} else {
					if(isNaN(val)){
						return ""
					} else {
						return val;
					}
				}
			}
		});

		$("#initialAmount,#ultimateAmount").numberbox({
			required: true,
			readonly: true,
			validType: 'length[1,20]',
			precision: 2,
			parser: function(val) {
				// 解析时去除千分位分隔符
				if(val) {
					return parseFloat(String(val).replace(/,/g, ''));
				} else {
					if(isNaN(val)) {
						return '';
					} else {
						return val;
					}
				}
			},
			formatter: function(val) {
				if (val || val === 0) {
					val = parseFloat(val).toFixed(2).toString().split(".");
					val[0] = val[0].replace(new RegExp('(\\d)(?=(\\d{3})+$)', 'ig'), "$1,");
					return val.join(".");
				} else {
					if(isNaN(val)){
						return ""
					} else {
						return val;
					}
				}
			}
		});
		if (_curStatus && (_curStatus == 'N' || _curStatus == 'B' || _curStatus == 'C')) {
			$('#ourCompanyName').combobox({
				data:_funderOurCompanyNameJson,
				valueField:'dictName',
				textField:'dictName',
				panelHeight:"auto",
				editable:false,
				required:true,
				onLoadSuccess:function(data){

				},
				onSelect : function(node){
					var value = node.dictName;
					if (value === '青岛中光亿云供应链管理有限公司') {
						$("#initialAmount").numberbox("setValue", fundAmountQg);
					} else if (value === "网塑（宁波）供应链管理有限公司") {
						$("#initialAmount").numberbox("setValue", fundAmountWs);
					}
				}
			});
			$("#fundCompanyName").combobox({
				data: fundCompanyListJson,
				valueField: 'companyName',
				textField: 'companyName',
				panelHeight: "auto",
				editable: false,
				required: true,
				onLoadSuccess: function(data) {
					if (data && !$(this).combobox("getValue")){
						$(this).combobox("setValue", data[0].companyName);
					}
				},
				onSelect: function (node) {
					$("#fundCompanyId").val(node.id);
					fundAmountQg = node.fundAmountQg ? node.fundAmountQg : 0;
					fundAmountWs = node.fundAmountWs ? node.fundAmountWs : 0
					var ourCompanyName = $('#ourCompanyName').combobox("getValue");
					if ('青岛中光亿云供应链管理有限公司' === ourCompanyName) {
						$("#initialAmount").numberbox("setValue", fundAmountQg);
					} else if ('网塑（宁波）供应链管理有限公司' === ourCompanyName) {
						$("#initialAmount").numberbox("setValue", fundAmountWs);
					}

				}
			});

		} else {
			$("#inputForm").find("input").not('.tags input').not("[type='button']").attr("readonly", true);
			// $("#fundCompanyName").combobox({readonly: true});
		}
		_beforSaveOper = true;
	});
	//发起申请前操作
	function beforSaveOper() {
		return true;
	}
</script>
