	fileEditFlg = true;
}else{
	fileEditFlg = false;
}

//
var _productChildrenJson = eval('[(${productChildrenJson})]');
//牌号名称

//厂商列表

//合同类型

//付款方式
var _payTypeJson= eval('[(${payTypeJson})]');
//结算方式

var _contractAttrJson= eval('[(${contractAttr})]');

//默认交货地址

function CommissionRate(businessCommissionRate,
						buyCommissionRate,
						sellCommissionRate,
						marketingRetentionRate,
						companyCommissionRate,
						productCd) {
	this.businessCommissionRate = businessCommissionRate;
	this.buyCommissionRate = buyCommissionRate;
	this.sellCommissionRate = sellCommissionRate;
	this.marketingRetentionRate = marketingRetentionRate;
	this.companyCommissionRate = companyCommissionRate;
	this.productCd = productCd;
}

// 品种提成比例
var productCommissionRate = [];

$(function(){
	var _stock_virtual_id = $("#stockVirtualId").val();
	if (_stock_virtual_id && _stock_virtual_id > 0){
		_buyVirtualFlg = true;
	}
	buyApplyId = $("#buyApplyId").val();
	sellApplyId = $("#sellApplyId").val();
	filePlugin.load($('#buyContentTemplateId').val(),'#upbtempPath');
	if ($("#buyContentTemplateId").length>0){
		fileUpload("upbtempBtn", "buyContentTemplateId", "upbtempPath", filePlugin);
	}

	sellFilePlugin.load($('#sellContentTemplateId').val(),'#upselltempPath');
	if ($("#sellContentTemplateId").length>0){
		fileUpload("upstempBtn", "sellContentTemplateId", "upselltempPath", sellFilePlugin);
	}
	//采购定金(付)
	$("#payRateAmount").numberbox({
		validType:'length[1,20]',
		precision:2,
		editable:false,
		onChange:function (value) {
			if (Number(value)>0){
				var buyDate = new Date();
				var date=$('#buyPayBondTime').val();
				if(date==undefined ||date ==""||date==null) {
					$('#buyPayBondTime').datebox("setValue",buyDate.toLocaleDateString());

// 下游销售单价（发起时预估）= 上游采购单价 + 上游采购单价*托盘利率 * 托盘天数
function formatterSellPrice(){
	let bdealPrice = $("#bdealPrice").val();
	let tpRate = $("#tpRate").val();
	let tpDays = $("#tpDays").val();
	if (bdealPrice && tpRate && tpDays) {
		let sdealPrice = bdealPrice*(1+tpRate*tpDays)
		$("#sdealPrice").numberbox('setValue', sdealPrice);
	}
}
// 如果是化工品就清空：牌号、厂商、包装规格的必填项
function clearRequired(productCd){
	let hgFlag = productCd.slice(0,2);
	// 如果是化工品，则不需要填地址（省份、市等），牌号，厂商、包装规格
	if (hgFlag === 'HG') {
		$('#wrapSpecs,#factoryName,#brandNumber').combobox({
			required: false
		});
	}else{
		$('#wrapSpecs,#factoryName,#brandNumber').combobox({
			required: true
		});
	}
}
function formatterBuy(value){
	if (!value){
		value = $("#bdealPrice").numberbox('getValue');
	}
	var notax = parseFloat(value/1.13).toFixed(2);
	$("#bdealAmountNotax").numberbox('setValue',notax);
	var dealNumber = $("#dealNumber").numberbox('getValue');
	if (dealNumber){
		var totalAmount = parseFloat(value*dealNumber).toFixed(2);
		$("#btotalAmount").numberbox('setValue',totalAmount);
	}
}
function formatterSell(value){
	if (!value){
		value = $("#sdealPrice").numberbox('getValue');
	}
	var dealNumber = $("#dealNumber").numberbox('getValue');
	if (dealNumber){
		var totalAmount = parseFloat(value*dealNumber).toFixed(2);
		$("#stotalAmount").numberbox('setValue',totalAmount);

		let bdealPrice = $("#bdealPrice").val();
		let tpRate = $("#tpRate").val();
		let tpDays = $("#tpDays").val();
		var approveTpInterest = bdealPrice*tpRate*tpDays*dealNumber;
		$("#approveTpInterest").numberbox('setValue', approveTpInterest);
	}
}

// 计算销售价 销售总价
function getDealPrice() {
	// 采购含税单价
	var premium = $("#premium").numberbox('getValue');
	if (isBlank(premium)) {
		premium = 0;
	}
	premium = Number(premium);
	var transportCost_price = 0;
	var warehouseCost_price = 0;
	var total_number = $("#dealNumber").numberbox('getValue');
	// 销售价 = 仓储费单价+运输费单价+加价+含税采购价
	var warehouseCost = $("#swarehouseCost").numberbox("getValue");
	var transportCost = $("#stransportCost").numberbox("getValue");
	if (transportCost){
		transportCost_price = transportCost/total_number;
	}
	if (warehouseCost){
		warehouseCost_price = warehouseCost/total_number;
	}
	var bdealPrice = $("#bdealPrice").numberbox("getValue");
	// 销售价 = 仓储费单价+运输费单价+加价+含税采购价
	var deal_price = premium + Number(warehouseCost_price) + Number(transportCost_price) + Number(bdealPrice);
	if (deal_price) {
		$("#sdealPrice").numberbox('setValue', deal_price);
	}

	// 销售总价 = 销售价 * 数量
	var sTotalAmount = Number(deal_price) * Number($("#dealNumber").numberbox("getValue"));
	if (sTotalAmount) {
		$("#stotalAmount").numberbox('setValue', sTotalAmount);
	}
}

function getGrossProfit() {
	var bAmount = $("#btotalAmount").numberbox('getValue');
	var sAmount = $("#stotalAmount").numberbox('getValue');
	if (bAmount != null && sAmount != null){
		// 运输费
		var transportCost_price = 0;
		// 仓库费
		var warehouseCost_price = 0;
		// 数量
		var total_number = $("#dealNumber").numberbox('getValue');

		var warehouseCost = $("#swarehouseCost").numberbox("getValue");
		var transportCost = $("#stransportCost").numberbox("getValue");

		// 销售价
		var sellPrice = $("#sdealPrice").numberbox("getValue");
		// 采购价
		var buyPrice = $("#bdealPrice").numberbox("getValue");

		var bwarehouseCost = $("#bwarehouseCost").numberbox("getValue");
		var btransportCost = $("#btransportCost").numberbox("getValue");


		var t_transportCost = Number(transportCost) + Number(btransportCost);
		var t_warehouseCost = Number(warehouseCost) + Number(bwarehouseCost);
		if (transportCost){
			transportCost_price = t_transportCost/total_number;
		}
		if (warehouseCost){
			warehouseCost_price = t_warehouseCost/total_number;
		}

		// 增值税 = ((销售价-采购价)/1.13*0.13-运费/1.09*0.09-仓储费/1.06*0.06)*数量
		var vatAmount = ((Number(sellPrice) - Number(buyPrice)) / 1.13 * 0.13 - Number(transportCost_price) / 1.09 * 0.09 - Number(warehouseCost_price) / 1.06 * 0.06) * Number(total_number);
		// 印花税= 销售价*数量*0.0003
		var printAmount = Number(sellPrice) * Number(total_number) / 1.13 * 0.0003;
		// 附加税 = 增值税 * 0.1
		var surtax = vatAmount * 0.1;


		// 利润 = 销售合同总价 - 采购合同总价-采购仓储费/1.06-采购运费/1.09- 增值税 - 附加税 -印花税
		var grossProfit = Number(sAmount) - Number(bAmount) - Number(t_warehouseCost) / 1.06 - Number(t_transportCost) / 1.09 - Number(vatAmount) - Number(surtax) - Number(printAmount);
		$("#grossProfit").val(Number(grossProfit).toFixed(2));
		var grossProfitRate = Number(grossProfit/bAmount*100).toFixed(2);
		$("#grossProfitRate").val(grossProfitRate);

		// 采购提成
		$("#buyCommission").val(Number(Number(grossProfit)*Number(0.08)).toFixed(2));
		// 销售提成
		$("#sellCommission").val(Number(Number(grossProfit)*Number(0.29)).toFixed(2));
		// 营销留存
		$("#marketingRetention").val(Number(Number(grossProfit)*Number(0.05)).toFixed(2));
		// 公司净利
		$("#companyCommission").val(Number(Number(grossProfit)*Number(0.54)).toFixed(2));
	}
}

function fileUpload(fileBtn, fileId, filePath, filePlugin) {
	var $this = $('#' + fileId);
	// fileBtn:点击弹出选择文件事件的dom对象
	// filePath:文件上传成功后，保存的服务文件Id
	// --start-文件上传---
	var uploader = WebUploader.create({
		auto : true,
		// swf文件路径
		swf : _ctx + '/static/webuploader-0.1.5/Uploader.swf',
		// 文件接收服务端。
		server : _ctx + '/file/uploadFile',
		// 选择文件的按钮。可选。
		// 内部根据当前运行是创建，可能是input元素，也可能是flash.
		pick : '#' + fileBtn,
		// 不压缩image, 默认如果是jpeg，文件上传前会压缩一把再上传！
		resize : false,
		duplicate :true ,//true可重复上传，默认不可多次重复上传
		// 只允许选择图片文件。
		accept : {
			title : 'file',
			extensions : 'gif,jpg,jpeg,bmp,png,pdf,rar,zip,doc,docx,xlsx,xls',
//					mimeTypes :	"image/*"
// 			mimeTypes :	"image/jpg,image/jpeg,image/gif,image/bmp,image/png,application/pdf,application/rar,application/zip,application/msword,application/vnd.openxmlformats-officedocument.wordprocessingml.document"
			mimeTypes: "*"
		}
	});
	// 去掉文件上传组件样式，使用上传dom 自己样式
	$(".webuploader-pick").removeClass();

	uploader.on('beforeFileQueued', function(file) {
		$.messager.progress('close');
		if(file &&file.size > 10485760){
			$.messager.alert('tip',"上传文件不能超过10M!",'info');
			return false;
		}
	})

	// 当有文件添加进来的时候
	uploader.on('fileQueued', function(file) {
		$.messager.progress();
		//var $li = $('<div id="' + file.id + '" class="file-item thumbnail">' + '<img>' + '<div class="info">' + file.name + '</div>' + '</div>'), $img = $li.find('img');
	});

	// 文件上传成功，给item添加成功class, 用样式标记上传成功。
	uploader.on('uploadSuccess', function(file, response) {
		$.messager.progress('close');
		if(file &&file.size > 10485760){
			$.messager.alert('tip',"上传文件不能超过10M!",'info');
			return;
		}
		if(response && response.result){//上传成功
			// console.log("uploadSuccess", response);
			var fileId = response.fileId;
			// console.log("fileId", fileId);
			filePlugin.uploadSuccess(fileId);
			//加载附件列表
			filePlugin.load($this.val(),'#'+filePath);
			filePlugin.load($this.val(),'#'+filePath);
			if (filePath == "upbtempPath"){
				upbtempBtnFun(false,true,false);
			}
			if (filePath == "upselltempPath"){
				upstempBtnFun(false,true,false);
			}
		}else{
			$.messager.alert('tip',"上传文件失败，失败信息："+ response._raw,'info');
		}

	});
	uploader.on('error',function(file){
		$.messager.progress('close');
		$.messager.alert('tip','文件格式不支持!','info');
	})
	// 文件上传失败，显示上传出错。
	uploader.on('file', function(file) {
		$.messager.progress('close');
		$.messager.alert('tip','文件上传失败,请重试!','info');
	});
	// --end-文件上传---
}
</script>
