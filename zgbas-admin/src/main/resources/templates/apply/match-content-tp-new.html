	// 下游销售单价（发起时预估）= 上游采购单价 + 上游采购单价*托盘利率 * 托盘天数
	function formatterSellPrice(){
		let bdealPrice = $("#bdealPrice").val();
		let tpRate = $("#tpRate").val();
		let tpDays = $("#tpDays").val();
		if (bdealPrice && tpRate && tpDays) {
			let sdealPrice = bdealPrice*(1+tpRate*tpDays)
			$("#sdealPrice").numberbox('setValue', sdealPrice);
		}
	}

	function formatterBuy(value){
		if (!value){
			value = $("#bdealPrice").numberbox('getValue');
		}
		var notax = parseFloat(value/1.13).toFixed(2);
		$("#bdealAmountNotax").numberbox('setValue',notax);
		var dealNumber = $("#dealNumber").numberbox('getValue');
		var payRate = $("#payRate").combobox('getValue');
		if (dealNumber){
			var totalAmount = parseFloat(value*dealNumber).toFixed(2);
			$("#btotalAmount").numberbox('setValue',totalAmount);
			// $("#payRateAmount").numberbox('setValue',totalAmount*payRate);
		}
	}
	function formatterSell(value){
		if (!value){
			value = $("#sdealPrice").numberbox('getValue');
		}
		var dealNumber = $("#dealNumber").numberbox('getValue');
		if (dealNumber){
			var totalAmount = parseFloat(value*dealNumber).toFixed(2);
			$("#stotalAmount").numberbox('setValue',totalAmount);

			let bdealPrice = $("#bdealPrice").val();
			let tpRate = $("#tpRate").val();
			let tpDays = $("#tpDays").val();
			var approveTpInterest = bdealPrice*tpRate*tpDays*dealNumber;
			$("#approveTpInterest").numberbox('setValue', approveTpInterest);
		}
	}

	//发起申请前操作
	function beforSaveOper(){
		// 若发货方式确定为我方配送，即采购端选择自提、销售端选择配送的，
		// 在预算新增时，一定要预先估算运输费用（包括运费与上车费合计）与仓储费用，若不录入运输费，则预算无法生成，仓储费可以不录入。
		if($("#buyDeliveryType").val() == 'Z' && $("#sellDeliveryType").val() == 'P'){
			var transportCost = $("#stransportCost").numberbox('getValue');
			if (isBlank(transportCost) || Number(transportCost) <= 0) {
				$.messager.alert('提示', '发货方式为我方配送,需预先估算运输费和仓储费（仓储费可以不录入）!出库时，可以调整运输和仓储费，但是只能往下调整', 'warning');
				return false;
			}
		}

		// 检验合同模板是否上传或选择
		var buyContract = $("#buyTemplateId").combobox('getValue');
		if ((isBlank(buyContract) && isBlank($("#buyContentTemplateId").val()))
				|| (buyContract == '-1' && isBlank($("#buyContentTemplateId").val()))
				) {
			$.messager.alert('提示','采购合同模板必须选择或上传!','warning');
			return false;
		}
		var sellContract = $("#sellTemplateId").combobox('getValue');
		if ((isBlank(sellContract) && isBlank($("#sellContentTemplateId").val()))
				|| (sellContract == '-1' && isBlank($("#sellContentTemplateId").val()))
			) {
			$.messager.alert('提示','销售合同模板必须选择或上传!','warning');
			return false;
		}

		//参数array
		var arr=new Array();
		var result={};
		var strB= Convert.getJson4Form("formB");
		var strS= Convert.getJson4Form("formS");
		arr.push(strB);
		arr.push(strS);
		valideAllRow('chainTable');
		//中间链条信息
		if (_exist_chain){
			var inserted = $("#chainTable").datagrid('getChanges', 'inserted');
			result['_inserted'] = inserted;

			var updated = $("#chainTable").datagrid('getChanges', 'updated');
			result['_updated'] = updated;

			var deleted = $("#chainTable").datagrid('getChanges', 'deleted');
			result['_deleted'] = deleted;
		}

		//商品信息
		var resultData= Convert.ToJSONString(result);
		if($('#_easy_grid').length==0){
			$('#inputFormApprove').append('<input type="hidden" id="_easy_grid" name="_easy_grid">');
		}
		$('#_easy_grid').val(resultData);
		console.log("resultData:"+resultData);
		//基本数据

		if($("#contentStr").length==0){
			$('#inputFormApprove').append('<input type="hidden" id="contentStr" name="contentStr">');
		}
		var resultArr=Convert.ToJSONString(arr);
		$("#contentStr").val(resultArr);
		console.log("formData:"+resultArr);
		return true;
	}

	function fileUpload(fileBtn, fileId, filePath, filePlugin) {
		var $this = $('#' + fileId);
		// fileBtn:点击弹出选择文件事件的dom对象
		// filePath:文件上传成功后，保存的服务文件Id
		// --start-文件上传---
		var uploader = WebUploader.create({
			auto : true,
			// swf文件路径
			swf : _ctx + '/static/webuploader-0.1.5/Uploader.swf',
			// 文件接收服务端。
			server : _ctx + '/file/uploadFile',
			// 选择文件的按钮。可选。
			// 内部根据当前运行是创建，可能是input元素，也可能是flash.
			pick : '#' + fileBtn,
			// 不压缩image, 默认如果是jpeg，文件上传前会压缩一把再上传！
			resize : false,
			duplicate :true ,//true可重复上传，默认不可多次重复上传
			// 只允许选择图片文件。
			accept : {
				title : 'file',
				extensions : 'gif,jpg,jpeg,bmp,png,pdf,rar,zip,doc,docx,xlsx,xls',
//					mimeTypes :	"image/*"
// 				mimeTypes :	"image/jpg,image/jpeg,image/gif,image/bmp,image/png,application/pdf,application/rar,application/zip,application/msword,application/vnd.openxmlformats-officedocument.wordprocessingml.document"
				mimeTypes: "*"
			}
		});
		// 去掉文件上传组件样式，使用上传dom 自己样式
		$(".webuploader-pick").removeClass();

		uploader.on('beforeFileQueued', function(file) {
			$.messager.progress('close');
			if(file &&file.size > 10485760){
				$.messager.alert('tip',"上传文件不能超过10M!",'info');
				return false;
			}
		})

		// 当有文件添加进来的时候
		uploader.on('fileQueued', function(file) {
			$.messager.progress();
			//var $li = $('<div id="' + file.id + '" class="file-item thumbnail">' + '<img>' + '<div class="info">' + file.name + '</div>' + '</div>'), $img = $li.find('img');
		});

		// 文件上传成功，给item添加成功class, 用样式标记上传成功。
		uploader.on('uploadSuccess', function(file, response) {
			$.messager.progress('close');
			if(file &&file.size > 10485760){
				$.messager.alert('tip',"上传文件不能超过10M!",'info');
				return;
			}
			if(response && response.result){//上传成功
				// console.log("uploadSuccess", response);
				var fileId = response.fileId;

				// console.log("fileId", fileId);
				filePlugin.uploadSuccess(fileId);
				//加载附件列表
				filePlugin.load($this.val(),'#'+filePath);
				if (filePath == "upbtempPath"){
					upbtempBtnFun(false,true,false);
				}
				if (filePath == "upselltempPath"){
					upstempBtnFun(false,true,false);
				}
			}else{
				$.messager.alert('tip',"上传文件失败，失败信息："+ response._raw,'info');
			}

		});
		uploader.on('error',function(file){
			$.messager.progress('close');
			$.messager.alert('tip','文件格式不支持!','info');
		})
		// 文件上传失败，显示上传出错。
		uploader.on('file', function(file) {
			$.messager.progress('close');
			$.messager.alert('tip','文件上传失败,请重试!','info');
		});
		// --end-文件上传---
	}

	function valideAllRow(datagridId) {
		//获得该table的所有行 校验
		try {
			var _tab = $("#" + datagridId).datagrid("getRows");
			var _len = _tab.length;
			for (var i = 0; i < _len; i++) {
				var rowIndex = $('#' + datagridId).datagrid('getRowIndex', _tab[i]);
				flag = $('#' + datagridId).datagrid('validateRow', rowIndex);
				if (!flag) {
					$('#' + datagridId).datagrid('selectRow', rowIndex);
					$('#' + datagridId).datagrid('beginEdit', rowIndex);
					break;
				} else {
					$('#' + datagridId).datagrid('endEdit', rowIndex);
				}
			}
			_exist_chain = true;
		}catch (err){
			_exist_chain = false
			console.log("valideAllRow error");
		}
	}
