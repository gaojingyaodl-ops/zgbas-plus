<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<div class="easyui-layout" fit="true">
    <div region="center" border="false">
        <div id="inputForm" method="post" class="editForm_approve content_div" style="margin-top: 10px;margin-bottom: 0;overflow:hidden;">
            <input type="hidden" name="id" id="entityId" th:value="${entity.id}" />
            <input type="hidden" name="companyId" id="companyId" th:value="${entity.companyId}" />
            <div class="editForm">
                <div class="mb6">
                    <p class="yw-table-filter w2">
                        <label>电子签章名称:</label>
                        <input readonly th:value="${entity.companyName}">
                    </p>
                </div>
            </div>
            <div class="mb6">
                <p class="yw-table-filter w2">
                    <label>法人代表:</label>
                    <input readonly name="legalRepresent" id="legalRepresent" type="text" th:value="${entity.legalRepresent}"></input>
                </p>
                <p class="yw-table-filter w2">
                    <label>法人邮箱:</label>
                    <input readonly name="email" id="email" type="text" th:value="${entity.email}"></input>
                </p>
               <p class="yw-table-filter w2">
                <label>法人手机号:</label>
                <input readonly name="phone" id="phone;" type="text" th:value="${entity.phone}"></input>
            </p>
                <p class="yw-table-filter w2">
                    <label>法人身份证号:</label>
                    <input readonly name="identityCardNumber" id="identityCardNumber" type="text" th:value="${entity.identityCardNumber}"></input>
                </p>
            </div>
                <div class="mb6">
            <label>签章图片:</label>
            <p class="controls showImg fileId" id="span_fileId" title="点击查看图片">
                <img width="500px"  th:src="${entity.electronicSignFileId}" th:onclick="openImg([[${entity.electronicSignFileId}]])">
            </p>
                    <label>营业执照图片:</label>
                    <p class="controls showImg fileId" id="span_fileId" title="点击查看图片">
                        <img width="500px"  th:src="${entity.businessLicenseWithSealUrl}" th:onclick="openImg([[${entity.businessLicenseWithSealUrl}]])">
                    </p>
            </div>
            <div class="mb6">

            </div>
        </div>
    </div>
</div>
</div>
<script th:src="@{/static/ueditor/third-party/webuploader/webuploader.min.js}" type="text/javascript"></script>
<script th:src="@{/static/js/file.js?v=2}" type="text/javascript"></script>
<script th:src="@{/static/js/admin/apply_base.js}" type="text/javascript"></script>
<script type="text/javascript">
    var filePlugin = new FilePlugin('#fileId',$('#entityId').val(),'/apply/sealUsage/updateFileId',[[${param.hasEditFile}]]);
    //var _curStatus = $("#entityStatus").val();
    var _curStatus = '[[${status}]]';
    $(function(){
        //$('#addBtn').linkbutton();
        $('.easyui-linkbutton').linkbutton();

    });
    function openImg(url) {
        window.open(url, "_blank")
    }
</script>
