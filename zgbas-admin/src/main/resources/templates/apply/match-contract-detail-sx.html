<div class="easyui-layout" id="inputForm" border="false" fit="true">
    <div region="north" border="false" method="post" style="margin-bottom:10px;">
        <input type="hidden" id="canApproveEdit" th:value="${psv.canApproveEdit}"/>
        <input type="hidden" name="id" id="entityId" th:value="${match.id}"/>
        <input type="hidden" name="status" id="entityStatus" th:value="${match.status}"/>
        <input type="hidden" id="businessType" name="businessType" th:value="${match.businessType}">
        <input type="hidden" id="sellContractFileId" name="sellContractFileId" th:value="${sellContractFileId}">
        <input type="hidden" id="buyContractFileId" name="buyContractFileId" th:value="${buyContractFileId}">
        <input type="hidden" id="serviceContractFileId" name="serviceContractFileId" th:value="${serviceContractFileId}">
    </div>
    <div class="mb6">
        <p class="yw-table-filter w2">
            <label>我方</label>
            <input id="ourCompanyName" th:value="${match.ourCompanyName}" class="control text_padding"
                   name="ourCompanyName" type="text"/>
        </p>
    </div>
    <div class="mb6">
        <p class="yw-table-filter">
            <label>品种</label>
            <input id="productCd" name="productCd" th:value="${match.productName}" class="control text_padding"
                   type="text"/>
            <input id="productName" name="productName" type="hidden">
        </p>
        <p class="yw-table-filter">
            <label>牌号</label>
            <input id="brandNumber" name="brandNumber" th:value="${match.brandNumber}" class="control text_padding"
                   type="text"/>
        </p>
        <p class="yw-table-filter">
            <label>数量(吨)</label>
            <input id="dealNumber" name="dealNumber" th:value="${match.dealNumber}" class="control text_padding"
                   type="text"/>
            <input id="maxNumber" name="maxNumber" type="hidden">
        </p>
        <p class="yw-table-filter">
            <label>厂商</label>
            <input id="factoryId" name="factoryId" th:value="${match.factoryId}" class="control text_padding"
                   type="hidden"/>
            <input id="factoryName" name="factoryName" th:value="${match.factoryName}" class="control text_padding"
                   type="text">
        </p>
        <p class="yw-table-filter">
            <label>包装规格</label>
            <input id="wrapSpecs" name="wrapSpecs" th:value="${match.wrapSpecs}" class="control text_padding"
                   type="text"/>
        </p>
        <p class="yw-table-filter">
            <label>质量标准</label>
            <input id="qualityStandard" name="qualityStandard" th:value="${match.qualityStandard}"
                   class="control text_padding" type="text"></input>
        </p>
    </div>
    <p class="form-section-title"><span class="approve_text">采购</span><a href="#"
                                                                         class="easyui-linkbutton btn-empty btn64 buyContractPreviewClass"
                                                                         style="margin-top: -60px;margin-left: 93%;">采购合同</a><i></i>
    </p>
    <form id="formB">
        <div th:each="entity:${buyProductDetailList}">
            <div class="mb10">
                <input id="buyContractId" th:value="${entity.contractId}" type="hidden"/>
                <input id="buyContractNo" th:value="${entity.contractNo}" type="hidden"/>
                <input type="hidden" id="stockContractId" name="stockContractId">
                <span class="btn-group hide" style="line-height: 28px;">
       		<a href="#" id="selectContract" th:tag="1" onclick="applyMatch.selectContract(this)">选择</a>
       	</span>
                <p class="yw-table-filter">
                    <label>采购来源</label>
                    <input id="buySource" name="buySource" th:value="${entity.buySource}" class="control text_padding"
                           type="text"/>
                    <input id="bcontractType" name="contractType" value="B" type="hidden">
                </p>
                <p class="yw-table-filter w2">
                    <label>供方</label>
                    <input id="buyCompanyName" name="companyName" th:value="${entity.companyName}"
                           class="control text_padding" type="text"/>
                    <input id="buyCompanyId" name="companyId" th:value="${entity.companyId}"
                           class="control text_padding" type="hidden">
                </p>
                <p class="yw-table-filter">
                    <label>合同编号</label>
                    <input id="contractNo" name="contractNo" type="text" th:value="${entity.contractNo}"
                           class="control text_padding" readonly="readonly"/>
                </p>
                <p class="yw-table-filter">
                    <label>业务员</label>
                    <input id="buyMatchUserName" name="matchUserName" th:value="${entity.matchUserName}"
                           class="control text_padding" type="text"/>
                    <input id="buyMatchUserId" name="matchUserId" th:value="${entity.matchUserId}"
                           class="control text_padding" type="hidden">
                </p>
            </div>
            <div class="mb10">
                <p class="yw-table-filter">
                    <label>仓储费(元)</label>
                    <input id="bwarehouseCost" name="warehouseCost" th:value="${#numbers.formatDecimal(entity.warehouseCost,1,'COMMA',2,'POINT')}"
                           class="control text_padding" type="text"/>
                </p>
                <p class="yw-table-filter">
                    <label>运输费(元)</label>
                    <input id="btransportCost" name="transportCost" th:value="${#numbers.formatDecimal(entity.transportCost,1,'COMMA',2,'POINT')}"
                           class="control text_padding" type="text"/>
                </p>
                <p class="yw-table-filter">
                    <label>装卸费(元)</label>
                    <input id="bstevedorage" name="stevedorage" th:value="${#numbers.formatDecimal(entity.stevedorage,1,'COMMA',2,'POINT')}"
                           class="control text_padding" type="text"/>
                </p>
                <p class="yw-table-filter">
                    <label>结算方式</label>
                    <input id="deliveryModeB" name="deliveryMode" th:value="${entity.deliveryMode}"
                           class="control text_padding" type="text"/>
                </p>
            </div>
            <div class="mb10">
                <p class="yw-table-filter">
                    <label>支付方式</label>
                    <input id="payType" name="payType" th:value="${entity.payType}" class="control text_padding"
                           type="text"/>
                </p>
                <p class="yw-table-filter">
                    <label>定金比例</label>
                    <input id="payRate" name="payRate" th:value="${entity.payRate}" class="control text_padding"
                           type="text"/>
                </p>
                <p class="yw-table-filter">
                    <label>定金</label>
                    <input id="payRateAmount" name="payRateAmount" th:value="${#numbers.formatDecimal(entity.payRateAmount,1,'COMMA',2,'POINT')}"
                           class="control text_padding" type="text"/>
                </p>
                <p class="yw-table-filter">
                    <label>付全款日期</label>
                    <input id="payFullTime" name="payFullTime"
                           th:value="${#dates.format(entity.payFullTime, 'yyyy-MM-dd')}" class="control text_padding"
                           type="text"/>
                </p>
            </div>
            <div class="mb10">
                <p class="yw-table-filter">
                    <label>交货方式</label>
                    <input id="buyDeliveryType" name="deliveryType" th:value="${entity.deliveryType}"
                           class="control text_padding" type="text"/>
                </p>
                <p class="yw-table-filter">
                    <label>交货日期</label>
                    <input id="buyDeliveryDate" name="deliveryDate"
                           th:value="${#dates.format(entity.deliveryDate, 'yyyy-MM-dd')}" class="control text_padding"
                           type="text"/>
                </p>
                <span style="margin-left: -10px;">
			<label>-</label>
		</span>
                <p class="yw-table-filter">
                    <input id="BarrivalTimeExt" name="arrivalTimeExt" th:value="${entity.arrivalTimeExt}"
                           class="control text_padding" type="text"/>
                </p>
                <p class="yw-table-filter">
                    <label>交货地点</label>
                    <input id="bdeliveryAddr" name="deliveryAddr" th:value="${entity.deliveryAddr}"
                           class="control text_padding" type="text"/>
                </p>
                <p class="yw-table-filter w2">
                    <label>详细地址</label>
                    <input id="bcontactAddr" name="contactAddr" th:value="${entity.contactAddr}"
                           class="control text_padding" type="text"/>
                </p>
            </div>
            <div class="mb10">
                <p class="yw-table-filter">
                    <label>含税单价(元)</label>
                    <input id="bdealPrice" name="dealPrice" th:value="${#numbers.formatDecimal(entity.dealPrice,1,'COMMA',2,'POINT')}" class="control text_padding"
                           type="text"/>
                </p>
                <p class="yw-table-filter">
                    <label>不含税单价(元)</label>
                    <input id="bdealAmountNotax" name="dealAmountNotax" th:value="${#numbers.formatDecimal(entity.dealAmountNotax,1,'COMMA',2,'POINT')}"
                           class="control text_padding" readonly type="text"/>
                </p>
                <p class="yw-table-filter">
                    <label>总价(元)</label>
                    <input id="btotalAmount" name="totalAmount" readonly th:value="${#numbers.formatDecimal(entity.totalAmount,1,'COMMA',2,'POINT')}"
                           class="control text_padding" type="text"/>
                </p>
                <p class="yw-table-filter w2">
                    <label>补充条款</label>
                    <input id="extraTerm" name="extraterm" th:value="${entity.extraTerm}" class="control text_padding"
                           type="text"/>
                </p>
                <p class="yw-table-filter w2">
                    <label>备注</label>
                    <input id="payRemark" name="payRemark" th:value="${entity.payRemark}" class="control text_padding"
                           type="text"/>
                </p>
            </div>
        </div>
    </form>
    <p class="form-section-title"><span class="approve_text">销售</span><a href="#"
                                                                         class="easyui-linkbutton btn-empty btn64 sellContractPreviewClass"
                                                                         style="margin-top: -60px;margin-left: 93%;">销售合同</a><i></i>
    </p>

        <a id="addBtn" href="#" class="easyui-linkbutton pl20 pr20" onClick="insert()">服务费合同</a>

                    <input id="sellContractId" th:value="${entity.contractId}" type="hidden"/>
                    <input id="sellContractNo" th:value="${entity.contractNo}" type="hidden"/>

                    <input id="scontractType" name="contractType" value="S" type="hidden">
                </p>
                <p class="yw-table-filter">
                    <label>合同编号</label>
                    <input id="contractNo" name="contractNo" th:value="${entity.contractNo}"

                </p>
                <p class="yw-table-filter">
                    <label>业务员</label>
                    <input id="sellMatchUserName" name="matchUserName" th:value="${entity.matchUserName}"

                    <input id="sellMatchUserId" name="matchUserId" th:value="${entity.matchUserId}"
                           class="control text_padding" type="hidden">
                </p>
            </div>
            <div class="mb10">
                <p class="yw-table-filter">
                    <label>仓储费(元)</label>
                    <input id="swarehouseCost" name="warehouseCost" th:value="${#numbers.formatDecimal(entity.warehouseCost,1,'COMMA',2,'POINT')}"
                           class="control text_padding" type="text"/>
                </p>
                <p class="yw-table-filter">
                    <label>运输费(元)</label>
                    <input id="stransportCost" name="transportCost" th:value="${#numbers.formatDecimal(entity.transportCost,1,'COMMA',2,'POINT')}"
                           class="control text_padding" type="text"/>
                </p>
                <p class="yw-table-filter">
                    <label>装卸费(元)</label>
                    <input id="sstevedorage" name="stevedorage" th:value="${#numbers.formatDecimal(entity.stevedorage,1,'COMMA',2,'POINT')}"
                           class="control text_padding" type="text"/>
                </p>
                <p class="yw-table-filter">
                    <label>交货方式</label>
                    <input id="sellDeliveryType" name="deliveryType" th:value="${entity.deliveryType}"
                           class="control text_padding" type="text"/>
                </p>
            </div>

            <div class="mb10">
                <p class="yw-table-filter">
                    <label>交货日期</label>
                    <input id="sellDeliveryDate" name="deliveryDate"
                           th:value="${#dates.format(entity.deliveryDate, 'yyyy-MM-dd')}" class="control text_padding"
                           type="text"/>
                </p>
                <span style="margin-left: -10px;">
                    <label>-</label>
                </span>
                <p class="yw-table-filter">
                    <input id="SarrivalTimeExt" name="arrivalTimeExt" th:value="${entity.arrivalTimeExt}"
                           class="control text_padding" type="text"/>
                </p>
                <p class="yw-table-filter">
                    <label>交货地点</label>
                    <input id="deliveryAddr" name="deliveryAddr" th:value="${entity.deliveryAddr}"
                           class="control text_padding" type="text"/>
                </p>
                <p class="yw-table-filter w2">
                    <label>详细地址</label>
                    <input id="contactAddr" name="contractAddr" class="control text_padding" type="text" th:value="${entity.contactAddr}"/>
                </p>
            </div>

            <div class="mb10">
                <p class="yw-table-filter w2">
                    <label>补充条款</label>
                    <input id="extraTerm" name="extraTerm" th:value="${entity.extraTerm}" class="control text_padding"
                           type="text"/>
                </p>
                <p class="yw-table-filter w2">
                    <label>备注</label>
                    <input id="receiveRemark" name="receiveRemark" th:value="${entity.receiveRemark}"
                           class="control text_padding" type="text"/>
                </p>
            </div>

            <div class="mb10">
                <p class="yw-table-filter">
                    <label>结算方式</label>
                    <input id="deliveryModeS" name="settlementType" th:value="${entity.settlementType}" class="control text_padding" type="text"/>
                </p>
                <p class="yw-table-filter w2" th:if="${serviceFlg == 'true'}">
                    <label>服务合同我方抬头</label>
                    <input th:value="${serviceContract.ourCompanyName}" class="control text_padding" type="text"/>
                </p>
                <p class="yw-table-filter" th:if="${serviceFlg == 'true'}">
                    <label>服务合同编号</label>
                    <input th:value="${serviceContract.serviceContractNo}" class="control text_padding" type="text"/>
                </p>
            </div>

            <div class="mb10">
                <p class="yw-table-filter">
                    <label>付全款日期</label>
                    <input id="receiveFullTime" name="receiveFullTime" type="text" th:value="${#dates.format(entity.receiveFullTime, 'yyyy-MM-dd')}" class="control text_padding"/>
                </p>
                <p class="yw-table-filter">
                    <label>回款周期(天)</label>
                    <input id="creditDays" name="creditDays" th:value="${entity.creditDays}" type="text" class="control text_padding"/>
                </p>
                <p class="yw-table-filter serviceAmount_p">
                    <label>资金服务费(元)</label>
                    <input id="serviceAmount" name="serviceAmount" th:value="${#numbers.formatDecimal(entity.serviceAmount,1,'COMMA',2,'POINT')}" class="control text_padding" type="text"/>
                </p>
                <p class="yw-table-filter" id="minDealPrice_lable" style="display: none">
                    <label>不含险销售价(元)</label>
                    <input id="sdealPriceNoInsurance" name="dealPriceNoInsurance" th:value="${#numbers.formatDecimal(entity.dealPriceNoInsurance,1,'COMMA',2,'POINT')}" class="control text_padding" type="text"/>
                </p>
                <input id="minDealPrice" name="minDealPrice" type="hidden"/>
                <input id="basePrice" name="basePrice" type="hidden"/>
                <p class="yw-table-filter">
                    <label>销售价(元)</label>
                    <input id="sdealPrice" name="dealPrice" th:value="${#numbers.formatDecimal(entity.dealPrice,1,'COMMA',2,'POINT')}" class="control text_padding" type="text"/>
                </p>
                <p class="yw-table-filter" id="premium_lable">
                    <label>加价(元)</label>
                    <input id="premium" name="premium" th:value="${#numbers.formatDecimal(entity.premium,1,'COMMA',2,'POINT')}" class="control text_padding" type="text"/>
                </p>
                <p class="yw-table-filter">
                    <label>销售总价(元)</label>
                    <input id="stotalAmount" name="totalAmount" th:value="${#numbers.formatDecimal(entity.totalAmount,1,'COMMA',2,'POINT')}" class="control text_padding" type="text"/>
                </p>
            </div>
        </div>
    </form>

    <input id="serverContractId" th:if="${serviceFlg == 'true'}" th:value="${serviceContract.id}" type="hidden"/>
    <input id="serviceFlg" th:if="${serviceFlg == 'true'}" th:value="${serviceFlg}" type="hidden"/>

    <p class="form-section-title"><span class="approve_text">业务审批</span><i></i></p>
    <div>
        <div style="height:300px;display: inline-block;">
            <span style="color:#46b780"></span>
            <div>
                <table id="allphisTable"
                       title="" iconCls="icon-edit" singleSelect="true"
                       idField="id" style="width:1200px;">
                </table>
            </div>
        </div>

            <label>决算时间</label>

        <p class="yw-table-filter">
            <label>逾期天数</label>

        </p>
        <p class="yw-table-filter">
            <label>逾期服务费(元)</label>
            <input id="breachAmount" name="breachAmount" th:value="${#numbers.formatDecimal(settlement.breachAmount,1,'COMMA',2,'POINT')}" class="control text_padding" type="text" readonly="readonly"/>
        </p>

            <label>已收逾期服务费(元)</label>

            <label>业务员罚金(元)</label>

            <label>利润(元)</label>

            <label>采购提成(元)</label>
            <input id="buyCommissionAmount" name="buyCommissionAmount" th:value="${#numbers.formatDecimal(settlement.buyCommissionAmount,1,'COMMA',2,'POINT')}" class="control text_padding" type="text" readonly="readonly"/>
        </p>
        <p class="yw-table-filter">
            <label>销售提成(元)</label>
            <input id="sellCommissionAmount" name="sellCommissionAmount" th:value="${#numbers.formatDecimal(settlement.sellCommissionAmount,1,'COMMA',2,'POINT')}" class="control text_padding" type="text" readonly="readonly"/>
        </p>
        <p class="yw-table-filter">
            <label>管理提成(元)</label>

        </p>
        <p class="yw-table-filter">
            <label>公司毛利收入(元)</label>
            <input id="companyCommissionAmount" name="companyCommissionAmount" th:value="${#numbers.formatDecimal(settlement.companyCommissionAmount,1,'COMMA',2,'POINT')}" class="control text_padding" type="text" readonly="readonly"/>
        </p>

</div>
