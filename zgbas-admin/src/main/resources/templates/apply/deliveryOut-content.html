	var easyuiPanelOnOpen = function(left, top) {
		var iframeWidth = $(this).parent().parent().width();

		var iframeHeight = $(this).parent().parent().height();

		var windowWidth = $(this).parent().width();
		var windowHeight = $(this).parent().height();

		var setWidth = (iframeWidth - windowWidth) / 2;
		var setHeight = (iframeHeight - windowHeight) / 2;
		$(this).parent().css({/* 修正面板位置 */
			left : setWidth,
			top : setHeight
		});

		if (iframeHeight < windowHeight) {
			$(this).parent().css({/* 修正面板位置 */
				left : setWidth,
				top : 0
			});
		}
		$(".window-shadow").hide();
	};
	$.fn.window.defaults.onOpen = easyuiPanelOnOpen;

			{field:'productAttr',title:'在途/现货',align:'center', width:90,editor:{type:'combobox',options:{required:'true',readonly:'readonly',data:_productType,textField:'dictName',valueField:'dictCd'}},

			{field:'stockDetailId',title:'库存明细Id',hidden:true, width:80,editor:{type:'numberbox',options:{required:'true'}}},
			{field:'stockContractId',title:'合同库存Id',hidden:true, width:80,editor:{type:'numberbox',options:{required:'true'}}},
			{field:'warehouseNumber',title:'已提数量', width:100,hidden:true},
			{field:'curNumber',title:'出库数量(吨)', width:110,align:'right',editor:{type:'numberbox',options:{required:'true',validType:'length[1,20]',precision:4,min:0}},
				formatter: function (value, row, index) {

					}

			{field:'action',title:'业务操作', width:90,align:'center',

			onBeginEdit:function(index,row){

		});


		$('#w_stockDetail_choose').window({

			validType: 'cardRex'

		//身份证号合法性验证
		//支持15位和18位身份证号
		//支持地址编码、出生日期、校验位验证
		$.extend($.fn.validatebox.defaults.rules, {
			cardRex: {
				validator: function(code){
					// 身份证号码为15位或者18位,年的前两位:1800-2399,天数:闰年不能禁止29+
					//var rex=/(^[1-9]\d{5}(18|19|([23]\d))\d{2}((0[1-9])|(10|11|12))(([0-2][1-9])|10|20|30|31)\d{3}[0-9Xx]$)|(^[1-9]\d{5}\d{2}((0[1-9])|(10|11|12))(([0-2][1-9])|10|20|30|31)\d{2}$)/;
					/*  //if(rex.test(value)){
                         return true;
                     }else{
                         return false;
                     } */
					var city={11:"北京",12:"天津",13:"河北",14:"山西",15:"内蒙古",21:"辽宁",22:"吉林",23:"黑龙江 ",31:"上海",32:"江苏",33:"浙江",34:"安徽",35:"福建",36:"江西",37:"山东",41:"河南",42:"湖北 ",43:"湖南",44:"广东",45:"广西",46:"海南",50:"重庆",51:"四川",52:"贵州",53:"云南",54:"西藏 ",61:"陕西",62:"甘肃",63:"青海",64:"宁夏",65:"新疆",71:"台湾",81:"香港",82:"澳门",91:"国外 "};
					var tip = "";
					var pass= true;

					if(!code || !/^\d{6}(18|19|20)?\d{2}(0[1-9]|1[012])(0[1-9]|[12]\d|3[01])\d{3}(\d|X)$/i.test(code)){
						tip = "身份证号格式错误";
						pass = false;
					}

					else if(!city[code.substr(0,2)]){
						tip = "地址编码错误";
						pass = false;
					}
					else{
						//18位身份证需要验证最后一位校验位
						if(code.length == 18){
							code = code.split('');
							//∑(ai×Wi)(mod 11)
							//加权因子
							var factor = [ 7, 9, 10, 5, 8, 4, 2, 1, 6, 3, 7, 9, 10, 5, 8, 4, 2 ];
							//校验位
							var parity = [ 1, 0, 'X', 9, 8, 7, 6, 5, 4, 3, 2 ];
							var sum = 0;
							var ai = 0;
							var wi = 0;
							for (var i = 0; i < 17; i++)
							{
								ai = code[i];
								wi = factor[i];
								sum += ai * wi;
							}
							var last = parity[sum % 11];
							if(parity[sum % 11] != code[17]){
								tip = "校验位错误";
								pass =false;
							}
						}
					}
					return pass;
				},
				message: '请输入正确的18位身份证号!'
			}
		});

		//加载附件列表
		filePlugin.load($('#fileId').val(),'#span_fileId');

	function remove(id,event,target){
		var row , index;
		index = getRowIndex(target);
		if(id=='0' ||id =='' || id == undefined) {
			$('#outTable').datagrid('deleteRow',index);
		}else{
			$.messager.confirm('提示','确认要删除该记录吗?',function(t){
				if(t){
					$('#outTable').datagrid('deleteRow', index);
					var nextSelect=index>0?index-1:0;
					$('#outTable').datagrid('selectRow', nextSelect);
				}
			});
		}
		event.stopPropagation();
	}

		$('#w_contract_choose').attr('callbackExec', 'chooseCallback');
		$('#w_contract_choose').window({href:url});
		$('#w_contract_choose').window("open");
	}

		}

		$('#w_stockDetail_choose').attr('callbackExec', 'warehoseOutChooseCallback');

		$('#outTable').datagrid('endEdit', _lastIndex);

	function byContract(contract){
		if (contract!=undefined){
			//根据合同编号获取table表数据
			var contractId = contract.id;
			if(contractId!=undefined&&contractId!=0){
				var _url = _ctx+"/ctr/product/findProductList?ctrContractId="+contractId;
				var _buyCompanyId;
				//var _url = _ctx+"/ctr/product/list?search_EQL_ctrContractId="+contractId;
				$.getJSON(_url ,function(data){
					prouctDetailJson = data;
					for(var i in data.rows){
						var row =data.rows[i];
						//var curNumber = row.dealNumber - row.curApproveNumber - row.warehouseNumber;
						var new_row = {
							ctrProductId:row.id,
							stockContractId:row.stockContractId,
							productCd:row.productCd,
							productName:row.productName,
							brandNumber:row.brandNumber,
							factoryId:row.factoryId,
// 							warehouseName:row.warehouseName,
							warehouseAddr:row.warehouseAddr,
//							wrapSpecs:Convert.findValueByKey(packingSpecificaJson,"dictCd",row.wrapSpecs,"dictName"),
//							wrapSpecs:row.wrapSpecs,
							factoryName:row.factoryName,
// 							warehouseId:row.warehouseId,
							dealNumber:row.dealNumber,
							dealPrice:row.dealPrice,
							totalPrice:row.totalPrice,
							warehouseNumber:row.warehouseNumber,
							productAttr:'N',
							curApproveNumber:row.curApproveNumber,
							curNumber:row.maxCurNumber
						};
						$('#outTable').datagrid('appendRow', new_row);
						var rowIndex=$('#outTable').datagrid('getRowIndex',new_row);
						_lastIndex = rowIndex;
						$('#outTable').datagrid('beginEdit', rowIndex);
						_buyCompanyId = row.buyCompanyId;
						$("#buyCompanyId").val(_buyCompanyId);
					}
				});
			}
			$("#contractId").val(contractId);
			$("#contractNo").val(contract.contractNo);
			$("#deliveryMode").combobox("setValue",contract.deliveryMode);
			$("#deliveryPhone").val(contract.deliveryPhone);
			$("#deliveryAddr").val(contract.deliveryAddr);
			$("#companyId").val(contract.companyId);
			$("#companyName").val(contract.companyName);
			$("#contactName").val(contract.contactName);
			$("#contactPhone").val(contract.contactPhone);
			$("#ourCompanyName").val(contract.ourCompanyName);

			var _deliveryAddr = contract.deliveryAddr;
			$("#deliveryAddr").val(_deliveryAddr);

			var _contactAddr = contract.contactAddr;

			$("#contactAddr").val(_contactAddr);
			$("#payAmount").val(Number(contract.dealedAmount).toFixed(2));
			$("#businessNo").val(contract.businessNo);
			//$("#transportAmount").val(Number(contract.transportAmount).toFixed(2));
			//$("#warehouseAmount").val(Number(contract.warehouseAmount).toFixed(2));
			$("#transportAmount").numberbox('setValue',contract.transportAmount);
			$("#warehouseAmount").numberbox('setValue',contract.warehouseAmount);
			var delivery_type = contract.deliveryType;
			var out_type = $('#warehouseOutType').combobox('getValue');
			if (!out_type){
				if (delivery_type == 'P'){
					$('#warehouseOutType').combobox('setValue','BSG');
				}else if (delivery_type == 'Z'){
					$('#warehouseOutType').combobox('setValue','AZT');
				}
			}
			if(contractId != undefined){
				$.post(_ctx+'/bas/stockDetail/findByContractId?contractId='+contractId,function(detail){
					var warehouseBatchNo = $("#warehouseBatchNo").val();
					var warehousePosition = $("#warehousePosition").val();
					if (!warehouseBatchNo){
						$("#warehouseBatchNo").val(detail.warehouseBatchNo);
					}
					if (!warehousePosition){
						$("#warehousePosition").val(detail.warehousePosition);
					}
				})
			}
		}
	}

	function setSellProcess(sellStepListJson){
		if(sellStepListJson){
			var _html ="";
			var _curConditionId ="";
			for(var i in sellStepListJson){
				if(approveId==0&&_curConditionId==""||approveId!=0){
					//新增，默认一个审批条件
					_curConditionId = sellStepListJson[0].conditionId;
				}
				if(sellStepListJson[i].conditionId==_curConditionId){
					_html +='<div class="process-step"><span class="span1 sell_process_span">';
					_html +='</span><span class="span2">'+sellStepListJson[i].stepName+'</span></div><div class="process-line"></div>';
				}
			}
			$("#sell_process").after(_html);

			//设置审批步骤当前审批节点
			$(".sell_process_span").text("");
			$(".sell_process_span").parent().addClass("process-step-finished");
		}
