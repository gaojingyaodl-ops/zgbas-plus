
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
<title>自营考核统计</title>
<th:block th:replace="~{layouts/include :: include}"></th:block>
</head>
<body class="easyui-layout">
	<div region="north" class="search_div" border="false"  style="height: 105px">
	<form id="searchForm" class="form-search from-input-layout" method="post">
		<p class="p_text">
			<!-- <span class="input-colspan">
				<label style="width: 80px;">业务编号:</label>
				<input type="text" id="srh_contractType" name="businessNo"/>
			</span> -->
			<span class="input-colspan">
				<label style="width: 80px;">牌号:</label>
				<input type="text" name="brandNumber"/>
			</span>
			<span class="input-colspan">
				<label style="width: 80px;">销售企业:</label>
				<input  type="text" name="sellCompany"/>
			</span>
			 <span class="input-colspan">
				<label style="width: 80px;">事业部:</label>
				<input  type="text" id="deptId" class="control text_padding" name="deptId"/>
			</span>
		</p>
		<p class="p_text">
			<span class="input-colspan">
				<label style="width: 80px;">采购员:</label>
				<input type="text" id="matchUserName" class="control text_padding" name="buyMatchName"></input>
			</span>
			<!-- <span class="input-colspan">
				<label style="width: 80px;">采购员:</label>
				<input type="text" id="srh_procurementName" name="search_EQS_procurementName"/>
			</span> -->
			<!-- <span class="input-colspan">
					<label style="width: 60px;">销售:</label>
					<input  id="srh_contractTime_from" name="search_GTED_contractTime"  type="text"/>
			</span>	 -->
			<span class="input-colspan">
					<label style="width: 80px;">收款日期:</label>
					<input name="beginTime" id="beginTime" class="easyui-datebox" />
			</span>
			<span class="input-colspan">
					<label style="width: 80px;">到:</label>
					<input name="endTime"  id="endTime" class="easyui-datebox" />
			</span>
			<span class="btn-group">
				<a href="#" id="btn" iconCls="icon-search" class="easyui-linkbutton" onclick="Convert.search('searchForm','tt');">查询</a>
				<a href="#" id="btn" iconCls="icon-clear" class="easyui-linkbutton" onclick="$('#searchForm').form('reset');">清空</a>
				<a href="#" id="btn" class="easyui-linkbutton" onclick="exportExcel()">导出</a>
			</span>
		</p>
	</form>
</div>
<div region="center" border="false" class="panel_padding" style="padding-right:30px;" >
	<table id="tt" fit="true"
			title="" iconCls="icon-edit" singleSelect="true"
			idField="id">
	</table>
</div>
 <script type="text/javascript">
    var lastIndex=0;
	var deptJson =eval('[(${deptJson})]');
	var userJson =eval('[(${userJson})]');
	var matchUserNameTreeJson = eval('[(${matchUserNameTree})]');
	var productTypeJson =eval('[(${productTypeJson})]');
	$(function(){
		$('#matchUserName').combotree({
			data : matchUserNameTreeJson,
			multiple : false,
			editable : true,
			height : 30,
			formatter:function(node){
				var enableFlg = node.attributes.enableFlg;
				if (enableFlg==false){
					return '<span style="color:red;">'+node.text+'(无效)</span>';
				}
				return node.text;
			},
			onSelect : function(node) {
				if (node.children.length != 0) {
					$('#matchUserName').combotree('clear');
				} else {
					$('#matchUserName').combotree('setValue', node.text);
				}
			}
		});
		$('#deptId').combobox({
			data : deptJson,
			textField:'deptName',
			valueField:'deptId',
			panelHeight:"auto",
		});
		 $("#srh_procurementName").combobox({
				data:userJson,
				textField:'name',
				valueField:'id',
				panelHeight:"auto"
			});
		$('#tt').datagrid({
			pagination:true,
			pageSize:20,
			rownumbers:true,
			showFooter :true,
			pageList:[500,200,100,50,30,20],
			url:_ctx+"/rpt/stat/findAssessment",
			columns:[ [
				{field:'buyDate',title:'采购日期',width:110},
				{field:'productName', title: '货名',width:150,formatter:function(value, row, index){
					if(value){
						var str=row.productName+'/'+row.brandNumber+'/'+row.factoryName;
						return str;
					}
				}},
				{field:'buyCompanyName',title:'采购企业(上家)', width:190},
				{field:'sellNumber',title:'销售数量(吨)',align:'right', width:90},
				{field:'buyPrice',title:'采购单价(元)',align:'right', width:110, formatter:function(value, row, index){
					if(row.buyPrice){
						return row.buyPrice.toFixed(2);
					}
				}},
				{field:'buyAmount',title:'采购额(元)',align:'right', width:110, formatter:function(value, row, index){
					if(row.buyAmount){
						return row.buyAmount.toFixed(2);
					}
				}},
				{field:'transAmount',title:'运费(元)',align:'right', width:80, formatter:function(value, row, index){
					if(row.transAmount){
						return row.transAmount.toFixed(2);
					}else{
						return 0;
					}
				}},
				{field:'buyUserName', title:'采购业务员', width:80},
				{field:'buyMatchProfit',title:'采购员毛利(元)',align:'right', width:110, formatter:function(value, row, index){
					if(row.buyMatchProfit){
						return row.buyMatchProfit.toFixed(2);
					}
				}},
				{field:'payTime',title:'收款日期', width:110},
				{field:'sellPrice',title:'销售单价(元)',align:'right', width:100, formatter:function(value, row, index){
					if(row.sellPrice){
						return row.sellPrice.toFixed(2);
					}
				}},
				{field:'sellAmount',title:'销售额(元)',align:'right', width:100, formatter:function(value, row, index){
					if(row.sellAmount){
						return row.sellAmount.toFixed(2);
					}
				}},
				{field:'sellCompanyName',title:'销售企业(下家)', width:110},
				{field:'sellUserName',title:'销售业务员', width:90},
				{field:'sellMatchProfit', title: '销售员毛利(元)',align:'right', width: 120, formatter:function(value, row, index){
					if(row.sellMatchProfit){
						return row.sellMatchProfit.toFixed(2);
					}
				}},
			]],
			//toolbar:toolbar,
			onDblClickRow:function(index,row){
				lastIndex = index;
				editrow(row.id);
			},
			onClickRow:function(index,row){
				lastIndex = index;
			},
			onLoadSuccess:function(data){
				var total =$('#tt').datagrid('getData').total;
				if (lastIndex >total-1){
					lastIndex=total-1;
				}
				if (lastIndex){
					$('#tt').datagrid('selectRow', lastIndex);
				}
			}
		});

		$('#w').window({
			modal:true,
			closed: true,
			collapsible : false,
			minimizable : false,
			cache:false,
			iconCls:"",
			onClose:function(){
				$('#tt').datagrid('reload');
			}
		});

	});
	function exportExcel(){
    	$('#searchForm').form('submit', {url:_ctx+"/rpt/stat/exportExcel"});
	}
</script>
</body>
</html>
