<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
<title>授信额度监控</title>
<th:block th:replace="~{layouts/include :: include}"></th:block>
	<style>
		.datagrid-row {
			height: 65px !important; /* 设置表格行高为40px */
		}
	</style>

</head>
<body class="easyui-layout">
<div region="north" class="search_div pt20	pl20 pr20 pb15 ofh" border="false" >
	<form id="searchForm" class="form-search from-input-layout" method="post">
		<div class="mb6">
			<p class="yw-table-filter">
				<label style="width: 80px;">客户名称:</label>
				<input id="companyName" name="companyName" type="text" value=""/>
			</p>
			<p class="yw-table-filter">
				<label style="width: 80px;">授信类别:</label>
				<input id="creditCategory" name="creditCategory" type="text" value=""/>
			</p>
			<p class="yw-table-filter mobile-display-none" id="columns_user">
				<label style="width: 80px;">业务员:</label>
				<input type="text" id="matchUserName" class="control text_padding" name="matchUserId"/>
			</p>
			<p class="yw-table-filter">
				<label style="width: 80px;">区域:</label>
				<input id="deptId" name="deptId" type="text" value=""/>
			</p>
			<p class="yw-table-filter mobile-display-none">
				<label style="width: 100px;">应收本金:</label>
				<input id="receiveAmountStart" name="receiveAmountStart" type="text" value=""/>
			</p>
			<span style="margin-left: -10px;" class="mobile-display-none">
				<label>~</label>
			</span>
			<p class="yw-table-filter mobile-display-none">
				<input id="receiveAmountEnd" name="receiveAmountEnd" type="text" value=""/>
			</p>
		</div>
		<div class="mb6">
			<p class="yw-table-filter mobile-display-none">
				<label style="width: 80px;">超保金额:</label>
				<input id="excessAmountStart" name="excessAmountStart" type="text" value=""/>
			</p>
			<span style="margin-left: -10px;" class="mobile-display-none">
				<label> ~ </label>
			</span>
			<p class="yw-table-filter mobile-display-none">
				<input id="excessAmountEnd" name="excessAmountEnd" type="text" value=""/>
			</p>
			<p class="yw-table-filter mobile-display-none">
				<label style="width: 100px;">超保占比（%）:</label>
				<input id="excessRateStart" name="excessRateStart" type="text" value=""/>
			</p>
			<span style="margin-left: -10px;" class="mobile-display-none">
				<label>~</label>
			</span>
			<p class="yw-table-filter mobile-display-none">
				<input id="excessRateEnd" name="excessRateEnd" type="text" value=""/>
			</p>
			<p class="yw-table-filter">
				<lable>客户分类</lable>
				<input name="creditRating" type="text" id="credit_rating" value="W"/>
			</p>

			<a href="#" id="btn" class="easyui-linkbutton btn64" onclick="Convert.search('searchForm','tt');">查询</a>
			<a href="#" id="btn" class="easyui-linkbutton btn-empty btn64 ml10" onclick="$('#searchForm').form('reset');">清空</a>
			<span class="" th:if="${permReportCreditMonitorExport == true}">
				<a href="#" id="btn" class="easyui-linkbutton btn-empty btn64 ml10" onclick="exportExcel()">导出</a>
			</span>
		</div>
	</form>
</div>
<div region="center" border="false" class="panel_padding pl20 pr20">
	<table id="tt" fit="true"
			title="" iconCls="icon-edit" singleSelect="true"
			idField="id">
	</table>
</div>
</div>
<script type="text/javascript">
	var lastIndex=0;
	var deptJson=eval('[(${deptJson})]');
	var creditRating = eval('[(${creditRating})]');
	var creditRatingNew = [{dictCd:'', dictName:'--全部--'}].concat(creditRating);
	var companyGrade = eval('[(${companyGrade})]');
	var companyType = eval('[(${companyType})]');
	var onLineFlg = eval('[(${onLineFlg})]');
	var userJson = eval('[(${userJson})]');
	var areaJson = eval('[(${areaJson})]');
	var matchUserJson = eval('[(${matchUserNameTree})]');

	var _matchUserId_profit = '[[${matchUserId}]]';
	var _deptId_profit = '[[${deptId}]]';
	
	$(function(){
		$("#credit_rating").combobox({
			data:creditRatingNew,
			textField:'dictName',
			valueField:'dictCd',
			editable:false,
			panelHeight:"auto"
		});
		$("#excessAmountStart,#excessAmountEnd,#excessRateStart,#excessRateEnd,#receiveAmountStart,#receiveAmountEnd").numberbox({
			required:false,
			validType:'length[1,20]',
			precision:2
		});
		$('#deptId').combobox({
			data : [{deptId:'',deptName:''}],
			textField:'deptName',
			valueField:'deptId',
			panelHeight:"auto",
			editable:false
		});
		findByDept();//查询业务部门
		$('#matchUserName').combotree({
			data : matchUserJson,
			multiple : false,
			editable : true,
			onSelect : function(node) {
				if (node.children.length != 0) {
					$('#matchUserName').combotree('clear');
				}
			}
		});
		if(!strIsNull(_matchUserId_profit)){
			$("#matchUserName").combotree('setValue',_matchUserId_profit);
		}
		
		if(!strIsNull(_deptId_profit)){
			$("#deptId").combobox('setValue',_deptId_profit);
		}
		// 业务类型
		$('#piccFlgId').combobox({
			data:[ {id:'0',text:'人保授信'}, {id:'1',text:'大地授信'}, {id:'1',text:'自主授信'}],
			textField:'text',
			valueField:'id',
			panelHeight:"auto",
			editable:false
		});
		
		$('#creditCategory').combobox({
			data:[ {id:'0',text:'人保授信'}, {id:'1',text:'大地授信'}, {id:'2',text:'中银授信'}, {id:'9',text:'自主授信'}],
			textField:'text',
			valueField:'id',
			panelHeight:"auto",
			editable:false
		});
		
		$('#tt').datagrid({
			pagination:true,
			pageSize:30,
			rownumbers:true,
			showFooter:true,
			queryParams:Convert.getJson4Form('searchForm'),
			pageList:[500,200,100,50,30,20],
			url:_ctx+"/rpt/creditAmountMonitor/findCreditAmountMonitorPage",
			frozenColumns:[ [
				{
					field : 'companyName',
					title : '企业名称',
					sortable : false,
					width : 200,
					align: 'left',
					formatter : function(value, row, index) {
						if(row.companyId) {
							if(row.creditRating == "W"){
								return '<p title="' + row.companyName + '" class="note" style="color:green">' + value + '</p>';
							}else if(row.creditRating == "G"){
								return '<p title="' + row.companyName + '" class="note" style="color:#ccc">' + value + '</p>'
							}else{
								return '<p title="' + row.companyName + '" class="note" style="color:red">' + value + '</p>'
							}
						} else {
							return value;
						}

					}
				}
			] ],
			columns:[ [
				{
					field : 'creditRating',
					title : '客户分类',
					width : 90,
					align:'center',
					formatter : function(value, row, index) {
						return Convert.findValueByKey(creditRating, "dictCd",value, "dictName");
					}
				},
				{
					field : 'creditInfo',
					title : '授信信息',
					width : 400,
					align:'left',
					formatter: function(value, row, index) {
						// 针对 "人保" 和 "大地" 设置不同的颜色
						if (value) {
							value = value.replace(/人保/g, '<span style="color: #005977;">人保</span>');
							value = value.replace(/大地/g, '<span style="color: #5e00b3;">大地</span>');
							value = value.replace(/中银/g, '<span style="color: #eac121;">中银</span>');
							value = value.replace(/自主/g, '<span style="color: #e3142c;">自主</span>');
						}

						return value;
					}
				},
				// {field:'piccFlg',title:'授信类别',align:"center",width:80,formatter:function(value,row,index){
				// 	if(row.companyId) {
				// 		if(value === true){
				// 			return '人保授信';
				// 		}else{
				// 			return '自主授信';
				// 		}
				// 	}
				// }},
				// {field:'piccCreditAmount',title:'人保额度',align:"right", width:120,formatter:formateNumTon},
				// {field:'daDiCreditAmount',title:'大地额度',align:"right", width:120,formatter:formateNumTon},
				// {field:'usedCreditAmount',title:'已使用额度',align:"right", width:120,formatter:formateNumTon},
				{field:'excessGrossProfit',title:'超保毛利',align:"right", width:120,formatter:formateNumTon},
				{field:'receiveAmount',title:'应收本金',align:"right", width:120,formatter:formateNumTon},
				{field:'excessAmount',title:'人保超额',align:"right", width:120,formatter:formateNumTon},
				{field:'excessRate',title:'人保超额占比',align:"right",width:120,formatter:formateRateTon},
				{field:'creditOrdersNum',title:'赊销单数', width:80},
				{field:'overdueAmount',title:'应收逾期本金',align:"right",width:120,formatter:formateNumTon},
				{field:'overdueDays7',title:'逾期[7,15)', width:80},
				{field:'overdueDays15',title:'逾期[15,30)', width:80},
				{field:'overdueDays30',title:'逾期[30,∞)', width:80},
				{field:'contractStartDate',title:'开始合作时间',align:"center", width:90,formatter: function(value, row, index) {
					if(row.companyId) {
						if(value) {
							// 截取前10个字符
							var truncatedText = value.substring(0, 7);
							var replacedText = truncatedText.replace('-', '.');
							return replacedText;
						}
					}
				}},
				{field:'liabilityFlg',title:'是否签连带', width:80},
				{field:'accessReportFlg',title:'是否访厂', width:80},
				{field:'matchUserName',title:'业务员',align:"left", width:100},	
				{field:'deptId',title:'区域',align:"left",width:140,formatter:function(value,row,index){
					return Convert.findValueByKey(deptJson,"deptId",value,"deptName");
				}}
			    

			]],
			onDblClickRow:function(index,row){
				lastIndex = index;
				//editrow(row.id,row.contractNo);
				approveDetail(row);
			},

		});
	});
	function approveDetail(row){
		var  companyName=row.companyName;
		var title = "赊销预算";
		window.parent.addTab(title,_ctx+'/ctr/contract/findDCSX?contractType=S&companyName='+companyName);
	}
	/*  导出Excel表格 */
	function exportExcel(){
    	$('#searchForm').form('submit', {url:_ctx+"/rpt/creditAmountMonitor/exportExcel"});
	}

	/*  获取事业部列表 */
	async function findByDept(){
		$.ajax({
			type: 'POST',
			url: _ctx+'/rpt/contractReport/findProfitByDeptId',
			data: Convert.getJson4Form('searchForm'),
			success: function (result) {
				var sc  = eval('('+result+')');//由Json字符串转换成Javascript对象
				var deptByIdJson = sc.rows;
				$('#deptId').combobox({
					data : deptByIdJson,
					textField:'deptName',
					valueField:'deptId',
					panelHeight:"auto",
					editable:false
				});
				if(!strIsNull(_deptId_profit)){
					$("#deptId").combobox('setValue',_deptId_profit);
				}
			},
		});
	}

	function formateNumTon(num, row, index) {
		if (num) {
			num = parseFloat(num).toFixed(3).toString().split(".");
			num[0] = num[0].replace(new RegExp('(\\d)(?=(\\d{3})+$)', 'ig'), "$1,");
			return num.join(".");
		} else {
			return num;
		}
	}
	function formateRateTon(num, row, index) {
		if(row.companyId) {
			if (num) {
				num = parseFloat(num).toFixed(2).toString().split(".");
				num[0] = num[0].replace(new RegExp('(\\d)(?=(\\d{3})+$)', 'ig'), "$1,");
				return num.join(".")+'%';
			} else {
				return '0.00%';
			}
		}
	}
	// 只显示年月，不显示日
	var intiMonthBox = function(id){
		var db = $('#'+id);
		db.datebox({
			onShowPanel: function () {//显示日趋选择对象后再触发弹出月份层的事件，初始化时没有生成月份层
				span.trigger('click'); //触发click事件弹出月份层
				if (!tds) setTimeout(function () {//延时触发获取月份对象，因为上面的事件触发和对象生成有时间间隔
					tds = p.find('div.calendar-menu-month-inner td');
					tds.click(function (e) {
						e.stopPropagation(); //禁止冒泡执行easyui给月份绑定的事件
						var year = /\d{4}/.exec(span.html())[0]//得到年份
								, month = parseInt($(this).attr('abbr'), 10); //月份，这里不需要+1
						db.datebox('hidePanel')//隐藏日期对象
								.datebox('setValue', year + '-' + month); //设置日期的值
					});
				}, 0);
				yearIpt.unbind();//解绑年份输入框中任何事件
			},
			parser: function (s) {
				if (!s) return new Date();
				var arr = s.split('-');
				return new Date(parseInt(arr[0], 10), parseInt(arr[1], 10) - 1, 1);
			},
			formatter: function (d) {
				return d.getFullYear() + '-' + (d.getMonth() + 1);
			}
		});
		var p = db.datebox('panel'), //日期选择对象
				tds = false, //日期选择对象中月份
				yearIpt = p.find('input.calendar-menu-year'),//年份输入框
				span = p.find('span.calendar-text'); //显示月份层的触发控件
	}

</script>
</body>
</html>
