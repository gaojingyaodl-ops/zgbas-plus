<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
<title>人员ROI报表</title>
<th:block th:replace="~{layouts/include :: include}"></th:block>
</head>
<body class="easyui-layout">
<div region="north" class="search_div pt20	pl20 pr20 pb15 ofh" border="false" >
	<form id="searchForm" class="form-search from-input-layout" method="post">
		<div class="mb6">
			<p class="yw-table-filter mobile-display-none">
				<label style="width: 80px;">姓名:</label>
				<input id="matchUserName" name="matchUserName" type="text" value=""/>
			</p>
			<p class="yw-table-filter mobile-display-none">
				<label>年月</label>
				<input  id="baseStartDate" name="baseStartDate" class="easyui-validatebox" th:value="${nowTargetMonth}"/>
			</p>
			<span style="margin-left: -15px;" class="mobile-display-none">
				<label>~</label>
			</span>
			<p class="yw-table-filter mobile-display-none">
				<input  id="baseEndDate"  name="baseEndDate" class="easyui-validatebox" th:value="${nowTargetMonth}"/>
			</p>

			<p class="yw-table-filter">
				<label style="width: 80px;">区域:</label>
				<input id="branchCd" name="branchCd" type="text" value=""/>
			</p>


			<a href="#" id="btn" class="easyui-linkbutton btn64" onclick="Convert.search('searchForm','tt');">查询</a>
			<a href="#" id="btn" class="easyui-linkbutton btn-empty btn64 ml10" onclick="$('#searchForm').form('reset');">清空</a>
			<span class="" th:if="${permReportUserRoiExport == true}">
				<a href="#" id="btn" class="easyui-linkbutton btn64" onclick="exportExcel()">数据导出</a>
			</span>
		</div>
	</form>
</div>
<div region="center" border="false" class="panel_padding pl20 pr20">
	<table id="tt" fit="true" title="" iconCls="icon-edit" singleSelect="true" idField="id">
	</table>
</div>
<script type="text/javascript">
	var branchListJson = eval('[(${branchList})]');
	$(function(){
		$('#tt').datagrid({
			pagination:true,
			pageSize:500,
			rownumbers:true,
			showFooter:true,
			queryParams:Convert.getJson4Form('searchForm'),
			pageList: [1000, 500],
			url:_ctx+"/rpt/userRoi/findUserRoiPage",
			columns:[ [
				{field:'matchUserName',title:'姓名', width:70},
				{field:'branchName',title:'所属区域', width:70},
				{field:'baseDate',title:'年月', width:120},
				{field:'orderCount',title:'订单数', width:70,align:"right"},
				{field:'tunnage',title:'吨数', width:70,align:"right",formatter:formateNumTon},
				{field:'sellMoney',title:'销售额(万元)',align:"right", width:140,formatter:formateNumTon},
				{field:'gross',title:'净毛利(万元)', align:"right",width:120,formatter:formateNumTon},
				// {field:'grossAvg',title:'毛利率均值', align:"right",width:120,formatter:formateNumTon},
				{field:'totalFinancing',title:'总投入(万元)', align:"right",width:120,formatter:formateNumTon},
				{field:'commission',title:'销售提成(万元)', align:"right",width:120,formatter:formateNumTon},
				{field:'evectionCost',title:'出差(万元)', align:"right",width:120,formatter:formateNumTon},
				{field:'roi',title:'ROI', align:"right",width:120,formatter:formateNumTon},
			]]

		});
		$('#baseStartDate').datebox({
			editable:false
		});
		intiMonthBox('baseStartDate');
		$('#baseEndDate').datebox({
			editable:false
		});
		intiMonthBox('baseEndDate');
		$('#branchCd').combobox({
			data: branchListJson,
			valueField: 'dictCd',
			textField: 'dictName'
		});
	});
	/*  导出Excel表格 */
	function exportExcel(){
    	$('#searchForm').form('submit', {url:_ctx+"/rpt/userRoi/exportUserRoi"});
	}

	function formateNumTon(num, row, index) {
		if (num) {
			num = parseFloat(num).toFixed(2).toString().split(".");
			num[0] = num[0].replace(new RegExp('(\\d)(?=(\\d{3})+$)', 'ig'), "$1,");
			return num.join(".");
		} else {
			return num;
		}
	}
	function intiMonthBox(id){
		var db = $('#'+id);
		db.datebox({
			onShowPanel: function () {//显示日趋选择对象后再触发弹出月份层的事件，初始化时没有生成月份层
				span.trigger('click'); //触发click事件弹出月份层
				if (!tds) setTimeout(function () {//延时触发获取月份对象，因为上面的事件触发和对象生成有时间间隔
					tds = p.find('div.calendar-menu-month-inner td');
					tds.click(function (e) {
						e.stopPropagation(); //禁止冒泡执行easyui给月份绑定的事件
						var year = /\d{4}/.exec(span.html())[0]//得到年份
								, month = parseInt($(this).attr('abbr'), 10); //月份，这里不需要+1
						db.datebox('hidePanel')//隐藏日期对象
								.datebox('setValue', year + '-' + month); //设置日期的值
					});
				}, 0);
				yearIpt.unbind();//解绑年份输入框中任何事件
			},
			parser: function (s) {
				if (!s) return new Date();
				var arr = s.split('-');
				return new Date(parseInt(arr[0], 10), parseInt(arr[1], 10) - 1, 1);
			},
			formatter: function (d) {
				let year = d.getFullYear();
				let month = d.getMonth() + 1;
				if (month < 10) {
					month = '0' + month;
				}
				return year + '-' + month;
			}
		});
		var p = db.datebox('panel'), //日期选择对象
				tds = false, //日期选择对象中月份
				yearIpt = p.find('input.calendar-menu-year'),//年份输入框
				span = p.find('span.calendar-text'); //显示月份层的触发控件
	}

</script>
</body>
</html>
