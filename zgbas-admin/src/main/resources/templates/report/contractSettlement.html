<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
<title>结算列表查询</title>
<th:block th:replace="~{layouts/include :: include}"></th:block>
</head>
<body class="easyui-layout">
<div region="north" class="search_div pt20	pl20 pr20 pb15 ofh" border="false" >
	<form id="searchForm" class="form-search from-input-layout" method="post">
		<div class="mb6">
			<p class="yw-table-filter">
				<label>业务类型</label>
				<input type="text" id="budgetType" name="budgetTypes" class="control text_padding"></input>
			</p>
			<p class="yw-table-filter">
				<label>合同编号</label>
				<input  class="control" id="contractNo" type="text" name="contractNo"/>
			</p>
			<p class="yw-table-filter">
				<label>我方抬头</label>
				<input type="text" id="ourCompanyName" name="ourCompanyName"></input>
			</p>
			<p class="yw-table-filter">
				<label>企业名称:</label>
				<input id="companyName" name="companyName" type="text" value=""/>
			</p>
			<p class="yw-table-filter">
				<label>品种/牌号:</label>
				<input id="productsName" name="productsName" type="text" />
			</p>
			<p class="yw-table-filter mobile-display-none" id="columns_user">
				<label style="width: 80px;">业务员:</label>
				<input type="text" id="matchUserName" class="control text_padding" name="matchUserId"/>
			</p>
		</div>
		<div class="mb6">
			<p class="yw-table-filter">
				<label>区域:</label>
				<input id="deptName" name="deptName" type="text"/>
			</p>
			<p class="yw-table-filter mobile-display-none">
				<label style="width: 80px;">签订日期:</label>
				<input id="contractTimeFrom" name="contractTimeFrom" type="text" class="easyui-datebox"/>
			</p>
			<span style="margin-left: -10px;" class="mobile-display-none">
				<label> ~ </label>
			</span>
			<p class="yw-table-filter mobile-display-none">
				<input id="contractTimeTo" name="contractTimeTo" type="text" class="easyui-datebox"/>
			</p>
			<p class="yw-table-filter mobile-display-none">
				<label style="width: 100px;">收全款日:</label>
				<input id="spayFullTimeFrom" name="spayFullTimeFrom" type="text" class="easyui-datebox"/>
			</p>
			<span style="margin-left: -10px;" class="mobile-display-none">
				<label>~</label>
			</span>
			<p class="yw-table-filter mobile-display-none">
				<input id="spayFullTimeTo" name="spayFullTimeTo" type="text" class="easyui-datebox"/>
			</p>

			<a href="#" id="btn" class="easyui-linkbutton btn64" onclick="Convert.search('searchForm','tt');">查询</a>
			<a href="#" id="btn" class="easyui-linkbutton btn-empty btn64 ml10" onclick="$('#searchForm').form('reset');">清空</a>
<!--			<a href="#" id="btn" class="easyui-linkbutton btn-empty btn64 ml10" onclick="exportExcel()">导出</a>-->
		</div>
	</form>
</div>
<div region="center" border="false" class="panel_padding pl20 pr20">
	<table id="tt" fit="true"
			title="" iconCls="icon-edit" singleSelect="true"
			idField="id">
	</table>
</div>
</div>
<script type="text/javascript">
	var lastIndex=0;
	var deptJson=eval('[(${deptJson})]');
	var settlementStatusJson=eval('[(${settlementStatus})]');
	var companyGrade = eval('[(${companyGrade})]');
	var companyType = eval('[(${companyType})]');
	var onLineFlg = eval('[(${onLineFlg})]');
	var userJson = eval('[(${userJson})]');
	var areaJson = eval('[(${areaJson})]');
	var matchUserJson = eval('[(${matchUserNameTree})]');
	var budgetTypeJson = [{dictCd:'SX',dictName:'赊销合同'},{dictCd:'DC',dictName:'代采合同'},{dictCd:'DCSX',dictName:'代采赊销'}];
	var _ourCompanyJson=eval('[(${ourCompanyJson})]');

	var _matchUserId_profit = '[[${matchUserId}]]';
	var _deptId_profit = '[[${deptId}]]';
	var _budgetType = '[[${budgetType}]]';
	var _receiveDateStart = '[[${receiveDateStart}]]';
	var _receiveDateEnd = '[[${receiveDateEnd}]]';

	$(function(){
		$('#budgetType').combobox({
			data:budgetTypeJson,
			multiple : true,
			valueField:'dictCd',
			textField:'dictName',
			panelHeight:"auto",
			editable:false
		});
		if(!strIsNull(_budgetType)){
			$("#budgetType").combobox('setValues',_budgetType);
		}
		$("#spayFullTimeFrom").datebox({
			height:30,
			editable:false,
			required: false
		})
		if(!strIsNull(_receiveDateStart)){
			$("#spayFullTimeFrom").datebox('setValue',_receiveDateStart);
		}
		$("#spayFullTimeTo").datebox({
			height:30,
			editable:false,
			required: false
		})
		if(!strIsNull(_receiveDateEnd)){
			$("#spayFullTimeTo").datebox('setValue',_receiveDateEnd);
		}
		$('#ourCompanyName').combobox({
			data:_ourCompanyJson,
			valueField:'dictName',
			textField:'dictName',
			panelWidth:'auto',
			panelHeight:"auto"
		});
		$('#deptId').combobox({
			data : [{deptId:'',deptName:''}],
			textField:'deptName',
			valueField:'deptId',
			panelHeight:"auto",
			editable:false
		});
		findByDept();//查询业务部门
		$('#matchUserName').combotree({
			data : matchUserJson,
			multiple : false,
			editable : true,
			onSelect : function(node) {
				if (node.children.length != 0) {
					$('#matchUserName').combotree('clear');
				}
			}
		});
		if(!strIsNull(_matchUserId_profit)){
			$("#matchUserName").combotree('setValue',_matchUserId_profit);
		}
		
		if(!strIsNull(_deptId_profit)){
			$("#deptId").combobox('setValue',_deptId_profit);
		}
		// 业务类型
		$('#piccFlgId').combobox({
			data:[ {id:'1',text:'人保授信'}, {id:'0',text:'自主授信'}],
			textField:'text',
			valueField:'id',
			panelHeight:"auto",
			editable:false
		});
		
		$('#tt').datagrid({
			pagination:true,
			pageSize:30,
			rownumbers:true,
			showFooter:true,
			queryParams:Convert.getJson4Form('searchForm'),
			pageList:[500,200,100,50,30,20],
			url:_ctx+"/rpt/contractSettlement/findCreditAmountMonitorPage",
			columns:[ [
				{
					field : 'approveNo',
					title : '预算编号',
					width : 125,
					align:'left',
				},
				{field:'buyContractNo',title:'采购合同编号',align:"left", width:125},
				{field:'sellContractNo',title:'销售合同编号',align:"left", width:125},
				{field:'productsName',title:'品种/牌号',align:"left", width:125},
				{field:'contractTime',title:'签订日',align:"center", width:90},
				{field:'receiveDate',title:'收全款日期',align:"center", width:100},
				{field:'appointPayDate',title:'约定付款日期',align:"center", width:100},
				{field:'deptName',title:'区域',align:"left",width:100},
				{field:'sellMatchUserName',title:'业务员', align:"left",width:100},
				{field:'sellOurCompanyName',title:'我方抬头',align:"left",width:220},
				{field:'sellCompanyName',title:'采购商', align:"left",width:220},
				{field:'buyCompanyName',title:'供应商', align:"left",width:220},
				{field:'dealNumber',title:'合同数量', align:"right",width:130,formatter:formaterNumTon},
				{field:'buyPrice',title:'采购单价', align:"right",width:130,formatter:formaterNumTon},
				{field:'sellPrice',title:'销售单价', align:"right",width:130,formatter:formaterNumTon},
				{field:'buyTotalAmount',title:'采购合同金额',align:"right", width:130,formatter:formaterNumTon},
				{field:'sellTotalAmount',title:'销售合同金额', align:"right",width:130,formatter:formaterNumTon},
				{field:'creditCycle',title:'回款周期(天)', align:"right",width:130},
				{field:'warehouseAmount',title:'仓储费(元)',align:"right", width:130,formatter:formaterNumTon},
				{field:'transportAmount',title:'运输费(元)',align:"right", width:130,formatter:formaterNumTon},
				{field:'deliveryFee',title:'出库费(元)',align:"right", width:130,formatter:formaterNumTon},
				{field:'stevedorage',title:'装卸费(元)',align:"right", width:130,formatter:formaterNumTon},
				{field:'insuranceAmount',title:'保费(元)',align:"right", width:130,formatter:formaterNumTon},
				{field:'financialServiceAmount',title:'金融服务费(元)',align:"right", width:130,formatter:formaterNumTon},
				{field:'vatAmount',title:'增值税(元)', align:"right",width:130,formatter:formaterNumTon},
				{field:'surchargeAmount',title:'附加税(元)', align:"right",width:130,formatter:formaterNumTon},
				{field:'printAmount',title:'印花税(元)', align:"right",width:130,formatter:formaterNumTon},
				{field:'afterTaxSpreadAmount',title:'毛利', align:"right",width:130,formatter:formaterNumTon},
				{field:'settlementStatus',title:'结算状态',align:"center",width:140,formatter:function(value,row,index){
						return Convert.findValueByKey(settlementStatusJson,"dictCd",value,"dictName");
					}}
			]],
			onDblClickRow:function(index,row){
				lastIndex = index;
				//editrow(row.id,row.contractNo);
				// approveDetail(row);
			},

		});
	});
	function approveDetail(row){
		var  companyName=row.companyName;
		var title = "赊销预算";
		window.parent.addTab(title,_ctx+'/ctr/contract/findDCSX?contractType=S&companyName='+companyName);
	}
	/*  导出Excel表格 */
	function exportExcel(){
    	$('#searchForm').form('submit', {url:_ctx+"/rpt/creditAmountMonitor/exportExcel"});
	}

	/*  获取事业部列表 */
	async function findByDept(){
		$.ajax({
			type: 'POST',
			url: _ctx+'/rpt/contractReport/findProfitByDeptId',
			data: Convert.getJson4Form('searchForm'),
			success: function (result) {
				var sc  = eval('('+result+')');//由Json字符串转换成Javascript对象
				var deptByIdJson = sc.rows;
				$('#deptId').combobox({
					data : deptByIdJson,
					textField:'deptName',
					valueField:'deptId',
					panelHeight:"auto",
					editable:false
				});
				if(!strIsNull(_deptId_profit)){
					$("#deptId").combobox('setValue',_deptId_profit);
				}
			},
		});
	}

	function formaterNumTon(num, row, index) {
		if (num) {
			num = parseFloat(num).toFixed(3).toString().split(".");
			num[0] = num[0].replace(new RegExp('(\\d)(?=(\\d{3})+$)', 'ig'), "$1,");
			return num.join(".");
		} else {
			return num;
		}
	}

	function formaterMoneyTon(num, row, index) {
		if (num) {
			num = parseFloat(num).toFixed(2).toString().split(".");
			num[0] = num[0].replace(new RegExp('(\\d)(?=(\\d{3})+$)', 'ig'), "$1,");
			return num.join(".");
		} else {
			return num;
		}
	}

	function formaterRateTon(num, row, index) {
		if(row.companyId) {
			if (num) {
				num = parseFloat(num).toFixed(2).toString().split(".");
				num[0] = num[0].replace(new RegExp('(\\d)(?=(\\d{3})+$)', 'ig'), "$1,");
				return num.join(".")+'%';
			} else {
				return '0.00%';
			}
		}
	}
	// 只显示年月，不显示日
	var intiMonthBox = function(id){
		var db = $('#'+id);
		db.datebox({
			onShowPanel: function () {//显示日趋选择对象后再触发弹出月份层的事件，初始化时没有生成月份层
				span.trigger('click'); //触发click事件弹出月份层
				if (!tds) setTimeout(function () {//延时触发获取月份对象，因为上面的事件触发和对象生成有时间间隔
					tds = p.find('div.calendar-menu-month-inner td');
					tds.click(function (e) {
						e.stopPropagation(); //禁止冒泡执行easyui给月份绑定的事件
						var year = /\d{4}/.exec(span.html())[0]//得到年份
								, month = parseInt($(this).attr('abbr'), 10); //月份，这里不需要+1
						db.datebox('hidePanel')//隐藏日期对象
								.datebox('setValue', year + '-' + month); //设置日期的值
					});
				}, 0);
				yearIpt.unbind();//解绑年份输入框中任何事件
			},
			parser: function (s) {
				if (!s) return new Date();
				var arr = s.split('-');
				return new Date(parseInt(arr[0], 10), parseInt(arr[1], 10) - 1, 1);
			},
			formatter: function (d) {
				return d.getFullYear() + '-' + (d.getMonth() + 1);
			}
		});
		var p = db.datebox('panel'), //日期选择对象
				tds = false, //日期选择对象中月份
				yearIpt = p.find('input.calendar-menu-year'),//年份输入框
				span = p.find('span.calendar-text'); //显示月份层的触发控件
	}

</script>
</body>
</html>
