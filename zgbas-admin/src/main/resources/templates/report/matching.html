<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
<title>撮合考核统计</title>
<th:block th:replace="~{layouts/include :: include}"></th:block>
</head>
<body class="easyui-layout">
	<div region="north" class="search_div" border="false"  style="height: 105px">
	<form id="searchForm" class="form-search from-input-layout" method="post">
		<p class="p_text">
			<span class="input-colspan">
				<label style="width: 80px;">牌号:</label>
				<input type="text" name="brandNumber"/>
			</span>
			<span class="input-colspan">
				<label style="width: 120px;">销售企业:</label>
				<input  type="text" name="sellCompany"/>
			</span>
			<!-- <span class="input-colspan">
				<label style="width: 105px;">事业部:</label>
				<input  type="text" id="srh_deptIdType" class="control text_padding" name="search_EQS_deptId"/>
			</span> -->
			<span class="input-colspan">
				<label style="width: 80px;">采购员:</label>
				<input type="text" id="procurementName" class="control text_padding" name="buyMatchName"></input>
			</span>
		</p>
		<p class="p_text">
			<span class="input-colspan">
				<label style="width: 80px;">销售员:</label>
				<input type="text" id="matchUserName" class="control text_padding" name="sellMatchName"></input>
			</span>
			<!-- <span class="input-colspan">
				<label style="width: 80px;">采购员:</label>
				<input type="text" id="srh_procurementName" name="search_EQS_procurementName"/>
			</span> -->
			<!-- <span class="input-colspan">
					<label style="width: 60px;">销售:</label>
					<input  id="srh_contractTime_from" name="search_GTED_contractTime"  type="text"/>
			</span>	 -->
			<span class="input-colspan">
					<label style="width: 120px;">收款日期:</label>
					<input name="beginTime" id="beginTime" class="easyui-datebox" />
			</span>
			<span class="input-colspan">
					<label style="width: 80px;">到:</label>
					<input name="endTime"  id="endTime" class="easyui-datebox" />
			</span>
			<span class="btn-group">
				<a href="#" id="btn" iconCls="icon-search" class="easyui-linkbutton" onclick="Convert.search('searchForm','tt');">查询</a>
				<a href="#" id="btn" iconCls="icon-clear" class="easyui-linkbutton" onclick="$('#searchForm').form('reset');">清空</a>
				<a href="#" id="btn" class="easyui-linkbutton" onclick="exportExcel()">导出</a>
			</span>
		</p>
	</form>
</div>
<div region="center" border="false" class="panel_padding" style="padding-right:30px;" >
	<table id="tt" fit="true"
			title="" iconCls="icon-edit" singleSelect="true"
			idField="id">
	</table>
</div>
 <script type="text/javascript">
    var lastIndex=0;
	var deptJson =eval('[(${deptJson})]');
	var userJson =eval('[(${userJson})]');
	var matchUserNameTreeJson = eval('[(${matchUserNameTree})]');
	var productTypeJson =eval('[(${productTypeJson})]');
	$(function(){
		$('#matchUserName').combotree({
			data: matchUserNameTreeJson,
			multiple : false,
			editable : true,
			//required:true,
			height:30,
			formatter:function(node){
				var enableFlg = node.attributes.enableFlg;
				if (enableFlg==false){
					return '<span style="color:red;">'+node.text+'(无效)</span>';
				}
				return node.text;
			},
			onSelect : function(node){
				if(node.children.length!=0){
					$('#matchUserName').combotree('clear');
				}else{

					$('#matchUserName').combotree('setValue',node.text);
				}
			}
		});
		$('#procurementName').combotree({
			data: matchUserNameTreeJson,
			multiple : false,
			editable : true,
			//required:true,
			height:30,
			formatter:function(node){
				var enableFlg = node.attributes.enableFlg;
				if (enableFlg==false){
					return '<span style="color:red;">'+node.text+'(无效)</span>';
				}
				return node.text;
			},
			onSelect : function(node){
				if(node.children.length!=0){
					$('#procurementName').combotree('clear');
				}else{

					$('#procurementName').combotree('setValue',node.text);
				}
			}
		});
		$('#srh_deptIdType').combotree({
			data: matchUserNameTreeJson,
			multiple : false,
			editable : true,
			height:30,
			onSelect : function(node){
				if(node.children.length!=0){
					$('#srh_deptIdType').combotree('clear');
				}else{
					//更新datagrid的deliveryMode和warehouse的下拉框
					var id = node.id;
					$('#srh_deptIdType').val(node.text);
					$("#srh_deptIdType").val(node.text)
					if(id.indexOf("deptName")>=0){
						id = id.replace("deptName","");
						$("#srh_deptIdType").val(Number(id));
					}

				}
			}
		});
		 $("#srh_procurementName").combobox({
				data:userJson,
				textField:'name',
				valueField:'id',
				panelHeight:"auto"
			});
		$('#tt').datagrid({
			pagination:true,
			pageSize:20,
			rownumbers:true,
			showFooter :true,
			pageList:[500,200,100,50,30,20],
			url:_ctx+"/rpt/statistics/findMatching",
			columns:[ [
				{field:'productName', title: '货名',width:140,formatter:function(value, row, index){
					if(row.productName){
						var str=row.productName+'/'+row.brandNumber+'/'+row.factoryName;
						return str;
					}
				}},
				{field:'buyCompanyName',title:'采购企业(上家)', width:170},
				{field:'sellNumber',title:'销售数量(吨)', width:80,align:'right'},
				{field:'buyPrice',title:'采购单价(元)', width:100,align:'right'},
				{field:'buyPayTime',title:'付款日期',width:130},
				{field:'sellCompanyName',title:'销售企业(下家)', width:110},
				{field:'sellPrice',title:'销售单价(元)', width:100,align:'right'},
				{field:'sellPayTime',title:'收款日期',width:130},
				{field:'balance',title:'差额(元)',width:80,align:'right'},
				{field:'transportAmount',title:'运费(元)',width:80,align:'right'},
				{field:'profit',title:'毛利(元)',width:100,align:'right'},
				{field:'bountyAmoun',title:'奖励金额(元)',widht:80,align:'right', formatter:function(value, row, index){
					if(row.bountyAmoun){
						return row.bountyAmoun.toFixed(2);
					}
				}},
				{field:'buyMatchName', title:'采购业务员', width:80},
				{field:'bounty',title:'奖励(元)',width:90,align:'right', formatter:function(value, row, index){
					if(row.bounty){
						return row.bounty.toFixed(2);
					}
				}},
				{field:'sellMatchName',title:'销售业务员', width:100},
				{field:'bounty',title:'奖励(元)',width:90,align:'right', formatter:function(value, row, index){
					if(row.bounty){
						return row.bounty.toFixed(2);
					}
				}}
			]],
			//toolbar:toolbar,
			onDblClickRow:function(index,row){
				lastIndex = index;
				editrow(row.id);
			},
			onClickRow:function(index,row){
				lastIndex = index;
			},
			onLoadSuccess:function(data){
				var total =$('#tt').datagrid('getData').total;
				if (lastIndex >total-1){
					lastIndex=total-1;
				}
				if (lastIndex){
					$('#tt').datagrid('selectRow', lastIndex);
				}
			}
		});

		$('#w').window({
			modal:true,
			closed: true,
			collapsible : false,
			minimizable : false,
			cache:false,
			iconCls:"",
			onClose:function(){
				$('#tt').datagrid('reload');
			}
		});
	});
	function exportExcel(){
    	$('#searchForm').form('submit', {url:_ctx+"/rpt/statistics/exportExcel"});
	}
</script>
</body>
</html>
