<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
<link th:href="@{/static/ueditor/third-party/webuploader/webuploader.css}" type="text/css" rel="stylesheet" />
</head>
<div class="easyui-layout" fit="true">
	<div region="north" border="false" id="inputForm" method="post" class="editForm_approve  editForm_approverela content_div">
		<input type="hidden" name="id" id="entityId" th:value="${entity.id}" />
		<input type="hidden" name="status" id="entityStatus" th:value="${entity.status}" />
		<input type="hidden" id="matchUserId" name="matchUserId"/>
		<input type="hidden" id="matchUserRela" name="matchUserName" value=""/>
		<input type="hidden" name="productName" id="productName" th:value="${entity.productName}" />
		<p class="p_text">
		<span class="input-colspan">
		<label >合同日期:</label>
		<input name="contractTime" class="easyui-datebox control" required="required" style="width:140px;height: 32px;" id="contractTime"  type="text" th:value="${#dates.format(entity.contractTime,'yyyy-MM-dd')}"></input>
		</span>
		<span class="input-colspan">
		<label>品名:</label>
		<input name="productCode" id="productCode" class="control"  type="text" th:value="${entity.productCode}"></input>
		</span>
		<span class="input-colspan">
		<label>我方抬头:</label>
		<input type="text" id="ourCompanyName"  class="control" name="ourCompanyName" th:value="${entity.ourCompanyName}"/>
		</span>
		<span class="input-colspan">
		<label>毛利润:</label>
		<input name="grossProfit" id="grossProfit" type="text" readonly="readonly" th:value="${entity.grossProfit}" class="control readonly text_padding"></input>
		</span>
		<span class="input-colspan">
		 <!-- <label>敞口业务:</label>
			<input type="checkbox" th:checked="${entity.exposureFlg}" style="width:18px;height:18px;" class="" onchange="selectExposureFlg(this)"/>
			<input type="hidden" name="exposureFlg" id="exposureFlg" th:value="${entity.exposureFlg}"/>
			<label></label> -->
			<label onchange="selectExposureFlg(this)" th:class="${entity.exposureFlg} ? 'ckbox on' : 'ckbox'">
				<span id="enableFlg" style="vertical-align: middle;">敞口业务</span>
	            <input type="checkbox" th:checked="${entity.exposureFlg}" onchange="$('#exposureFlg').val($(this).attr('checked')=='checked');" style="position: relative;top: 4px;"/>
                <input type="hidden" name="exposureFlg" id="exposureFlg" th:value="${entity.exposureFlg}" />
	          </label>
		</span>
		<span class="input-colspan">
		<label>业务员:</label>
		<input id="matchUserName" class="control text_padding" type="text"></input>
		</span>
		<span class="input-colspan slP hide">
		<label>牌号:</label>
		<input name="brandNumber" id="brandNumber" class="control brand" type="text" th:value="${entity.brandNumber}"></input>
		</span>
		</p>
	</div>

	<div region="center" style="padding:0;position: relative;overflow:hidden;" fit="true" border="false">
		<div id="btn" class="add-btn">
			<a th:if="${entity.status eq 'B' or entity.status eq 'N'}" href="#" class="easyui-linkbutton insertContent" data-options="iconCls:'icon-add'" onclick="insertRela(this)">新增</a>
		</div>
		<table id="relaTable" style="height: 120px;"
					title="" iconCls="icon-edit" singleSelect="true"
					idField="id">
		</table>

		<div class="editForm">
			<p>
				<span class="upload-btn" id="btn_fileId">
				 	<i></i>
	               	<span>附件上传</span>
	           	</span>
	           	<!-- <a id="btn_fileId" href="#" class="easyui-linkbutton" data-options="iconCls:'icon-upload'" style="width:106px;margin-top:10px;background:transparent;color: #2d2d2d;">上传附件 </a> -->
				<input class="control" id="fileId" name="fileId" type="hidden" th:value="${entity.fileId}" />
			</p>
			<p class="controls showImg fileId" id="span_fileId"></p>
		</div>
	</div>
</div>
<div id="w_contract_choose" class="easyui-window" title="合同详情" data-options="width:830,height:640">
</div>
 <div id="w_contract" class="easyui-window" style="width:915px;height:600px;display: none;"></div>
<script th:src="@{/static/ueditor/third-party/webuploader/webuploader.min.js}" type="text/javascript"></script>
<script th:src="@{/static/js/file.js?v=2}" type="text/javascript"></script>
<script type="text/javascript">
    var lastIndex;
    var clickIndex;
	var _companyJson = eval('[(${companyJson})]');
	var _ourCompanyJson = eval('[(${ourCompanyJson})]');
	var filePlugin = new FilePlugin('#fileId',$('#entityId').val(),'/bas/contractRela/updateFileId',[[${param.hasEditFile}]]);
	var _contractTypeJson = eval('[(${contractTypeJson})]');
	var _productDeliveryJson = eval('[(${productDeliveryJson})]');
	var _productJson = eval('[(${productJson})]');
	var matchUserNameTreeJson = eval('[(${matchUserNameTree})]');

	var _deliveryMode,_warehouse;
	var _contractTextIdArray={};
	$(function(){
		$('.easyui-linkbutton').linkbutton();
		$('#w_contract').window({
			title: '电子合同',
			modal:true,
			closed: true,
			collapsible : false,
			minimizable : false,
			cache:false
		});

		var _curStatus = $("#entityStatus").val();
		if(_curStatus&&(_curStatus=='N'||_curStatus=='B')){
			$(".insertContent").show();
			$("#ourCompanyName").combobox({
				data:_ourCompanyJson,
				textField:'dictName',
				valueField:'dictName',
				panelHeight:"auto"
			});
			$('#ourCompanyName').combobox('select', _ourCompanyJson[0].dictName);

			$('#w_contract_choose').window({
				title: '请选择合同',
				modal:true,
				closed: true,
				collapsible : false,
				minimizable : false,
				cache:false
			});


			$('#contractTime').datebox({
				height:30
			});

			$('.easyui-numberbox').numberbox({
			    min:0,
			    precision:2,
			    height:30
			});
			$('#productCode').combotree({
				data: _productDeliveryJson,
				multiple : false,
				editable : true,
				required:true,
				height:30,
				onSelect : function(node){
					if(node.children.length!=0){
						$('#productCode').combotree('clear');
					}else{
						//更新datagrid的deliveryMode和warehouse的下拉框
						var id = node.id
						$('#productName').val(node.text);
						updateGridTree(id,"insert");
						slTableShow(id);
					}
				},
				onLoadSuccess:function(){
					var _val = $('#productCode').combobox('getValue');
					if(_val){
						updateGridTree(_val,"load");
					}
				}
			});
			$('#matchUserName').combotree({
				data: matchUserNameTreeJson,
				multiple : false,
				editable : true,
				//required:true,
				height:30,
				formatter:function(node){
					var enableFlg = node.attributes.enableFlg;
					if (enableFlg==false){
						return '<span style="color:red;">'+node.text+'(无效)</span>';
					}
					return node.text;
				},
				onSelect : function(node){
					if(node.children.length!=0){
						$('#matchUserName').combotree('clear');
					}else{
						//更新datagrid的deliveryMode和warehouse的下拉框
						var id = node.id;
						$('#matchUserName').val(node.text);
						$("#matchUserRela").val(node.text)
						if(id.indexOf("user")>=0){
							id = id.replace("user","");
							$("#matchUserId").val(Number(id));
						}

					}
				}
			});
		};
		//若塑料有值，则要显示
		var _brandNumber = $("#brandNumber").val();
		if(_brandNumber){
			$(".slP").removeClass("hide");
		}

		var toolbar = [{
			id:'relaBtnAdd',
			text:'新增',
			iconCls:'icon-add',
			handler:function(){
				if(!lastIndex){
					lastIndex =1;
				}
				$('#relaTable').datagrid('endEdit', lastIndex);
				var field={};
				$('#relaTable').datagrid('appendRow',field);

				lastIndex = $('#relaTable').datagrid('getRows').length-1;
				$('#relaTable').datagrid('selectRow', lastIndex);
				$('#relaTable').datagrid('beginEdit', lastIndex);
				Convert.focusEditor("relaTable",field,lastIndex);
				var exposureFlg =$("#exposureFlg").val();
				if(exposureFlg=="true"){		//是敞口业务
					selectContract();
				}


// 				curOper(lastIndex);
			}
		},'-',{
			id:'btnDel',
			text:'删除',
			iconCls:'icon-remove',
			handler:function(){

			}
		},'-'];

		_beforSaveOper = true;
		var _url = _ctx+"/bas/contract/listChoose?sort=contractType&order=ASC&search_EQL_contractRelaId="+$("#entityId").val();
		$('#relaTable').datagrid({
			pageSize:50,
			rownumbers:true,
			url:_url,
			pagination:false,
			columns:[ [ {field:'contractType',title:'合同类别', width:120,editor:{type:'combobox',options:{required:'true',panelHeight:'auto',data:_contractTypeJson,textField:'dictName',valueField:'dictCd'}},
				formatter:function(value,row,index){
					return Convert.findValueByKey(_contractTypeJson,"dictCd",value,"dictName");
				}},
			{field:'buyOrSellContractNo',title:'选择合同',width:120,hidden:true,editor:{type:'text'}},
			{field:'buyOrSellContractId',hidden:true,title:'关联合同Id',editor:{type:'numberbox'}},
			{field:'remark',hidden:true,title:'原合同价格',editor:{type:'numberbox'}},
			{field:'contractNo',title:'合同编号', width:120,editor:{type:'validatebox',options:{required:'true',validType:'length[1,50]'}}},
			{field:'oppCompanyId',title:'企业名', width:120,editor:{type:'combobox',options:{required:'true',panelWidth:180,data:_companyJson,textField:'companyName',valueField:'id'}},
					formatter:function(value,row,index){
					return Convert.findValueByKey(_companyJson,"id",value,"companyName");
				}},
			{field:'dealPrice',title:'单价', width:90,editor:{type:'numberbox',options:{required:'true',validType:'length[1,20]',precision:2}}},
			{field:'dealNumber',title:'数量', width:80,editor:{type:'numberbox',options:{required:'true',validType:'length[1,20]',precision:4}},
				formatter: function (value, row, index) {
                    if (row != null) {
                        return parseFloat(value).toFixed(3);
                    }
			}},
			{field:'numberUnit',title:'单位', width:70,editor:{type:'textbox'}},
			{field:'dealAmount',title:'合同总价', width:100,editor:{type:'numberbox',options:{required:'true',validType:'length[1,20]',precision:2}}},
			{field:'bondRate',title:'定金(%)', width:70,editor:{type:'numberbox',options:{required:'true',validType:'length[1,20]'}}},
			{field:'deliveryMode', title:'交货方式', width:100,editor:{type:'combobox',options:{required:'true',panelHeight:'auto',data:_deliveryMode,textField:'dictName',valueField:'dictName'}}},
			{field:'warehouse',title:'仓库', width:100,editor:{type:'combobox',options:{required:'true',panelHeight:'auto',data:_warehouse,textField:'dictName',valueField:'dictName'}}},
			{field:'deliveryDateFrom',title:'交货期开始', width:120,editor:{type:'datebox',options:{required:'true'}}},
			{field:'matchUserName',title:'业务员',hidden:true,formatter:function(value,row,index){
				var _curMatchUserName = $('#matchUserName').val();
				if(value&&!_curMatchUserName){

					if(_curStatus&&(_curStatus=='A'||_curStatus=='D')){
						$('#matchUserName').val(value);
					}else{
						$('#matchUserName').combotree('setValue', row.matchUserName);
						$("#matchUserRela").val( row.matchUserName);
						$("#matchUserId").val(row.matchUserId);
					}


				}
			}},
			{field:'deliveryDateTo',title:'交货期结束', width:120, align:'center',editor:{type:'datebox',options:{}}},
			{field:'payTime',title:'付款日期', width:120,editor:{type:'datebox',options:{required:'true'}}},
			{field:'contractTextId',title:'电子合同',hidden:true,formatter:function(value,row,index){
				if(value){
					_contractTextIdArray[index] = value;
			}}},
			{field:'action',title:'操作', width:120, align:'center',formatter:function(value, row, index){
				var str = "";
				if(row.status==undefined||row.status=='N'||row.status=='B')
					str = '<img onclick="removeRela()" style="cursor:pointer;width:16px;hight:18px" src="/static/images/icon_delete.png"/>';
		        if((row.status=='D')){
		        	var _code = row.productCode.substr(0,2);
		        	if(_code == "SL"&&_contractTextIdArray[index])
		        	str = '<span onclick="printContract('+index+')" style="cursor:pointer;">合同预览</span>';
		        }
		        return str; }
			}
			]],
			//toolbar:'#btn',
			onDblClickRow:function(index,row,field){
				if (row.status=='N'||row.status=='B'){
					//进入可编辑状态
					$('#relaTable').datagrid('endEdit', lastIndex);
					$('#relaTable').datagrid('beginEdit', index);
					lastIndex = index;
					Convert.focusEditor("relaTable",field,lastIndex);
				}
			},
			onClickCell:function(index,field){
				var rows =$('#relaTable').datagrid('getData').rows;
				var row =rows[index];
				if (row.status=='N'||row.status=='B'){
					if (lastIndex != index){
						$('#relaTable').datagrid('endEdit', lastIndex);
						$('#relaTable').datagrid('beginEdit', index);
						var _val=$('#exposureFlg').val();
						var buyOrSelled=$("#relaTable").datagrid("getEditor",{index:index,field:'buyOrSellContractNo'});
						if(_val!="false"){
							$(buyOrSelled.target).bind("click",function(){
								contractBindClick(this);
							});
						}

					}
					lastIndex = index;
					Convert.focusEditor('relaTable',field,lastIndex);
				}
			},
			onBeginEdit:function(index,row){
				var ed_oppCompanyId = $('#relaTable').datagrid('getEditor', {index:index,field:'oppCompanyId'});//企业
				$(ed_oppCompanyId.target).combobox('options').onClick=function(record){
					var companyName =record.companyName;
					row.oppCompanyName=companyName;
				};
				$(ed_oppCompanyId.target).combobox('options').onSelect=function(record){
					var companyName =record.companyName;
					row.oppCompanyName=companyName;
				};
				curOper(index,row);
				//交货期开始时间
				var _deliveryDateFrom = $('#relaTable').datagrid('getEditor',{index: index, field:'deliveryDateFrom'});
				//交货期结束时间
				var _deliveryDateTo = $('#relaTable').datagrid('getEditor',{index: index, field:'deliveryDateTo'});
				$(_deliveryDateFrom.target).datebox('options').onSelect=function(beginDate){
					$(_deliveryDateTo.target).datebox('setValue','');
					var c = $(_deliveryDateTo.target).datebox('calendar');
						c.calendar({
							validator: function(date){
								var d = new Date(beginDate.getFullYear(), beginDate.getMonth(), beginDate.getDate());
								return d<date;
							}
						});
				}
			},
			onClickRow:function(index,row){
				lastIndex = index;
			},
			onLoadSuccess:function(){
				var _panel = $("#inputForm").find(".panel");
				_panel.find(".datagrid-wrap").css("height", 180+"px");
				_panel.find(".datagrid-view").css("height", 170+"px");
				_panel.find(".datagrid-body").css("height", 170+"px");

				viewSelectContract();
			}
		});

		//加载附件列表
		filePlugin.load($('#fileId').val(),'#span_fileId');
		if ($("#btn_fileId").length>0){
			fileUpload("btn_fileId", "fileId");
		}

		$("#relaTable").find(".panel").find(".datagrid-wrap").css("height", 450 + "px");

		if(_curStatus&&(_curStatus=='A'||_curStatus=='D')){
			var _productCode = $("#productCode").val();
			slTableShow(_productCode);
			var ConvertproductCode = Convert.findValueByKey(_productJson,"typeCode",_productCode,"typeName");
			$("#productCode").val(ConvertproductCode);
			$("#inputForm").find(".control").attr("readonly",true);
			$("[type='checkbox']").removeAttr("onchange");
			$(".textbox-text").addClass("readonly");
		}else{
			//判断是否是塑料
			var _productCode = $("#productCode").val();
			if(_productCode&&_productCode.indexOf("SL")>=0){
				slTableShow(_productCode);
			}
		}

		$.extend($.fn.validatebox.methods, {

		    remove: function (jq, newposition) {
		        return jq.each(function () {
		            $(this).removeClass("validatebox-text validatebox-invalid").unbind('focus').unbind('blur');
		        });
		    },

		    reduce: function (jq, newposition) {
		        return jq.each(function () {
		            var opt = $(this).data().validatebox.options;
		            $(this).addClass("validatebox-text").validatebox(opt);
		        });
		    }
		});

});
function slTableShow(id){
	//如果品名为塑料类
	if(id.indexOf("SL")>=0){
		$(".slP").removeClass("hide");
		$("#relaTable").datagrid("hideColumn", "deliveryDateTo");
	}else{
		$(".slP").addClass("hide");
		$("#relaTable").datagrid("showColumn", "deliveryDateTo");
	}
}
//新增合同审批
function insertRela(){
	if(!lastIndex){
		lastIndex =1;
	}
	$('#relaTable').datagrid('endEdit', lastIndex);
	var field={};
	$('#relaTable').datagrid('appendRow',field);

	lastIndex = $('#relaTable').datagrid('getRows').length-1;
	$('#relaTable').datagrid('selectRow', lastIndex);
	$('#relaTable').datagrid('beginEdit', lastIndex);
	Convert.focusEditor("relaTable",field,lastIndex);
	var exposureFlg =$("#exposureFlg").val();
	if(exposureFlg=="true"){		//是敞口业务
		selectContract();
	}
}
function removeRela(){
	var row = $('#relaTable').datagrid('getSelected');
	if(row){
		var index = $('#relaTable').datagrid('getRowIndex', row);
		if (row.id==undefined){
			$('#relaTable').datagrid('deleteRow',index);
		}else{
		$.messager.confirm('提示','确认要删除该记录吗?',function(t){
			if(t){
				//TODO:如果该记录被引用,是否强制不允许删除?
				/* $.post(_ctx+"/pm/approve/delete/"+row.id,function(result) {
					var rObj = eval(result);
					if(rObj.success){
						$('#relaTable').datagrid('reload');
					}else{
						 $.messager.alert('error',rObj.failure,'warning');
					}
				}); */
				$('#relaTable').datagrid('deleteRow', index);
					var nextSelect=index>0?index-1:0;
					$('#relaTable').datagrid('selectRow', nextSelect);
			}
		});
		}
	}
}

function updateGridTree(id,type){
	$.get( _ctx+"/bas/contractRela/template/"+id,function(data){
		if(data.success){
			var _result =eval('(' + data.success + ')');
			_deliveryMode = eval(_result.DELIVERYMODE);
			_warehouse = eval(_result.WAREHOUSE);
			var _datagrid = $('#relaTable');
			if(typeof(lastIndex)!="undefined"){
				//若有datagrid数据，则仓库、交收方式下拉框重新选择
				var _datagrid = $('#relaTable');
	            var length=_datagrid.datagrid('getRows').length;
				for(var i=0;i<length;i++){
					var ed =  _datagrid.datagrid("getEditor",{index:i,field:"deliveryMode"});
				    $(ed.target).combobox('loadData',_deliveryMode);
				    if(type!="load")
				    	$(ed.target).combobox('setValue',"");
				    ed =  _datagrid.datagrid("getEditor",{index:i,field:"warehouse"});
				    $(ed.target).combobox('loadData',_warehouse);
				    if(type!="load")
				    	$(ed.target).combobox('setValue',"");

				}

			}
		}

	});
}
//发起申请前操作
function beforSaveOper(){
	//查询数量是否一致
	var _buyNumber = 0;  //买卖数量
	var _sellNumber = 0;
	var _datagrid = $('#relaTable');
	var _data=_datagrid.datagrid('getRows');
	var length = _data.length;
	var exposureFlg =$("#exposureFlg").val();
	var rtn=true;
	var typeVal;
	if(exposureFlg=="true"){  // 是否为敞口业务  合同类型必须
		for(var i=0;i<length;i++){
			var _type;
			$('#relaTable').datagrid('beginEdit', i);
			var edType =  _datagrid.datagrid("getEditor",{index:i,field:"contractType"});
				if(edType){
					_type = $(edType.target).combobox('getValue');
					if(i==0){
						typeVal=_type;
					}
					if(_type!=typeVal && i!=0){
						$.messager.alert({
							width:358,
							height:170,
							title: '提示',
							msg: '敞口业务的合同类型必须一致！',
							ok: "确定",
							icon: "info",
							cls:'c9',
							border:'thin',
							fn: function(r){

				            }
				        });
						//$.messager.alert('提示','敞口业务的合同类型必须一致！','info');
						return false;
					}
				}
				$('#relaTable').datagrid('endEdit', i);
		}
	}else{
		for(var i=0;i<length;i++){
			var _type,_dealNumber;
			var edType =  _datagrid.datagrid("getEditor",{index:i,field:"contractType"});
			var ed =  _datagrid.datagrid("getEditor",{index:i,field:"dealNumber"});
			if(edType&&ed){
				_dealNumber = $(ed.target).numberbox('getValue');
				_type = $(edType.target).combobox('getValue');
			}else{
				_type = _data[i].contractType;
				_dealNumber = _data[i].dealNumber;
			}

		   if(_type=='B'){
			   _buyNumber += Number(_dealNumber);
		   }else if(_type=='S'){
	    		_sellNumber += Number(_dealNumber);
	    	}
		}
		if(_buyNumber==0 && _sellNumber==0){
			$.messager.alert({
				width:358,
				height:170,
				title: '提示',
				msg: '无法保存，请新增合同数据！',
				ok: "确定",
				icon: "info",
				cls:'c9',
				border:'thin',
				fn: function(r){

	            }
	        });
			//$.messager.alert('提示','无法保存，请新增合同数据！','info');
			return false;
		} else if(_buyNumber==0 || _sellNumber==0){
			$.messager.alert({
				width:358,
				height:170,
				title: '提示',
				msg: '请选择敞口业务!',
				ok: "确定",
				icon: "info",
				cls:'c9',
				border:'thin',
				fn: function(r){

	            }
	        });
			//$.messager.alert('提示',"请选择敞口业务",'info');
			return false;
		}
	}
	var changeRows=$('#relaTable').datagrid('getChanges','inserted','updated');
	for(var i=0;i<changeRows.length;i++){
		var rowIndex=$('#relaTable').datagrid('getRowIndex',changeRows[i]);
		flag=$('#relaTable').datagrid('validateRow',rowIndex);
		if (!flag){
			$('#relaTable').datagrid('selectRow',rowIndex);
			$('#relaTable').datagrid('beginEdit', rowIndex);
			break;
		}else{
			$('#relaTable').datagrid('endEdit', rowIndex);
		}
	}
	$('#relaTable').datagrid('endEdit', lastIndex);
    Convert.setChildren2Form("inputFormApprove","relaTable");
	return true;
}

//计算毛利率
function curGrossProfit(){
	var _datagrid = $('#relaTable');
	var _data=_datagrid.datagrid('getRows');
	var length = _data.length;
	var _val=$('#exposureFlg').val();
	//如果是敞口业务、且为销售，则利润计算方式改变
	if(_val=="true"){
		var _nowGrossProfit = 0;
		//若为销售合同，则需要计算毛利率
		for(var i=0;i<length;i++){
			var _type,_oldPrice =0,_nowNumber = 0,_nowPrice = 0;
			var edType =  _datagrid.datagrid("getEditor",{index:i,field:"contractType"});
			var _oldDealPrice =  _datagrid.datagrid("getEditor",{index:i,field:"remark"});
			var _nowDealPrice =  _datagrid.datagrid("getEditor",{index:i,field:"dealPrice"});
			var _nowDealNumber =  _datagrid.datagrid("getEditor",{index:i,field:"dealNumber"});
			if(edType){
				_type = $(edType.target).combobox('getValue');
				_oldPrice = $(_oldDealPrice.target).numberbox('getValue');
				//_nowPrice = $(_nowDealPrice.target).numberbox('getValue');
				_nowPrice= $(_nowDealPrice.target).numberbox('textbox').val();
				_nowNumber = $(_nowDealNumber.target).numberbox('getValue');

			}else{
				_type = _data[i].contractType;
				_oldPrice = _data[i].remark;
				_nowPrice = _data[i].dealPrice;
				_nowNumber = _data[i].dealNumber;
			}
			if(_oldPrice!=0&&_nowNumber!=0){
				_nowGrossProfit = _nowGrossProfit+(_nowPrice-_oldPrice)*_nowNumber;
			}

		}
		if(_nowGrossProfit < 0){
			_nowGrossProfit=0;
		}
		$("#grossProfit").val(_nowGrossProfit);
	}else{
		var buyAmount = 0;
		var sellAmount = 0;
		for(var i=0;i<length;i++){
			var _type,_dealAmount;
			var edType =  _datagrid.datagrid("getEditor",{index:i,field:"contractType"});
			var ed =  _datagrid.datagrid("getEditor",{index:i,field:"dealAmount"});
			var buyOrSelled=$("#relaTable").datagrid("getEditor",{index:i,field:'buyOrSellContractNo'});
			if(edType&&ed){
				_dealAmount = $(ed.target).numberbox('getValue');
				_type = $(edType.target).combobox('getValue');
			}else{
				_type = _data[i].contractType;
				_dealAmount = _data[i].dealAmount;
			}

			//去掉选择合同验证
			if(buyOrSelled)
			$(buyOrSelled.target).validatebox('remove');

			/*
			 */
			if(_dealAmount&&_type){
				if(_type=='B'){
			    	  buyAmount += Number(_dealAmount);
				   }
			    	if(_type=='S'){
			    		sellAmount += Number(_dealAmount);
			    	}
			}

		}
	    var resultAmount = (sellAmount-buyAmount).toFixed(2);
	    if(resultAmount<0){
	    	resultAmount = 0;
	    }
		$("#grossProfit").val(resultAmount);
	}
}

function selectExposureFlg(obj){
	$(obj).toggleClass('on');

	var _val=$('#exposureFlg').val();

		var _data=$("#relaTable").datagrid('getRows');

			$('#relaTable').datagrid('beginEdit', i);
			var ed=$("#relaTable").datagrid("getEditor",{index:i,field:'buyOrSellContractNo'});
			if(ed){
				if(_val=="true"){
					 $("#relaTable").datagrid("showColumn", "buyOrSellContractNo");
					ed.target.prop('readonly', true);
					$(ed.target).bind("click",function(){
						contractBindClick(this);
					});
				}else{
					ed.target.prop('readonly', false);
					$(ed.target).val('');
					$(ed.target).validatebox('remove');

					$("#relaTable").datagrid("hideColumn", "buyOrSellContractNo");
				}
			}
		}
}

function contractBindClick(dom){

	//获取合同类型
	var edType=$("#relaTable").datagrid("getEditor",{index:clickIndex,field:'contractType'});
	var _typeVal=$(edType.target).val();
	if(_typeVal){

//设置合同
function setContractVal(val){
	var _val=val[0].contractNo;

	var bondRate=$("#relaTable").datagrid("getEditor",{index:clickIndex,field:'bondRate'});
	$(bondRate.target).numberbox("setValue",val[0].bondRate);

	//交货方式
	var delMode=$("#relaTable").datagrid("getEditor",{index:clickIndex,field:'deliveryMode'});
	$(delMode.target).combobox("setValue",val[0].deliveryMode);

	//仓库
	var wareEd=$("#relaTable").datagrid("getEditor",{index:clickIndex,field:'warehouse'});
	$(wareEd.target).combobox("setValue",val[0].warehouse);

	//交货期开始
	var deliveryFrom=$("#relaTable").datagrid("getEditor",{index:clickIndex,field:'deliveryDateFrom'});
	$(deliveryFrom.target).datebox("setValue",val[0].deliveryDateFrom);
