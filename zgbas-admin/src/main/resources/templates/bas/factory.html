 <div region="north" class="search_div pt20	pl20 pr20 pb15 ofh" border="false">
	<form id="searchForm" class="form-search from-input-layout" method="post">
		<div class="mb6">
			<p class="yw-table-filter">

			<p class="yw-table-filter">

			<p class="yw-table-filter">

	function insert(){
		$("#tt").datagrid("appendRow",{factoryName:'',contactName:'',contactPhone:'',remark:'',enableFlg:''});
		var rows=$("#tt").datagrid('getRows');
		$("#tt").datagrid('beginEdit', rows.length - 1);
	}
 	function validateFactoryName(row){
		var _val = $.trim(row.factoryName);
		var _id = row.id;
		var flag=true;
		if(""==_val){
			flag= false;
			return flag;
		}
		if(row!=null){
		  _id = row.id;
		}$.ajax({
			"url":_ctx+"/bas/factory/validateFactory",
			"type":"GET",
			"async":false,
			"data":{factoryName:_val,id:_id},
			beforeSend:function(){
			},success:function(data){
				if(data.failure){
					$.messager.alert('提示','厂商（'+_val+'）已存在','info');
					flag = false;
				}
			}
		});
		return flag;
	}
 	function saveEdit(){
		var flag=true;
		var row = $('#tt').datagrid('getSelected');
		if (row){
			var index = $('#tt').datagrid('getRowIndex', row);
			$('#tt').datagrid('endEdit', index);
		}
		var changeRows=[];
		var inserted = $('#tt').datagrid('getChanges','inserted');
		var updated = $('#tt').datagrid('getChanges','updated');
		changeRows = inserted.concat(updated);
    	for(var i=0;i<changeRows.length;i++){
			var index = $('#tt').datagrid('getRowIndex', changeRows[i]);
			flag=$('#tt').datagrid('validateRow',index);
    		if (!flag){
    			$('#tt').datagrid('selectRow',index);
    			$('#tt').datagrid('beginEdit', index);
				break;
    		}else{
    			$('#tt').datagrid('endEdit', index);
    		}
		}
		if (flag){
		$.post(_ctx+"/bas/factory/saveBatch",Convert.ToSaveParam("tt") , function(result) {
			var rObj = eval(result);
			if(rObj.success){
				$('#tt').datagrid('reload');
			}else{
				$.messager.alert('error',rObj.failure,'warning');
			}
		});
		}
	}

	function ajaxPost(param){
		$.post(_ctx+"/bas/factory/save",{param:param},function(data){
			var rObj = eval(data);
			if(rObj.success){
				$.messager.alert("提示","保存成功");
				$('#tt').datagrid('reload');
			}else{
				$.messager.alert("提示","请联系管理员");
			}
		});
	}
	function endEdit(){
		var rows=$("#tt").datagrid('getRows');
		for(var i=0;i<rows.length;i++){
			//验证没通过 不关闭编辑器
			if($("#tt").datagrid("validateRow",i)){
				$("#tt").datagrid("endEdit",i);
			}
		}
	}
	function save(){
		endEdit();
		//$("#tt").datagrid("endEdit",index);
		var val=$("#tt").datagrid("getChanges");
		for(i=0;i<val.length;i++){
			var index=$('#tt').datagrid("getRowIndex",val[i]);
		}
		if($.isEmptyObject(val)){return false}
		var param=JSON.stringify(val);
		ajaxPost(param);
	}

	function remove(id){
	    $('#tt').datagrid('selectRecord',id);
		var row = $('#tt').datagrid('getSelected');
		if(row){
			var index = $('#tt').datagrid('getRowIndex', row);
			if (row.id==undefined){
				$('#tt').datagrid('deleteRow',index);
			}else{
				$.messager.confirm({
					width:388,
					height:170,
					title: '删除提示',
					msg: '确定要删除该信息吗？',
					ok: "确定",
					cancel: "取消",
					cls:'c9',
					border:'thin',
					fn: function(r){
		                if (r){
		                	//TODO:如果该记录被引用,是否强制不允许删除?
							$.post(_ctx+"/bas/factory/delete/"+row.id,function(result) {
								var rObj = eval(result);
								if(rObj.success){
									$('#tt').datagrid('reload');
									$('#tt').datagrid('clearSelections');
								}else{
									 $.messager.alert('error',rObj.failure,'warning');
								}
							});
		                }
		            }
		        });
			}
		}
