<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
<title>牌号管理</title>
<th:block th:replace="~{layouts/include :: include}"></th:block>

</head>
<body class="easyui-layout">
<div region="north" class="search_div" border="false" style="height: 100px">
	<form id="searchForm" class="form-search from-input-layout" method="post" >
		<p class="p_text">
			<span class="input-colspan">
				<label>单价地区:</label>
				<input name="search_EQS_areaCode" id="srh_areaCode" type="text" value=""/>
			</span>		
			
			<span class="btn-group">
				<a href="#" id="btn" iconCls="icon-search" class="easyui-linkbutton" onclick="Convert.search('searchForm','tt');">查询</a>
				<a href="#" id="btn" iconCls="icon-clear" class="easyui-linkbutton" onclick="$('#searchForm').form('reset');">清空</a>
			</span>						
		</p>
	</form>
	<div id="btn" class="add-btn" style="margin-top: 10px">
		  <a  href="#" class="easyui-linkbutton addBtn" data-options="iconCls:'icon-add'" onclick="insert()">新增</a>
		  <a  href="#" class="easyui-linkbutton btn-info-empty" data-options="iconCls:'icon-save'" onclick="saveEdit()">保存</a>
		  <!-- <a  href="#" class="easyui-linkbutton btn-info-empty" data-options="iconCls:'icon-excelUpload'" onclick="openDialog()" id="uploadBtn">上传</a> -->
	</div>		
</div>
<div region="center" border="false" class="panel_padding" style="padding-right:30px;">
	<table id="tt" fit="true"
			title="" iconCls="icon-edit" singleSelect="true"
			idField="id">
	</table>
</div>

<div id="dlg" data-options="width:350,height: 240,border:'thin',collapsible: false,minimizable: false,cls:'c9'">
	<form id="uploadForm" enctype="multipart/form-data">
    	<div class="uploadDiv">
    		<input type="file" name="file" id="uploadExcelFile">
    	</div>
    </form>
</div>
<script th:src="@{/static/js/areaJson.js?v=2}" type="text/javascript"></script>
<script type="text/javascript">
	var lastIndex;
	var _bsAreaJson = areaJson;
	var enterpriseId = eval('[(${enterpriseId})]');
	$(function(){
		$('#tt').datagrid({
			pagination:true,
			pageSize:20,
			rownumbers:true,
			pageList:[50,40,30,20,10],
			url:_ctx+"/bs/areaCost/findAreaCosts",
			columns:[ [
				{field:'areaCode',title:'区域名称',align:'center',width:160,editor:{ type:'combotree',options:{required:'true',panelWidth:160,panelHeight:300,data:_bsAreaJson,onBeforeExpand:function(node){}}},
					formatter:function(value,row,index){
						return Convert.findTreeValueByKey(_bsAreaJson,"id",value,"text");
				}},
				{field:'warehouseUnitCost',title:'仓储费单价(元)', width:180,editor: { type: 'numberbox',options:{required:true}}},
				{field:'enterpriseId',title:'业务员id', width:180,hidden:'hidden',editor: { type: 'validatebox',options:{required:false}},formatter:function(value,row,index){
					return enterpriseId;
				}},
				{field:'remark',title:'备注', width:100,editor: { type: 'validatebox',options:{required:false}}},
				{field:'operate',title:'操作', width:120,align:'center',formatter:function(value, row, index){  
			        var str = '<img onclick="remove('+row.id+')" style="cursor:pointer;width:16px;hight:18px" src="../static/new-version/images/icon_delete.png"/>';  
			        return str;
				}}
			]],
			toolbar:'#toolbar',
			onDblClickCell:function(index,field){
				$('#tt').datagrid('endEdit', lastIndex);
				$('#tt').datagrid('beginEdit', index);
				lastIndex = index;
				Convert.focusEditor("tt",field,lastIndex);
			},
			onBeginEdit:function(index,row){
				var ed_areaCode = $('#tt').datagrid('getEditor', {index:index,field:'areaCode'});
				$(ed_areaCode.target).combotree('options').onClick = function(record){
					if(record.children.length!=0){
						$(ed_areaCode.target).combotree('clear'); 
					}else{
						//后台查找是否已经存在
						$.post(_ctx+"/bs/areaCost/ajaxfindByAreaCode?id="+record.id,function(data){
							var rObj = eval(data);
				 			if(rObj != undefined && record.id == rObj.areaCode){
				 				$.messager.alert("提示:","地区单价已存在!");
				 				$(ed_areaCode.target).combotree('clear'); 
							}else{
								 //$.messager.alert("提示","提示信息");
								$(ed_areaCode.target).combotree('setValue',record.id);	
				 			}
				 		});
					}
				}
			}
		});
		
		//品名下拉
	    $('#srh_areaCode').combotree({
			data:_bsAreaJson, 
			valueField:'id',
			textField:'text',
			onSelect : function(node){
				if(node.children.length!=0){
					$('#srh_areaCode').combotree('clear'); 
				}else{
					$('#srh_areaCode').combotree('setValue',node.id);	
					
				}
			} 
		});
		
	});
	

	function insert(){
		$("#tt").datagrid("appendRow",{areaCode:'',warehouseUnitCost:'',remark:'',enterpriseId:enterpriseId});
		var rows=$("#tt").datagrid('getRows');					
		$("#tt").datagrid('beginEdit', rows.length - 1);
	}
	
	function saveEdit(){
		var flag=true;
		var row = $('#tt').datagrid('getSelected');
		if (row){
			var index = $('#tt').datagrid('getRowIndex', row);
			$('#tt').datagrid('endEdit', index);
		}
		var changeRows=[];
		var inserted = $('#tt').datagrid('getChanges','inserted');
		var updated = $('#tt').datagrid('getChanges','updated');
		changeRows = inserted.concat(updated);
    	for(var i=0;i<changeRows.length;i++){
			var index = $('#tt').datagrid('getRowIndex', changeRows[i]);
			flag=$('#tt').datagrid('validateRow',index);
    		if (!flag){
    			$('#tt').datagrid('selectRow',index);
    			$('#tt').datagrid('beginEdit', index);
				break;
    		}else{
    			$('#tt').datagrid('endEdit', index);
    		}
		}
		if (flag){
			$.post(_ctx+"/bs/areaCost/saveBatch",Convert.ToSaveParam("tt") , function(result) {
				var rObj = eval(result);
				if(rObj.success){
					$.messager.show({
						title : 'Tip',
						msg : rObj.success,
						timeout : 2000,
						showType : 'show'
					});
					$('#w').window("close");
					$('#tt').datagrid('reload');
				}else{
					$.messager.alert('error',rObj.failure,'warning');
				}
			});
		}
	}
	
	function remove(id){
 	    $('#tt').datagrid('selectRecord',id);
		var row = $('#tt').datagrid('getSelected');
		if(row){
			var index = $('#tt').datagrid('getRowIndex', row);
			if (row.id==undefined){
				$('#tt').datagrid('deleteRow',index);
			}else{
				$.messager.confirm({
					width:388,
					height:170,
					title: '删除提示',
					msg: '确定要删除该信息吗？',
					ok: "确定",
					cancel: "取消",
					cls:'c9',
					border:'thin',
					fn: function(r){
		                if (r){
		                	//TODO:如果该记录被引用,是否强制不允许删除?
							$.post(_ctx+"/bs/areaCost/delete/"+row.id,function(result) {
								var rObj = eval(result);
								if(rObj.success){
									$('#tt').datagrid('reload');
									$('#tt').datagrid('clearSelections');
								}else{
									 $.messager.alert('error',rObj.failure,'warning');
								}
							});
		                }
		            }
		        });		
			}
		}
	}

</script>
</body>
</html>
