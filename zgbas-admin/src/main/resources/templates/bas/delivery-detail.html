<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
<link th:href="@{/static/ueditor/third-party/webuploader/webuploader.css}" type="text/css" rel="stylesheet" />
<style>
.webuploader-pick{background: #ffffff!important;}
.webuploader-pick-hover{background: #ffffff!important;}
.showImg span img{width: 60px;height: 60px;border: 1px solid #e5e5e5;cursor:pointer;}
.showImg span a{font-size: 12px;text-align: center;cursor: pointer;display: block;margin-top: 2px;height: 16px;}
/* .date .datebox {width:220px!important;height:30px!important;border-radius: 4px!important;}
.date input {width:220px;height:30px!important;font-size:14px!important;} */
</style>
</head>
<div class="easyui-layout" fit="true">
	<div region="center" style="padding:5px 20px 5px 5px;+position: relative;overflow:hidden;" border="false">
		<form id="inputForm" method="post" class="editForm" style="margin-top: 10px;margin-bottom: 0;padding-left:20px;overflow:hidden;">
			<input type="hidden" name="id" id="entityId" th:value="${entity.id}" />
			<input type="hidden" name="contractId" id="contractId" th:value="${entity.contractId}" />
			<input type="hidden" name="contractNo" id="contractNo" th:value="${entity.contractNo}" />
			<input type="hidden" name="productCode" id="productCode" th:value="${entity.productCode}" />
			<p>
			<span>
			<label for="businessNo"  class="control-label">业务编号:</label>
			<input name="businessNo" id="businessNo" class="control readonly largemid" readonly type="text" th:value="${entity.businessNo}"></input>
			</span>
			</p>
			<P>
			<span>
			<label for="companyId"  class="control-label">企业名称:</label>
			<input type="hidden" name="companyName" id="companyName" />
			<input name="companyId" id="companyId" class="control" type="text" th:value="${entity.companyId}"></input>
			</span>
			<span>
			<label for="productName"  class="control-label">商品名称:</label>
			<input name="productName" id="productName" class="control" type="text" th:value="${entity.productName}"></input>
			</span>
			</P>
			<p>
			<span>
			<label for="deliveryDate"  class="control-label">交货日期:</label>
			<input name="deliveryDate" id="deliveryDate" class="control" type="text" th:value="${#dates.format(entity.deliveryDate,'yyyy-MM-dd')}"></input>
			</span>
			<span>
			<label for="status"  class="control-label">状态:</label>
			<input name="status" id="status" class="control" type="text" th:value="${entity.status}"></input>
			</span>
			</p>
			<p>
			<span>
			<label for="dealPrice"  class="control-label">单价:</label>
			<input name="dealPrice" id="dealPrice" class="control" type="text" th:value="${entity.dealPrice}"></input>
			</span>
			<span>
			<label for="dealNumber"  class="control-label">&nbsp;&nbsp;&nbsp;&nbsp;数量:</label>
			<input name="dealNumber" id="dealNumber" class="control" type="text" th:value="${entity.dealNumber}"></input>
			</span>
			</p>
			<p>
			<span>
			<label for="numberUnit"  class="control-label">数量单位:</label>
			<input name="numberUnit" id="numberUnit" class="control" type="text" th:value="${entity.numberUnit}"></input>
			</span>
			<span>
			<label for="deliveryMode"  class="control-label">提货方式:</label>
			<input name="deliveryMode" id="deliveryMode" class="control " readonly="readonly"  type="text"  th:value="${entity.deliveryMode}"></input>
			</span>
			</p>
			<p>
			<span>
			<label for="deliveryNo"  class="control-label">交割凭证:</label>
			<input name="deliveryNo" id="deliveryNo" class="control " type="text"  th:value="${entity.deliveryNo}"></input>
			</span>
			<span>
			<label for="warehouse"  class="control-label">仓库:</label>
			<input name="warehouse" id="warehouse" class="control " type="text"  th:value="${entity.warehouse}"></input>
			</span>
			</p>
			<p>
			<span>
			<label for="brandNumber"  class="control-label">牌号:</label>
			<input name="brandNumber" id="brandNumber" class="control " type="text"  th:value="${entity.brandNumber}"></input>
			</span>
			<span>
			<label for="warehouseAddress"  class="control-label">仓库地址:</label>
			<input name="warehouseAddress" id="warehouseAddress" class="control " type="text"  th:value="${entity.warehouseAddress}"></input>
			</span>
			</p>
			<p>
			<span>
			<label for="driverCardNo"  class="control-label">身份证号:</label>
			<input name="driverCardNo" id="driverCardNo" class="control largemid"  type="text"  th:value="${entity.driverCardNo}"></input>
			</span>
			</p>
			<p>
			<span>
			<label for="remark"  class="control-label">备注:</label>
			<input name="remark" id="remark" class="control largemid" type="text" th:value="${entity.remark}"></input>
			</span>
			</p>
			<p>
			<span class="btn_com float_left bgbai borderNone fjsc_span" id="btn_fileId">
				 <i class="float_left i_scfj"></i>
                <span class="float_left fontBlack fjsc_text">附件上传</span>
             </span>
			<input class="control" id="fileId" name="fileId" type="hidden" th:value="${entity.fileId}" />
			</p>
			<p class="controls showImg fileId" id="span_fileId">

			</p>
			</form>
	</div>
	<div region="south" border="false" style="overflow: hidden;height: 40px;" class="panel_padding">
		<div class="actions_bar">
		<a href="#" class="easyui-linkbutton btn" data-options="iconCls:'icon-save'" onclick="save();">保存</a>
		</div>
	</div>
	</div>
<script th:src="@{/static/ueditor/third-party/webuploader/webuploader.min.js}" type="text/javascript"></script>
<script th:src="@{/static/js/file.js?v=2}" type="text/javascript"></script>
<script type="text/javascript">
	var imgShowUrl =_filePath+'/view/small/';
	var filePlugin = new FilePlugin('#fileId',$('#entityId').val(),'/bas/delivery/updateFileId');

	$(function(){

		$("#status").combobox({
			data:approveStatusJson,
			textField:'dictName',
			valueField:'dictCd',
			readonly: true,
			editable:false
		});
		$("#companyId").combobox({
			data:companyJson,
			textField:'companyName',
			valueField:'id',
			readonly: true,
			editable:false,
			onSelect:function(record){
				$('#companyName').val(record.companyName);
			}
		});


 		$('#dealPrice,#dealNumber,#receiveAmount').numberbox({
 		    min:0,
 		    precision:4,
 		   readonly: true,
 		});


		$('#productName,#numberUnit,#businessNo').validatebox({
			readonly: true,
		});


		$('#deliveryDate').datebox({
			readonly: true
		});

		//加载附件列表
		filePlugin.load($('#fileId').val(),'#span_fileId');

		fileUpload("btn_fileId", "fileId");
// 		window.setTimeout(function(){
// 		},2000);

	});


	 	$('#dealPrice').numberbox('textbox').on('keyup',function(){
	 		var dealNumber =$('#dealNumber').numberbox('getValue');
	 		var dealPrice = $(this).val();
	 		var dealAmount = (dealNumber*dealPrice).toFixed(2);
	 		$('#dealAmount').val(dealAmount);

	 	});
	 	$('#dealNumber').numberbox('textbox').on('keyup',function(){
	 		var dealPrice =$('#dealPrice').numberbox('getValue');
	 		var dealNumber = $(this).val();
	 		var dealAmount = (dealNumber*dealPrice).toFixed(2);
	 		$('#dealAmount').val(dealAmount);

	 	});

	 	//选择合同
	 	function openChoose(){
			var url=_ctx+"/bas/contract/choose";
			$('#w_contract_choose').attr('callbackExec', 'chooseCallback');
			$('#w_contract_choose').window({href:url});
			$('#w_contract_choose').window("open");
		}
		function chooseCallback(contractRows){
			var contract = contractRows[0];
			if (contract!=undefined){
				$("#contractId").val(contract.id);
				$("#businessNo").val(contract.businessNo);
				$("#contractNo").val(contract.contractNo);
				$("#productCode").val(contract.productCode);
				$("#productName").val(contract.productName);
				$("#dealPrice").numberbox('setValue',contract.dealPrice);
				$("#dealNumber").numberbox('setValue',contract.dealNumber);
				$("#taxAmount").val(contract.taxAmount);
				$("#dealAmountNotax").val(contract.dealAmountNotax);
				$("#dealAmount").val(contract.dealAmount);
				$("#numberUnit").val(contract.numberUnit);
				$("#companyId").combobox('setValue',contract.oppCompanyId);
				$("#companyName").val(contract.oppCompanyName);
				$("#companyId").combobox('select',contract.oppCompanyId)

				$("#companyId").combobox('validate');
				$("#productName").validatebox('validate');
				$("#numberUnit").validatebox('validate');
				$("#businessNo").validatebox('validate');
			}

		}

		function fileUpload(fileUploadId, fuSaveId) {
			var $this = $('#' + fuSaveId);
			// fileUploadId:点击弹出选择文件事件的dom对象
			// fusaveId:文件上传成功后，保存的服务文件Id
			// --start-文件上传---
			var uploader = WebUploader.create({
				auto : true,
				// swf文件路径
				swf : _ctx + '/static/webuploader-0.1.5/Uploader.swf',
				// 文件接收服务端。
				server : _ctx + '/file/uploadFile',
				// 选择文件的按钮。可选。
				// 内部根据当前运行是创建，可能是input元素，也可能是flash.
				pick : '#' + fileUploadId,
				// 不压缩image, 默认如果是jpeg，文件上传前会压缩一把再上传！
				resize : false,
				duplicate :true ,//true可重复上传，默认不可多次重复上传
				// 只允许选择图片文件。
				accept : {
					title : 'file',
					extensions : 'gif,jpg,jpeg,bmp,png,pdf,rar,zip,doc,docx,xlsx,xls',
//	 				mimeTypes :	"image/*"
// 					mimeTypes :	"image/jpg,image/jpeg,image/gif,image/bmp,image/png"
					mimeTypes: "*"
				}
			});
			// 去掉文件上传组件样式，使用上传dom 自己样式
			$(".webuploader-pick").removeClass();

			uploader.on('beforeFileQueued', function(file) {
				$.messager.progress('close');
				if(file &&file.size > 10485760){
					$.messager.alert('tip',"上传文件不能超过10M!",'info');
					return false;
				}
			})

			// 当有文件添加进来的时候
			uploader.on('fileQueued', function(file) {
				$.messager.progress();
				//var $li = $('<div id="' + file.id + '" class="file-item thumbnail">' + '<img>' + '<div class="info">' + file.name + '</div>' + '</div>'), $img = $li.find('img');
			});

			// 文件上传成功，给item添加成功class, 用样式标记上传成功。
			uploader.on('uploadSuccess', function(file, response) {
				$.messager.progress('close');
				if(file &&file.size > 10485760){
					$.messager.alert('tip',"上传文件不能超过10M!",'info');
					return;
				}
				if(response && response.result){//上传成功
					var fileId = response.fileId;

					filePlugin.uploadSuccess(fileId);
					//加载附件列表
					filePlugin.load($('#fileId').val(),'#span_fileId');

				}else{
					$.messager.alert('tip',"上传文件失败，失败信息："+ response._raw,'info');
				}

			});
			uploader.on('error',function(file){
				$.messager.progress('close');
				$.messager.alert('tip','请选择图片','info');
			})
			// 文件上传失败，显示上传出错。
			uploader.on('file', function(file) {
				$.messager.progress('close');
				$.messager.alert('tip','文件上传失败,请重试!','info');
			});
			// --end-文件上传---
		}

		function save(){
			var url =_ctx+'/bas/delivery/save';
			var options={
			        url:url,
			        onSubmit: function(){
			        	var flag=true;
			        	if(!$("#inputForm").form('validate'))
			        		flag=false;
			        	if (!flag){
			        		$.messager.alert('提示','保存失败，请输入必输项！','warning');
			        	}
			        	return flag;
			        },
			        success:function(data){
			        	var rObj = eval('('+data+')');
						if(rObj.success){
							var rtnEntity = eval('('+rObj.success+')');
			        		 $.messager.show({
			                     title:'Tip',
			                     msg:'保存成功',
			                     timeout:2000,
			                     showType:'show'
			                 });
			        		 var id =$("#entityId").val();
			        		$("#entityId").val(rtnEntity.id);
			        		$('#w').window("close");
			        	}else{
			        		$.messager.alert('error',rObj.failure,'warning');
			        	}
			        }
				};
			$('#inputForm').form('submit', options);
		}
</script>
</html>
