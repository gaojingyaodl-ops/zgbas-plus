<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <title>业务成本统计</title>
    <th:block th:replace="~{layouts/include :: include}"></th:block>
</head>
<body class="easyui-layout">
<div region="north" class="search_div pt20	pl20 pr20 pb15 ofh" border="false">
    <form id="searchForm" class="form-search from-input-layout" method="post" style="margin-left: 2px">
        <div class="mb6">
            <p class="yw-table-filter mobile-display-none">
                <label>姓名:</label>
                <input name="matchUserName" type="text" value=""/>
            </p>
            <p class="yw-table-filter">
                <lable>年月:</lable>
                <input name="baseStartDate" class="easyui-validatebox" id="baseStartDate" type="text" th:value="${nowTargetMonth}"/>
            </p>
            <span style="margin-left: -15px;" class="mobile-display-none">
				<label>~</label>
			</span>
            <p class="yw-table-filter mobile-display-none">
                <input  id="baseEndDate"  name="baseEndDate" class="easyui-validatebox" th:value="${nowTargetMonth}"/>
            </p>
            <p class="yw-table-filter">
                <lable>区域:</lable>
                <input name="branchCd" class="easyui-validatebox" id="branchCd" type="text" value=""/>
            </p>
            <a href="#" id="btn1" class="easyui-linkbutton btn64 ml10" onclick="Convert.search('searchForm','tt');">查询</a>
            <a href="#" id="btn2" class="easyui-linkbutton btn-empty btn64 ml10" onclick="$('#searchForm').form('reset');">清空</a>
            <a id = "btn3" href="javascript:downloadExcel()" class="easyui-linkbutton btn-empty btn64 ml10" >下载模版</a>
            <span class="">
                <a href="#" id="uploadExcelFile" class="easyui-linkbutton btn64 ml10" onclick="showImportExcel()">导入数据</a>
            </span>
            <span class="" th:if="${permReportMatchUserCostStatisticsExport == true}">
                <a href="#" id="refreshUserEvectionCost" class="easyui-linkbutton btn150 ml10" onclick="refreshUserEvectionCost()">计算出差报销费用</a>
                <a href="#" id="btn" class="easyui-linkbutton btn-empty btn64 ml10" onclick="exportExcel()">导出</a>
            </span>
        </div>
    </form>
</div>
<div region="center" border="false" class="panel_padding pl20 pr20">
    <table id="tt" fit="true"
           title="" iconCls="icon-edit" singleSelect="true"
           idField="id">
    </table>
</div>
<div id="w_import_excel" title="业务成本统计excel" class="easyui-window" data-options="width:400,height:250">
<script type="text/javascript">
    var lastIndex=0;
    var branchListJson = eval('[(${branchList})]');
    $(function(){
        init();
        $('#w_import_excel').window({
            title: '业务成本数据导入',
            modal:true,
            closed: true,
            collapsible : false,
            minimizable : false,
            maximizable : false,
            cache:false,
            onClose:function(){
                $('#tt').datagrid('reload');
            }
        });
        $('#baseStartDate').datebox({
        });
        intiMonthBox('baseStartDate');
        $('#baseEndDate').datebox({
        });
        intiMonthBox('baseEndDate');
        $('#branchCd').combobox({
            data: branchListJson,
            valueField: 'dictCd',
            textField: 'dictName'
        });
    });
    function init(){
        $('#tt').datagrid({
            pagination:true,
            rownumbers:true,
            pageSize:50,
            showFooter:true,
            pageList:[50,40,30,20,10],
            queryParams:Convert.getJson4Form('searchForm'),
            url:_ctx+"/rpt/baseCost/selectByPage",
            columns:[ [
                {field: 'matchUserName', title: '业务员', align: 'left', width: 80},
                {field: 'branchName', title: '所属区域名称', align: 'left', width: 100},
                {field: 'baseDate', title: '业务成本年月', align: 'left', width: 120,},
                {field: 'wages', title: '工资', align: 'right', width: 80},
                {field: 'commission', title: '提成绩效', align: 'right', width: 80},
                {field: 'otherCost', title: '其它费用', align: 'right', width: 80},
                {field: 'socialSecurity', title: '社保', align: 'right', width: 80},
                {field: 'providentFund', title: '公积金', align: 'right', width: 80},
                {field: 'evectionCost', title: '出差报销费用', align: 'right', width: 100},
                {field: 'totalCost', title: '合计成本', align: 'right', width: 80},
                {field: 'remark', title: '备注', align: 'left', width: 300},
                {field: 'updatedDate', title: '导入时间', align: 'center', width: 150}
            ] ],
            toolbar:'#toolbar',
            onDblClickRow:function(index,row){
                lastIndex = index;
                editrow(row.id);
            },
            onClickRow:function(index,row){
                lastIndex = index;
            },
            onLoadSuccess:function(data){
                var total =$('#tt').datagrid('getData').total;
                if (lastIndex >total-1){
                    lastIndex=total-1;
                }
                $('#tt').datagrid('selectRow', lastIndex);
            }
        });

    }

    function refreshUserEvectionCost(){
        let _baseStartDate = $("#baseStartDate").datebox("getValue");
        let _baseEndDate = $("#baseEndDate").datebox("getValue");
        $.messager.confirm({
            width: 388,
            height: 170,
            title: '结算提示',
            msg: '确定执行计算出差报销费用吗？',
            ok: "确定",
            cancel: "取消",
            cls: 'c9',
            border: 'thin',
            fn: function (r) {
                if (r) {
                    var url = _ctx + "/rpt/baseCost/refreshUserEvectionCost?baseStartDate=" + _baseStartDate + "&baseEndDate=" + _baseEndDate;
                    $.get(url, function (data) {
                        var rObj = eval(data);
                        if (rObj.success) {
                            $.messager.show({
                                title: 'Tip',
                                msg: '计算成功!',
                                timeout: 2000,
                                height: 120,
                                showType: 'show'
                            });
                            $('#tt').datagrid('reload');
                        } else {
                            $.messager.alert('提示', rObj.failure, 'warning');
                        }
                    });
                }
            }
        });
    }

    /** 导入数据 */
    function showImportExcel(){
        var url=_ctx+"/rpt/baseCost/showImportExcel";
        $('#w_import_excel').window({href:url});
        $('#w_import_excel').window("open");
    }

    /*  导出Excel表格 */
    function exportExcel(){
        $('#searchForm').form('submit', {url:_ctx+"/rpt/baseCost/exportExcel"});
    }

    function intiMonthBox(id){
        var db = $('#'+id);
        db.datebox({
            onShowPanel: function () {//显示日趋选择对象后再触发弹出月份层的事件，初始化时没有生成月份层
                span.trigger('click'); //触发click事件弹出月份层
                if (!tds) setTimeout(function () {//延时触发获取月份对象，因为上面的事件触发和对象生成有时间间隔
                    tds = p.find('div.calendar-menu-month-inner td');
                    tds.click(function (e) {
                        e.stopPropagation(); //禁止冒泡执行easyui给月份绑定的事件
                        var year = /\d{4}/.exec(span.html())[0]//得到年份
                            , month = parseInt($(this).attr('abbr'), 10); //月份，这里不需要+1
                        db.datebox('hidePanel')//隐藏日期对象
                            .datebox('setValue', year + '-' + month); //设置日期的值
                    });
                }, 0);
                yearIpt.unbind();//解绑年份输入框中任何事件
            },
            parser: function (s) {
                if (!s) return new Date();
                var arr = s.split('-');
                return new Date(parseInt(arr[0], 10), parseInt(arr[1], 10) - 1, 1);
            },
            formatter: function (d) {
                let year = d.getFullYear();
                let month = d.getMonth() + 1;
                if (month < 10) {
                    month = '0' + month;
                }
                return year + '-' + month;
            }
        });
        var p = db.datebox('panel'), //日期选择对象
            tds = false, //日期选择对象中月份
            yearIpt = p.find('input.calendar-menu-year'),//年份输入框
            span = p.find('span.calendar-text'); //显示月份层的触发控件
    }

    function downloadExcel() {
        window.location.href="/rpt/baseCost/downloadExcel";
    }

    function formateNumTon(num, row, index) {
        if (num) {
            num = parseFloat(num).toFixed(2).toString().split(".");
            num[0] = num[0].replace(new RegExp('(\\d)(?=(\\d{3})+$)', 'ig'), "$1,");
            return num.join(".");
        } else {
            return num;
        }
    }
</script>
</body>
</html>
