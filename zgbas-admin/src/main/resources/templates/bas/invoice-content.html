<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
<link th:href="@{/static/ueditor/third-party/webuploader/webuploader.css}" type="text/css" rel="stylesheet" />

</head>
<div class="easyui-layout" fit="true">	
	<div region="center" style="padding:0px 20px 5px 5px;+position: relative;overflow:hidden;" border="false">
		<div id="inputForm" method="post" class="editForm_approve content_div" style="margin-top: 10px;margin-bottom: 0;overflow:hidden;">
			<input type="hidden" name="id" id="entityId" th:value="${entity.id}" />
			<input type="hidden" name="contractId" id="contractId" th:value="${entity.contractId}" />
			<input type="hidden" name="contractNo" id="contractNo" th:value="${entity.contractNo}" />
			<input type="hidden" name="status" id="entityStatus" th:value="${entity.status}" />
			<input type="hidden" name="productCode" id="productCode" th:value="${entity.productCode}" />
			<input type="hidden" name="closeFlg" id="closeFlg" th:value="${entity.closeFlg}" />
			<p  class="p_text">
				<span class="input-colspan">
					<label for="businessNo"  class="control-label">业务编号:</label>
					<input name="businessNo" id="businessNo" class="chooseBtnStyle" readonly type="text" th:value="${entity.businessNo}"></input>
					<input type="button" value="选择" onclick="openChoose();" class="chooseBtn"/>
				</span>
			</p>
			<p  class="p_text">
				<span class="input-colspan">
					<label for="productName"  class="control-label">品名:</label>
					<input name="productName" id="productName" readonly class="control" type="text" th:value="${entity.productName}"></input>
				</span>
				<span class="input-colspan">
					<label for="dealPrice"  class="control-label">单价:</label>
					<input name="dealPrice" id="dealPrice" class="control" type="text" th:value="${entity.dealPrice}"></input>
				</span>
				<span class="input-colspan">
					<label for="dealNumber"  class="control-label">数量:</label>
					<input name="dealNumber" id="dealNumber" class="control" type="text" th:value="${entity.dealNumber}"></input>
				</span>
				<span class="input-colspan">
					<label for="numberUnit"  class="control-label">数量单位:</label>
					<input name="numberUnit" id="numberUnit" readonly class="control" type="text" th:value="${entity.numberUnit}"></input>
				</span>
			</p>
			<p  class="p_text">
				<span class="input-colspan">
					<label for="dealAmount"  class="control-label">开票金额:</label>
					<input name="dealAmount" id="dealAmount" class="control readonly"  readonly="readonly" type="text"  th:value="${entity.dealAmount}"></input>
				</span>
				<span class="input-colspan">
					<label for="dealAmountNotax"  class="control-label">不含税价:</label>
					<input name="dealAmountNotax" id="dealAmountNotax" class="control readonly"  readonly="readonly" type="text" th:value="${entity.dealAmountNotax}"></input>
				</span>
				<span class="input-colspan">
					<label for="taxAmount"  class="control-label">销项税:</label>
					<input name="taxAmount" id="taxAmount" class="control readonly"  readonly="readonly" type="text" th:value="${entity.taxAmount}"></input>
				</span>
			</p>
			<p  class="p_text">
				<span class="input-colspan2">
					<label for="companyId"  class="control-label">开票抬头:</label>
					<input type="hidden" name="companyName" id="companyName" />
					<input name="companyId" id="companyId" class="control large" type="text" th:value="${entity.companyId}"></input>
				</span>
				<span class="input-colspan2">
					<label for="address"  class="control-label">公司地址:</label>
					<input name="address" id="address" class="control addressLarge" type="text"  th:value="${entity.address}"></input>
				</span>
			</p>
			<p  class="p_text">
				<span class="input-colspan">
					<label for="companyPhone"  class="control-label">公司电话:</label>
					<input name="companyPhone" id="companyPhone" class="control " type="text"  th:value="${entity.companyPhone}"></input>
				</span>
				<span class="input-colspan">
					<label for="bankAccount"  class="control-label">银行账号:</label>
					<input name="bankAccount" id="bankAccount" class="control large" type="text" th:value="${entity.bankAccount}"></input>
				</span>
				<span class="input-colspan">
					<label for="invoiceDate"  class="control-label">开票日期:</label>
					<input name="invoiceDate" id="invoiceDate" class="control" type="text" th:value="${#dates.format(entity.invoiceDate,'yyyy-MM-dd')}"></input>
				</span>
				<span class="input-colspan">
					<label for="bankName"  class="control-label">开户行:</label>
					<input name="bankName" id="bankName" class="control" type="text"  th:value="${entity.bankName}"></input>
				</span>
			</p>
			<p  class="p_text">
				<span class="input-colspan">
					<label for="taxNo"  class="control-label">税号:</label>
					<input name="taxNo" id="taxNo" class="control" type="text"  th:value="${entity.taxNo}"></input>
				</span>
				<span class="input-colspan">
					<label for="invoiceNo"  class="control-label">发票号码:</label>
					<input name="invoiceNo" id="invoiceNo" class="control large" type="text"  th:value="${entity.invoiceNo}"></input>
				</span>
				<span class="input-colspan">
					<label for="billNo"  class="control-label">记账凭证号:</label>
					<input name="billNo" id="billNo" class="control " type="text"  th:value="${entity.billNo}"></input>
				</span>
			</p>
			<p  class="p_text">
				<span class="input-colspan">
					<label for="receiveDate"  class="control-label">收款日期:</label>
					<input name="receiveDate" id="receiveDate" class="control " type="text"  th:value="${#dates.format(entity.receiveDate,'yyyy-MM-dd')}"></input>
				</span>
				<span class="input-colspan">
					<label for="receiveAmount"  class="control-label">收款金额:</label>
					<input name="receiveAmount" id="receiveAmount" class="control large" type="text"  th:value="${entity.receiveAmount}"></input>
				</span>
				<span class="input-colspan">
					<label for="receiveBillNo"  class="control-label"  id="jzpzh">记账凭证号:</label>
					<input name="receiveBillNo" id="receiveBillNo" class="control " type="text"  th:value="${entity.receiveBillNo}"></input>
				</span>
			</p>
			<p  class="p_text">
				<span class="input-colspan2">
					<label for="payCompanyName"  class="control-label">付款方抬头:</label>
					<input name="payCompanyName" id="payCompanyName" class="control large" type="text" th:value="${entity.payCompanyName}"></input>
				</span>
				<span class="input-colspan2">
					<label for="ourCompanyName"  class="control-label">我方抬头:</label>
					<input name="ourCompanyName" id="ourCompanyName" class="control ourLarge" type="text" th:value="${entity.ourCompanyName}"></input>
				</span>
			</p>
			<p  class="p_text">
				<span class="input-colspan4">
					<label for="remark"  class="control-label">备注:</label>
					<input name="remark" id="remark" class="control larger" type="text" th:value="${entity.remark}"></input>
				</span>
			</p>
	</div>
	<div class="editForm"> 
			<p>
				<span class="upload-btn" id="btn_fileId">
				 	<i></i>
                	<span>附件上传</span>
            	</span>
            	<!-- <a id="btn_fileId" href="#" class="easyui-linkbutton" data-options="iconCls:'icon-upload'" style="width:106px;margin-top:10px;background:transparent;color: #2d2d2d;">上传附件 </a> -->
				<input class="control" id="fileId" name="fileId" type="hidden" th:value="${entity.fileId}" />
			</p>
			<p class="controls showImg fileId" id="span_fileId"></p>
	</div>
	
	</div>
</div>
<div id="w_contract_choose" title="合同详情" data-options="width:830,height:640"></div>
<script th:src="@{/static/ueditor/third-party/webuploader/webuploader.min.js}" type="text/javascript"></script>
<script th:src="@{/static/js/file.js?v=2}" type="text/javascript"></script>
<script type="text/javascript">
	var isExists=false;
	var imgShowUrl =_filePath+'/view/small/';
	var companyJson =eval('[(${companyJson})]');
	var approveStatusJson =eval('[(${approveStatusJson})]');
	var filePlugin = new FilePlugin('#fileId',$('#entityId').val(),'/bas/pay/updateFileId',[[${param.hasEditFile}]]);
	var _productDeliveryJson = eval('[(${productDeliveryJson})]');
	$(function(){
		$('#w_contract_choose').window({
			title: '请选择合同',
			modal:true,
			closed: true,
			collapsible : false,
			minimizable : false,
			cache:false,
			iconCls:""
		});
		
		/* $("#status").combobox({
			data:approveStatusJson,
			textField:'dictName',
			valueField:'dictCd',
			readonly: true,
			editable:false
		}); */
		/* $.get(_ctx+"/bs/productType/tree",function(result){
			if(result.success){
				$('#productName').combotree({
					data : eval(result.success),
					multiple : false,
					editable : true,
					onSelect : function(node){
						if(node.children.length!=0){
							$('#productName').combotree('clear'); 
						}
					}
				});
			}
			
		}); */
		
		var _curStatus = $("#entityStatus").val();
		if(_curStatus&&(_curStatus=='N'||_curStatus=='B')){
			$(".insertContent").show();
			$("#companyId").combobox({
				data:companyJson,
				textField:'companyName',
				valueField:'id',
				required: true,
				editable:false,
				onSelect:function(record){
					$('#companyName').val(record.companyName);
					$('#taxNo').val(record.taxNo);
					$('#bankName').val(record.bankName);
					$('#address').val(record.address);
					$('#companyPhone').val(record.companyPhone);
					$('#bankAccount').val(record.bankAccount);
				}
			});
			
	 		$('#dealNumber').numberbox({
	 		    min:0,
	 		    precision:4,
	 		    required: true
	 		});
	 		
	 		$('#taxNo').numberbox({
	 			required: true
	 		});
	 		
	 		$('#dealPrice,#receiveAmount').numberbox({
	 		    min:0,
	 		    precision:2
	 		});
	 		
			$('#businessNo,#companyPhone,#bankAccount,#bankName').validatebox({
				required: true
			});
							
			$('#invoiceDate').datebox({
			    required:true
			});
			
			$('#receiveDate').datebox({
			});
			
			$('#dealPrice').numberbox('textbox').on('keyup',function(){
		 		var dealNumber =$('#dealNumber').numberbox('getValue');
		 		var dealPrice = $(this).val();
		 		var dealAmount = (dealNumber*dealPrice).toFixed(2);
		 		$('#dealAmount').val(dealAmount);
		 		var dealAmountNotax = (dealAmount/1.17).toFixed(2);
		 		$('#dealAmountNotax').val(dealAmountNotax);
		 		$('#taxAmount').val((dealAmountNotax*0.17).toFixed(2));
		 	});
		 	$('#dealNumber').numberbox('textbox').on('keyup',function(){
		 		var dealPrice =$('#dealPrice').numberbox('getValue');
		 		var dealNumber = $(this).val();
		 		var dealAmount = (dealNumber*dealPrice).toFixed(2);
		 		$('#dealAmount').val(dealAmount);
		 		var dealAmountNotax = (dealAmount/1.17).toFixed(2);
		 		$('#dealAmountNotax').val(dealAmountNotax);
		 		$('#taxAmount').val((dealAmountNotax*0.17).toFixed(2));
		 	});
		}
		if(_curStatus&&(_curStatus=='A'||_curStatus=='D')){
			$(".chooseBtn").hide();
			$("#businessNo").removeClass("busSelect").attr("style","width:342px");
			var _companyId = $("#companyId").val();
			var ConvertcompanyId = Convert.findValueByKey(companyJson,"id",_companyId,"companyName");
			$("#companyId").val(ConvertcompanyId);
			$("#pm_content_div").find("input").not("[type='button']").attr("readonly",true);
			$("#dealNumber").val(Number($("#dealNumber").val()).toFixed(3));
		}
		//加载附件列表
		filePlugin.load($('#fileId').val(),'#span_fileId');
		if ($('#btn_fileId').length>0){
			fileUpload("btn_fileId", "fileId");
		}
// 		window.setTimeout(function(){
// 		},2000);
			
	});
	
 	//选择合同
 	function openChoose(){
		var url=_ctx+"/bas/contract/choose?contractType=S";
		$('#w_contract_choose').attr('callbackExec', 'chooseCallback');
		$('#w_contract_choose').window({href:url});
		$('#w_contract_choose').window("open");
	}
	function chooseCallback(contractRows){
		var contract = contractRows[0];
		if (contract!=undefined){
			$("#contractId").val(contract.id);
			$("#businessNo").val(contract.businessNo);
			$("#contractNo").val(contract.contractNo);
			$("#productCode").val(contract.productCode);
			$("#productName").val(contract.productName);
			$("#ourCompanyName").val(contract.ourCompanyName);
			$("#dealPrice").numberbox('setValue',contract.dealPrice);
			$("#dealNumber").numberbox('setValue',contract.dealNumber);
			$("#taxAmount").val(contract.taxAmount);
			$("#dealAmountNotax").val(contract.dealAmountNotax);
			$("#dealAmount").val(contract.dealAmount);
			$("#numberUnit").val(contract.numberUnit);
			$("#companyId").combobox('setValue',contract.oppCompanyId);
			$("#companyName").val(contract.oppCompanyName);
			$("#companyId").combobox('select',contract.oppCompanyId)
			$("#companyId").combobox('validate');
			$("#businessNo").validatebox('validate');
			$("#closeFlg").val(contract.closeFlg);
		}
	}
</script>
