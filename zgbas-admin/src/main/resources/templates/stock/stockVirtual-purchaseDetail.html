<!--采购 新建弹出页面-->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <th:block th:replace="~{layouts/include :: include}"></th:block>
    <link th:href="@{/static/ueditor/third-party/webuploader/webuploader.css}" type="text/css" rel="stylesheet" />
    <script th:src="@{/static/ueditor/third-party/webuploader/webuploader.min.js}" type="text/javascript"></script>
    <script th:src="@{/static/jquery/FileSaver.js}" type="text/javascript"></script>
    <script th:src="@{/static/jquery/jquery.wordexport.js}" type="text/javascript"></script>
    <script th:src="@{/static/js/areaJson.js?v=2}" type="text/javascript"></script>
</head>
<body class="easyui-layout">
<div region="north" class="search_div pt20	pl20 pr20 pb15 ofh" border="false" method="post">
    <input type="hidden" id="current_userId" th:value = "${@shiroUtil.getCurrentUserId()}">
    <input type="hidden" id="current_userName" th:value="${@shiroUtil.getCurrentUserName()}">
    <input type="hidden" id="supplierPrepayAmount">
    <input type="hidden" id="usedSupplierPrepayAmount">

    <form  id="inputForm" class="from-input-layout" method="post" >
        <input id="idstr" name="id" type="hidden" th:value="${entity.id}" />
        <input id="stockVirtualNo" name="stockVirtualNo" type="hidden" th:value="${entity.stockVirtualNo}" />
        <input id="status" name="status" type="hidden" th:value="${entity.status}" />
        <div class="form-section">
            <p class="form-section-title"><span class="approve_text">标的物信息</span><i></i></p>
            <div class="mb6">
                <p class="yw-table-filter">
                    <label>品种</label>
                    <input id="productCd" name="productCd" type="text" th:value="${entity.productCd}"/>
                    <input id="productName" name="productName" type="hidden" th:value="${entity.productName}"/>
                </p>
                <p class="yw-table-filter">
                    <label>牌号</label>
                    <input id="brandNumber" name="brandNumber" type="text" th:value="${entity.brandNumber}"/>
                </p>
                <p class="yw-table-filter">
                    <label>数量(吨)</label>
                    <input id="dealNumber" name="dealNumber" type="text" th:value="${entity.dealNumber}"/>
                    <input id="maxNumber" name="maxNumber" type="hidden" />
                </p>
                <p class="yw-table-filter">
                    <label>厂商</label>
                    <input id="factoryId" name="factoryId" type="hidden" />
                    <input id="factoryName" name="factoryName" type="text" th:value="${entity.factoryName}"/>
                </p>
                <p class="yw-table-filter">
                    <label>包装规格</label>
                    <input id="wrapSpecs" name="wrapSpecs" type="text"th:value="${entity.wrapSpecs}" />
                </p>
                <p class="yw-table-filter">
                    <label>质量标准</label>
                    <input id="qualityStandard" name="qualityStandard" type="text" th:value="${entity.qualityStandard}"/>
                </p>
            </div>
        </div>
        <div class="form-section">
            <p class="form-section-title"><span class="approve_text">采购</span><i></i></p>
            <div class="mb10">
                <p class="yw-table-filter w2">
                    <label>供应商</label>
                    <input id="buyCompanyId" name="companyId" type="hidden" th:value="${entity.companyId}" />
                    <input id="buyCompanyName" name="companyName" type="text" th:value="${entity.companyName}"/>
                    <input id="bcontractType" name="contractType" th:value="${entity.contractType == null ? 'B' : entity.contractType}" type="hidden">
                </p>
                <p class="yw-table-filter w2">
                    <label>代采方</label>
                    <input id="ourCompanyName" name="ourCompanyName" type="text" th:value="${entity.ourCompanyName}"/>
                </p>
            </div>
            <div class="mb10">
                <p class="yw-table-filter">
                    <label>业务员</label>
                    <input id="buyMatchUserName" name="matchUserName" type="text" th:value="${entity.matchUserName}"/>
                    <input id="buyMatchUserId" name="matchUserId" type="hidden" th:value="${entity.matchUserId}"/>
                </p>
                <p class="yw-table-filter">
                    <label>结算方式</label>
                    <input id="deliveryModeB" name="deliveryMode" type="text" th:value="${entity.deliveryMode}"/>
                </p>
                <p class="yw-table-filter">
                    <label>支付方式</label>
                    <input id="payType" name="payType" type="text" th:value="${entity.payType}"/>
                </p>
                <p class="yw-table-filter">
                    <label>定金比例</label>
                    <input id="payRate" name="payRate" type="text" th:value="${entity.payRate}"/>
                </p>
                <p class="yw-table-filter">
                    <label>定金</label>
                    <input id="payRateAmount" name="payBondAmount" type="text" th:value="${entity.payBondAmount}"/>
                </p>
            </div>
            <div class="mb10">
                <p class="yw-table-filter">
                    <label>交货方式</label>
                    <input id="deliveryType" name="deliveryType" type="text" th:value="${entity.deliveryType}"/>
                </p>
                <p class="yw-table-filter">
                    <label>交货日期</label>
                    <input id="buyDeliveryDate" name="deliveryDate" type="text" th:value="${#dates.format(entity.deliveryDate, 'yyyy-MM-dd')}"/>
                </p>
                <span style="margin-left: -10px;">
                    <label>-</label>
                </span>
                <p class="yw-table-filter">
                    <input id="BarrivalTimeExt" name="arrivalTimeExt" type="text" th:value="${entity.arrivalTimeExt}"/>
                </p>
                <p class="yw-table-filter">
                    <label>付全款日期</label>
                    <input id="payFullTime" name="payFullTime" type="text" th:value="${#dates.format(entity.payFullTime, 'yyyy-MM-dd')}"/>
                </p>
            </div>
            <div class="mb10">
                <input id="bdeliveryAddr" name="deliveryAddr" type="hidden" th:value="${entity.deliveryAddr}"/>
                <input id="bsAreaId" name="bsAreaId" type="hidden" th:value="${entity.bsAreaId}"/>
                <p class="yw-table-filter">
                        <span class="input-colspan">
                            <label>省份:</label>
                            <input name="provinceName" id="provinceName" required="required" type="text"/>
                                <input name="provinceNameUtil" id="provinceNameUtil" type="hidden"/>
                                <input name="provinceCodeUtil" id="provinceCodeUtil" type="hidden"/>
                        </span>
                </p>
                <span style="margin-left: -10px;">
                        <label>-</label>
                    </span>
                <p class="yw-table-filter">
                        <span class="input-colspan">
                            <label>市:</label>
                            <input name="areaCode" id="cityName"  type="text"/>
                            <input name="cityNameUtil" id="cityNameUtil" type="hidden"/>
                            <input name="cityCodeUtil" id="cityCodeUtil" type="hidden"/>
                        </span>
                </p>
                <span style="margin-left: -10px;">
                        <label>-</label>
                    </span>
                <p class="yw-table-filter">
                        <span class="input-colspan">
                        <label>区:</label>
                            <input name="areaCode" id="areaCode" type="text"/>
                            <input name="areaCodeUtil" id="areaCodeUtil" type="hidden"/>
                            <input name="areaNameUtil" id="areaNameUtil" type="hidden"/>
                        </span>
                </p>
                <span style="margin-left: -10px;">
                        <label>-</label>
                    </span>
                <p class="yw-table-filter ">
                    <label>详细地址</label>
                    <input id="bcontactAddr" name="contactAddr" type="text" th:value="${entity.contactAddr}"/>
                </p>
            </div>


            <div class="mb10">
                <p class="yw-table-filter">
                    <label>仓储费(元)</label>
                    <input id="bwarehouseCost" name="warehouseCost"  type="text" th:value="${entity.warehouseCost == null ? '0.00' : entity.warehouseCost}"/>
                </p>

                <p class="yw-table-filter">
                    <label>运输费(元)</label>
                    <input id="btransportCost" name="transportCost" type="text" th:value="${entity.transportCost == null ? '0.00' : entity.transportCost}"/>
                </p>
                <p class="yw-table-filter">
                    <label>含税单价(元)</label>
                    <input id="bdealPrice" name="dealPrice" type="text" th:value="${entity.dealPrice}"/>
                </p>
                <p class="yw-table-filter">
                    <label>不含税单价(元)</label>
                    <input id="bdealAmountNotax" name="dealAmountNotax" readonly type="text" th:value="${entity.dealAmountNotax}"/>
                </p>
                <p class="yw-table-filter">
                    <label>总价(元)</label>
                    <input id="btotalAmount" name="totalAmount" type="text" th:value="${entity.totalAmount}"/>
                </p>
            </div>
            <div class="mb10">
                <p class="yw-table-filter w2">
                    <label>补充条款</label>
                    <input id="extraTerm" name="extraTerm" type="text" th:value="${entity.extraTerm}"/>
                </p>
                <p class="yw-table-filter w2">
                    <label>备注</label>
                    <input id="payRemark" name="remark" type="text" th:value="${entity.remark}"/>
                </p>
            </div>
            <div class="mb10">
                <p class="yw-table-filter w2 buyTemplateClass">
                    <label>采购合同模板</label>
                    <input id="buyTemplateId" name="templateId" type="text" th:value="${entity.templateId}"/>
                </p>

                <span class="yw-table-filter upbtempBtnClass upload-btn" id="upbtempBtn">
                    <a href="#"  class="easyui-linkbutton addBtn">上传模板</a>
                </span>

                <p class="yw-table-filter bContractPreviewClass">
                    <a href="#" id="bContractPreviewBtn" class="easyui-linkbutton addBtn btn64">合同预览</a>
                </p>

                <p class="yw-table-filter w2">
                    <input type="hidden" name="contentTemplateId" id="buyContentTemplateId" th:value="${entity.contentTemplateId}"/>
                    <label class="control-label" id="upbtempPath"></label>
                </p>
            </div>
        </div>
        <div class="mt15">
            <a href="#" class="easyui-linkbutton btn-info-empty" data-options="iconCls:'icon-save'" id="releaseSave" onclick="save();">发布</a>
            <a href="#" class="easyui-linkbutton btn-info-empty" data-options="iconCls:'icon-cancel'" onclick="closeDetail();">关闭</a>
        </div>
    </form>
</div>
<div id="w_stock_choose" class="easyui-window" title="合同详情" data-options="width:1060,height:540"></div>
<div id="w_contract" class="easyui-window" title="电子合同" data-options="width:930,height:600"></div>
<script type="text/javascript" th:inline="javascript">
    // 附件上传插件初始化
    var filePlugin = new FilePlugin('#buyContentTemplateId', $('#idstr').val(), '/stock/virtual/updateFileId', true);
    var $id = $('#idstr').val();
    //品名列表
    var _productTypeJson = eval('[(${productTypeJson})]');
    // 牌号名称
    var _brandJson = eval('[(${brandJson})]');
    // 厂商列表
    var _factoryJson = eval('[(${factoryJson})]');
    // 合同类型
    var _contractTypeJson = eval('[(${contractTypeJson})]');
    // 付款方式
    var _payTypeJson = eval('[(${payTypeJson})]');
    // 结算方式
    var _deliveryModeJson = eval('[(${deliveryModeJson})]');
    // 提货方式
    var _deliveryTypeJson = eval('[(${deliveryTypeJson})]');
    _deliveryTypeJson = _deliveryTypeJson.filter(function (a) {
        return a.dictCd != 'P';
    });
    //交货日期补充
    var _arrivalTimeExtJson = eval('[(${arrivalTimeExtJson})]');
    //质量标准
    var _qualityStandardJson = eval('[(${qualityStandardJson})]');
    //我方企业抬头
    var _ourCompanyNameJson = eval('[(${ourCompanyNameJson})]');
    // 定金比例
    var _contractBondRateJson = eval('[(${contractBondRateJson})]');
    // 包装规格
    var _packingSpecificaJson = eval('[(${packingSpecificaJson})]');
    // 采购来源
    var _buySourceJson = eval('[(${buySourceJson})]');
    // 业务员树
    var _matchUserNameTree = eval('[(${matchUserNameTree})]');
    // 采购合同模板
    var _buyTemplateList = eval('[(${buyTemplateList})]');
    var _matchCreateFlg = false;
    var _deliveryAddrFlg = false;
    _beforSaveOper = true;
    // 代采赊销-采购-我方
    var _dcsxOurCompanyNameJson = eval('[(${dcsxOurCompanyNameJson})]');
    var _ourCompanyNameJson_ = _ourCompanyNameJson.concat(_dcsxOurCompanyNameJson);
    var commissionRate = {
        // 业务提成比例
        businessCommissionRate: 0,
        // 采购提成比例
        buyCommissionRate: 0,
        // 营销比例
        marketingRetentionRate: 0,
        companyCommissionRate: 0
    }

    function CommissionRate(businessCommissionRate,
                            buyCommissionRate,
                            marketingRetentionRate,
                            companyCommissionRate,
                            productCd) {
        this.businessCommissionRate = businessCommissionRate;
        this.buyCommissionRate = buyCommissionRate;
        this.marketingRetentionRate = marketingRetentionRate;
        this.companyCommissionRate = companyCommissionRate;
        this.productCd = productCd;
    }

    // 品种提成比例
    var productCommissionRate = [];
    var _buyVirtualFlg = false;
    var _sellVirtualFlg = false;

    $(function () {
        $('#addBtn').linkbutton();
        $('#addBtnp').linkbutton();
        $('.easyui-linkbutton').linkbutton();
        $('#ourCompanyName').combobox({
            data: _ourCompanyNameJson_,
            valueField: 'dictCd',
            textField: 'dictName',
            panelHeight: "auto",
            editable: false,
            required: true,
            onLoadSuccess: function (data) {
                var value = $(this).val();
                if (!value){
                	$(this).combobox('setValue',data[0].dictCd);
                	value = data[0].dictCd;
                }
            }
        });

        // 合同预览按钮初始化隐藏
        $(".bContractPreviewClass").hide();

        $('#w_contract').window({
            title: '电子合同',
            modal: true,
            closed: true,
            collapsible: false,
            minimizable: false,
            maximizable: false,
            cache: false
        });
        // 初始化牌照
        $("#brandNumber").combobox({
            data: "",
            required: true,
            limitToList: true,
            editable: true,
            textField: 'brandNumber',
            valueField: 'brandNumber'
        });

        // 初始化品种
        $("#productCd").combotree({
            data: _productTypeJson,
            required: true,
            editable: true,
            panelWidth: 150,
            panelHeight: 300,
            onSelect: function (node) {
                var text = node.text;
                $("#productName").val(text);
                var new_brandJson = _brandJson.filter(function (e) {
                    return e.productCd == node.id && e.enterpriseId == 44;
                })
                $.post(_ctx + "/ctr/product/getProductConfig?productCd=" + node.id, function (result) {
                    if (result) {
                        productCommissionRate = [];
                        var commissionRate = new CommissionRate(result.businessCommissionRate, result.buyCommissionRate, result.marketingRate, result.companyCommissionRate, node.id);
                        productCommissionRate.push(commissionRate);
                    }
                });

                // 初始化牌照
                $("#brandNumber").combobox({
                    data: new_brandJson,
                    required: true,
                    limitToList: true,
                    editable: true,
                    textField: 'brandNumber',
                    valueField: 'brandNumber'
                });
            }
        });

        // 初始化厂商数据
        $("#factoryName").combobox({
            data: _factoryJson,
            required: true,
            textField: 'factoryName',
            valueField: 'factoryName',
            panelHeight: '100',
            onSelect: function (node) {
                var id = node.id;
                $("#factoryId").val(id);
            }
        });

        // 采购-销售地点
        $('#bdeliveryAddr').textbox({required: true});
        $('#bdeliveryAddr').next().hide();
        $('#bsAreaId').textbox({required: true});
        $('#bsAreaId').next().hide();

        var other = {
            id: -1,
            templateName: "其他",
        }
        _buyTemplateList.push(other);
        $("#buyTemplateId").combobox({
            data: _buyTemplateList,
            required: false,
            editable: false,
            textField: 'templateName',
            valueField: 'id',
            panelHeight: '200',
            onChange: function () {
                upbtempBtnFun(true, false, false);
            }
        });



        // 采购-收货日期(补充)
        $("#BarrivalTimeExt").combobox({
            data: _arrivalTimeExtJson,
            valueField: 'dictCd',
            textField: 'dictName',
            panelHeight: "auto",
            required: true,
            editable: false,
            onLoadSuccess: function () {
                var value = $(this).combobox('getValue');
                if (!value) {
                    $(this).combobox("setValue", "LR");
                }
            }
        });

        // 数量
        $("#dealNumber").numberbox({
            required: true,
            validType: 'length[1,20]',
            precision: 3,
            onChange: function (value) {
                formatterBuy(null);
            }
        });

        $("#payRateAmount").numberbox({
            required: true,
            validType: 'length[1,20]',
            precision: 2
        });

        // 仓储费 运输费
        $("#bwarehouseCost,#btransportCost").numberbox({
            required: true,
            validType: 'length[1,20]',
            precision: 2,
            onChange: function (value) {
                // 延迟执行，防止服务合同字段不是最新值
                // 清除旧的定时器
                window.clearTimeout($(this).data('timeout'));
                // 设置新的定时器
                $(this).data('timeout', setTimeout(function () {
                    // 这里放置要执行的代码
                    // getGrossProfit();
                }, 1000));
            }
        });

        // 采购 不含税单价(元)
        $("#bdealAmountNotax").numberbox({
            required: true,
            validType: 'length[1,20]',
            precision: 2
        });

        // 总价
        $("#btotalAmount").numberbox({
            editable: false,
            precision: 2,
            onChange: function () {
                _deliveryModeJson_ = _deliveryModeJson.filter(function (a){
                    return a.dictCd == "XHHK" || a.dictCd == "XKHH";
                })
                // 预付款额度不足时，采购合同只能选择先货后款
                if (Number($("#supplierPrepayAmount").val()) - Number($("#usedSupplierPrepayAmount").val()) < Number($("#btotalAmount").numberbox("getValue"))) {
                    _deliveryModeJson_ = _deliveryModeJson.filter(function (a){
                        return a.dictCd == "XHHK";
                    })
                    if (!_buyVirtualFlg){
                        $('#deliveryModeB').combobox("clear");
                    }
                }
                if (!_buyVirtualFlg){
                    $('#deliveryModeB').combobox('loadData', _deliveryModeJson_);
                }
            }
        });

        // 加价
        $("#premium").numberbox({
            required: true,
            validType: 'length[1,20]',
            precision: 2,
            value: 0,
            // onChange:function(value){
            // 	getDealPrice();
            // }
        });

        // 含税单价
        $("#bdealPrice").numberbox({
            required: true,
            validType: 'length[1,20]',
            precision: 2,
            onChange: function (value) {
                formatterBuy(value);
              //  getDealPrice();
            }
        });

        // 付全款日期、付全款日期、交货日期、交货日期
        $("#receiveFullTime,#payFullTime,#buyDeliveryDate").datebox({
            height: 30,
            required: true,
            editable: false,
        });

        // 质量标准
        $("#qualityStandard").combobox({
            data: _qualityStandardJson,
            required: true,
            textField: 'dictName',
            valueField: 'dictCd',
            panelHeight: 'auto'
        });

        // 包装规格
        $("#wrapSpecs").combobox({
            data: _packingSpecificaJson,
            required: true,
            textField: 'dictName',
            valueField: 'dictCd',
            panelHeight: 'auto'
        });

        // 采购来源
        $("#buySource").combobox({
            data: _buySourceJson,
            required: true,
            textField: 'dictName',
            valueField: 'dictCd',
            panelHeight: 'auto',
            onLoadSuccess: function (data) {
                var value = $(this).val();
                if (!value) {
                    $(this).combobox('setValue', 'G');
                }
            }
        });

        // 供方公司名
        $('#buyCompanyName').combobox({
            url:_ctx+"/bs/company/listMyCompany/"+0+"/"+1,
            mode:'remote',
            limitToList:true,
            valueField:'companyName',
            textField:'text',
            panelHeight:300,
            required:true,
            formatter: function(row){
                var text = row.text;
                var myFlag = row.myFlag;
                if (myFlag!=true){
                    text = '<span style="color:#ccc">'+text+'</span>';
                }

                return text+"[剩余额度:"+(Number(row.supplierPurchaseAmount) - Number(row.usedSupplierPurchaseAmount))+"]";

            },
            onSelect : function(node){
                _supplierFuture = node.supplierFuture == '1' ? false : true;
                _supplierDelivery = node.supplierDelivery == '1' ? true : false;

                // $("#buyDeliveryDate").datebox({
                // 	readonly:_supplierFuture
                // })

                var tt_deliverJson = _deliveryTypeJson;
                // 不能上游配送
                if (!_supplierDelivery && !_buyVirtualFlg) {
                    tt_deliverJson = _deliveryTypeJson.filter(function (a){
                        return a.dictCd != 'P1';
                    });
                    // $("#buyDeliveryType").combobox("setValue", 'P2');
                    // $("#deliveryType").combobox("clear");
                }
                $("#deliveryType").combobox("loadData", tt_deliverJson);


                $("#supplierPrepayAmount").val(node.supplierPrepayAmount);
                $("#usedSupplierPrepayAmount").val(node.usedSupplierPrepayAmount);
                $('#buyCompanyId').val(node.id);
                if (!_buyVirtualFlg){
                    _deliveryModeJson_ = _deliveryModeJson.filter(function (a){
                        return a.dictCd == "XHHK" || a.dictCd == "XKHH";
                    })
                }
                // 预付款额度充足时，采购合同可以选择先款后货；
                // 不做限制

                // 预付款额度不足时，采购合同只能选择先货后款
                if (!_buyVirtualFlg){
                    if (Number(node.supplierPrepayAmount) - Number(node.usedSupplierPrepayAmount) < Number($("#btotalAmount").numberbox("getValue"))) {
                        _deliveryModeJson_ = _deliveryModeJson.filter(function (a){
                            return a.dictCd == "XHHK";
                        })
                        $('#deliveryModeB').combobox("clear");
                    }
                    $('#deliveryModeB').combobox('loadData', _deliveryModeJson_);
                }

        //关联收货地址省市区
                $("#provinceName").combobox({
                    url: _ctx + "/bs/areaCost/ajaxGetCity?id=1",
                    valueField: "id",
                    textField: "name",
                    width: 150,
                    height: 30
                });
                $("#cityName").combobox({
                    url:_ctx+"/bs/areaCost/ajaxGetCity?id=0",
                    valueField:"id",
                    textField:"name",
                    width : 150,
                    height : 30,
                });
                $("#areaCode").combobox({
                    url:_ctx+"/bs/areaCost/ajaxGetCity?id=0",
                    valueField:"id",
                    textField:"name",
                    width : 150,
                    height : 30,
                });
                $("#bcontactAddr").combobox({
                    url: _ctx + "/bas/warehouse/findByCompanyIdAddr/" + node.id,
                    valueField:'warehouseAddr',
                    textField:'warehouseAddr',
                    panelHeight:300,
                    onLoadSuccess:function(){
                        _deliveryAddrFlg = true;
                        var value = $(this).val();
                        if (!value){
                            var data = $(this).combobox("getData");
                            if (data && data.length > 0) {
                                for (let i = 0; i < data.length; i++) {

    function formatterBuy(value){
        if (!value){
            value = $("#bdealPrice").numberbox('getValue');
        }
        var notax = parseFloat(value/1.13).toFixed(2);
        $("#bdealAmountNotax").numberbox('setValue',notax);
        var dealNumber = $("#dealNumber").numberbox('getValue');
        var payRate = $("#payRate").combobox('getValue');
        if (dealNumber){
            var totalAmount = parseFloat(value*dealNumber).toFixed(2);
            $("#btotalAmount").numberbox('setValue',totalAmount);
            $("#payRateAmount").numberbox('setValue',totalAmount*payRate);

            _deliveryModeJson_ = _deliveryModeJson.filter(function (a){
                return a.dictCd == "XHHK" || a.dictCd == "XKHH";
            })

            // 预付款额度不足时，采购合同只能选择先货后款
            if (Number($("#supplierPrepayAmount").val()) - Number($("#usedSupplierPrepayAmount").val()) < Number($("#btotalAmount").numberbox("getValue"))) {
                _deliveryModeJson_ = _deliveryModeJson.filter(function (a){
                    return a.dictCd == "XHHK";
                })
                if (!_buyVirtualFlg){
                    $('#deliveryModeB').combobox("clear");
                }
            }
            if (!_buyVirtualFlg){
                $('#deliveryModeB').combobox('loadData', _deliveryModeJson_);
            }
        }
    }

    function fileUpload(fileBtn, fileId, filePath, filePlugin) {
        var $this = $('#' + fileId);
        // fileBtn:点击弹出选择文件事件的dom对象
        // filePath:文件上传成功后，保存的服务文件Id
        // --start-文件上传---
        var uploader = WebUploader.create({
            auto: true,
            // swf文件路径
            swf: _ctx + '/static/webuploader-0.1.5/Uploader.swf',
            // 文件接收服务端。
            server: _ctx + '/file/uploadFile',
            // 选择文件的按钮。可选。
            // 内部根据当前运行是创建，可能是input元素，也可能是flash.
            pick: '#' + fileBtn,
            // 不压缩image, 默认如果是jpeg，文件上传前会压缩一把再上传！
            resize: false,
            duplicate: true,//true可重复上传，默认不可多次重复上传
            // 只允许选择图片文件。
            accept: {
                title: 'file',
                extensions: 'gif,jpg,jpeg,bmp,png,pdf,rar,zip,doc,docx,xlsx,xls',
//					mimeTypes :	"image/*"
// 				mimeTypes :	"image/jpg,image/jpeg,image/gif,image/bmp,image/png,application/pdf,application/rar,application/zip,application/msword,application/vnd.openxmlformats-officedocument.wordprocessingml.document"
                mimeTypes: "*"
            }
        });
        // 去掉文件上传组件样式，使用上传dom 自己样式
        $(".webuploader-pick").removeClass();

        uploader.on('beforeFileQueued', function (file) {
            $.messager.progress('close');
            if (file && file.size > 10485760) {
                $.messager.alert('tip', "上传文件不能超过10M!", 'info');
                return false;
            }
        })

        // 当有文件添加进来的时候
        uploader.on('fileQueued', function (file) {
            $.messager.progress();
            //var $li = $('<div id="' + file.id + '" class="file-item thumbnail">' + '<img>' + '<div class="info">' + file.name + '</div>' + '</div>'), $img = $li.find('img');
        });

        // 文件上传成功，给item添加成功class, 用样式标记上传成功。
        uploader.on('uploadSuccess', function (file, response) {
            $.messager.progress('close');
            if (file && file.size > 10485760) {
                $.messager.alert('tip', "上传文件不能超过10M!", 'info');
                return;
            }
            if (response && response.result) {//上传成功
                // console.log("uploadSuccess", response);
                var fileId = response.fileId;

                // console.log("fileId", fileId);
                filePlugin.uploadSuccess(fileId);
                //加载附件列表
                filePlugin.load($this.val(), '#' + filePath);
                if (filePath == "upbtempPath") {
                    upbtempBtnFun(false, true, false);
                }
                if (filePath == "upselltempPath") {
                    upstempBtnFun(false, true, false);
                }
            } else {
                $.messager.alert('tip', "上传文件失败，失败信息：" + response._raw, 'info');
            }

        });
        uploader.on('error', function (file) {
            $.messager.progress('close');
            $.messager.alert('tip', '文件格式不支持!', 'info');
        })
        // 文件上传失败，显示上传出错。
        uploader.on('file', function (file) {
            $.messager.progress('close');
            $.messager.alert('tip', '文件上传失败,请重试!', 'info');
        });
        // --end-文件上传---
    }
