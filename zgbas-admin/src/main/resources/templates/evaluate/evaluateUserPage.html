<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <th:block th:replace="~{layouts/include :: include}"></th:block>
    <link th:href="@{/static/ueditor/third-party/webuploader/webuploader.css}" type="text/css" rel="stylesheet" />
    <script th:src="@{/static/ueditor/third-party/webuploader/webuploader.min.js}" type="text/javascript"></script>
    <script th:src="@{/static/js/file.js?v=2}" type="text/javascript"></script>
    <script th:src="@{/static/jquery/FileSaver.js}" type="text/javascript"></script>
    <script th:src="@{/static/jquery/jquery.wordexport.js}" type="text/javascript"></script>
    <script th:src="@{/static/js/areaJson.js?v=2}" type="text/javascript"></script>
</head>
<style>
    .datagrid-cell-check{height: 26px;}
    .datagrid-header-check{height: 26px;}
</style>
<body class="easyui-layout">
<div region="north" class="search_div pt20	pl20 pr20 pb15 ofh" border="false" >
    <input type="hidden" id="current_userId" th:value = "${@shiroUtil.getCurrentUserId()}">
    <input type="hidden" id="current_userName" th:value="${@shiroUtil.getCurrentUserName()}">
    <input type="hidden" id="auditPermission" th:value="${auditPermission}">
<!--    <input type="hidden" id="assessmentPermission" th:value="${assessmentPermission}">-->
    <form id="searchForm" class="form-search from-input-layout" method="post">
        <div class="mb6">
            <p class="yw-table-filter">
                <label>姓名</label>
                <input class="control" name="userName" id="contractTypeSearch" type="text"/>
                <input class="control" name="evaluateDept" value="UP" type="hidden"/>
            </p>
            <p class="yw-table-filter">
                <label>年月</label>
                <input class="control" id="yearAndMonth" name="evaluateMonth" type="text" th:value="${yearAndMonth}"/>
            </p>
            <p class="yw-table-filter">
                <label>状态</label>
                <input class="control" name="evaluateStatus" id="evaluateStatus" type="text"/>
            </p>
            <a href="#" id="btnEdit" class="easyui-linkbutton btn64" onclick="Convert.search('searchForm','tt');">查询</a>
            <a href="#" id="btnDel" class="easyui-linkbutton btn-empty btn64 ml10" onclick="$('#searchForm').form('reset');">清空</a>
        </div>
    </form>
    <div id="btnDiv" class="add-btn" style="margin-top: 10px">
        <a href="#" class="easyui-linkbutton btn64 addBtn"  onclick="batchReview()">批量审核</a>
    </div>
</div>
<div region="center" border="false" class="panel_padding" style="padding-right: 20px;padding-left:20px;">
    <table id="tt" fit="true" title="" iconCls="icon-edit" singleSelect="true" idField="id">
    </table>
</div>
<div id="w" title="考核" data-options="width:1020,height:580"></div>
<script type="text/javascript">
    var _evaluateUserStatusJson = eval('[(${evaluateUserStatusJson})]');
    var $auditPermission = $('#auditPermission').val();
    // var $assessmentPermission = $('#assessmentPermission').val();
    var $currentUserId = $('#current_userId').val();
    var lastIndex;
    $(function () {
        // 检查是否拥有批量审核权限，如果没有，直接隐藏按钮
        checkIsHaveAuditPermission();
        $('#tt').datagrid({
            pagination:true,
            pageSize:25,
            rownumbers:true,
            showFooter:true,
            singleSelect:false,
            selectOnCheck:true,
            checkOnSelect:false,
            pageList:[100,50,45,40,35,30,25],
            queryParams: Convert.getJson4Form('searchForm'),
            url: _ctx + "/evaluate/evaluateDetail/findDataList",
            columns: [ [
                {title: '全选', field: 'ck',checkbox : true, sortable: false},
                {field: 'id', hidden: 'true'},
                {field: 'userId', hidden: 'true'},
                {field: 'assessmentUserId', hidden: 'true'},
                {field: 'appealFlag', hidden: 'true'},
                {field: 'evaluateMonth', title: '年月', align: 'center', width: 60},
                {field: 'userName', title: '姓名', align: 'left', width: 60},
                {field: 'score', title: '评分', align: 'right', width: 60},
                {field: 'evaluateRemark', title: '上级评语', align: 'left', width: 300},
                {field: 'evaluateDate', title: '考评日期', align: 'center', width: 120},
                {
                    field: 'status', title: '状态', align: 'center', width: 80,
                    formatter: function (value) {
                        return Convert.findValueByKey(_evaluateUserStatusJson, 'dictCd', value, 'dictName')
                    }
                },
                {field: 'assessmentUserName', title: '评分人', align: 'left', width: 60},
                {field: 'opt', title: '操作', width: 180, align: 'center', formatter: operate}
            ]],
            // onDblClickCell: function (index, field) {
            //     // lastIndex = index;
            //     var row = $('#tt').datagrid('getSelected');
            //     // editrow(row.id);
            //     let type = row.contractType == 'B';
            //     alter(row.id,type)
            // }
        });

        $('#evaluateStatus').combobox({
            data:_evaluateUserStatusJson,
            textField:'dictName',
            valueField:'dictCd',
            panelHeight:"auto",
            editable:false
        })
        intiMonthBox('yearAndMonth');


    });

//    ===========================函数==========================
    function batchReview(){
        let checkedItems = $('#tt').datagrid('getChecked');
        if(checkedItems.length == 0){
            $.messager.alert('提示','请选择需要审核的员工！','warning');
            return;
        }
        var str = "";
        for (var i = 0; i < checkedItems.length; i++) {
            str += checkedItems[i].id+ ",";
        }
        //去掉最后一个逗号(如果不需要去掉，就不用写)
        if (str.length > 0) {
            str = str.substr(0, str.length - 1);
        }
        $.ajax({
            type: 'post',
            url: _ctx+'/evaluate/evaluateDetail/auditDetail?evaluateUserIds='+str,
            success: function(data){
                if(data == 'success'){
                    $.messager.show({
                        title:'提示',
                        msg:'审核成功！',
                        timeout:2000,
                        cls:'c9',
                        border:'thin',
                        showType:'show'
                    });
                }else if(data == "noAuditPermission"){
                    $.messager.alert('提示','抱歉！您没有审核权限！','warning');
                }
                else{
                    $.messager.alert('提示','审核失败，请联系管理员！','warning');
                }
                $('#tt').datagrid('reload');
                $('#tt').datagrid('unselectAll');
                $('#tt').datagrid('uncheckAll');
            },
            error:function (r){
                console.log("出错了！！！")
            }
        });

    }

    // 初始化年-月
    function intiMonthBox(id){
        var db = $('#'+id);
        db.datebox({
            onShowPanel: function () {//显示日趋选择对象后再触发弹出月份层的事件，初始化时没有生成月份层
                span.trigger('click'); //触发click事件弹出月份层
                if (!tds) setTimeout(function () {//延时触发获取月份对象，因为上面的事件触发和对象生成有时间间隔
                    tds = p.find('div.calendar-menu-month-inner td');
                    tds.click(function (e) {
                        e.stopPropagation(); //禁止冒泡执行easyui给月份绑定的事件
                        var year = /\d{4}/.exec(span.html())[0]//得到年份
                            , month = parseInt($(this).attr('abbr'), 10); //月份，这里不需要+1
                        db.datebox('hidePanel')//隐藏日期对象
                            .datebox('setValue', year + '-' + month); //设置日期的值
                    });
                }, 0);
                yearIpt.unbind();//解绑年份输入框中任何事件
            },
            parser: function (s) {
                if (!s) return new Date();
                var arr = s.split('-');
                return new Date(parseInt(arr[0], 10), parseInt(arr[1], 10) - 1, 1);
            },
            formatter: function (d) {
                let year = d.getFullYear();
                let month = d.getMonth() + 1;
                if (month < 10) {
                    month = '0' + month;
                }
                return year + '-' + month;
            }
        });
        var p = db.datebox('panel'), //日期选择对象
            tds = false, //日期选择对象中月份
            yearIpt = p.find('input.calendar-menu-year'),//年份输入框
            span = p.find('span.calendar-text'); //显示月份层的触发控件
    }

    // 格式化报价单状态样式
    function operate(value,row,index) {
        let result = "";
        let evaluateStatus = row.status;
        let _userId = row.userId;
        let assessmentUserId = row.assessmentUserId;
        if (evaluateStatus != "0") {
            result = '<span class="contract-btn contract-btn-10" onclick="details(\''+ row.id +'\')">详情</span>';
        }
        if ((evaluateStatus == "0" || evaluateStatus == "1" || evaluateStatus == "4") && assessmentUserId == $currentUserId && _userId != $currentUserId) {
           result += '<span class="contract-btn contract-btn-2" id="assessment" onclick="assessment(\''+ row.id +'\')">考评</span>';
        }
        if(evaluateStatus == "1" && $auditPermission =='1'){
            result += '<span class="contract-btn contract-btn-5" onclick="audit(\''+ row.id +'\')">审核</span>';
        }
        if(evaluateStatus == "2" && _userId == $currentUserId){
            result += '<span class="contract-btn contract-btn-3" onclick="confirmed(\''+ row.id +'\')">待确认</span>';
        }

        if(evaluateStatus == "2" && row.appealFlag !='1' && _userId == $currentUserId){
            result += '<span class="contract-btn contract-btn-4" onclick="appeal(\''+ row.id +'\')">申诉</span>';
        }else if(evaluateStatus == "2" && row.appealFlag =='1' && _userId == $currentUserId){
            result += '<span class="contract-btn contract-btn-1" onclick="appealDetail(\''+ row.id +'\')">申诉详情</span>';
        }
        return result;
    }

    // 考核函数
    function assessment(id){
        assessmentDetail(id,0);
    }
    // 已考评
    function isAssessmentDetailOk(id){
        assessmentDetail(id,2);
    }
    // 审核
    function audit(id){
        assessmentDetail(id,3);
    }
    // 待确认
    function confirmed(id) {
        assessmentDetail(id,4);
    }
    // 申诉
    function appeal(id){
        $('#w').window({
            href:_ctx + "/evaluate/evaluateDetail/evaluateAppealPage?evaluateUserId=" + id + "&appealType=0",
            title : '申诉',
            modal : true,
            closed : true,
            collapsible : false,
            minimizable : false,
            maximizable : false,
            cache : false,
            onClose : function() {
                $('#tt').datagrid('reload');
            }
        });
        $('#w').window('open');
    }
    // 申诉详情
    function appealDetail(id){
        $('#w').window({
            href:_ctx + "/evaluate/evaluateDetail/evaluateAppealPage?evaluateUserId=" + id + "&appealType=1",
            title : '申诉',
            modal : true,
            closed : true,
            collapsible : false,
            minimizable : false,
            maximizable : false,
            cache : false,
            onClose : function() {
                $('#tt').datagrid('reload');
            }
        });
        $('#w').window('open');
    }

    function assessmentDetail(id,type){
        let _yearAndMonth = $('#yearAndMonth').datebox('getValue');
        $('#w').window({
            href:_ctx + "/evaluate/evaluateDetail/getEvaluateDetail?evaluateUserId=" + id + "&type="+type+"&yearAndMonth="+_yearAndMonth,
            title : '考核',
            modal : true,
            closed : true,
            collapsible : false,
            minimizable : false,
            maximizable : false,
            cache : false,
            onClose : function() {
                $('#tt').datagrid('reload');
            }
        });
        $('#w').window('open');

    }
    // 详情函数
    function details(id){
        assessmentDetail(id,1);
    }

    // 检查是否拥有审核权限，如果没有，直接隐藏批量审核按钮
    function checkIsHaveAuditPermission(){
        if($auditPermission == '0'){
            $('#btnDiv').hide();
        }
    }
</script>
</body>
</html>
