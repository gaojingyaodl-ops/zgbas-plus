<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <th:block th:replace="~{layouts/include :: include}"></th:block>
    <link th:href="@{/static/ueditor/third-party/webuploader/webuploader.css}" type="text/css" rel="stylesheet" />
    <script th:src="@{/static/ueditor/third-party/webuploader/webuploader.min.js}" type="text/javascript"></script>
    <script th:src="@{/static/js/file.js?v=2}" type="text/javascript"></script>
    <script th:src="@{/static/jquery/FileSaver.js}" type="text/javascript"></script>
    <script th:src="@{/static/jquery/jquery.wordexport.js}" type="text/javascript"></script>
    <script th:src="@{/static/js/areaJson.js?v=2}" type="text/javascript"></script>

    <style>
        .datagrid-cell{
        line-height:25px
    }
    </style>
</head>
<body class="easyui-layout">
<style>.datagrid-cell{line-height:25px}</style>
<div region="north" class="search_div pt20	pl20 pr20 pb15 ofh" border="false" >
    <input type="hidden" id="current_userId" th:value = "${@shiroUtil.getCurrentUserId()}">
    <input id="idStr" name="idStr" th:value="${entity.id}" type="hidden">
    <input id="evaluateUserStatus" name="status" th:value="${entity.status}" type="hidden">
    <input id="type" name="type" th:value="${type}" type="hidden">
<!--    <input id="updateAssessment" name="type" th:value="${updateAssessment}" type="hidden">-->
    <input id="yearAndMonth" name="yearAndMonth" th:value="${yearAndMonth}" type="hidden">
    <form id="inputForm" class="form-search from-input-layout" method="post">
        <div id="_evaluate_detail">

        </div>
        <div class="mb6">
            <p class="yw-table-filter w4">
                <label>上级评语:</label>
                <input name="evaluateRemark" id="evaluateRemark" type="text" th:value="${entity.evaluateRemark}"/>
            </p>
            <p class="yw-table-filter w1" id="evaluateScopeP">
                <label>评定结果:</label>
                <input name="evaluateScope" id="evaluateScope" type="text" th:value="${entity.score}" readonly/>
            </p>
        </div>
        <div class="mb6">
            <p class="yw-table-filter w1">
                <label>日期:</label>
                <input name="evaluateDate" id="evaluateDate" type="text"/>
            </p>
            <p class="yw-table-filter w1">
                <label>姓名:</label>
                <input name="userName" id="userName" type="text"/>
            </p>
            <p class="yw-table-filter w1">
                <label>部门:</label>
                <input name="deptName" id="deptName" type="text"/>
            </p>
        </div>
        <div class="mb6">
            <span id="confirmAssessment">
                <a href="#" class="easyui-linkbutton btn-info-empty" onclick="confirmAssessment();">确认考评</a>
            </span>
            <span id="auditDetail">
                <a href="#" class="easyui-linkbutton btn-info-empty"  onclick="auditDetail();">确认审核</a>
            </span>
            <span id="closew">
                <a href="#" class="easyui-linkbutton btn-info-empty"  onclick="closew();">关闭</a>
            </span>
            <span id="confirm" class="btn-group">
                <a href="#" class="easyui-linkbutton btn-info-empty"  onclick="confirm();">我已知晓并确认</a>
                <a href="#" class="easyui-linkbutton btn-info-empty"  onclick="exportFile();">导出</a>
            </span>

        </div>
    </form>
</div>
<script type="text/javascript" th:inline="javascript">
    var $current_userId = $('#current_userId').val();
    var _evaluateGroupJson = eval('[(${evaluateGroupJson})]');
    var _evaluateMetricsJson = eval('[(${evaluateMetricsJson})]');
    var lastIndex;
    let _idStr = $('#idStr').val();
    let $yearAndMonth = $('#yearAndMonth').val();
    let _evaluateUserStatus = $('#evaluateUserStatus').val();
    let _type = $('#type').val();
    // let $updateAssessment = $('#updateAssessment').val();
    $(function () {
        $('#closew').hide();
        $('#auditDetail').hide();
        $('#confirm').hide();
        // $('#exportFile').hide();
        $('#evaluateRemark').textbox({
            required:true,
        });
        $('#evaluateScopeP').hide();
        if(_evaluateUserStatus != 0 && _type != 0){

            $('#evaluateRemark').textbox({
                required:true,
                readonly: true
            });
            $('#evaluateScopeP').show();
        }

        // 如果是详情
        if (_type == 1 || _type == 2) {
            console.log("_type=" + _type)
            // 则隐藏确认考核按钮
            $('#confirmAssessment').hide();
            // 显示返回按钮
            $('#closew').show();
        } else if (_type == 3) {// 如果是审核
            console.log("_evaluateUserStatus=" + _evaluateUserStatus)
            // 则隐藏确认考核按钮
            $('#confirmAssessment').hide();
            // 显示确认评分按钮
            $('#auditDetail').show();
        }else if(_type == 4){
            // 待确认
            $('#confirmAssessment').hide();
            $('#confirm').show();
            // $('#exportFile').show();
        }

        $('#evaluateDate,#userName,#deptName').textbox({
            readonly:true,
        });
        $('#_evaluate_detail').datagrid({
            pagination:false,
            rownumbers:false,
            showFooter:false,
            singleSelect:true,
            pageSize:100,
           // queryParams: Convert.getJson4Form('searchForm'),
            url: _ctx + "/evaluate/evaluateDetail/evaluatelist?evaluateUserId="+_idStr+"&evaluateDept=UP"+"&type="+_type+"&yearAndMonth="+$yearAndMonth,
            columns: [ [
                {field: 'scoreUserId', hidden: true},
                {field: 'dispOrderNo', title: '', align: 'left', width: 30},
                {
                    field: 'evaluateDetailId', hidden: 'true', formatter: function(value,row,index){
                        if (strIsNull(row.evaluateDetailId)) {
                            return '<input type="hidden" name="evaluateDetailId" id="evaluateDetailId" value="' + row.evaluateDetailId + '" />';
                        }
                        return '';
                    }
                },
                {
                    field: 'evaluateUserId', hidden: 'true', formatter: function (value,row,index) {
                        if(strIsNull(row.evaluateUserId)){
                            return '<input type="hidden" name="evaluateUserId" id="evaluateUserId" value="' + row.evaluateUserId + '" />';
                        }
                        return '';
                    }
                },
                {
                    field: 'evaluateGroup', title: '考核项目', align: 'center', width: 60,
                    formatter: function (value) {
                        if(strIsNull(value)){
                            return "";
                        }
                        return Convert.findValueByKey(_evaluateGroupJson, 'dictCd', value, 'dictName')
                    }
                },
                {
                    field: 'evaluateMetrics', title: '考核指标', align: 'center', width: 60,
                    formatter: function (value) {
                        if(strIsNull(value)){
                            return "";
                        }
                        return Convert.findValueByKey(_evaluateMetricsJson, 'dictCd', value, 'dictName')
                    }
                },
                {field: 'weight', title: '权重(分)', align: 'left', width: 60},
                {field:'metricsContent',title:'指标定义', width:600,nowrap:true,align: 'left',
                    formatter:function(value,row,index){
                        return '<div style="word-break:break-all; word-wrap:break-word;white-space:pre-wrap;">'+value+'</div>';
                    }
                },
                {
                    field: 'detailScore', title: '评分', align: 'center', width: 80,
                    formatter:function (value,row,index){
                        if(_evaluateUserStatus == 0){
                            return '<input name="detailScore" id="detailScore'+ index +'"type="text" style="width: 100%;height: 100%" />';
                        }else{
                            return '<input name="detailScore" id="detailScore'+ index +'"type="text" value="' + row.detailScore + '" style="width: 100%;height: 100%"/>';
                        }

                    },
                    styler: function(value,row,index){
                        return 'height:50px';
                    }
                },
                {field: 'scoreUserName', title: '评分人员', align: 'center', width: 80}
            ]],
            onLoadSuccess:function (){

                // 获取行号
                let rows=$(this).datagrid("getRows");
                // let rowLength = rows.length;
                let data = rows[0];
               if(!strIsNull(data)){
                   $('#evaluateRemark').textbox('setValue',data.evaluateRemark);
                   $('#evaluateDate').textbox('setValue',data.evaluateDate);
                   $('#userName').textbox('setValue',data.userName);
                   $('#deptName').textbox('setValue',data.deptName);
               }
               for(let index = 0; index < rows.length ; index++){
                   let evaluate = rows[index];
                   if(strIsNull(evaluate.weight)){
                       $("input[id='detailScore" + index + "']").numberbox({
                           required:true,
                           precision:0,
                           max:0
                       });
                   }else{
                       $("input[id='detailScore" + index + "']").numberbox({
                           required:true,
                           precision:0,
                           min:0
                       });
                   }
                   // 没有评分或者是上级要修改评分
                   if(_evaluateUserStatus == 0 || (_type == 0 && evaluate.scoreUserId.indexOf("|") == -1)){
                       $("input[id='detailScore" + index + "']").numberbox({
                           readonly:false
                       });
                   }else{
                       $("input[id='detailScore" + index + "']").numberbox({
                           readonly:true
                       });
                   }

               }
            }
        });

    });

    function checkCurrentUserIsSourceUser(currentUserId,sourceUserIds){
        if(sourceUserIds.indexOf('|') != -1){
            let split = sourceUserIds.split("|");
            debugger
            for (let i = 0; i < split.length; i++) {
                if(split[i] == currentUserId){
                    return true;
                }
            }
            return false;
        }else{
            return currentUserId == sourceUserIds;
        }
    }


    // 确认考核函数
    function confirmAssessment (){
        let checkFlag = false;
        let detailArray =[];
        let rows=$(_evaluate_detail).datagrid("getRows");
        $.each(rows, function (index, element) {
            let score = $("input[id='detailScore" + index + "']").numberbox('getValue');
            if(strIsNull(score)){
                checkFlag = true;
            }
            let detailScore = {
                evaluateDetailId:element.evaluateDetailId,
                evaluateUserId:element.evaluateUserId,
                detailScore:score
            }
            detailArray.push(detailScore);
        })

        let _evaluateRemark = $('#evaluateRemark').val();
        if(strIsNull(_evaluateRemark)){
            checkFlag = true;
        }
        let data = {
            detailScoreArray: detailArray,
            evaluateRemark:_evaluateRemark
        }
        let dataJson = JSON.stringify(data);

        if(checkFlag){
            $.messager.alert('提示','请填写完所有必填项！','warning');
        }else{
            $.ajax({
                type: 'post',
                url: _ctx+'/evaluate/evaluateDetail/saveAssessment',
                contentType:'application/json',
                // dataJson:'json',
                data: dataJson,
                success: function(data){
                    if(data == 'success'){
                        $.messager.show({
                            title:'提示',
                            msg:'考评成功！',
                            timeout:2000,
                            cls:'c9',
                            border:'thin',
                            showType:'show'
                        });
                        $('#w').window('close');
                        $('#tt').datagrid('reload');
                    }else if(data =='noPermission'){
                        $.messager.alert('提示','抱歉，您没有审核权限！','warning');
                        $('#w').window('close');
                    }else{
                        $.messager.alert('提示','考评失败，请联系管理员！','warning');
                    }
                },
                error:function (r){
                    console.log("出错了！！！")
                }
            });
        }
    }
    // 审核函数
    function auditDetail(){
        $.ajax({
            type: 'post',
            url: _ctx+'/evaluate/evaluateDetail/auditDetail?evaluateUserIds='+_idStr,
            success: function(data){
                if(data == 'success'){
                    $.messager.show({
                        title:'提示',
                        msg:'审核成功！',
                        timeout:2000,
                        cls:'c9',
                        border:'thin',
                        showType:'show'
                    });
                    $('#w').window('close');
                    $('#tt').datagrid('reload');
                }else if(data == 'noAuditPermission'){
                    $.messager.alert('提示','抱歉！您没有审核权限！','warning');
                    $('#w').window('close');
                }
                else{
                    $.messager.alert('提示','审核失败，请联系管理员！','warning');
                }
            },
            error:function (r){
                console.log("出错了！！！")
            }
        });
    }

    // 我已知晓并确认
    function confirm(){
        $.ajax({
            type: 'post',
            url: _ctx+'/evaluate/evaluateDetail/evaluateConfirm?evaluateUserId='+_idStr,
            success: function(data){
                if(data == 'success'){
                    $.messager.show({
                        title:'提示',
                        msg:'确认成功！',
                        timeout:2000,
                        cls:'c9',
                        border:'thin',
                        showType:'show'
                    });

                }else if(data == 'noPermission'){
                    $.messager.alert('提示','抱歉，您没有权限确认！','warning');
                }
                else{
                    $.messager.alert('提示','确认失败，请联系管理员！','warning');
                }
                $('#w').window('close');
                $('#tt').datagrid('reload');
            },
            error:function (r){
                console.log("出错了！！！")
            }
        });
    }

    // 导出函数
    function exportFile(){

        $('#inputForm').form('submit', {
            url:_ctx+"/evaluate/evaluateDetail/exportFile?evaluateUserId="+_idStr
        });
    }

    // 关闭函数
    function closew(){
        $('#w').window('close');
        $('#tt').datagrid('reload');
    }
</script>
</body>
</html>
