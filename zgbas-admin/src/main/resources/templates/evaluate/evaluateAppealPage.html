<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns="http://www.w3.org/1999/html">
<head>
    <th:block th:replace="~{layouts/include :: include}"></th:block>
    <link th:href="@{/static/ueditor/third-party/webuploader/webuploader.css}" type="text/css" rel="stylesheet" />
    <script th:src="@{/static/ueditor/third-party/webuploader/webuploader.min.js}" type="text/javascript"></script>
    <script th:src="@{/static/js/file.js?v=2}" type="text/javascript"></script>
    <script th:src="@{/static/jquery/FileSaver.js}" type="text/javascript"></script>
    <script th:src="@{/static/jquery/jquery.wordexport.js}" type="text/javascript"></script>
    <script th:src="@{/static/js/areaJson.js?v=2}" type="text/javascript"></script>
</head>
<body class="easyui-layout">
<style>
    .appealFont{
        font-size: 15px
    }
</style>
<div region="north" class="search_div pt20	pl20 pr20 pb15 ofh" border="false" >
    <input type="hidden" id="evaluateUserId" th:value = "${entity.id}">
    <input type="hidden" id="appealFlag" th:value="${entity.appealFlag}">
    <input type="hidden" id="appealType" th:value="${appealType}">
    <div>
        <p class="appealFont">员工有权对考评结果进行申诉</p>
    </div>
    <div>
        <p class="appealFont pt20">您的申诉内容将发送到监审委员会</p>
    </div>
    <div>
        <p class="appealFont pt20">申诉内容：</p><br>
    </div>
    <div>
        <input  id="appealRemark" th:value="${evaluateAppeal.appealRemark}"/>
    </div>
    <div id="btnDiv" class="add-btn" style="margin-top: 10px">
        <span id="appealSubmit">
                <a href="#" class="easyui-linkbutton btn-info-empty" onclick="appealSubmit()">提交</a>
        </span>
        <span id="appealClose">
                <a href="#" class="easyui-linkbutton btn-info-empty" onclick="appealClose()">关闭</a>
        </span>
    </div>
</div>
<script type="text/javascript">
    var _appealType = $('#appealType').val();
    $(function () {
        $('#appealClose').hide();
        $('#appealRemark').textbox({
            width: 970,
            height: 350,
            required: true,
            multiline: true,
            maxlength: 300,
        })

        if(_appealType == 1){
            $('#appealClose').show();
            $('#appealSubmit').hide();
            $('#appealRemark').textbox({
                readonly:true,
                required: false,
            });
        }
    });

//    ===========================函数==========================
    function appealSubmit(){
        let _evaluateUserId = $('#evaluateUserId').val();
        let _appealRemark = $('#appealRemark').val();
        let data = {
            evaluateUserId:_evaluateUserId,
            appealRemark:_appealRemark
        }
        let dataJson = JSON.stringify(data);
        $.ajax({
            type: 'post',
            url: _ctx+'/evaluate/evaluateDetail/saveAppeal',
            contentType:'application/json',
            data: dataJson,
            success: function(data){
                if(data == 'success'){
                    $.messager.show({
                        title:'提示',
                        msg:'申诉提交成功！',
                        timeout:2000,
                        cls:'c9',
                        border:'thin',
                        showType:'show'
                    });
                }else{
                    $.messager.alert('提示','申诉提交失败，请联系管理员！','warning');
                }

                $('#w').window('close');
                $('#tt').datagrid('reload');
            },
            error:function (r){
                console.log("出错了！！！")
            }
        });
    }

    function appealClose(){
        $('#w').window('close');
        $('#tt').datagrid('reload');
    }

</script>
</body>
</html>
