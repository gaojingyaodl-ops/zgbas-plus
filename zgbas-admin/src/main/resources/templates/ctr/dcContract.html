	/**
	 * 合同状态图标展示逻辑
	 */
	function contractStatusView(value, row) {
		let str = '';
		let contractType = row.contractType;
		let virtualBillFlag = row.virtualBillFlag;
		let virtualContractNo = row.virtualContractNo;
		var _totalAmount = row.totalAmount;
		if (row.finalTotalAmount){
			_totalAmount = row.finalTotalAmount;
		}
		if (!row.id){
			return str;
		}
		if (value === 'B') {
			// 已审批
			str += '<img class="icon-contract-approve"/>';
		} else if (value === 'S') {
			// 已签约
			str += '<img class="icon-contract-sign"/>';
		} else if (value === 'D') {
			// 已完成
			str += '<img class="icon-contract-complete"/>';
		} else if (value === 'C') {
			// 作废
			return '<img class="icon-contract-invalid"/>';
		} else {
			str += '<img class="icon-contract-sign"/>';
		}
		// 出入库
		if (row.warehouseNumber >= row.totalNumber){
			str += contractType === 'B' ?  '<img class="icon-deliveryIn"/>' : '<img class="icon-deliveryOut"/>';
		}

		// 确认收货
		if (row.confirmReceiveNumber >= row.totalNumber){
			str += '<img class="icon-confirmReceipt"/>';
		}

		// 收付款
		if (row.dealedAmount >= _totalAmount) {
			str += contractType === 'B' ? '<img class="icon-pay"/>' : '<img class="icon-receive"/>';
		}

		// 收开票
		if (row.billedAmount >= _totalAmount) {
			str += contractType === 'B' ?  '<img class="icon-invoiceReceive"/>' : '<img class="icon-invoice"/>';
		}

		// 罚金
		if (contractType === 'S' && row.breachAmount > 0 && row.receiveBreachAmount < row.breachAmount) {
			str += '<img class="icon-fine"/>';
		}

		if (row.performanceStatus === 'B'){
			// 履约状态-宽限
			str += '<img class="icon-grace"/>';
		}else if (row.performanceStatus === 'D'){
			// 履约状态-催告
			str += '<img class="icon-interpellation"/>';
		}else if (row.performanceStatus === 'S'){
			// 履约状态-逾期
			str += '<img class="icon-overdue"/>';
		}else if (row.performanceStatus === 'P'){
			// 履约状态-违约
			str += '<img class="icon-breach"/>';
		}
		return str;
	}

	/**
	 * 业务操作列数据初始化
	 */
	function businessOptionColumnInit(value, row) {
		var str = '';
		//更新违约标识
		var viFlgUpdate = $('#violateTreatyFlgUpdate').val();//是否有权限
		var contractType = row.contractType;
		var _totalAmount = row.totalAmount;
		if (row.finalTotalAmount){
			_totalAmount = row.finalTotalAmount;
		}
		if (row.violateTreatyFlg != 'true' && viFlgUpdate == 'true' && row.violateFlg =='逾期' && contractType != 'B' && row.dealedAmount < _totalAmount){
			str += '<span onclick="violateFlgUpdate('+row.id+')" class="contract-btn contract-btn-4">逾期</span>';
		}
		// 是否已通过盖章审核
		if (row.sealFlg == "true" && row.contractStatus != 'Z'){
			if(row.id>0 && row.contractStatus != "C"){// 合同不是作废状态
				if(row.dealedAmount + row.receiveBreachAmount + row.discountReceiveAmount < (_totalAmount + row.breachAmount + row.discountChargeAmount) && row.contractStatus != "B"){// 已收付款金额 小于 合同总价加罚息 && 合同不是已审批状态
					if(row.contractType == "B"){ // 采购合同
						str += '<span class="contract-btn contract-btn-2" onclick="startPay('+row.id+','+row.applyCancelFlg+')">付款</span>';
					}else{ // 销售合同
						str += '<span class="contract-btn contract-btn-2" onclick="startReceive('+row.id+','+row.applyCancelFlg+')">收货款</span>';
					}
				}
				if (matchCredit_flg) { // 白条预算才有可能有服务费
					if ((row.receiveServiceAmount < row.serviceAmount+ row.breachAmount) && row.contractStatus != "B" && !isBlank(row.serviceContractId)){
						str += '<span class="contract-btn contract-btn-2" onclick="startServiceReceive('+row.id+','+row.serviceContractId+','+row.applyCancelFlg+')">收服务款</span>';
					}
				}
				if(row.warehouseNumber < row.totalNumber && row.contractStatus != "B"){// 实际已入\出库数量 小于合同数量 && 合同不是已审批状态
					if (row.contractType == "B") { // 采购
						str += '<span class="contract-btn contract-btn-1" onclick="startDeliveryIn(\'' + row.id + '\',\'' + row.contractNo + '\',\'' + row.virtualType + '\',' + row.applyCancelFlg + ')">入库</span>';
					} else {
						str += '<span class="contract-btn contract-btn-1" onclick="startDeliveryOut(\'' + row.contractNo + '\',' + row.applyCancelFlg + ')">出库</span>';
					}
				}
				if(row.warehouseNumber > 0){ // 实际已入\出库数量 大于0
					str += '<span class="contract-btn contract-btn-4" onclick="contLoss('+row.id+','+row.applyCancelFlg+')">损耗申请</span>';
				}
				// 销售合同非则一的且出库数量小于总数量显示新增送货单
				if(matchCredit_flg&&row.contractType == "S"&&(row.biddinStatus =="N" || !row.biddinStatus)&&row.allWarehouse){
					if(row.deliveryStaus=="D"){
						str += '<span class="contract-btn contract-btn-2" onclick="show(' + row.id + ')">查看送货单</span>';
					}else{
						str += '<span class="contract-btn contract-btn-2" onclick="inssert(' + row.id + ')">新增送货单</span>';
					}
				}
				if(row.warehouseNumber > 0 && row.contractStatus != "B" && row.contractType == "S"){
					str += '<span class="contract-btn contract-btn-1" onclick="logisticsAdjust('+row.id+','+row.applyCancelFlg+')">物流调整</span>';
				}
				if((row.billedAmount < _totalAmount) && row.contractStatus != "B" && row.contractType == "B"){
					str += '<span class="contract-btn contract-btn-3" onclick="startInvoiceReceive('+row.id+','+row.applyCancelFlg+')">收票</span>';
					if (row.specialChainFlag == true){
						str += '<span class="contract-btn contract-btn-3" onclick="startInvoice('+row.id+','+row.applyCancelFlg+',\''+row.contractType+'\')">开票</span>';
					}
				}
				if (row.contractStatus != "B" && row.contractType == "S" && (_totalAmount + row.breachAmount - row.billedAmount) > 0){
					str += '<span class="contract-btn contract-btn-3" onclick="startInvoice('+row.id+','+row.applyCancelFlg+',\''+row.contractType+'\')">开票</span>';
				}
				if (matchCredit_flg) {
					if (row.serviceBilledAmount < (row.serviceAmount+ row.breachAmount) && row.contractStatus != "B" && !isBlank(row.serviceContractId)){
						str += '<span class="contract-btn contract-btn-2" onclick="startServiceInvoice('+row.serviceContractId+','+row.applyCancelFlg+','+row.serviceContractId+')">服务费开票</span>';
					}
				}
				if(row.canStartBuy && preSellFlg && row.contractStatus != "B"){
					str += '<span onclick="getBuyContract('+row.id+','+row.applyCancelFlg+')" class="contract-btn contract-btn-4">发起采购</span>';
				}
				if (row.contractType == 'S') {
					if (row.warehouseNumber > row.confirmReceiveNumber) {
						if( row.biddinStatus =="N" || !row.biddinStatus){
							str += '<span onclick="startConfirmReceipt('+row.id+','+row.applyCancelFlg+')" class="contract-btn contract-btn-4">确认收货</span>';
						}
					}
				}

				// 合同调整
				if(row.contractStatus != 'D'){

					str += '<span class="contract-btn contract-btn-1" onclick="exportBusinessDelivery(' + row.approveId + ')">导出面单</span>';
				}

			}
		}
		if (row.contractStatus != "C" && row.contractType=="B" && row.totalNumber > row.warehouseNumber){

		$.extend($.fn.datagrid.methods, {
			autoMergeCells : function (jq, fields) {
				return jq.each(function () {
					var target = $(this);
					if (!fields) {
						fields = target.datagrid("getColumnFields");
					}
					var rows = target.datagrid("getRows");
					var i = 0,
							j = 0,
							temp = {};
					for (i; i < rows.length; i++) {
						var row = rows[i];
						j = 0;
						for (j; j < fields.length; j++) {
							var field = fields[j];
							var tf = temp[field];
							if (!tf) {
								tf = temp[field] = {};
								tf[row[field]] = [i];
							} else {
								var tfv = tf[row[field]];
								if (tfv) {
									tfv.push(i);
								} else {
									tfv = tf[row[field]] = [i];
								}
							}
						}
					}
					$.each(temp, function (field, colunm) {
						$.each(colunm, function () {
							var group = this;

							if (group.length > 1) {
								var before,
										after,
										megerIndex = group[0];
								for (var i = 0; i < group.length; i++) {
									before = group[i];
									after = group[i + 1];
									if (after && (after - before) == 1) {
										continue;
									}
									var rowspan = before - megerIndex + 1;
									if (rowspan > 1) {
										target.datagrid('mergeCells', {
											index : megerIndex,
											field : field,
											rowspan : rowspan
										});
									}
									if (after && (after - before) != 1) {
										megerIndex = after;
									}
								}
							}
						});
					});
				});
			}
		});

	function showImg(value,row,index){
		if(value!=undefined){
			var arrayObj = new Array();
			var j=0;
			arrayObj.push(row.fileId);
			arrayObj.push(row.invoiceFileId);
			arrayObj.push(row.amountFileId);
			arrayObj.push(row.warehouseFileId);
			arrayObj.push(row.doubleCheckFileId);
			var str = "";
			for(i = 0,len=arrayObj.length; i < len; i++) {
				if(arrayObj[i]){
					str += arrayObj[i];
				}
			}
			if (str != null && str.length > 1){
				str = str.substr(0,str.length-1);
				var arr = str.split(",");
				arr = arr.filter(n=>n);
				j = arr.length;
			}
			return j;
		}

	//字符串转日期
	function strDateForDate(str){
		var strDate = str.split(" ");
		var strDatepart = strDate[0].split("-");
		var dtDate = new Date(strDatepart[0],strDatepart[1]-1,strDatepart[2]);
		return dtDate;
	}

	//计算两个日期的天数差
	function dateDiff(firstDate,secondDate){
		var firstDate = new Date(firstDate);
		var secondDate = new Date(secondDate);
		var diff = Math.abs(firstDate.getTime() - secondDate.getTime())
		var result = parseInt(diff / (1000 * 60 * 60 * 24));
		return result
	}

	//设置layout的自适应高度
	function setHeight() {
		var c = $('.easyui-layout');
		var p = c.layout('panel', 'north');
		var oldHeight = p.panel('panel').outerHeight();
		p.panel('resize', { height: 'auto' });
		var newHeight = p.panel('panel').outerHeight();
		c.layout('resize', {
			height: (c.height() + newHeight - oldHeight)
		});
	}

	function formateNumTon(num, row, index) {
		if (num) {
			num = parseFloat(num).toFixed(3).toString().split(".");
			num[0] = num[0].replace(new RegExp('(\\d)(?=(\\d{3})+$)', 'ig'), "$1,");
			return num.join(".");
		} else {
			return num;
		}
	}

	function formateNum(num,row,index) {
		if (num){
			num = parseFloat(num).toFixed(2).toString().split(".");
			num[0] = num[0].replace(new RegExp('(\\d)(?=(\\d{3})+$)','ig'),"$1,");
			return num.join(".");
		}else{
			return num;
		}
	}

						productsName:$("#productsName").val()
					}
					$.post(_ctx+"/sys/quick/search/saveQuickSearch", {propJson:JSON.stringify(params),moduleUrl:moduleUrl,searchName:r} ,function(result) {
						var rObj = eval(result);
						if(rObj.success){
							//若datagrid的url为空，则需添加
							$.messager.show({
								height:150,
								title:'提示',
								msg:'保存成功',
								timeout:2000,
								border:'thin',
								cls:'c9',
								showType:'show'
							});
						}else{
							$.messager.alert('error',rObj.failure,'warning');
						}
					});
				}
			});
		}
	}
</script>
