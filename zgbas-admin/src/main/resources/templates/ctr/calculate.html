<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
<title>二次结算</title>
<th:block th:replace="~{layouts/include :: include}"></th:block>
</head>
<body class="easyui-layout">
	<div region="north" class="search_div pt20	pl20 pr20 pb15 ofh" border="false">
	<form id="searchForm" class="form-search from-input-layout" method="post">
		<div class="mb6">
			<p class="yw-table-filter">
				<label style="width: 60px;">合同编号</label>
				<input type="text" id="businessNo" name="businessNo"/>
			</p>
			<p class="yw-table-filter">
				<label style="width: 60px;">品名</label>
				<input type="text" id="brandNumber" name="brandNumber"/>
			</p>
			<p class="yw-table-filter">
				<label style="width: 100px;">采购合同时间</label>
				<input name="buyContractSatrtTime" class="easyui-datebox"/>
			</p>
			<span style="margin-left: -15px;">
				<label>~</label>
			</span>
			<p class="yw-table-filter">
				<input name="buyContractEndTime" class="easyui-datebox" />
			</p>
			<p class="yw-table-filter">
				<label style="width: 60px;">业务类型</label>
				<input type="text" id="businessType" name="businessType"/>
			</p>
		</div>
		<div class="mb6">
			<p class="yw-table-filter">
				<label style="width: 60px;">需货商</label>
				<input type="text" id="sellCompanyName" name="sellCompanyName"/>
			</p>
			<p class="yw-table-filter">
				<label style="width: 60px;">供货商</label>
				<input type="text" id="buyCompanyName" name="buyCompanyName"/>
			</p>
			<p class="yw-table-filter">
				<label style="width: 100px;">销售合同时间</label>
				<input name="sellContractSatrtTime" class="easyui-datebox"/>
			</p>
			<p class="yw-table-filter">
				<label>到</label>
				<input name="sellContractEndTime" class="easyui-datebox" />
			</p>
			<a href="#" id="btn" iconCls="icon-search" class="easyui-linkbutton" onclick="Convert.search('searchForm','tt_calculate');">查询</a>
			<a href="#" id="btn" iconCls="icon-clear" class="easyui-linkbutton" onclick="$('#searchForm').form('reset');">清空</a>
		</div>
	</form>
</div>
<div region="center" border="false" class="panel_padding" style="padding-right:20px;padding-left:20px;" >
	<table id="tt_calculate" fit="true"
			title="" iconCls="icon-edit" singleSelect="true"
			idField="id">
	</table>
</div>
 <script type="text/javascript">
    var lastIndex=0;
	var userJson =eval('[(${userJson})]');
	var businessTypeJson =eval('[(${businessTypeJson})]');
	var matchUserNameTreeJson = eval('[(${matchUserNameTree})]');
	var productTypeJson = eval('[(${productTypeJson})]');
	var applyTypeJson = eval('[(${applyTypeJson})]');
	var deliveryModeJson = eval('[(${deliveryModeJson})]');
	//var calculateFlg = [[${calculateFlg}]];
	var bkbAuditFlg = [[${bkbAuditFlg}]];
	var dlkzAuditFlg = [[${dlkzAuditFlg}]];
	var dldcAuditFLg = [[${dldcAuditFLg}]];
	var dlkzApplyFLg = [[${dlkzApplyFLg}]];
	var dldcApplyFLg = [[${dldcApplyFLg}]];
	var bizUserId = [[${bizUserId}]];
	console.log('bkbAuditFlg:'+bkbAuditFlg);
	console.log('dlkzAuditFlg:'+dlkzAuditFlg);
	console.log('dldcAuditFLg:'+dldcAuditFLg);
	console.log('dlkzApplyFLg:'+dlkzApplyFLg);
	console.log('dldcApplyFLg:'+dldcApplyFLg);
	console.log('bizUserId:'+bizUserId);
	$(function(){
		$('#matchUserName').combotree({
			data : matchUserNameTreeJson,
			multiple : false,
			editable : true,
			height : 30,
			formatter:function(node){
				var enableFlg = node.attributes.enableFlg;
				if (enableFlg==false){
					return '<span style="color:red;">'+node.text+'(无效)</span>';
				}
				return node.text;
			},
			onSelect : function(node) {
				if (node.children.length != 0) {
					$('#matchUserName').combotree('clear');
				} else {
					$('#matchUserName').combotree('setValue', node.text);
				}
			}
		});
		//品名下拉
		$('#brandNumber').combotree({
			data:productTypeJson,
			multiple : false,
			editable : true,
			onSelect:function(data){
				$('#brandNumber').val(data.typeName);
			}
		});
		//业务类型
		$('#businessType').combobox({
			data : [ {
				id : '',
				text : '全部',
			},{
				id : 'ZY-BB',
				text : '背靠背',
			}, {
				id : 'DL-KZ',
				text : '代理开证'
			}, {
				id : 'DL-DC',
				text : '国企代采'
			} ],
			textField : 'text',
			valueField : 'id',
			panelHeight : "auto",
			onLoadSuccess : function() {
				var value = $(this).val();
				if (!value){
					$("#businessType").combobox('setValue', '');
				}
			}
		});
		$('#tt_calculate').datagrid({
			pagination:true,
			pageSize:20,
			rownumbers:true,
			showFooter:false,
			fitColumns:false,
			remoteSort: false,
			queryParams:Convert.getJson4Form('searchForm'),
			pageList:[500,200,100,50,30,20],
			url:_ctx+"/rpt/agency/findSecondCalculatePage",
			columns:[ [
				{field:'businessType',title:'业务类型', width:70,formatter:function(value,row,index){
					return Convert.findValueByKey(businessTypeJson,"dictCd",value,"dictName");
				}},
				{field:'buyContractNo', title:'采购合同编号', width:120,
					formatter:function(value,row,index){
						if(value){
							return '<span class="c_blue_b yw-menu-section" onclick="showContract(\''+row.id+'\',\''+row.contractNo+'\')">'+value+'</span>';
						}
				}},
				{field:'buyContractDate',title:'采购合同时间', width:100,align:'center'},
				{field:'ourCompanyName',title:'我方抬头', width:200,align:'left'},
				{field:'productName', title:'货名', width:180, formatter:function(value, row, index){
					if(row.productName){
						var str = row.productName+'/'+row.brandNumber+'/'+row.factoryName;
						if (_industry.indexOf('SL')==-1){
							//不是塑料行业主要显示品名
							str = row.productName;
						}
						return str;
					}
				}},
				{field:'buyCompanyName',title:'供货商',align:'left', width:220},
				{field:'buyTotalNumber',title:'采购数量(吨)',align:'right', width:100},
				{field:'buyTotalAmount',title:'采购总额(元)',align:'right', width:100},
				{field:'buyDeliveryMode', title:'采购方式',align:'center', width:100,formatter:function(value){
					if (value){
						return Convert.findValueByKey(deliveryModeJson,"dictCd",value,"dictName");
					}
				}},
				{field:'buyMatchUserName', title:'采购业务员',align:'center', width:80},
				{field:'sellContractNo', title:'销售合同编号', width:120,
					formatter:function(value,row,index){
						if(value){
							return '<span class="c_blue_b yw-menu-section" onclick="showContract(\''+row.id+'\',\''+row.contractNo+'\')">'+value+'</span>';
						}
				}},
				{field:'sellCompanyName',title:'需货商',align:'left', width:180},
				{field:'sellTotalNumber',title:'销售数量(吨)',align:'right', width:100},
				{field:'sellTotalAmount',title:'销售总额(元)',align:'right', width:100},
				{field:'sellContractDate',title:'销售合同时间',align:'center', width:100},
				{field:'sellDeliveryMode', title:'销售方式',align:'center', width:100,formatter:function(value){
					if (value){
						return Convert.findValueByKey(deliveryModeJson,"dictCd",value,"dictName");
					}
				}},
				{field:'sellMatchUserName',title:'销售业务员',align:'center', width:80},
				{field:'action',title:'操作',align:'center',width:100,formatter:function(value,row,index){
					var str = "";
					var business_type = row.businessType;
					var matchUserId = row.matchUserId;
					if (row.calculateNo){
						if(business_type=='ZY-BB'){
							if(bkbAuditFlg){
								str = "<span style='cursor:pointer;' onclick='calculate(\""+ row.buyContractNo+ "\",\""+ row.buyId+ "\",\""+row.calculateNo+"\")' class='contract-btn contract-btn-5'>审核</span>";
							}else{
								str = "<span class='contract-btn contract-btn-8'>审核</span>";
							}
						}else if(business_type=='DL-KZ'){
							if(dlkzAuditFlg){
								str = "<span style='cursor:pointer;' onclick='calculate(\""+ row.buyContractNo+ "\",\""+ row.buyId+ "\",\""+row.calculateNo+"\")' class='contract-btn contract-btn-5'>审核</span>";
							}else{
								str = "<span class='contract-btn contract-btn-8'>审核</span>";
							}
						}else if(business_type=='DL-DC'){
							if(dldcAuditFLg){
								str = "<span style='cursor:pointer;' onclick='calculate(\""+ row.buyContractNo+ "\",\""+ row.buyId+ "\",\""+row.calculateNo+"\")' class='contract-btn contract-btn-5'>审核</span>";
							}else{
								str = "<span class='contract-btn contract-btn-8'>审核</span>";
							}
						}
					}else{
						if (business_type=='ZY-BB'){
							if(matchUserId == bizUserId || bkbAuditFlg){
								str = "<span style='cursor:pointer;' onclick='editable(\""+ row.buyContractNo+ "\",\""+ row.buyId+ "\")' class='contract-btn contract-btn-2'>二次结算</span>";
							}else{
								str = "<span class='contract-btn contract-btn-8'>二次结算</span>";
							}
						}else if(business_type=='DL-KZ'){
							if(dlkzApplyFLg || dlkzAuditFlg){
								str = "<span style='cursor:pointer;' onclick='editable(\""+ row.buyContractNo+ "\",\""+ row.buyId+ "\")' class='contract-btn contract-btn-2'>二次结算</span>";
							}else{
								str = "<span class='contract-btn contract-btn-8'>二次结算</span>";
							}
						}else if(business_type=='DL-DC'){
							if(dldcApplyFLg || dldcAuditFLg){
								str = "<span style='cursor:pointer;' onclick='editable(\""+ row.buyContractNo+ "\",\""+ row.buyId+ "\")' class='contract-btn contract-btn-2'>二次结算</span>";
							}else{
								str = "<span class='contract-btn contract-btn-8'>二次结算</span>";
							}
						}
					}
					return str;
				}}
			]],
			onDblClickRow:function(index,row){
				lastIndex = index;
				editrow(row.id);
			},
			onClickRow:function(index,row){
				lastIndex = index;
			}
		});

		/* $("#businessType").combobox('options').onClick=function(record){
			$("#businessType").combobox('setValue',record.id);
			Convert.search('searchForm','tt_calculate');
		}; */

		$('#w').window({
			modal:true,
			closed: true,
			collapsible : false,
			minimizable : false,
			cache:false,
			iconCls:"",
			onClose:function(){
				$('#tt_calculate').datagrid('reload');
			}
		});
		$.extend($.fn.datagrid.methods, {
		    autoMergeCells : function (jq, fields) {
		        return jq.each(function () {
		            var target = $(this);
		            if (!fields) {
		                fields = target.datagrid("getColumnFields");
		            }
		            var rows = target.datagrid("getRows");
		            var i = 0,
		            j = 0,
		            temp = {};
		            for (i; i < rows.length; i++) {
		                var row = rows[i];
		                j = 0;
		                for (j; j < fields.length; j++) {
		                    var field = fields[j];
		                    var tf = temp[field];
		                    if (!tf) {
		                        tf = temp[field] = {};
		                        tf[row[field]] = [i];
		                    } else {
		                        var tfv = tf[row[field]];
		                        if (tfv) {
		                            tfv.push(i);
		                        } else {
		                            tfv = tf[row[field]] = [i];
		                        }
		                    }
		                }
		            }
		            $.each(temp, function (field, colunm) {
		                $.each(colunm, function () {
		                    var group = this;

		                    if (group.length > 1) {
		                        var before,
		                        after,
		                        megerIndex = group[0];
		                        for (var i = 0; i < group.length; i++) {
		                            before = group[i];
		                            after = group[i + 1];
		                            if (after && (after - before) == 1) {
		                                continue;
		                            }
		                            var rowspan = before - megerIndex + 1;
		                            if (rowspan > 1) {
		                                target.datagrid('mergeCells', {
		                                    index : megerIndex,
		                                    field : field,
		                                    rowspan : rowspan
		                                });
		                            }
		                            if (after && (after - before) != 1) {
		                                megerIndex = after;
		                            }
		                        }
		                    }
		                });
		            });
		        });
		    }
		});
	});
	function editable(buyContractNo,buyId){
		if (buyContractNo){
			var title = "二次结算"+buyId;
			var url=_ctx+"/ctr/secondCalculate/detail?contractNo="+buyContractNo;
			window.parent.addTab(title,url);
		}
	}
	function calculate(buyContractNo,buyId,calculateNo){
		if (buyContractNo){
			var title = "二次结算"+buyId;
			var url=_ctx+"/ctr/secondCalculate/detail?contractNo="+buyContractNo+"&type=CC&calculateNo="+calculateNo;
			window.parent.addTab(title,url);
		}
	}
	function exportExcel(){
    	$('#searchForm').form('submit', {url:_ctx+"/rpt/agency/exportExcel"});
	}
	parent._callbackMethod['二次结算']=function(){
        console.log('reloading');
        reloading();
    }
    setInterval(reloading, 60000);

    function reloading(){
        $(".tooltip-bottom").remove();
        $('#tt_calculate').datagrid('reload');
    }
</script>
</body>
</html>
