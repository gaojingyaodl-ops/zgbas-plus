				</p>
				<p class="yw-table-filter w2">

<script type="text/javascript" th:inline="javascript">
var contractId=$("#entityId").val();
var type=$("#entityContractType").val();
var businessType = $('#businessType').val();
$(function(){
	var _$warehouseNumber ='出库数量';
	var _$dealedAmount='已收金额(元)';
	var _$billedAmount='开票金额(元)';
	var _$deliveryType='交货方式';
	var _$deliveryMode='结算方式';
	var _$bondAmount='保证金(元)';
	var _$deliveryDate='交货日期:';
	var _$transport_Label="预估运输费(元)";
	var _$warehouse_Label="预估仓储费(元)";
	if(type=='B'){
 		_$warehouseNumber='入库数量';
 		_$dealedAmount='已付金额(元)';
 		_$billedAmount='收票金额(元)';
 		_$deliveryType='交货方式';
 		_$deliveryMode='结算方式'
 	 	_$bondAmount='定金(元)';
 		_$deliveryDate='到货日期:';
 		_$transport_Label="运输费(元)";
 		_$warehouse_Label="仓储费(元)";
 	}
 	if (businessType == 'ZY-JK'){
 		_$bondAmount='银行保证金(元)';
 	}
	$("#warehouseLabel").text(_$warehouseNumber);
	$("#dealedLabel").text(_$dealedAmount);
	$("#billedLabel").text(_$billedAmount);
	$("#deliveryTypeLabel").text(_$deliveryType);
	$("#deliveryModeLabel").text(_$deliveryMode);
	$("#bondAmountLabel").text(_$bondAmount);
	$("#deliveryDateLabel").text(_$deliveryDate);
	$("#transport_Label").text(_$transport_Label);
	$("#warehouse_Label").text(_$warehouse_Label);

	//$("#btn_draw").bind("click",doCancel);
	var contractStatusJson =eval('[(${contractStatusJson})]');
	var _his_url = _ctx+"/ctr/contractOphis/detailHisPage/"+contractId;
	$('#tabContract').window({
		title:'上家列表',
		modal:true,
		closed: true,
		collapsible : false,
		minimizable : false,
		maximizable : false,
		cache:false,
		onClose:function(){
			$('#tab').datagrid('reload');
		}
	});
	$('#tabContractplus').window({
		title:'下家列表',
		modal:true,
		closed: true,
		collapsible : false,
		minimizable : false,
		maximizable : false,
		cache:false,
		onClose:function(){
			$('#tab').datagrid('reload');
		}
	});
})
	function tabcContract(){
		var url = _ctx+"/ctr/contract/findOpponent/"+contractId;
		if(type=="S"){
			//上家列表
			$('#tabContract').window({href:url});
			$('#tabContract').window("open");
		}else{
			//下家列表
			$('#tabContractplus').window({href:url});
			$('#tabContractplus').window("open");
		}}

[# th:if="${canAdjust}"]
	$("#transportAmount,#warehouseAmount").attr('readonly',false);
[/]
[# th:if="${interestFlg}"]
	$("#interestAmount").attr('readonly',false);
[/]
</script>

					$.post(_url,{id:_entityId},function(data){
						if(data.success){
							$.messager.show({
			                     title:'Tip',
			                     msg:'操作成功',
			                     timeout:2000,
			                     showType:'show'
			                 });

	function fileUpload(fileUploadId, fuSaveId,filePlugin) {
		var $this = $('#' + fuSaveId);
		// fileUploadId:点击弹出选择文件事件的dom对象
		// fusaveId:文件上传成功后，保存的服务文件Id
		// --start-文件上传---
		var uploader = WebUploader.create({
			auto : true,
			// swf文件路径
			swf : _ctx + '/static/webuploader-0.1.5/Uploader.swf',
			// 文件接收服务端。
			server : _ctx + '/file/uploadFile',
			// 选择文件的按钮。可选。
			// 内部根据当前运行是创建，可能是input元素，也可能是flash.
			pick : '#' + fileUploadId,
			// 不压缩image, 默认如果是jpeg，文件上传前会压缩一把再上传！
			resize : false,
			duplicate :true ,//true可重复上传，默认不可多次重复上传
			// 只允许选择图片文件。
			accept : {
				title : 'file',
				extensions : 'gif,jpg,jpeg,bmp,png,pdf,rar,zip,doc,docx,xlsx,xls',
//					mimeTypes :	"image/*"
// 				mimeTypes :	"image/jpg,image/jpeg,image/gif,image/bmp,image/png,application/pdf,application/rar,application/zip,application/msword,application/vnd.openxmlformats-officedocument.wordprocessingml.document"
				mimeTypes: "*"
			}
		});
		// 去掉文件上传组件样式，使用上传dom 自己样式
		$(".webuploader-pick").removeClass();

		uploader.on('beforeFileQueued', function(file) {
			$.messager.progress('close');
			if(file &&file.size > 10485760){
				$.messager.alert('tip',"上传文件不能超过10M!",'info');
				return false;
			}
		})

		// 当有文件添加进来的时候
		uploader.on('fileQueued', function(file) {
			$.messager.progress();
			//var $li = $('<div id="' + file.id + '" class="file-item thumbnail">' + '<img>' + '<div class="info">' + file.name + '</div>' + '</div>'), $img = $li.find('img');
		});

		// 文件上传成功，给item添加成功class, 用样式标记上传成功。
		uploader.on('uploadSuccess', function(file, response) {
			$.messager.progress('close');
			if(file &&file.size > 10485760){
				$.messager.alert('tip',"上传文件不能超过10M!",'info');
				return;
			}
			if(response && response.result){//上传成功
				var fileId = response.fileId;

				filePlugin.uploadSuccess(fileId);
				//加载附件列表
				filePlugin.load($this.val(),'#span_'+fuSaveId);

			}else{
				$.messager.alert('tip',"上传文件失败，失败信息："+ response._raw,'info');
			}

		});
		uploader.on('error',function(file){
			$.messager.progress('close');
			$.messager.alert('tip','文件格式不支持!','info');
		})
		// 文件上传失败，显示上传出错。
		uploader.on('file', function(file) {
			$.messager.progress('close');
			$.messager.alert('tip','文件上传失败,请重试!','info');
		});
		// --end-文件上传---
	}
