<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<link th:href="@{/static/ueditor/third-party/webuploader/webuploader.css?v=5565}" type="text/css" rel="stylesheet"/>
<div class="easyui-layout" fit="true" id="tab">
    <div region="center" border="false" class="pl20 pt20">
        <form id="inputForm" method="post" class="from-input-layout"
              style="margin-top: 10px;margin-bottom: 0;overflow:hidden;">
            <input type="hidden" name="contractId" id="contractId" th:value="${entity.contractId}"/>
            <input type="hidden" name="contractNoH" id="contractNoH" th:value="${entity.contractNo}"/>
            <input type="hidden" name="companyId" id="companyId" th:value="${entity.companyId}"/>
            <input type="hidden" name="billType" id="billType" th:value="${entity.billType}"/>
            <input type="hidden" id="seal_usage_approve_no" th:value="${entity.sealUsageApproveNo}"/>
            <input type="hidden" name="id" id="signFileId" th:value="${entity.id == null ? 0 : entity.id }"/>
            <input type="hidden" name="id" id="loadingId"  th:value="${entity.id}"/>
            <input type="hidden" id="productName" th:value="${entity.productName}"/>
            <input type="hidden" id="brandNumber" th:value="${entity.brandNumber}"/>
            <input type="hidden" id="factoryName" th:value="${entity.factoryName}"/>
            <input type="hidden" id="dealNumber" th:value="${entity.dealNumber}"/>
            <input type="hidden" id="driverName" th:value="${entity.driverName}"/>
            <input type="hidden" id="plateNumber" th:value="${entity.plateNumber}"/>
            <input type="hidden" id="driverCardNo" th:value="${entity.driverCardNo}"/>
            <input type="hidden" id="copyLoadingId" th:value="${copyLoadingId}"/>
            <input type="hidden" id="optionType" th:value="${type}"/>
            <div class="mb6">
                <p class="yw-table-filter">
                    <label>合同编号</label>
                    <input id="contractNo" name="contractNo" th:value="${entity.contractNo}"/>
                </p>
                <p class="yw-table-filter">
                    <label th:if="${entity.billType=='T'}">提货日期</label>
                    <label th:if="${entity.billType=='P'}">配送日期</label>
                    <input id="loadingDate" class="easyui-datebox" name="loadingDate" required="required" th:value="${#dates.format(entity.loadingDate,'yyyy-MM-dd')}"/>
                </p>
                <p class="yw-table-filter w2">
                    <label>我方抬头</label>
                    <input id="loading_ourCompanyName" required="required" name="ourCompanyName" th:value="${entity.ourCompanyName}"/>
                </p>
                <p class="yw-table-filter w2">
                    <label> 企业名称</label>
                    <input id="loading_companyName" required="required" name="companyName" th:value="${entity.companyName}"/>
                </p>
            </div>
            <div class="mb6">
                <th:block th:if="${entity.billType=='P'}">
                    <p class="yw-table-filter w2" th:if="${entity.billType=='P'}">
                        <label>配送地址</label>
                        <input id="contactAddress" name="contactAddress" required="required" th:value="${entity.contactAddress}"/>
                    </p>
                    <p class="yw-table-filter">
                        <label>联系人</label>
                        <input id="contactName" name="contactName" required="required" th:value="${entity.contactName}"/>
                    </p>
                    <p class="yw-table-filter">
                        <label>联系电话</label>
                        <input id="contactPhone" name="contactPhone" required="required" th:value="${entity.contactPhone}"/>
                    </p>

                </th:block>
            </div>
            <div class="mb6">
                <p class="yw-table-filter" th:if="${entity.billType=='P'}">
                    <label>配送单编号</label>
                    <input id="deliveryNo" name="deliveryNo" required="required" th:value="${entity.deliveryNo}"/>
                </p>
                <p class="yw-table-filter">
                    <label>数量</label>
                    <input id="dealNumbers" name="dealNumbers" required="required" th:value="${entity.dealNumber}"/>
                </p>
                <p class="yw-table-filter w2">
                    <label>备注</label>
                    <input id="remark" name="remark" type="text" th:value="${entity.remark}"/>
                </p>
                <p class="yw-table-filter">
                    <label>盖章审批单号</label>
                    <input id="sealUsageApproveNo" name="sealUsageApproveNo"  type="text" th:value="${entity.sealUsageApproveNo}"/>
                    <input id="sealUsageApproveId" name="sealUsageApproveId" type="hidden" th:value="${entity.sealUsageApproveId}"/>
                </p>
                <span class="easyui-linkbutton btn-info-empty"  onclick="openDetail()">盖章审批详情</span>
            </div>
        </form>
        <div border="false" class="pr20">
            <a  href="#" class="easyui-linkbutton mb6" data-options="iconCls:'icon-add'," onclick="insert()">新增明细</a>
            <div class="mt20 yw-menu-section tbw popup-tab" style="height:165px;" id="loadingDetails"></div>
        </div>

        <div region="south" border="false" style="overflow: hidden;height: 35px;padding-top: 10px;padding-left: 33px;">
            <div class="actions_bar" style="padding-left:426px;">
                <span th:if="${entity.billType=='T'}" class="easyui-linkbutton btn-info-empty" data-options="iconCls:'icon-save'"  onclick="createLoading()">保存提货单</span>
                <span th:if="${entity.billType=='P'}" class="easyui-linkbutton btn-info-empty" data-options="iconCls:'icon-save'"  onclick="createLoading()">保存配送单</span>
            </div>
        </div>
    </div>
</div>

                    }
                }
            ] ],
            toolbar: '#addBtn',
            onBeforeLoad:function(){
                $(this).datagrid('rejectChanges');
            },
            onClickCell:function(index,field){
                if (lastIndex2 != index){
                    $('#loadingDetails').datagrid('endEdit', lastIndex2);
                    $('#loadingDetails').datagrid('beginEdit', index);
                }
                lastIndex2 = index;
                Convert.focusEditor("loadingDetails",field,lastIndex2);
            },

                //进入可编辑状态
                $('#loadingDetails').datagrid('endEdit', lastIndex);
                $('#loadingDetails').datagrid('beginEdit', index);
                lastIndex2 = index;
                Convert.focusEditor("loadingDetails",field,lastIndex2);
            },
            onLoadSuccess:function (){
                var rows = $('#loadingDetails').datagrid('getRows');
                if (rows.length == 0 && delete_flg) {
                    insert();
                }
                if (_optionType){
                    for (var i = 0; i < rows.length; i++) {
                        $('#loadingDetails').datagrid('beginEdit', i);
                    }
                }
            }
        });
	});

    function insert() {
        var changeRows = $('#loadingDetails').datagrid('getRows');
        if (changeRows.length >= 5) {
            $.messager.alert('提示', '最多只能添加5条明细！', 'info');
            return;
        }
        var _productName = $("#productName").val();
        var _brandNumber = $("#brandNumber").val();
        var _factoryName = $("#factoryName").val();
        var _driverName = $("#driverName").val();
        var _plateNumber = $("#plateNumber").val();
        var _driverCardNo = $("#driverCardNo").val();
        $('#loadingDetails').datagrid('endEdit', lastIndex2);
        var field = {
            id: '0',
            productName: _productName.split(",")[0],
            brandNumber: _brandNumber.split(",")[0],
            factoryName: _factoryName.split(",")[0],
            dealNumber: '',
            numberUnit: '吨',
            driverName: _driverName.split(",")[0],
            plateNumber: _plateNumber.split(",")[0],
            driverCardNo: _driverCardNo.split(",")[0]
        }
        $('#loadingDetails').datagrid('appendRow', field);
        lastIndex2 = $('#loadingDetails').datagrid('getRows').length - 1;
        $('#loadingDetails').datagrid('selectRow', lastIndex2);
        $('#loadingDetails').datagrid('beginEdit', lastIndex2);
        Convert.focusEditor("loadingDetails", field, lastIndex2);
    }

    function createLoading() {
        var _url = _ctx + "/ctr/loading/createLoading?type=" + _optionType;
        $("#inputForm").form('submit', {
            url: _url,
            onSubmit: function () {
                var formFlg = $(this).form('enableValidation').form('validate');
                if (!formFlg) {
                    return false;
                }
                var flag = true;
                var totalRows = $('#loadingDetails').datagrid('getRows');
                for (var i = 0; i < totalRows.length; i++) {
                    var rowIndex = $('#loadingDetails').datagrid('getRowIndex', totalRows[i]);
                    flag = $('#loadingDetails').datagrid('validateRow', rowIndex);
                    if (!flag) {
                        $('#loadingDetails').datagrid('selectRow', rowIndex);
                        $('#loadingDetails').datagrid('beginEdit', rowIndex);
                        break;
                    } else {
                        $('#loadingDetails').datagrid('endEdit', rowIndex);
                    }
                }
                if (flag) {
                    $('#loadingDetails').datagrid('endEdit', lastIndex2);
                    Convert.setChildren2Form("inputForm", "loadingDetails");
                }
                return flag;
            },
            success: function (data) {
                var rObj = eval('(' + data + ')');
                if (rObj.success) {
                    $.messager.show({
                        title: '提示',
                        msg: '保存成功!',
                        timeout: 2000,
                        height: 120,
                        showType: 'show'
                    });
                    $('#w_loading').window("close");
                    $('#w_delivery').window("close");
                    $('#w_saveContractLoading_window').window("close");
                    $('#w_saveContractLoading_delivery_window').window("close");
                    $('#tt').datagrid('reload');
                    $('#loadingDetails').datagrid('reload');
                } else {
                    var failure = rObj.failure;
                    $.messager.alert('提示', failure, 'warning');
                    onClickFlg = true;
                    $('#tt').datagrid('reload');
                }
            }
        });
    }

    function deleteLoadingDetail(id){
        delete_flg = false;
        $('#loadingDetails').datagrid('selectRecord',id);
        var row = $('#loadingDetails').datagrid('getSelected');
        var index = $('#loadingDetails').datagrid('getRowIndex',row);
        if (id=='0'){
            $('#loadingDetails').datagrid('deleteRow', index);
            var nextSelect=index>0?index-1:0;
            $('#loadingDetails').datagrid('selectRow', nextSelect);
        }else{
            $.messager.confirm({
                width:388,
                height:170,
                title: '删除提示',
                msg: '确认删除该明细数据?',
                ok: "确定",
                cancel: "取消",
                cls:'c9',
                border:'thin',
                fn: function(r){
                    if (r){
                        if(id){
                            $.post(_ctx+"/ctr/loading/deleteLoadingDetail/"+id, function(result) {
                                $('#loadingDetails').datagrid('reload');
                            });
                        }
                    }
                }
            });
        }
    }
    // 发起提货单/配送单
    function saveContractLoading(contractId,deliveryType) {
        var windowDom = '#w_saveContractLoading_window';
        var url = _ctx + "/ctr/contract/getContractLoading/" + contractId + "/B";
        $(windowDom).window({href: url});
        $(windowDom).window("open");
    }

    function openDetail(){
        var sealUsageApproveId = $("#sealUsageApproveId").val();
        if (sealUsageApproveId){
            var title ='盖章申请:' + sealUsageApproveId;
            window.parent.addTab(title,_ctx+'/pm/approve/detail/'+ sealUsageApproveId);
        }
