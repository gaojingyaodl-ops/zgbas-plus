<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<link th:href="@{/static/ueditor/third-party/webuploader/webuploader.css?v=5565}" type="text/css" rel="stylesheet" />
<div class="easyui-layout" fit="true" id="tab">	
	<div region="center" border="false">
		<form id="inputForm"  method="post"  class="from-input-layout" style="margin-top: 10px;margin-bottom: 0;overflow:hidden;" >
			<div class="mb6" style="margin-left: 40px">
				<p class="yw-table-filter w2">
				  <label>合同号</label>
			      <input readonly name="contractNo" id="contractNo" type="text"  th:value="${entity.contractNo}"></input>
				</p>
				<p class="yw-table-filter">
					<label>放款日期:</label>
					<input name="loanDate" id="loanDate" class="easyui-datebox"  th:value="${#dates.format(entity.loanDate, 'yyyy-MM-dd')}"/>
				</p>
				<p class="yw-table-filter">
				   <label>放款金额:</label>
					<input  name="loanAmount" id="loanAmount" type="text"  th:value="${entity.loanAmount}"></input>
				</p>
			</div>
			<p style="margin-left:167px;margin-top: 20px;">
                    <span class="upload-btn" id="btn_factor">
                         <a href="#" class="easyui-linkbutton btn-info-empty" onclick="tijiao()">确认收款</a>
                    </span>
			</p>
		</form>
	</div>
</div>

<script th:src="@{/static/ueditor/third-party/webuploader/webuploader.min.js}" type="text/javascript"></script>
<script th:src="@{/static/js/file.js?v=2}" type="text/javascript"></script>
<script type="text/javascript" th:inline="javascript">

$(function(){


});

function tijiao(){
	var _url = _ctx+"/apply/ctrContractFactor/confirmimpl";
	var options={
		url:_url,
		success:function(data){
			var rObj = eval('('+data+')');
			if(rObj.success){
				$.messager.show({title:'提示',msg:'确认收款已录入系统',timeout:2000,showType:'show'});
			}else{
				var failure = rObj.failure;
				$.messager.alert('error',failure,'warning');
				onClickFlg = true;
			}
		}
	};
	$('#inputForm').form('submit', options);
	i = setTimeout("b()", 1000);
}
function b() {
	window.opener = null;
	window.open(' ','_self');
	window.close();
	clearTimeout(i);
}
</script>
