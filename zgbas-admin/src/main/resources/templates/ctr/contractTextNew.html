<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
<link rel="stylesheet" type="text/css" th:href="@{/static/css/normalize.css}">
<link rel="stylesheet" type="text/css" th:href="@{/static/css/contract180513.css}">
<link rel="stylesheet" type="text/css" th:href="@{/static/css/saasContract.css}">
<script th:src="@{/static/jquery/jquery.jqprint-0.3.js}" type="text/javascript"></script>
<script th:src="@{/static/jquery/FileSaver.js}" type="text/javascript"></script>
<script th:src="@{/static/jquery/jquery.wordexport.js}" type="text/javascript"></script>
</head>

<div style="width:150px;position: absolute;right: 20px;top: 50px;z-index: 100;">
	<p>
		<!-- <a  href="#" class="easyui-linkbutton" data-options="iconCls:'icon-downLoad'"  onclick="downLoadContract()">下载</a> -->
	
		<a  href="#" class="easyui-linkbutton btn64" data-options="iconCls:'icon-print'"  onclick="printTheContract()">打印</a>
		<a  href="#" class="easyui-linkbutton btn64 btn-empty" id="close-button-contract" onclick="closeWindow()">关闭</a>
	</p>
</div>
<div th:utext="${contractText}" id="contractText" style="padding-top: 20px"></div>
<script type="text/javascript">
var contractId = '[[${contractId}]]';
var windowId = '[[${windowId}]]';
//打印电子合同
function printTheContract(){
	$('#contractText').jqprint();
}
function downLoadContract(){
	  _url= _ctx+"/ctr/contract/downLoadContract?contractId="+contractId; 
	  window.location.href =_url;
 }
// 关闭当前窗口
function closeWindow() {
	$('#' + windowId).window("close");
}


</script>
