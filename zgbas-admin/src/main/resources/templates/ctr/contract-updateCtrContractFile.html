<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<link th:href="@{/static/ueditor/third-party/webuploader/webuploader.css?v=5565}" type="text/css" rel="stylesheet" />
<div class="easyui-layout" fit="true" id="tab">	
	<div region="center" border="false">
		<form id="inputForm" method="post"  enctype="multipart/form-data" class="from-input-layout" style="margin-top: 10px;margin-bottom: 0;overflow:hidden;">
		<input type="hidden" name="ctrContractId" id="ctrContractId" th:value="${entity.id}" />
		<input type="hidden" id="contractType" th:value="${entity.contractType}" />

	
		<div class="editForm" style="padding-left:75px;" th:if="${entity.contractType eq 'B'}">
			<p style="width:240px">
				<span class="upload-btn" id="btn_fileId">
	               	 <a href="#" class="easyui-linkbutton file-upload" data-options="iconCls:'icon-upload'">上传附件 </a>
	           	</span>
				<input class="control" id="fileId" name="fileId" type="hidden" th:value="${entity.buyContentFileId}" />
			</p>
			<p class="controls showImg fileId" id="span_fileId"></p>
		</div>
		<div class="editForm" style="padding-left:75px;" th:if="${entity.contractType eq 'S'}">
			<p style="width:240px">
			<span class="upload-btn" id="btn_fileId">
				 <a href="#" class="easyui-linkbutton file-upload" data-options="iconCls:'icon-upload'">上传附件 </a>
			</span>
				<input class="control" id="fileId" name="fileId" type="hidden" th:value="${entity.sellContentFileId}" />
			</p>
			<p class="controls showImg fileId" id="span_fileId"></p>
		</div>

		</form>
	
	</div>
</div>

<script th:src="@{/static/ueditor/third-party/webuploader/webuploader.min.js}" type="text/javascript"></script>
<script th:src="@{/static/js/file.js?v=2}" type="text/javascript"></script>
<script type="text/javascript" th:inline="javascript">
var onClickFlg = true;
var filePlugin = new FilePlugin('#fileId', $('#ctrContractId').val(), '/ctr/contract/updateCtrFileId', true);

$(function(){
	//加载附件列表
	filePlugin.load($('#fileId').val(),'#span_fileId');
	if ($("#btn_fileId").length>0){
		fileUpload("btn_fileId", "fileId");
	}
});

function save() {
	var contractId = $('#ctrContractId').val();
	var doubleCheckFileId = $('#fileId').val();
	if(doubleCheckFileId&&onClickFlg){
		onClickFlg = false;
		var _url = _ctx+"/ctr/contract/doSigning";
		var options={
		        url:_url,
		        success:function(data){
		        	var rObj = eval('('+data+')');
		        	if(rObj.success){
						$.messager.show({title:'Tip',msg:'保存成功',timeout:2000,showType:'show'});
						$('#w_doubleCheck_window').window("close");
						$('#tt').datagrid('reload');
					}else{
						var failure = rObj.failure;
						$.messager.alert('error',failure,'warning');
						onClickFlg = true;
						$('#tt').datagrid('reload');
					}
		        }
			};
		$('#inputForm').form('submit', options);
	}
	
}
</script>
