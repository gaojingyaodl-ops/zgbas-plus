<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
	<title>订单预警</title>
	<th:block th:replace="~{layouts/include :: include}"></th:block>
</head>
<body class="easyui-layout">
<div region="north" class="search_div pt20	pl20 pr20 pb15 ofh" border="false">
	<form id="searchForm" class="form-search from-input-layout" method="post">
		<div class="mb6">
			<p class="yw-table-filter mobile-display-none">
				<label>合同类型</label>
				<input type="text" id="contractType" class="control text_padding" name="contractType" th:value="${contractType}"></input>
			</p>
			<p class="yw-table-filter">
				<label>合同编号</label>
<!--				<input  class="control" id="contractNo" type="text" name="search_LIKES_contractNo"/>-->
				<input  class="control" id="contractNo" type="text" name="contractNo"/>
			</p>
			<p class="yw-table-filter">
				<label>企业名称</label>
<!--				<input  class="control" id="companyName" type="text" name="search_LIKES_companyName"/>-->
				<input  class="control" id="companyName" type="text" name="companyName"/>
			</p>

			<p class="yw-table-filter">
				<label>我方抬头</label>
<!--				<input type="text" id="ourCompanyName" class="control text_padding" name="search_LIKES_ourCompanyName"></input>-->
				<input type="text" id="ourCompanyName" class="control text_padding" name="ourCompanyName"></input>
			</p>
			<p class="yw-table-filter">
				<label id="matchCreditFlgName"></label>
				<input  class="control" id="matchCreditFlg" type="text" name="matchCreditFlg"/>
			</p>
			<p class="yw-table-filter">
				<label>产品类型</label>
				<input type="text" id="productType" class="control text_padding" name="productType"/>
			</p>
			
		</div>
		<div class="mb6">
			<p class="yw-table-filter">
				<label id="payTypeName"></label>
				<input type="text" id="payType" class="control text_padding" name="payCondition"></input>
			</p>
			<p class="yw-table-filter">
				<label id="warehouseTypeInName"></label>
				<input type="text" id="warehouseInType" class="control text_padding" name="warehouseInCondition"></input>
			</p>
			<p class="yw-table-filter">
				<label id="warehouseTypeOutName"></label>
				<input type="text" id="warehouseOutType" class="control text_padding" name="warehouseOutCondition"></input>
			</p>
			<p class="yw-table-filter">
				<label>交货日期</label>
				<input  id="srh_deliveryDate_from" name="deliveryDateFrom" class="easyui-datebox"/>
			</p>
			<span style="margin-left: -15px;">
				<label>~</label>
			</span>
			<p class="yw-table-filter">
				<input  id="srh_deliveryDate_to"  name="deliveryDateTo" class="easyui-datebox"/>
			</p>
			<a href="#" class="easyui-linkbutton  btn64" onclick="Convert.search('searchForm','tt');">查询</a>
			<a href="#" class="easyui-linkbutton btn-empty btn64 ml10" onclick="$('#searchForm').form('reset');">清空</a>
			<a href="#" class="easyui-linkbutton btn-empty btn64 ml6"  onclick="exportExcel()">导出</a>
		</div>
	</form>
</div>
<div region="center" border="false" class="panel_padding"  style="padding-right:20px;padding-left:20px;">
	<table id="tt" fit="true"
		   title="" iconCls="icon-edit" singleSelect="true"
		   idField="id">
	</table>
</div>

<script type="text/javascript">
	var lastIndex=0;
	var _ourCompanyJson=eval('[(${ourCompanyJson})]');
	var processListJson = eval('[(${processListJson})]');
	var _productType_business = '[[${productType}]]';
	var _$payType="付款状态";
	var _$warehouseTypeIn="入库状态";
	var _$warehouseTypeOut="出库状态";
	var _$matchCreditFlg="是否赊销";
	var payTypeJson = [{id:'PY',text:'已付款'},{id:'PN',text:'未付款'}];
	var warehouseTypeInJson = [{id:'WY',text:'已入库'},{id:'WN',text:'未入库'}];
	var warehouseTypeOutJson = [{id:'WY',text:'已出库'},{id:'WN',text:'未出库'}];
	var matchCreditFlgJson = [{id:'true',text:'是'},{id:'false',text:'否'}];
	$("#payTypeName").html(_$payType);
	$("#warehouseTypeInName").html(_$warehouseTypeIn);
	$("#warehouseTypeOutName").html(_$warehouseTypeOut);
	$("#matchCreditFlgName").html(_$matchCreditFlg);
	
	var _deliveryDateTo = '[[${deliveryDateTo}]]';
	var _warehouseInCondition = '[[${warehouseInCondition}]]';
	// var _contractType = '[[${contractType}]]';
	
	var _payCondition = '[[${payCondition}]]';
	var _warehouseOutCondition = '[[${warehouseOutCondition}]]';
	
	var _matchCreditFlg = '[[${matchCreditFlg}]]';
	var _index = '[[${index}]]';
	
	$(function(){
		$("#productType").combobox({
			data:[{id:'',text:'--全部--'},{id:'HG',text:'化工'},{id:'NHG',text:'非化工'}],
			textField:'text',
			valueField:'id',
			panelHeight:"auto",
			onLoadSuccess:function(){
			}
		});
		if(!strIsNull(_productType_business)){
			$("#productType").combobox('setValue',_productType_business);
		}
		//我方抬头
		$('#ourCompanyName').combobox({
			data:_ourCompanyJson,
			valueField:'dictName',
			textField:'dictName',
			panelWidth:'auto',
			panelHeight:"auto"
		});
		$("#payType").combobox({
			data:payTypeJson,
			textField:'text',
			valueField:'id',
			panelHeight:"auto"
		});
		$("#warehouseInType").combobox({
			data:warehouseTypeInJson,
			textField:'text',
			valueField:'id',
			panelHeight:"auto"
		});
		$("#warehouseOutType").combobox({
			data:warehouseTypeOutJson,
			textField:'text',
			valueField:'id',
			panelHeight:"auto"
		});
		$("#matchCreditFlg").combobox({
			data:matchCreditFlgJson,
			textField:'text',
			valueField:'id',
			panelHeight:"auto"
		});
		$("#contractType").combobox({
			data:[{id:'B',text:'采购合同'},{id:'S',text:'销售合同'}],
			textField:'text',
			valueField:'id',
			panelHeight:"auto"
		});
		// 首页跳转的时候使用
		if(!strIsNull(_index)){
			
			$("#payType").combobox('setValue',_payCondition);
			$("#warehouseOutType").combobox('setValue',_warehouseOutCondition);
			// $("#contractType").combobox('setValue',_contractType);
		} else {
			$("#warehouseInType").combobox('setValue',_warehouseInCondition);
			$("#srh_deliveryDate_to").datebox('setValue',_deliveryDateTo);
			$("#matchCreditFlg").combobox('setValue',_matchCreditFlg);
			// $("#contractType").combobox('setValue',_contractType);
		}
		$('#tt').datagrid({
			pagination:true,
			pageSize:30,
			rownumbers:false,
			showFooter:true,
			queryParams:Convert.getJson4Form('searchForm'),
			pageList:[500,200,100,50,30,20],
			url:_ctx+"/ctr/unDelivery/findUnDeliveryPage",
			columns: [ [
				{field:'contractNo', title:'合同编号', width:140 , formatter:function(value,row,index){
						if (row.id) {
							if (row.breachDays > 0) {
								return '<span style="color: red">'+value+'</span>';
							}else {
								return '<span>'+value+'</span>';
							}
						}
				}  },
				{field: 'businessTypeDcsx', title: '业务类型',align: "left", width: 100, formatter: function (value, row, index) {
						if (row.id) {
							if (row.matchCreditFlg == true) {
								if (value == "DCSXBL") {
									return "代采赊销保理";
								}
								if (value == "DCSX") {
									return "代采赊销预算";
								}
								if (value == "BL") {
									return "保理赊销预算";
								}
								if (value == "PT") {
									return "普通赊销预算";
								}
								if (value == "" || value == null) {
									return "普通赊销预算";
								}if(value=="HDFK"||value==null){
									return "货到付款预算";
								}
								if(value=="DCSXHDFK"||value==null){
									return "货到付款预算";
								}

							} else {
								return "代采预算";
							}
						}
				}   },
				{field:'productsName',title:'货名',align:'left', width:130,formatter:function(value,row){
						if (value){
							var content = '<p title="' + value + '" class="note">' + value + '</p>';
							return content;
						}
					}},
				{field:'companyName',title:'对方企业名称',align:'left', width:130,formatter:function(value,row){
						if (value){
							var s_str = value.split("有限公司");
							if (s_str) {
								value = s_str[0];
							}
							var content = '<p title="' + value + '" class="note">' + value + '</p>';
							return content;
						}
					}},
				{field:'totalNumber',title:'合同数量(吨)',align:"right", width:90,formatter:formateNumTon},
				{field:'totalAmount',title:'合同总价(元)', align:"right", width:90,formatter:formateNum},
				{field:'warehouseNumber',title:'发货数量(吨)', align:"right", width:90,formatter:formateNum},
				{field:'deliveryDateFrom',title:'发货日期', align:"center", width:100},
				{field:'overdueDay',title:'逾期发货天数', align:"center", width:100},
				{field:'matchUserName',title:'业务员',align:"center", width:70},
				{field: 'option',title: '操作',align: "center",width: 70,formatter:function (value, row, index){
					if(row.contractType == 'B' && Number(row.warehouseNumber.toFixed(4)) < Number(row.totalNumber.toFixed(4))){
						return '<span class="contract-btn contract-btn-1" onclick="startDeliveryIn('+row.id+','+row.applyCancelFlg+')">入库</span>';
					}
				}}
			]],
			onDblClickRow:function(index,row){
				lastIndex = index;
				approveDetail(row);
			},
			onClickRow:function(index,row){
				lastIndex = index;
			},
			onLoadSuccess:function(data){

				var total =$('#tt').datagrid('getData').total;
				if (lastIndex >total-1){
					lastIndex=total-1;
				}
			}
		});

	});

	function startDeliveryIn(contractId,applyCancelFlg){
		if (applyCancelFlg){
			$.messager.alert('提示','本合同已发起作废申请，当前不可发起申请 !','info');
			return false;
		}
		var title ='新建:入库申请';
		var processCode = "APPLY_DELIVERYIN";
		doRedirect(title,processCode,contractId);
	}

	function doRedirect(title,processCode,contractId){
		var processId = Convert.findValueByKey(processListJson,"processCode",processCode,"id");
		window.parent.addTab(title,_ctx+'/pm/approve/newFlow/'+processId+'?contractId='+contractId);
	}

   // 导出功能
	function exportExcel(){
		$('#searchForm').form('submit', {url:_ctx+"/ctr/unDelivery/exportExcel"});
	}

	//字符串转日期
	function strDateForDate(str){
		var strDate = str.split(" ");
		var strDatepart = strDate[0].split("-");
		var dtDate = new Date(strDatepart[0],strDatepart[1]-1,strDatepart[2]);
		return dtDate;
	}

	//计算两个日期的天数差
	function dateDiff(firstDate,secondDate){
		var firstDate = new Date(firstDate);
		var secondDate = new Date(secondDate);
		var diff = Math.abs(firstDate.getTime() - secondDate.getTime())
		var result = parseInt(diff / (1000 * 60 * 60 * 24));
		return result
	}

	function formateNumTon(num, row, index) {
		if (num) {
			num = parseFloat(num).toFixed(3).toString().split(".");
			num[0] = num[0].replace(new RegExp('(\\d)(?=(\\d{3})+$)', 'ig'), "$1,");
			return num.join(".");
		} else {
			return num;
		}
	}

	function formateNum(num,row,index) {
		if (num){
			num = parseFloat(num).toFixed(2).toString().split(".");
			num[0] = num[0].replace(new RegExp('(\\d)(?=(\\d{3})+$)','ig'),"$1,");
			return num.join(".");
		}else{
			return num;
		}
	}


	// 判断是否为空
	function isBlank(val) {
		if (val == undefined
				|| val == ''
				|| val == null) {
			return true;
		}
		return false;
	}
	//预算详情
	function approveDetail(row){
		var  approveId=row.approveId;
		var title = "预算详情" + ':' +approveId;
		window.parent.addTab(title,_ctx+'/bs/matchDetail/content2/'+approveId);
	}

</script>

</body>
</html>
