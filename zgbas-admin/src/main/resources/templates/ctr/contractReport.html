<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
<title></title>
<th:block th:replace="~{layouts/include :: include}"></th:block>
</head>
<body class="easyui-layout">
<div region="north" class="search_div pt20	pl20 pr20 pb15 ofh" border="false">
	<form id="searchForm" class="form-search from-input-layout" method="post">
		<input type="hidden" id="contractType" th:value="${contractType}">
		<input type="hidden" id="searchType" name="searchType" th:value="${searchType}"/>
		<div class="mb6">
			<p class="yw-table-filter">
				<label>合同编号:</label>
				<input  class="control" type="text" name="contractNo"/>
			</p>
			<p class="yw-table-filter">
				<label>企业名称:</label>
				<input  class="control" type="text" name="companyName"/>
			</p>
			<p class="yw-table-filter">
				<label>业务员:</label>
				<input type="text" id="matchUserName" class="control text_padding" name="matchUserName"></input>
			</p>
			<p class="yw-table-filter">
				<label>合同属性:</label>
				<input type="text"  name="contractAttr" id="contractAttr" class="control text_padding"></input>
			</p>
			<p class="yw-table-filter">
				<label>业务类型:</label>
				<input type="text"  name="businessType" id="source" class="control text_padding"></input>
			</p>
			<p class="yw-table-filter">
				<label>类型:</label>
				<input type="text" id="contractTypes" class="control text_padding" name="type"></input>
			</p>
			<p class="yw-table-filter">
				<label>货名:</label>
				<input  class="control" type="text" name="productName"/>
			</p>
		</div>
		<div class="mb6">
			<p class="yw-table-filter">
				<label>合同时间:</label>
				<input  id="srh_contractTime_from" name="contractTimeStart" class="easyui-datebox"/>				
			</p>
			<span style="margin-left: -15px;">
				<label>~</label>
			</span>
			<p class="yw-table-filter">
				<input  id="srh_contractTime_to"  name="contractTimeEnd" class="easyui-datebox" />
			</p>
			<p class="yw-table-filter">
				<label>交货方式:</label>
				<input type="text" id="deliveryMode" class="control text_padding" name="deliveryMode"></input>
			</p>
			<p class="yw-table-filter">
				<label id="payTypeName"></label>
				<input type="text" id="payType" class="control text_padding" name="payType"></input>
			</p>
			<p class="yw-table-filter">
				<label id="billTypeName"></label>
				<input type="text" id="billType" class="control text_padding" name="billType"></input>
			</p>
			<p class="yw-table-filter">
				<label>我方抬头:</label>
				<input type="text" id="ourCompanyName" class="control text_padding" name="ourCompanyName"></input>
			</p>
			<a href="#" id="btn" iconCls="icon-search" class="easyui-linkbutton" onclick="Convert.search('searchForm','tt');">查询</a>
			<a href="#" id="btn" iconCls="icon-clear" class="easyui-linkbutton ml10" onclick="$('#searchForm').form('reset');">清空</a>
			<a href="#" id="btn" iconCls="icon-export" class="easyui-linkbutton ml6 btn-export" style="position: fixed;right:20px;top:92px;" onclick="exportExcel()">导出</a>
		</div>
	</form>
</div>
<div region="center" border="false" class="panel_padding"  style="padding-right:20px;padding-left:20px;">
	<table id="tt" fit="true"
			title="" iconCls="icon-edit" singleSelect="true"
			idField="id">
	</table>
</div>

	$(function(){

				data:[{id:'',text:'--全部--'},{id:'Y',text:'有效'},{id:'N',text:'作废'}],

	function showImg(value,row,index){
		 if(value!=undefined){
			var arrayObj = new Array();
			var j=0;
			arrayObj.push(row.fileId);
			arrayObj.push(row.invoiceFileId);
			arrayObj.push(row.amountFileId);
			arrayObj.push(row.warehouseFileId);
			arrayObj.push(row.doubleCheckFileId);
			for(i = 0,len=arrayObj.length; i < len; i++) {
			    if(arrayObj[i]){
			    	j++;
			    }
			}
			return j; 
		 }
	}
	function editrow(id,contractNo){
		var url=_ctx+"/ctr/contract/detail/"+id;
		var title=contractNo;
		window.parent.addTab(title,url);
	}

	//合同预览
	function printContract(contractId){
		if(contractId){
			var url = _ctx+"/ctr/contractText/getBycontractId/"+contractId;
			$('#w_contract').window({href:url});
			$('#w_contract').window("open");
		}
	}
	
	
	function getBuyContract(contractId){
		var title ='新建:预售采购申请';
		var processCode = "APPLY_PRESELL_BUY";
		doRedirect(title,processCode,contractId);
	}
	
	function startDeliveryIn(contractId){
		var title ='新建:入库申请';
		var processCode = "APPLY_DELIVERYIN";
		doRedirect(title,processCode,contractId);
	}
	
	function startDeliveryOut(contractId){
		var title ='新建:出库申请';
		var processCode = "APPLY_DELIVERYOUT";
		doRedirect(title,processCode,contractId);
	}
	
	function startPay(contractId){
		var title ='新建:付款申请';
		var processCode = "APPLY_PAY";
		doRedirect(title,processCode,contractId);
	}
	
	function startReceive(contractId){
		var title ='新建:收款申请';
		var processCode = "APPLY_RECEIVE";
		doRedirect(title,processCode,contractId);
	}
	
	function startInvoiceReceive(contractId){
		var title ='新建:收票申请';
		var processCode = "APPLY_INRECEIVED";
		doRedirect(title,processCode,contractId);
	}
	
	function startInvoice(contractId){
		var title ='新建:开票申请';
		var processCode = "CTR_INVOICE";
		doRedirect(title,processCode,contractId);
	}
	
	function doRedirect(title,processCode,contractId){
		var processId = Convert.findValueByKey(processListJson,"processCode",processCode,"id");
		window.parent.addTab(title,_ctx+'/pm/approve/newFlow/'+processId+'?contractId='+contractId);
	}
	
	function queryStockDetailHis(id){
		if(id){
			var url =_ctx+"/ctr/contractOphis/findBuyAndSellOphis/"+id;
			$('#w_detail').window({href:url});
			$('#w_detail').window("open");
		} 
	}
	
	function dealedAmountDetail(id){
		if(id){
			var url =_ctx+"/ctr/contract/detailAmount/"+id;
			$('#w_dealedAmount_detail').window({href:url});
			$('#w_dealedAmount_detail').window("open");
		}
	}
	
	//合同损耗
	function contractLoss(id,contractNo){
		if(id){
			var url=_ctx+"/ctr/contract/loss/"+id;
			var title='合同损耗登记'; 
			$('#w_contractLoss').window({href:url});
			$('#w_contractLoss').window("open");
		}
		
	}
	
	//双签
	function signing(id){
		if(id){
			var url=_ctx+"/ctr/contract/openSigning/"+id;
			var title='上传双签协议附件'; 
			$('#w_doubleCheck_window').window({href:url});
			$('#w_doubleCheck_window').window("open");
		}
		
	}

	function exportExcel(){
    	$('#searchForm').form('submit', {url:_ctx+"/rpt/contractReport/exportExcel"});
	}

	//确认收货
	function confirm(id) {
		var url = _ctx + "/ctr/contract/getEntityById?id=" + id;
		$('#w_confirm').window({href : url});
		$('#w_confirm').window("open");
	}
	
	//字符串转日期
	function strDateForDate(str){
		var strDate = str.split(" ");
		var strDatepart = strDate[0].split("-");
		var dtDate = new Date(strDatepart[0],strDatepart[1]-1,strDatepart[2]);
		return dtDate;
	}
	
	//计算两个日期的天数差
	function dateDiff(firstDate,secondDate){
		var firstDate = new Date(firstDate);
		var secondDate = new Date(secondDate);
		var diff = Math.abs(firstDate.getTime() - secondDate.getTime())
		var result = parseInt(diff / (1000 * 60 * 60 * 24));
		return result
	}
</script>
