<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{layouts/include :: include}"></th:block>
    <link th:href="@{/static/ueditor/third-party/webuploader/webuploader.css}" type="text/css" rel="stylesheet" />
    <script th:src="@{/static/ueditor/third-party/webuploader/webuploader.min.js}" type="text/javascript"></script>
    <script th:src="@{/static/js/file.js?v=2}" type="text/javascript"></script>
    <script th:src="@{/static/js/filePlus.js}" type="text/javascript"></script>
    <script th:src="@{/static/jquery/FileSaver.js}" type="text/javascript"></script>
    <script th:src="@{/static/jquery/jquery.wordexport.js}" type="text/javascript"></script>
    <script th:src="@{/static/js/areaJson.js?v=2}" type="text/javascript"></script>
</head>
<body class="easyui-layout">
<div region="north" class="search_div pt20	pl20 pr20 pb15 ofh" border="false" >
    <form id="searchForm" class="form-search from-input-layout" method="post">
        <div class="mb6">
            <p class="yw-table-filter mobile-display-none">
                <label>关联合同号</label>
                <input name="search_LIKES_linkContractNos" id="searchLinkContractNos"/>
            </p>
            <p class="yw-table-filter mobile-display-none">
                <label>是否结案</label>
                <input name="search_EQB_settleFlag" id="search_settleFlag"/>
            </p>
            <a href="#" id="btnEdit" class="easyui-linkbutton btn64" onclick="Convert.search('searchForm','tt');">查询</a>
            <a href="#" id="btnDel" class="easyui-linkbutton btn-empty btn64 ml10" onclick="$('#searchForm').form('reset');">清空</a>
            <a href="#" class="easyui-linkbutton btn-empty btn64 ml6 mobile-display-none" onclick="exportExcel()">导出</a>
        </div>
        <div>
            <a href="#" id="addCase" class="easyui-linkbutton btn64" onclick="insertData()" style="margin-right: 5px">新增</a>
        </div>
    </form>
</div>
<div region="center" border="false" class="panel_padding" style="padding-right: 20px;padding-left:20px;">
    <table id="tt" fit="true" title="" iconCls="icon-edit" singleSelect="true" idField="id">
    </table>
</div>
<div id="caseWindow"  data-options="width:800,height:450"></div>
<div id="feeApplyWindow"  data-options="width:400,height:350"></div>
<script type="text/javascript">
    var _settleFlag = [
        {dictCd:'false',dictName:"未结案"},
        {dictCd:'true',dictName:"已结案"},
    ]
    $('#caseWindow').window({
        title : '',
        modal : true,
        closed : true,
        collapsible : false,
        minimizable : false,
        maximizable : false,
        cache : false,
        onClose : function() {
            $('#tt').datagrid('reload');
        }
    });
    $('#feeApplyWindow').window({
        title : '',
        modal : true,
        closed : true,
        collapsible : false,
        minimizable : false,
        maximizable : false,
        cache : false,
    });
    $(function () {
        $("#search_settleFlag").combobox({
            data:_settleFlag,
            textField:'dictName',
            valueField:'dictCd',
            editable:false,
            panelHeight:"auto"
        });
        $('#tt').datagrid({
            pagination: true,
            rownumbers: true,
            pageSize: 10,
            pageList: [50, 40, 30, 20, 10],
            queryParams: Convert.getJson4Form('searchForm'),
            url: _ctx + "/ctr/litigationCase/findLitigationCaseByPage",
            columns: [ [
                {field: 'linkContractNos', title: '关联合同号', align: 'left', width: 200,formatter: function (value,row){
                        return '<p title="' + value + '" class="note">' + value + '</p>';
                    }},
                {field: 'settleFlag', title: '是否结案', align: 'center', formatter: function (value,row,index){
                    if(value == 0){
                        return '未结案'
                    }
                    return '已结案'
                    },width: 90},
                {field: 'lawyer', title: '接洽律师', align: 'center', width: 90},
                {field: 'judgmentDate', title: '判决时间', align: 'center', width: 90},
                {field: 'caseNo', title: '案号', align: 'center', width: 130},
                {field: 'competentCourt', title: '管辖法院', align: 'center', width: 130},
                {field: 'attorneyFee', title: '律师费', align: 'right', width: 100, formatter: function (value,row){
                        let color="#000";
                        if(row.attorneyApproveStatus === 'A'){
                            color="red";
                        } else if(row.attorneyApproveStatus ==='D'){
                            color="#4a9bff"
                        }
                        return `<span style="color:${color}">${formateNum(value)}</span>`
                    }},
                {field: 'processingFee', title: '案件受理费', align: 'right', width: 100, formatter: function (value,row){
                        let color="#000";
                        if(row.processingApproveStatus === 'A'){
                            color="red";
                        } else if(row.processingApproveStatus ==='D'){
                            color="#4a9bff"
                        }
                        return `<span style="color:${color}">${formateNum(value)}</span>`
                    }},
                {field: 'preservationFee', title: '保全费', align: 'right', width: 100, formatter: function (value,row){
                        let color="#000";
                        if(row.preservationApproveStatus === 'A'){
                            color="red";
                        } else if(row.preservationApproveStatus ==='D'){
                            color="#4a9bff"
                        }
                        return `<span style="color:${color}">${formateNum(value)}</span>`
                    }},
                {field: 'liabilityFee', title: '诉责费', align: 'right', width: 100, formatter: function (value,row){
                        let color="#000";
                        if(row.liabilityApproveStatus === 'A'){
                            color="red";
                        } else if(row.liabilityApproveStatus ==='D'){
                            color="#4a9bff"
                        }
                        return `<span style="color:${color}">${formateNum(value)}</span>`
                    }},
                {field: 'totalFee', title: '诉讼费用合计', align: 'right', width: 120, formatter: formateNum},
                {field: 'caseFollow', title: '案件进展跟进', align: 'center', width: 150},
                {field: 'operate', title: '操作', align: 'left', width: 120,formatter: function (value,row,index){
                        var str = "";
                        let attorneyApproveStatus = row.attorneyApproveStatus
                        let processingApproveStatus = row.processingApproveStatus
                        let preservationApproveStatus = row.preservationApproveStatus
                        let liabilityApproveStatus = row.liabilityApproveStatus
                        let editFlg = attorneyApproveStatus==='D'&&processingApproveStatus==='D'&&preservationApproveStatus==='D'&&liabilityApproveStatus==='D';
                        // 全部基恩审批完成之后不可编辑
                        str += `<span onclick="editData(${row.id})" class="contract-btn contract-btn-1"">编辑</span>`;
                        if (!editFlg) {
                            str += `<span onclick="feeApply(${row.id})" class="contract-btn contract-btn-3"">费用申请</span>`;
                        }
                        return str;
                    }}
            ]]
        });
    });

    function insertData(){
        var url = _ctx + "/ctr/litigationCase/skipUpdateLitigationCase?type=A";
        $('#caseWindow').window({href:url,title:'新增诉讼案件'});
        $('#caseWindow').window("open");
    }

    function editData(id){
        var url = _ctx + "/ctr/litigationCase/skipUpdateLitigationCase?type=U&id="+id;
        $('#caseWindow').window({href:url,title:'修改诉讼案件'});
        $('#caseWindow').window("open");
    }
    function feeApply(id){
        let url = '/ctr/litigationCase/feeApply?id='+id
        $('#feeApplyWindow').window({href:url,title:'请选择费用'});
        $('#feeApplyWindow').window("open");
    }

    function formateNum(num,row,index) {
        if (num){
            num = parseFloat(num).toFixed(2).toString().split(".");
            num[0] = num[0].replace(new RegExp('(\\d)(?=(\\d{3})+$)','ig'),"$1,");
            return num.join(".");
        }else{
            return num;
        }
    }
    function exportExcel() {
        $.messager.confirm({
            title: '提示',
            msg: '确认要导诉讼案件吗？',
            ok: "导出",
            cancel: "取消",
            cls: 'c9',
            border: 'thin',
            fn: function (r) {
                if (r) {
                    $('#searchForm').form('submit', {url: _ctx + "/ctr/litigationCase/exportExcel"});
                }
            }
        })
    }

</script>
</body>
</html>
