<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
<link th:href="@{/static/ueditor/third-party/webuploader/webuploader.css}" type="text/css" rel="stylesheet" />
<th:block th:replace="~{layouts/include :: include}"></th:block>
</head>
<body>
<div class="easyui-layout" fit="true" id="tab">	
	<div region="center" border="false">
	<form id="From" class="from-input-layout" method="post" style="margin:20px 10px;">
		<p class="p_text">
			<span class="input-colspan">
				<label for="contractNo">合同编号:</label>
				<input name="contractNo" id="contractNo" readonly="readonly"  type="text" th:value="${entity.contractNo}"></input>
			</span>
			<span class="input-colspan">
				<label for="companyName">对方企业:</label>
					<input name="companyName" id="companyName" type="text" readonly="readonly" th:value="${entity.companyName}"></input>
			</span>
			<span class="input-colspan">
					<label for="contractAttr">合同属性:</label>
					<input name="contractAttr" id="contractAttr" readonly type="text"  th:value="${entity.contractAttr}"></input>
			</span>
		 </p>
		  <p class="p_text">
		 	<span class="input-colspan">
					<label for="totalAmount">合同总价(元):</label>
					<input name="totalAmount" id="totalAmount" readonly="readonly" type="text" th:value="${entity.totalAmount}"></input>
			</span>
		 	<span class="input-colspan">
		 			<th:block th:if="${entity.contractType=='S'}">
						<label for="dealedAmount">已收金额(元):</label>
				    </th:block>
					<th:block th:if="${entity.contractType=='B'}">
						<label for="dealedAmount">已付金额(元):</label>
				    </th:block> 
					<input name="dealedAmount" id="dealedAmount" readonly="readonly" type="text" th:value="${entity.dealedAmount}"></input>
			</span>
			<span class="input-colspan">
					<th:block th:if="${entity.contractType=='S'}">
						<label for="payFullTime">收全款日期:</label>
				    </th:block>
					<th:block th:if="${entity.contractType=='B'}">
						<label for="payFullTime">付全款日期:</label>
				    </th:block> 
					<input id="payFullTime" readonly type="text"  th:value="${#dates.format(entity.payFullTime,'yyyy-MM-dd')}"></input>
			 </span>	
		 </p>
		 <p class="p_text">
		 <span class="input-colspan">
				<label for="matchUserName">业务员:</label>
					<input name="matchUserName" id="matchUserName" readonly type="text"  th:value="${entity.matchUserName}"></input>
		</span>
		<span class="input-colspan">
				<label for="contractTime">合同时间:</label>
				<input id="contractTime" readonly="readonly"  type="text" th:value="${#dates.format(entity.contractTime,'yyyy-MM-dd')}"></input>
			</span>
		<span class="input-colspan">
					<label for="source">业务类型:</label>
					<input name="source" id="source" type="text"  readonly="readonly" th:value="${entity.source}"></input>
		</span>
		</p>
	</form>
	<form id="replyFrom" class="from-input-layout" method="post">
		<input type="hidden" name="ctrContractId" id="ctrContractId" th:value="${entity.id}" />
		 <p class="p_text">
				<span class="input-colspan3">
					<label for="notifyContent" style="margin-top:-140px;">通知内容:</label>
					<textarea  readonly style="width:84%;height:260%" th:text="${follow.notifyContent}"></textarea>
				</span>
		</p>
		 <p class="p_text">
				<span class="input-colspan3">
					<label for="replyContent" style="margin-top:-140px;">回复内容:</label>
					<th:block th:if="${follow.status=='D'}">
						<textarea name="replyContent" id="replyContent" readonly="readonly" style="width:84%;height:260%" th:text="${follow.replyContent}"></textarea>
				    </th:block>
					<th:block th:if="${follow.status=='N'}">
						<textarea name="replyContent" id="replyContent" style="width:84%;height:260%" th:text="${follow.replyContent}"></textarea>
				    </th:block>
				</span>
		</p>
		<div class="actions_bar">
			<th:block th:if="${follow.status=='N'}">
				<th:block th:if="${entity.matchUserId==curreUserId}">
					<a href="#" class="easyui-linkbutton btn-info-empty" data-options="iconCls:'icon-save'" onclick="saveReply();">保存</a>
				</th:block>
				<a href="#" class="easyui-linkbutton btn-danger-empty" data-options="iconCls:'icon-no'" onclick="$('#w_reply').window('close')">关闭</a>
			</th:block>
			<th:block th:if="${follow.status=='D'}">
				<a href="#" class="easyui-linkbutton btn-danger-empty" data-options="iconCls:'icon-no'" onclick="$('#w_reply').window('close')">关闭</a>
			</th:block>
		</div>
	</form>
	</div>
</div>
<script th:src="@{/static/ueditor/third-party/webuploader/webuploader.min.js}" type="text/javascript"></script>
<script th:src="@{/static/js/file.js?v=2}" type="text/javascript"></script>
<script type="text/javascript">
var canNotify = '[(${canNotify})]';
var contractId=$("#entityId").val();
var type=$("#entityContractType").val;
var _applyTypeJson = eval('[(${applyTypeJson})]');
var _contractAttrJson = eval('[(${contractAttrJson})]');
$(function(){
	//业务类型
	var sourceDom=$("#source");
	var sourceType=Convert.findValueByKey(_applyTypeJson,"dictCd",sourceDom.val(),"dictName");;
	sourceDom.val(sourceType);
	//合同属性
	var contractAttrDom=$("#contractAttr");
	var contractAttr=Convert.findValueByKey(_contractAttrJson,"dictCd",contractAttrDom.val(),"dictName");;
	contractAttrDom.val(contractAttr);
});
function saveReply(){
	var url =_ctx+'/rpt/orverdur/saveReply';
	var options={
	        url:url,
	        onSubmit: function(){
	        	var flag=true;
	        	if(!$("#replyFrom").form('validate'))
	        		flag=false;
	        	if (!flag){
	        		$.messager.alert('提示','保存失败，请输入必输项！','warning');
	        	}
	        	return flag;
	        },
		};
	$('#replyFrom').form('submit', options);
	$('#w_reply').window('close');
	$('#tt').datagrid('reload');
} 
$("#replyContent").on("input propertychange", function () {
    var $this = $(this),
            _val = $this.val(),
            count = "";
    if (_val.length > 199) {
        $this.val(_val.substring(0, 199));
    }
});
</script>
</body>
</html>
