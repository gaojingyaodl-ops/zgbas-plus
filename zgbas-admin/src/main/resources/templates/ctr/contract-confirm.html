<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">

<style type="text/css">
</style>
<div class="easyui-layout" fit="true" >
	<div region="center" border="false" class="from-input-layout" style="padding:20px 10px 0px 10px;">
		<form id="confirmForm" method="post">
			<input type="hidden" th:value="${entity.id}" id="entityId" name="id">
			<div class="mb6">
				<p class="yw-table-filter">
					<label>合同编号:</label>
					<input type="text" readonly="readonly" th:value="${entity.contractNo}"/>
				</p>
				<p class="yw-table-filter">
					<label>合同数量:</label>
					<input type="text" readonly="readonly" th:value="${entity.totalNumber}"/>
				</p>
				<p class="yw-table-filter">
					<label>出库数量:</label>
					<input type="text" readonly="readonly" id="warehouseNumber" th:value="${entity.warehouseNumber}"/>
				</p>
			</div>
			<div class="mb6">
				<p class="yw-table-filter w2">
					<label>货品名称:</label>
					<input type="text" readonly="readonly" th:value="${entity.productsName}"/>
				</p>
				<p class="yw-table-filter">
					<label>已收货数量:</label>
					<input type="text" readonly="readonly" id="alreadyconfirmNumber" th:value="${entity.confirmReceiveNumber}"/>
				</p>
			</div>
			<!-- <div class="mb6">
				<p class="yw-table-filter w2">
					<label>对方企业:</label>
					<input type="text" readonly="readonly" th:value="${entity.companyName}"/>
				</p>
			</div> -->
			<div class="mb6">
				<p class="yw-table-filter">
					<label>本次收货数量:</label>
					<input type="text" id="confirmNumber" name="confirmReceiveNumber"/>
				</p>
				<p class="yw-table-filter">
					<label>收货日期:</label>
					<input name="deliveryInTime" id="deliveryInTime" class="easyui-datebox"/>
				</p>
			</div>
			<div class="editForm">
				<p style="width:240px">
					<span class="upload-btn" id="btn_fileId">
		               	 <a href="#" class="easyui-linkbutton file-upload" data-options="iconCls:'icon-upload'">收货证明 </a>
		           	</span>
					<input class="control" id="warehouseFileId" name="warehouseFileId" type="hidden"/>
				</p>
				<p class="controls showImg fileId" id="span_fileId"></p>
			</div>
		</form>
	</div>
	<!-- padding:10px 10px 0px 10px -->
	<div region="south" border="false" class="actions_bar" style="padding-left:62%;padding-top:10px;height:50px;">
		<a href="#" class="easyui-linkbutton btn-info-empty" data-options="iconCls:'icon-save'" onclick="confirmReceive();">收货</a>
		<a href="#" class="easyui-linkbutton btn-danger-empty" data-options="iconCls:'icon-no'" onclick="$('#w_confirm').window('close')">关闭</a>
	</div>
</div>

<!-- <script th:src="@{/static/ueditor/third-party/webuploader/webuploader.min.js}" type="text/javascript"></script> -->
<script th:src="@{/static/js/file.js?v=2}" type="text/javascript"></script>
<script type="text/javascript">
	var warehouseFilePlugin = new FilePlugin('#warehouseFileId',0,'/ctr/contract/updateWarehouseFileId',true);
	warehouseFilePlugin.load($('#warehouseFileId').val(),'#span_warehouseFileId');
	if ($('#btn_warehouseFileId').length>0){
		fileUpload("btn_warehouseFileId", "warehouseFileId",warehouseFilePlugin);
	}
	$('#confirmNumber').numberbox({
		 precision:4,
		 required: true
	});
	$(function(){
		var warehouseNumber = $('#warehouseNumber').val();
		var alreadyconfirmNumber = $('#alreadyconfirmNumber').val();
		var dealNumber = Number(warehouseNumber) - Number(alreadyconfirmNumber);
		$('#confirmNumber').numberbox('options').max = dealNumber;

		$('#deliveryInTime').datebox({
			required: true,
			editable: false
		});
	});
	function confirmReceive(){
		var warehouseFileId = $('#warehouseFileId').val();
		var deliveryInTimeVal  = $('#deliveryInTime').val();
		var confirmNumber = $('#confirmNumber').numberbox('getValue');
		if (confirmNumber != null && confirmNumber == 0){
			$.messager.alert('提示','收货数量不可为0！','info');
			return;
		}
		if (!deliveryInTimeVal){
			$.messager.alert('提示','收货日期不可为空！','info');
			return;
		}
		if(!warehouseFileId){
			$.messager.alert('提示','收货证明附件不可为空！','info');
			return;
		}
		var _url = _ctx+"/ctr/contract/updateConfirmNumber";
		var options={
		        url:_url,
		        success:function(data){
		        	var rObj = eval('('+data+')');
		        	if(rObj.success){
						$.messager.show({title:'Tip',msg:'确认收货操作成功',timeout:2000,showType:'show'});
						$('#w_confirm').window('close');
						$('#tt').datagrid('reload');
					}else{
						var failure = eval("("+rObj.failure+")");
						$.messager.alert('error',failure.message,'warning');
					}
		        }
			};
		$('#confirmForm').form('submit', options);
	}
	function fileUpload(fileUploadId, fuSaveId,filePlugin) {
		var $this = $('#' + fuSaveId);
		// fileUploadId:点击弹出选择文件事件的dom对象
		// fusaveId:文件上传成功后，保存的服务文件Id
		// --start-文件上传---
		var uploader = WebUploader.create({
			auto : true,
			// swf文件路径
			swf : _ctx + '/static/webuploader-0.1.5/Uploader.swf',
			// 文件接收服务端。
			server : _ctx + '/file/uploadFile',
			// 选择文件的按钮。可选。
			// 内部根据当前运行是创建，可能是input元素，也可能是flash.
			pick : '#' + fileUploadId,
			// 不压缩image, 默认如果是jpeg，文件上传前会压缩一把再上传！
			resize : false,
			duplicate :true ,//true可重复上传，默认不可多次重复上传
			// 只允许选择图片文件。
			accept : {
				title : 'file',
				extensions : 'gif,jpg,jpeg,bmp,png,pdf,rar,zip,doc,docx,xlsx,xls',
//					mimeTypes :	"image/*"
// 				mimeTypes :	"image/jpg,image/jpeg,image/gif,image/bmp,image/png,application/pdf,application/rar,application/zip,application/msword,application/vnd.openxmlformats-officedocument.wordprocessingml.document"
				mimeTypes: "*"
			}
		});
		// 去掉文件上传组件样式，使用上传dom 自己样式
		$(".webuploader-pick").removeClass();

		uploader.on('beforeFileQueued', function(file) {
			$.messager.progress('close');
			if(file &&file.size > 10485760){
				$.messager.alert('tip',"上传文件不能超过10M!",'info');
				return false;
			}
		})

		// 当有文件添加进来的时候
		uploader.on('fileQueued', function(file) {
			$.messager.progress();
			//var $li = $('<div id="' + file.id + '" class="file-item thumbnail">' + '<img>' + '<div class="info">' + file.name + '</div>' + '</div>'), $img = $li.find('img');
		});

		// 文件上传成功，给item添加成功class, 用样式标记上传成功。
		uploader.on('uploadSuccess', function(file, response) {
			$.messager.progress('close');
			if(file &&file.size > 10485760){
				$.messager.alert('tip',"上传文件不能超过10M!",'info');
				return;
			}
			if(response && response.result){//上传成功
				var fileId = response.fileId;

				filePlugin.uploadSuccess(fileId);
				//加载附件列表
				filePlugin.load($this.val(),'#span_'+fuSaveId);

			}else{
				$.messager.alert('tip',"上传文件失败，失败信息："+ response._raw,'info');
			}

		});
		uploader.on('error',function(file){
			$.messager.progress('close');
			$.messager.alert('tip','文件格式不支持!','info');
		})
		// 文件上传失败，显示上传出错。
		uploader.on('file', function(file) {
			$.messager.progress('close');
			$.messager.alert('tip','文件上传失败,请重试!','info');
		});
		// --end-文件上传---
	}

	//获取当前日期
	function myformatter(date){
	    var y = date.getFullYear();
	    var m = date.getMonth()+1;
	    var d = date.getDate();
	    return y+'-'+(m<10?('0'+m):m)+'-'+(d<10?('0'+d):d);
	}
</script>
</html>
