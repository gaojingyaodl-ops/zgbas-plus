<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<link th:href="@{/static/ueditor/third-party/webuploader/webuploader.css?v=5565}" type="text/css" rel="stylesheet" />
<div class="easyui-layout" fit="true" id="tab">
	<div region="center" border="false">
		<form id="inputForm" method="post"  enctype="multipart/form-data" class="from-input-layout" style="margin-top: 10px;margin-bottom: 0;overflow:hidden;">
		<input type="hidden" name="id" id="id" th:value="${entity.id}" />
			<div class="form-section editt">
				<p class="form-section-title"><span class="approve_text">原合同费用</span><i></i></p>
				<div class="mb6">
					<p class="yw-table-filter">
						<label>原仓储费(元)</label>
						<input readonly th:value="${entity.warehouseAmount}"/>
					</p>
					<p class="yw-table-filter">
						<label>原运输费(元)</label>
						<input readonly th:value="${entity.transportAmount}"/>
					</p>
					<p class="yw-table-filter">
						<label>原出\入库费(元)</label>
						<input readonly th:value="${entity.deliveryFee}"/>
					</p>
				</div>
			</div>

			<div class="form-section editt">
				<p class="form-section-title"><span class="approve_text">调整后合同费用</span><i></i></p>
				<div class="mb6">
					<p class="yw-table-filter">
						<label>调整后仓储费(元)</label>
						<input id="warehouseAmount" name="warehouseAmount" type="number"/>
					</p>
					<p class="yw-table-filter">
						<label>调整后运输费(元)</label>
						<input id="transportAmount" name="transportAmount" type="number"/>
					</p>
					<p class="yw-table-filter">
						<label>调整后出\入库费(元)</label>
						<input id="deliveryFee" name="deliveryFee" type="number"/>
					</p>
				</div>
			</div>

		</form>
		<div region="south" border="false" style="overflow: hidden;height: 40px;">
			<div class="actions_bar" style="padding-left:240px;">
				<span  class="easyui-linkbutton btn-info-empty" data-options="iconCls:'icon-save'" id="save" onclick="save()">保存</span>
			</div>
		</div>
	</div>
</div>

<script th:src="@{/static/ueditor/third-party/webuploader/webuploader.min.js}" type="text/javascript"></script>
<script th:src="@{/static/js/file.js?v=2}" type="text/javascript"></script>
<script type="text/javascript" th:inline="javascript">
function save() {

		var _url = _ctx+"/ctr/contract/updateContractCost";
		var options={
		        url:_url,
		        success:function(data){
		        	var rObj = eval('('+data+')');
		        	if(rObj.success){
						$.messager.show({title:'Tip',msg:'保存成功',timeout:2000,showType:'show'});
						$('#w_updateCost_window').window("close");
						$('#tt').datagrid('reload');
					}else{
						var failure = rObj.failure;
						$.messager.alert('error',failure,'warning');
						onClickFlg = true;
						$('#tt').datagrid('reload');
					}
		        }
			};
		$('#inputForm').form('submit', options);

}
</script>
