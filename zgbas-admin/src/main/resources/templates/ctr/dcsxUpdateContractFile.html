<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<link th:href="@{/static/ueditor/third-party/webuploader/webuploader.css?v=5565}" type="text/css" rel="stylesheet" />
<div class="easyui-layout" fit="true" id="tab">
	<div region="center" border="false">
		<form id="inputForm" method="post"  enctype="multipart/form-data" class="from-input-layout">
		<input type="hidden" name="id" id="id" th:value="${entity.id}" />
			<input class="control" id="oldFileId" name="oldFileId" type="hidden" th:value="${entity.fileId}" />
		<fieldset style="border: #00b7ee 1px solid;margin-bottom: 20px;margin-top: 20px;margin-left: 20px;margin-right: 20px;">
			<legend style="color: #00b7ee">修改前信息</legend>
			<div class="mb6">
				<p class="yw-table-filter">
					<label>合同总价:</label>
					<input readonly name="totalAmount" id="totalAmount" type="text" th:value="${entity.totalAmount}"></input>
				</p>
				<p class="yw-table-filter">
					<label>合同数量:</label>
					<input readonly name="totalNumber" id="totalNumber" type="text"   th:value="${entity.totalNumber}"></input>
				</p>

				<p class="yw-table-filter">
					<label>合同单价:</label>
					<input readonly name="dealPrice" id="dealPrice" type="text" th:value="${entity.dealPrice}"></input>
				</p>
				<p class="yw-table-filter">
					<label>付全款日期</label>
					<input readonly id="payFullTime" name="payFullTime" type="text" th:value="${#dates.format(entity.payFullTime, 'yyyy-MM-dd')}"/>
				</p>

			</div>
		</fieldset>
		<fieldset style="border: #00b7ee 1px solid;margin-bottom: 20px;margin-top: 20px;margin-left: 20px;margin-right: 20px;">
			<legend style="color: #00b7ee">修改后信息</legend>
			<div class="mb6">
				<p class="yw-table-filter">
					<label>合同总价:</label>
					<input name="newTotalAmount" id="newTotalAmount" type="text"></input>
				</p>
				<p class="yw-table-filter">
					<label>合同数量:</label>
					<input name="newTotalNumber" id="newTotalNumber" type="text"  ></input>
				</p>

				<p class="yw-table-filter">
					<label>合同单价:</label>
					<input name="newDealPrice" id="newDealPrice" type="text"></input>
				</p>
				<p class="yw-table-filter">
					<label>付全款日期</label>
					<input id="newPayFullTime" name="newPayFullTime" class="easyui-datebox" type="text" />
				</p>

			</div>
		</fieldset>
		<div class="editForm" style="padding-left: 20px;">
			<p style="width:240px">
			<span class="upload-btn" id="btn_fileId">
				 <a href="#" class="easyui-linkbutton file-upload" data-options="iconCls:'icon-upload'">上传附件 </a>
			</span>
				<input class="control" id="fileId" name="fileId" type="hidden" th:value="${entity.fileId}" />
			</p>
			<p class="controls showImg fileId" style="margin: 20px 0px 20px 0px;" id="span_fileId"></p>
		</div>
		</form>
		<div region="south" border="false" style="overflow: hidden;height: 40px;">
			<div class="actions_bar" style="padding-left:360px">
				<span  class="easyui-linkbutton btn-info-empty" data-options="iconCls:'icon-save'" id="save" onclick="save()">保存</span>
			</div>
		</div>
	</div>
</div>

<script th:src="@{/static/ueditor/third-party/webuploader/webuploader.min.js}" type="text/javascript"></script>
<script th:src="@{/static/js/file.js?v=2}" type="text/javascript"></script>
<script type="text/javascript" th:inline="javascript">
var onClickFlg = true;
var filePlugin = new FilePlugin('#fileId', $('#id').val(), '/ctr/contract/updateCtrFileId', true);



$(function(){
	//加载附件列表
	filePlugin.load($('#fileId').val(),'#span_fileId');
	if ($("#btn_fileId").length>0){
		fileUpload("btn_fileId", "fileId","span_fileId",filePlugin);
	}
	$('#newTotalAmount,#newDealPrice').numberbox({
		min:0,
		precision:2,
		required: false
	});
	$('#newTotalNumber').numberbox({
		min:0,
		precision:4,
		required: false
	});

});

function save() {
	var contractId = $('#id').val();
	var fileId = $('#fileId').val();
	console.log('---contractId--  '+contractId);
	console.log('---fileId--  '+fileId);
	if(fileId != null){
		var _url = _ctx+"/ctr/dcsx/updateContractFile";
		var options={
		        url:_url,
		        success:function(data){
		        	var rObj = eval('('+data+')');
		        	if(rObj.success){
						$.messager.show({title:'Tip',msg:'保存成功',timeout:2000,showType:'show'});
						$('#w_update_fileId').window("close");
						$('#tt').datagrid('reload');
					}else{
						var failure = rObj.failure;
						$.messager.alert('error',failure,'warning');
						onClickFlg = true;
						$('#tt').datagrid('reload');
					}
		        }
			};
		$('#inputForm').form('submit', options);
	}

}

function fileUpload(fileBtn, fileId, filePath, filePlugin) {
	var $this = $('#' + fileId);
	// fileBtn:点击弹出选择文件事件的dom对象
	// filePath:文件上传成功后，保存的服务文件Id
	// --start-文件上传---
	var uploader = WebUploader.create({
		auto : true,
		// swf文件路径
		swf : _ctx + '/static/webuploader-0.1.5/Uploader.swf',
		title:'更新附件',
		// 文件接收服务端。
		server : _ctx + '/file/uploadFile',
		// 选择文件的按钮。可选。
		// 内部根据当前运行是创建，可能是input元素，也可能是flash.
		pick : '#' + fileBtn,
		// 不压缩image, 默认如果是jpeg，文件上传前会压缩一把再上传！
		resize : false,
		duplicate :true ,//true可重复上传，默认不可多次重复上传
		// 只允许选择图片文件。
		accept : {
			title : 'file',
			extensions : 'gif,jpg,jpeg,bmp,png,pdf,rar,zip,doc,docx,xlsx,xls',
//					mimeTypes :	"image/*"
// 				mimeTypes :	"image/jpg,image/jpeg,image/gif,image/bmp,image/png,application/pdf,application/rar,application/zip,application/msword,application/vnd.openxmlformats-officedocument.wordprocessingml.document"
			mimeTypes: "*"
		}
	});
	// 去掉文件上传组件样式，使用上传dom 自己样式
	$(".webuploader-pick").removeClass();

	uploader.on('beforeFileQueued', function(file) {
		$.messager.progress('close');
		if(file &&file.size > 10485760){
			$.messager.alert('tip',"上传文件不能超过10M!",'info');
			return false;
		}
	})

	// 当有文件添加进来的时候
	uploader.on('fileQueued', function(file) {
		$.messager.progress();
		//var $li = $('<div id="' + file.id + '" class="file-item thumbnail">' + '<img>' + '<div class="info">' + file.name + '</div>' + '</div>'), $img = $li.find('img');
	});
	var valTemp = $this.val();
	// 文件上传成功，给item添加成功class, 用样式标记上传成功。
	uploader.on('uploadSuccess', function(file, response) {
		$.messager.progress('close');
		if(file &&file.size > 10485760){
			$.messager.alert('tip',"上传文件不能超过10M!",'info');
			return;
		}
		$this.val("");
		if(response && response.result){//上传成功
			console.log("uploadSuccess", response);
			var fileId = response.fileId;
			// console.log("fileId", fileId);
			filePlugin.uploadSuccess(fileId);
			//加载附件列表
			filePlugin.load($this.val(),'#'+filePath);
		}else{
			$$this.val(valTemp);
			$.messager.alert('tip',"上传文件失败，失败信息："+ response._raw,'info');
		}

	});
	uploader.on('error',function(file){
		$.messager.progress('close');
		$.messager.alert('tip','文件格式不支持!','info');
	})
	// 文件上传失败，显示上传出错。
	uploader.on('file', function(file) {
		$.messager.progress('close');
		$.messager.alert('tip','文件上传失败,请重试!','info');
	});
	// --end-文件上传---
}
</script>
