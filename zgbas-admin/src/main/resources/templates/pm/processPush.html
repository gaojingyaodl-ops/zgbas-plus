<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
<title>流程推送管理</title>
<th:block th:replace="~{layouts/include :: include}"></th:block>
</head>
<body class="easyui-layout">
<div region="north" class="search_div pt20	pl20 pr20 pb15 ofh" border="false">
	<form id="searchForm" class="form-search from-input-layout" method="post">
		<div class="mb6">
			<p class="yw-table-filter">
				<label>流程名称:</label>
				<input name="search_LIKES_processName" id="process_srh" type="text" value=""/>
			</p>
			<p class="yw-table-filter">
				<label>推送人:</label>
				<input name="search_LIKES_userName" id="user_srh" type="text" value=""/>
			</p>
			<p class="yw-table-filter">
				<label>是否有效:</label>
				<input name="search_EQB_enableFlg" type="text" value="" id="enableFlg_srh"/>
			</p>
			<a href="#" class="easyui-linkbutton btn64" onclick="Convert.search('searchForm','tt');">查询</a>
			<a href="#" class="easyui-linkbutton btn-empty btn64 ml10" onclick="$('#searchForm').form('reset');">清空</a>
		</div>
	</form>
	<div id="btn" class="add-btn" style="margin-top: 10px">
		  <a  href="#" class="easyui-linkbutton btn64 addBtn" onclick="editProcessPush(0)">新增</a>
	</div>
</div>

<div region="center" border="false" class="panel_padding" style="padding-right:20px;padding-left:20px;">
	<table id="tt" fit="true"
			title="" iconCls="icon-edit" singleSelect="true"
			idField="id">
	</table>
</div>
<div id="w_process_push" title="流程推送配置" data-options="width:700,height:240"></div>
<script type="text/javascript">
	var lastIndex;
	var enableFlgs = eval('[(${enableFlgs})]');
	var deptTree = eval('[(${deptTree})]');
	var processList =eval('[(${processList})]');
	$(function(){
		$("#enableFlg_srh").combobox({
			data:enableFlgs,
			textField:'dictName',
			valueField:'dictCd',
			panelHeight:"auto"	
		});

		$("#process_srh").combobox({
			data:processList,
			editable : true,
			textField:'processName',
			valueField:'processName'
		});

		$('#user_srh').combotree({
			data : deptTree,
			multiple : false,
			editable : true,
			onSelect : function(node) {
				if (node.children.length != 0) {
					$('#user_srh').combotree('clear');
				}else{
					$('#user_srh').combotree('setValue',node.text);
				}
			}
		});
		
		$('#tt').datagrid({
			pagination:true,
			pageSize:20,
			rownumbers:true,
			pageList:[50,40,30,20],
			url:_ctx+"/pm/push/list",
			columns:[ [
				{field:'processName',title:'流程名称',align:'left',sortable:true, width:250},
				{field:'userName',title:'推送人',align:'left',sortable:true, width:120},
				{field:'conditionValue',title:'条件内容',align:'left', width:400},
				{field:'enableFlg',title:'有效',align:'left', width:100,
					formatter:function(value){
						if(value=='true'){
							return "<span style='color:#76b3ff;font-weight: bold;';>是</span>";
						}else{
							return "<span style='color:red;font-weight:bold'>否</span>";;
						}
				}},
				{field:'updatedDate',title:'更新时间', width:140},
				{field:'operate',title:'操作', width:100,align:'center',formatter:function(value, row, index){
					var str = '<img onclick="remove('+row.id+')" style="cursor:pointer;width:16px;hight:18px" src="../static/new-version/images/icon_delete.png"/>';
			        return str; }}
			]],
			toolbar:"#toolbar",
			onDblClickCell:function(index,field){
				var row = $('#tt').datagrid('getSelected');
				editProcessPush(row.id);
			},
			onClickCell:function(index,field){
				lastIndex = index;
			}
		});

		$('#w_process_push').window({
			title : '流程推送配置',
			modal : true,
			closed : true,
			collapsible : false,
			minimizable : false,
			maximizable : false,
			cache : false,
			onClose : function() {
				$('#tt').datagrid('reload');
			}
		});
	});

	//弹出新增框
	function editProcessPush(id) {
		var url = _ctx + "/pm/push/detail/" + id;
		$('#w_process_push').window({href:url});
		$('#w_process_push').window("open");
	}

	function remove(id){
		$('#tt').datagrid('selectRecord',id);
		var row = $('#tt').datagrid('getSelected');
		if(row){
			var index = $('#tt').datagrid('getRowIndex', row);
			if (row.id==undefined){
				$('#tt').datagrid('deleteRow',index);
			}else{
				$.messager.confirm({
					width:388,
					height:170,
					title: '删除提示',
					msg: '确定要删除该信息吗？',
					ok: "确定",
					cancel: "取消",
					cls:'c9',
					border:'thin',
					fn: function(r){
		                if (r){
							$.post(_ctx+"/pm/push/delete/"+row.id,function(result) {
								var rObj = eval(result);
								if(rObj.success){
									$('#tt').datagrid('reload');
									$('#tt').datagrid('clearSelections');
								}else{
									 $.messager.alert('error',rObj.failure,'warning');
								}
							});
		                }
		            }
		        });
			}
		}
	}
</script>
</body>
</html>
