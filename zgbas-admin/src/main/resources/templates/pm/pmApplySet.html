<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
<title>审批流程配置</title>
<th:block th:replace="~{layouts/include :: include}"></th:block>
</head>
<body class="easyui-layout">
<div region="north" class="search_div pt20	pl20 pr20 pb15 ofh" border="false">
	<form id="searchForm" class="form-search from-input-layout" method="post">
		<div class="mb6">
			<p class="yw-table-filter">
				<label>审批流程:</label>
				<input name="search_EQL_processId" type="text" value="" id="processId"/>
			</p>
			<p class="yw-table-filter">
				<label>审批步骤:</label>
				<input name="search_EQL_stepId" type="text" value="" id="stepId"/>
			</p>
			<p class="yw-table-filter">
				<label>属性:</label>
				<input name="search_LIKES_fieldName" type="text" value="" id="fieldName"/>
			</p>
			<a href="#" id="btn" class="easyui-linkbutton btn64" onclick="Convert.search('searchForm','tt');">查询</a>
			<a href="#" id="btn"class="easyui-linkbutton btn-empty btn64 ml10" onclick="$('#searchForm').form('reset');">清空</a>
		</div>
	</form>
	<div id="btn" class="add-btn" style="margin-top: 10px">
		  <a  href="#" class="easyui-linkbutton btn64 addBtn" onclick="insert()">新增</a>
		  <a  href="#" class="easyui-linkbutton btn64 btn-info-empty" onclick="saveEdit();">保存</a>
	</div>
</div>

<div region="center" border="false" class="panel_padding" style="padding-right:20px;padding-left:20px;">
	<table id="tt" fit="true"
			title="" iconCls="icon-edit" singleSelect="true"
			idField="id">
	</table>
</div>
<script type="text/javascript">
var editFlg =eval('[(${editFlg})]');
var processJson =eval('[(${processJson})]');
var stepListJson = eval('[(${stepListJson})]');
var lastIndex;
	$(function(){
		$("#processId").combobox({
			data:processJson,
			textField:'processName',
			valueField:'id'
		});;
		$("#stepId").combobox({
			data:stepListJson,
			textField:'stepName',
			valueField:'id'
		});;
		$('#tt').datagrid({
			pagination:true,
			pageSize:10,
			rownumbers:true,
			pageList:[50,40,30,20,10],
			url:_ctx+"/pm/applySet/applylist",
			columns:[ [
				{field:'processId',title:'流程名称', width:150,editor:{type:'combobox',options:{required:'true',panelWidth:150,data:processJson,textField:'processName',valueField:'id'}},
					formatter:function(value,row,index){
						return Convert.findTreeValueByKey(processJson,"id",value,"processName");
				}},
				{field:'stepId',title:'步骤名称', width:150,editor:{type:'combobox',
						options:{
							required:'true',
							data: stepListJson,
							valueField:"id",textField:'stepName'}},
					formatter:function(value,row,index){
						return Convert.findTreeValueByKey(stepListJson,"id",value,"stepName");
				}},
				{field:'fieldName',title:'属性',editor:{type:'validatebox'}, width:150},
				{field:'editFlg',title:'可编辑',editor:{type:'checkbox',options:{on:'true',off:'false'}}, width:120, align:'center',
					formatter:function(value,row,index){
						if(value=='true')
							return '是';
						else
							return '否';

				}},
				{field:'requireFlg',title:'必填',editor:{type:'checkbox',options:{on:'true',off:'false'}}, width:120, align:'center',
					formatter:function(value,row,index){
						if(value=='true')
							return '是';
						else
							return '否';

				}},

				{field:'remark',title:'备注',editor:{type:'validatebox',options:{validType:'length[1,20]'}}, width:120},
				{field:'operate',title:'操作', width:120,align:'center',formatter:function(value, row, index){
					var str = '<img onclick="remove('+row.id+')" style="cursor:pointer;width:16px;hight:18px" src="../static/new-version/images/icon_delete.png"/>';
			        return str; }}
			]],
			toolbar:"#toolbar",
			onDblClickCell:function(index,field){
				$('#tt').datagrid('endEdit', lastIndex);
				$('#tt').datagrid('beginEdit', index);
				lastIndex = index;
				Convert.focusEditor("tt",field,lastIndex);
			},
			onClickCell:function(index,field){
				if (lastIndex != index){
					$('#tt').datagrid('endEdit', lastIndex);
					$('#tt').datagrid('beginEdit', index);
				}
				lastIndex = index;
				Convert.focusEditor("tt",field,lastIndex);
			},
			onBeginEdit:function(index,row){
				var ed_processId = $('#tt').datagrid('getEditor', {index:index,field:'processId'});
				var ed_stepId = $('#tt').datagrid('getEditor', {index:index,field:'stepId'});
				$(ed_processId.target).combobox('options').onSelect=function(record){
					var _id = record.id;
					$(ed_stepId.target).combobox("setValue","");
					$(ed_stepId.target).combobox('reload',_ctx+"/pm/applySet/findStep?processId="+_id);
				}
			}

		});
	});

	function array2str(array,prefix){
		var a_new =[];
		for(var index in array){
			var str = array[index];
			a_new.push(str.replace(prefix,""));
		}
		if (a_new.length > 0){
			return a_new.join('|')+"|";
		}
		return '';
	}

	function saveEdit(){
		var flag=true;
		var saveflag = true;
		var row = $('#tt').datagrid('getSelected');
		if (row){
			var index = $('#tt').datagrid('getRowIndex', row);
			$('#tt').datagrid('endEdit', index);
		}
		var changeRows=[];
		var inserted = $('#tt').datagrid('getChanges','inserted');
		var updated = $('#tt').datagrid('getChanges','updated');
		changeRows = inserted.concat(updated);
		for(var i=0;i<changeRows.length;i++){
			var index = $('#tt').datagrid('getRowIndex', changeRows[i]);
			flag=$('#tt').datagrid('validateRow',index);
    		if (!flag){
    			$('#tt').datagrid('selectRow',index);
    			$('#tt').datagrid('beginEdit', index);
				break;
    		}else{
    			$('#tt').datagrid('endEdit', index);
			}
		}
		//判断新增的记录是否存在
		for(var i=0;i<inserted.length;i++){
			var row = inserted[i];
			var data = {"processId":row.processId,"stepId":row.stepId,"fieldName":row.fieldName};
			$.ajax({
				 type: "POST",
				 url: _ctx+"/pm/applySet/findByParm",
				 data:data,
				 async: false,
				 success: function(data){
					if(data.message == 'fail'){
						 saveflag = false;
	     				 $.messager.alert('提示','保存失败，信息重复','warning');
	     				$('#tt').datagrid('selectRow',index);
     	    			$('#tt').datagrid('beginEdit', index);
	    			}}
			});
		}
		//批量保存
		if (flag && saveflag){
			$.post(_ctx+"/pm/applySet/saveBatch",Convert.ToSaveParam("tt"), function(result) {
				var rObj = eval(result);
				if(rObj.success){
					$('#tt').datagrid('reload');
				}else{
					$.messager.alert('error',rObj.failure,'warning');
				}
			});
		}
	}
	function getDeptShow(jsonObject,keyField,keyValue,valueField){
		var rtnValue='';
		for(var i in jsonObject){
			var _dom=jsonObject[i];
			if (_dom[keyField]==keyValue){
				rtnValue = _dom[valueField];
				break;
			}
			var children = _dom.children;
			if(children!=null && children.length>0){
				rtnValue = getDeptShow(children,keyField,keyValue,valueField);
			}
		}
		return rtnValue;
	}
	//新增
	function insert(){
		$('#tt').datagrid('endEdit', lastIndex);
		var field={};
		$('#tt').datagrid('appendRow',field);
		lastIndex = $('#tt').datagrid('getRows').length-1;
		$('#tt').datagrid('selectRow', lastIndex);
		$('#tt').datagrid('beginEdit', lastIndex);
		Convert.focusEditor("tt",field,lastIndex);
	}
	function remove(id){
		$('#tt').datagrid('selectRecord',id);
		var row = $('#tt').datagrid('getSelected');
		if(row){
			var index = $('#tt').datagrid('getRowIndex', row);
			if (row.id==undefined){
				$('#tt').datagrid('deleteRow',index);
			}else{
				$.messager.confirm({
					width:388,
					height:170,
					title: '删除提示',
					msg: '确定要删除该信息吗？',
					ok: "确定",
					cancel: "取消",
					cls:'c9',
					border:'thin',
					fn: function(r){
		                if (r){
		                	//TODO:如果该记录被引用,是否强制不允许删除?
							$.post(_ctx+"/pm/applySet/delete/"+row.id,function(result) {
								var rObj = eval(result);
								if(rObj.success){
									$('#tt').datagrid('reload');
									$('#tt').datagrid('clearSelections');
								}else{
									 $.messager.alert('error',rObj.failure,'warning');
								}
							});
		                }
		            }
		        });
			}
		}
	}
</script>
</body>
</html>
