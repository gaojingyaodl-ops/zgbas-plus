<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
<title>流程主表</title>
<th:block th:replace="~{layouts/include :: include}"></th:block>
</head>
<body class="easyui-layout">
<div region="north" class="search_div pt20	pl20 pr20 pb15 ofh" border="false">
	<form id="searchForm" class="form-search from-input-layout" method="post">
	<div class="mb6">
		<p class="yw-table-filter">
			<label>流程代码:</label>
			<input name="search_LIKES_processCode" type="text" value=""/>
		</p>
		<p class="yw-table-filter">
			<label>流程名称:</label>
			<input type="text" name="search_LIKES_processName"/>
		</p>
		<p class="yw-table-filter">
			<lable>流程分组:</lable>
			<input name="search_EQS_processGroup" type="text" id="processGroup"/>
		</p>
		<a href="#" id="btn" class="easyui-linkbutton btn64" onclick="Convert.search('searchForm','tt');">查询</a>
		<a href="#" id="btn" class="easyui-linkbutton btn-empty btn64 ml10" onclick="$('#searchForm').form('reset');">清空</a>
	</div>
	</form>
	<div id="btn" class="add-btn">
		  <a  href="#" class="easyui-linkbutton btn64" onclick="detail(0,'/pm/process/detail/')">新增</a>
	</div>
</div>


<div region="center" border="false" class="panel_padding" style="padding-right:20px;padding-left:20px;">
	<table id="tt" fit="true"
			title="" iconCls="icon-edit" singleSelect="true"
			idField="id">
	</table>
</div>

<div id="win" data-options="width:1055,height:790" class="easyui-window">
</div>
<script type="text/javascript">
	var lastIndex;
	var processGroupJson =eval('[(${processGroup})]');
	$(function(){
		$("#processGroup").combobox({
			data:processGroupJson,
			textField:'dictName',
			valueField:'dictCd',
			panelHeight:"auto"
		});

		$('#tt').datagrid({
			pagination:true,
			pageSize:30,
			rownumbers:true,
			pageList:[50,40,30,20,10],
			url:_ctx+"/pm/process/list",
			columns:[ [
				{field:'processCode',title:'流程代码', align:'left',width:230},
				{field:'processName',title:'流程名称', align:'left',width:120},
				{field:'enableFlg',title:'有效',width:80, align:'center',
					formatter:function(value,row,index){
						if(value=='true'){
							return "<span style='color:#76b3ff;font-weight: bold;';>是</span>";
						}else{
							return "<span style='color:red;font-weight:bold'>否</span>";;
						}

					}				},
				{field:'viewFlg',title:'控制权限',width:80, align:'center',
					formatter:function(value,row,index){
						if(value=='true'){
							return "<span style='color:#76b3ff;font-weight: bold;';>是</span>";
						}else{
							return "<span style='color:red;font-weight:bold'>否</span>";;
						}

					}				},
				{field:'entityName',title:'实体名称', width:300, align:'left'},
				{field:'entityService',title:'服务名称', width:200, align:'left'},
				{field:'contentUrl',title:'内容地址', width:250, align:'left'},
				{
					field : 'processGroup',
					title : '流程分组',
					width : 80,
					align:'center',
					formatter : function(value, row, index) {
						return Convert.findValueByKey(processGroupJson, "dictCd",value, "dictName");
					}
				},
				{field:'dispOrderNo',title:'序号', width:70},
				{field:'updatedDate',title:'更新时间', width:130, align:'center'},
				{field:'operate',title:'操作', width:120,align:'center',formatter:function(value, row, index){
			        //var detail = '<img onclick= detail("'+row.id+'","/pm/process/detail/")" style="cursor:pointer;width:15px;hight:15px" src="../static/images/icon_delete.png"/>';
					var str = '<img onclick="alter(\''+row.id+'\')" style="cursor:pointer;width:16px;hight:18px;margin-right:25px" src="../static/images/icon_alter.png"/>'
					str = str + '<img onclick="remove('+row.id+')" style="cursor:pointer;width:16px;hight:18px" src="../static/new-version/images/icon_delete.png"/>';
			        return str; }}
			]],
			toolbar:"#toolbar",
			/* toolbar:[{
				text:'新增',
				iconCls:'icon-add',
				handler:function(){
					processDetail(0);
				}
			},'-',{
				text:'编辑',
				iconCls:'icon-edit',
				handler:function(){
					var row = $('#tt').datagrid('getSelected');
					if(row){
						var index = $('#tt').datagrid('getRowIndex', row);
						processDetail(row.id);
					}
				}
			},'-',{
				text:'删除',
				iconCls:'icon-remove',
				handler:function(){
					var row = $('#tt').datagrid('getSelected');
					if(row){
						var index = $('#tt').datagrid('getRowIndex', row);
						if (row.id==undefined){
							$('#tt').datagrid('deleteRow',index);
						}else{
						$.messager.confirm('提示','确认要删除该记录吗?',function(t){
							if(t){
								//TODO:如果该记录被引用,是否强制不允许删除?
								$.post(_ctx+"/pm/process/delete/"+row.id,function(result) {
									var rObj = eval(result);
									if(rObj.success){
										$('#tt').datagrid('reload');
									}else{
										 $.messager.alert('error',rObj.failure,'warning');
									}
								});
							}
						});
						}
						var nextSelect=index>0?index-1:0;
						$('#tt').datagrid('selectRow', nextSelect);
					}
				}
			},'-'], */
			onDblClickRow:function(index,row){
				lastIndex = index;
				detail(row.id,'/pm/process/detail/');
			},
			onClickRow:function(index,row){
				lastIndex = index;
			}
		});
		$('#win').window({
			modal:true,
			closed: true,
			collapsible : false,
			minimizable : false,
			maximizable : false,
			cache:false,
			iconCls:"",
			onClose:function(){
				$('#tt').datagrid('reload');

			}
		});
	});
	function detail(id,url){
		var _title="新增";
		if(id!=0){
			_title = "编辑";
		}
		var _href = url+id
		$('#win').window({title:_title,href:_href});
		$('#win').window('open');
	}
	function remove(id){
		$('#tt').datagrid('selectRecord',id);
		var row = $('#tt').datagrid('getSelected');
		if(row){
			var index = $('#tt').datagrid('getRowIndex', row);
			if (row.id==undefined){
				$('#tt').datagrid('deleteRow',index);
			}else{
				$.messager.confirm({
					width:388,
					height:170,
					title: '删除提示',
					msg: '确定要删除该信息吗？',
					ok: "确定",
					cancel: "取消",
					cls:'c9',
					border:'thin',
					fn: function(r){
		                if (r){
		                	//TODO:如果该记录被引用,是否强制不允许删除?
							$.post(_ctx+"/pm/process/delete/"+row.id,function(result) {
								var rObj = eval(result);
								if(rObj.success){
									$('#tt').datagrid('reload');
									$('#tt').datagrid('clearSelections');
								}else{
									 $.messager.alert('error',rObj.failure,'warning');
								}
							});
		                }
		            }
		        });
			}
		}
	}

	function alter(id){
		$('#tt').datagrid('selectRecord',id);
		var row = $('#tt').datagrid('getSelected');
		if(row){
			var index = $('#tt').datagrid('getRowIndex', row);
			if (row.id!=undefined){
				lastIndex = index;
				detail(row.id,'/pm/process/detail/');
			}
		}
	}
</script>
</body>
</html>
