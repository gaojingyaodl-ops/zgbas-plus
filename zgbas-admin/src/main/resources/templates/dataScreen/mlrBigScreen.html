<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <title>毛利润大屏</title>
    <th:block th:replace="~{layouts/include :: include}"></th:block>
</head>
<body class="easyui-layout">
<div region="north" class="search_div pt20	pl20 pr20 pb15 ofh" style="height: 100%;" border="false">
    <input type="hidden" id="currentUserId" th:value="${@shiroUtil.getCurrentUserId()}">
    <form id="searchForm" class="form-search from-input-layout" method="post">
        <div class="mb6">
            <input name="basDataServerUrl" id="basDataServerUrl" class="easyui-validatebox" type="hidden" th:value="${basDataServerUrl}"/>
            <input name="basDataServerPhoneUrl" id="basDataServerPhoneUrl" class="easyui-validatebox" type="hidden" th:value="${basDataServerPhoneUrl}"/>
            <p class="yw-table-filter">
                <label style="width: 80px;">年月:</label>
                <input name="baseDate" class="easyui-validatebox" id="baseDate" type="text" th:value="${nowTargetMonth}"/>
            </p>
            <a  href="#" class="easyui-linkbutton addBtn" onclick="gotoMlrDataScreen()" style="width: 100px;">打 开</a>
        </div>
        <div class="mb6">
            <input name="basDataRangeServerUrl" id="basDataRangeServerUrl" class="easyui-validatebox" type="hidden" th:value="${basDataRangeServerUrl}"/>
            <input name="basDataRangePhoneUrl" id="basDataRangePhoneUrl" class="easyui-validatebox" type="hidden" th:value="${basDataRangePhoneUrl}"/>
            <p class="yw-table-filter">
                <label style="width: 80px;">年月:</label>
                <input name="startDate" class="easyui-validatebox" id="startDate" type="text" th:value="${nowTargetMonth}"/>
            </p>
            <span style="margin-left: -15px;" class="mobile-display-none">
				<label>~</label>
			</span>
            <p class="yw-table-filter">
                <input name="endDate" class="easyui-validatebox" id="endDate" type="text" th:value="${nowTargetMonth}"/>
            </p>
            <a  href="#" class="easyui-linkbutton addBtn" onclick="gotoMlrRangeDataScreen()" style="width: 100px;">打 开</a>
        </div>
        <div>
            毛利：销售总额-采购总额-仓储费-装卸费-出库费-运输费
        </div>
    </form>
</div>
<script type="text/javascript">
    var _basDataServerUrl = $('#basDataServerUrl').val();
    var _basDataServerPhoneUrl = $('#basDataServerPhoneUrl').val();
    $(function(){
        $('#baseDate').datebox({
        });
        intiMonthBox('baseDate');

        $('#startDate').datebox({
        });
        intiMonthBox('startDate');
        
        $('#endDate').datebox({
        });
        intiMonthBox('endDate');

        // 判断是否为手机访问
        if (isMobile()) {
            _basDataServerUrl = _basDataServerPhoneUrl;
        } 

        
    });

    // 判断是否为手机的函数
    function isMobile() {
        return window.innerWidth <= 768; // 根据实际情况调整阈值
    }
    function formatterData(value){
        if (value && value.length > 10){
            return value.substring(0,value.length-3);
        }
    }
    function gotoMlrDataScreen(){
        var _baseDate = $('#baseDate').val();
        var month = _baseDate.replaceAll("-","")
        const firstAmpersandIndex = _basDataServerUrl.indexOf("&"); // 查找第一个 & 的位置
        const urlPart1 = _basDataServerUrl.substring(0, firstAmpersandIndex); // 切割第一个 & 之前的部分
        const urlPart2 = _basDataServerUrl.substring(firstAmpersandIndex + 1); // 切割第一个 & 之后的部分
        const newUrl = urlPart1 + "/" + month + "&" + urlPart2;
        window.open(newUrl);
    }

    function gotoMlrRangeDataScreen(){
        var _startDate = $('#startDate').val();
        var _endDate = $('#endDate').val();
        var month = _startDate.replaceAll("-","") + "-" + _endDate.replaceAll("-","")
        var _basDataRangeServerUrl = $('#basDataRangeServerUrl').val();
        if (isMobile()) {
            _basDataRangeServerUrl = $('#basDataRangePhoneUrl').val();;
        }
        const firstAmpersandIndex = _basDataRangeServerUrl.indexOf("&"); // 查找第一个 & 的位置
        const urlPart1 = _basDataRangeServerUrl.substring(0, firstAmpersandIndex); // 切割第一个 & 之前的部分
        const urlPart2 = _basDataRangeServerUrl.substring(firstAmpersandIndex + 1); // 切割第一个 & 之后的部分
        const newUrl = urlPart1 + "/" + month + "&" + urlPart2;
        window.open(newUrl);
    }
    
</script>
</body>
</html>
