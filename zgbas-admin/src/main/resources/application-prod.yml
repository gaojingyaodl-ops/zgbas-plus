# zgbas-plus prod profile — ALL secrets via env-var (D-P2-13).
# Uses ${VAR} (fail-fast if unset) for secrets per Open Question 3 resolution.
spring:
  datasource:
    druid:                                             # D-P2-15 unified prefix
      driver-class-name: com.mysql.cj.jdbc.Driver
      url: ${DB_URL}
      username: ${DB_USERNAME}
      password: ${DB_PASSWORD}                         # D-P2-13 rotate prod DB password
      initial-size: 1
      min-idle: 1
      max-active: 20
      max-wait: 60000
      validation-query: select 'x'
      test-while-idle: true
      filters: stat
  thymeleaf:
    cache: true                                        # WARNING 1: prod enables template cache (dev profile sets false for hot reload; prod overrides back to true)

# External HTTP SDK keys (EXT-04) — prod env-var injection.
spt:
  app:
    secretKey: ${SPT_APP_SECRET}                       # D-P2-13 rotate
    appCode: ${SPT_APP_CODE}
  # Phase 4 D-P4-01 方案 A: Feign self-loopback anchor (prod env-var, no default — fail-fast).
  # BasClientConfig reads this key; the 238 bas Feign proxies self-loop to this URL.
  # Prod points at the monolith's own external-facing URL/port (same process, same port).
  bas:
    server:
      url: ${SPT_BAS_SERVER_URL}
  # Phase 4 Wave 3 (Plan 04-05): basWx purchase contracts prod URL (force-externalized).
  bas.purchaseWx:
    url: ${SPT_BAS_PURCHASE_WX_URL}
  # Phase 4 Wave 3 (Plan 04-05): report contracts prod URL (force-externalized).
  report:
    url: ${SPT_BAS_REPORT_URL}

auth:
  url: ${AUTH_URL}
push:
  server:
    url: ${PUSH_SERVER_URL}
file:
  server:
    url: ${FILE_SERVER_URL}
sign:
  server:
    url: ${SIGN_SERVER_URL}                            # Pitfall 9: required for cfca Feign SpEL

# Phase 3 auth config — prod env-var placeholders (D-P3-07/D-P3-12).
# All values resolve from environment; empty default = feature OFF in prod.
shiro:
  prop:
    mock-password: ${ZGBAS_MOCK_PASSWORD:}             # D-P3-07: empty default = mock backdoor OFF in prod (source application-prod.properties comments this out)
    app-cd: ${ZGBAS_APP_CD:}                           # D-P3-02: appCode via env-var
zgBas:
  secret: ${ZGBAS_SECRET:}                             # D-P3-12: SSO secret via env-var

# Phase 4 D-P4-04: rocketmq prod config — all placeholders force-externalized (D-P2-13).
# Source application-prod.properties:34-36 had plaintext AK/SK; we externalize them.
# Producer is lazy-connecting (RESEARCH A2): broker reachability is a deploy-time concern,
# not a context-boot concern. ${ROCKETMQ_NAMESERVER} has no default — fail-fast if unset.
rocketmq:
  name-server: ${ROCKETMQ_NAMESERVER}
  producer:
    group: contract_producer_group
    access-key: ${ROCKETMQ_AK}
    secret-key: ${ROCKETMQ_SK}
# Phase 4 Wave 3 (Plan 04-05): res.* prod config. res.md5.secret.key is a fixed non-secret
# MD5 salt label (literal in source application.properties:72 — same value across envs);
# the URLs are env-specific so they are force-externalized (D-P2-13).
res:
  md5:
    secret:
      key: pd_md5_key
  fileView: ${RES_FILEVIEW_URL}
  login:
    url: ${RES_LOGIN_URL}
  mobile:
    login:
      url: ${RES_MOBILE_LOGIN_URL}
# Phase 4 Wave 4 (Plan 04-06): BFF controller @Value placeholders (D-P2-13 prod externalization).
basData:
  md5:
    secret:
      key: basData_md5_key
  server:
    url: ${BASDATA_SERVER_URL}
down:
  wordOutputUrl: ${DOWN_WORD_OUTPUT_URL}
fact:
  bis:
    url: ${FACT_BIS_URL}
    secret:
      secretKey: ${FACT_BIS_SECRET_KEY}
trade:
  app:
    secret: ${TRADE_APP_SECRET}
  login:
    url: ${TRADE_LOGIN_URL}
# Phase 4 Wave 3 (Plan 04-05 Rule 3): remaining placeholder keys referenced by ported
# basServer service impls (照搬 source basServer application.properties /
# application-prod.properties). Non-secret invariant values (boolean feature flags + the
# fixed share.key label — identical across all source envs, like res.md5.secret.key above)
# are committed as literals; env-specific URLs and the third-party Baidu API key are
# force-externalized (D-P2-13 prod externalization, fail-fast — no committed plaintext,
# no defaults for secrets).
baidu:
  map:
    ak: ${BAIDU_MAP_AK}
basTrade:
  server:
    approveCallBackUrl: ${BASTRADE_APPROVE_CALLBACK_URL}
cms:
  server:
    url: ${CMS_SERVER_URL}
credit:
  contract:
    switch: true
picc:
  contract:
    switch: false
share:
  key: shareUrl
zip:
  file:
    directory: ${ZIP_FILE_DIRECTORY}
