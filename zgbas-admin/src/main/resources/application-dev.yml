# zgbas-plus dev profile — non-secret local defaults + env-var placeholders for secrets (D-P2-13).
# Secrets are NEVER committed: DB password + auth secretKey resolve from the local environment
# (export DB_PASSWORD / SPT_APP_SECRET, or a gitignored local override). The plaintext values that
# were briefly committed here (and already in the source zgbas git history) MUST be rotated.
spring:
  datasource:
    druid:                                             # D-P2-15 unified prefix -> @ConfigurationProperties(spring.datasource.druid)
      driver-class-name: com.mysql.cj.jdbc.Driver
      url: jdbc:mysql://47.104.15.98:3306/sptbasdb_pd?serverTimezone=GMT%2B8&useUnicode=true&characterEncoding=UTF-8&useSSL=false
      username: ${DB_USER:sptbaspduser}
      password: ${DB_PASSWORD}                        # D-P2-13 externalized — export DB_PASSWORD locally; rotate the leaked value
      initial-size: 1
      min-idle: 1
      max-active: 20
      max-wait: 60000
      time-between-eviction-runs-millis: 60000
      min-evictable-idle-time-millis: 300000
      validation-query: select 'x'
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false
      pool-prepared-statements: true
      max-pool-prepared-statement-per-connection-size: 20
      filters: stat

# External HTTP SDK keys (EXT-04) — dev defaults from source config.properties.
spt:
  app:
    secretKey: ${SPT_APP_SECRET}                      # D-P2-13 externalized — export locally; rotate the leaked value
    appCode: ${SPT_APP_CODE:zgbas}

auth:
  url: http://47.104.15.98:9011
push:
  server:
    url: http://push.tosupply.cn/ys-push-server
file:
  server:
    url: http://file.tosupply.cn/ys-file-server
sign:
  server:
    url: http://47.104.15.98:9002                       # Pitfall 9: required for cfca Feign SpEL #{signServerConfig.url}
